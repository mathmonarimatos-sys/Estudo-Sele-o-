  { id: "cr3", subject: "cruise", q: "LRC só pode ser usado em voos longos?", options: ["Não, pode ser usado em qualquer voo", "Sim, conforme o próprio nome diz", "Apenas em voos longos acima 3000nm", "Apenas com mais de 6 passageiros"], correct: 0, explanation: "NÃO. O nome confunde. LRC pode ser usado em QUALQUER voo. Em longos a economia é maior em absoluto. Não existe regime 'Short Range Cruise' — em curtos geralmente usa-se ECON do CI da empresa." },
  { id: "cr4", subject: "cruise", q: "A Holding Speed é exatamente a Minimum Endurance Speed (ME)?", options: ["Sim, ME e Holding são exatamente idênticas", "Não, Holding é levemente maior, mais estável", "Não, Holding é levemente menor que ME", "Holding usa MRC, ME não é aplicável"], correct: 1, explanation: "Levemente MAIOR que ME. A ME está em região INSTÁVEL (back-side da curva): perder velocidade exige MAIS empuxo. Holding fica logo após ME, em região estável. Por isso aviões fazem hold acima da ME teórica." },
  { id: "cr5", subject: "cruise", q: "Como o vento afeta MRC, LRC e ECON speeds?", options: ["Todas as três são corrigidas pelo vento", "Nenhuma das três é corrigida pelo vento", "MRC e ECON corrigem por vento, LRC não", "Somente o LRC sofre correção por vento"], correct: 2, explanation: "MRC e ECON ajustam pela presença de vento (headwind aumenta velocidade, tailwind reduz). LRC é regime FIXO definido por fórmula peso-altitude — independe de vento." },
  { id: "cr6", subject: "cruise", q: "Aeronave fica mais leve em cruzeiro. O MRC/LRC fazem o quê?", options: ["Saltam alternadamente", "Sobem", "Ficam iguais", "Descem"], correct: 3, explanation: "DESCEM. Menos peso = menos sustentação necessária = menos arrasto = curva de drag para velocidades menores. MRC e LRC caem progressivamente conforme combustível é queimado." },
  { id: "ca1", subject: "cruise", q: "O que é Optimum Altitude?", options: ["Altitude estrutural máxima certificada AFM", "Altitude do máximo Fuel Mileage no peso", "Tropopausa padrão na atmosfera ISA", "Altitude do menor consumo absoluto"], correct: 1, explanation: "Altitude de MÁXIMO Fuel Mileage para o peso ATUAL. Aeronave mais leve = optimum mais alto. À medida que queima combustível, optimum sobe linearmente — daí estratégia de step climb." },
  { id: "ca2", subject: "cruise", q: "No RVSM, qual é a estratégia de Step Climb?", options: ["Subir 4000ft de uma vez quando leve", "Descer 1000ft a cada hora cheia", "1000ft acima até 1000ft abaixo, +2000ft", "Manter sempre exatamente o optimum"], correct: 2, explanation: "Sobe-se inicial 1.000ft ACIMA do optimum. Voa até ficar 1.000ft ABAIXO. Faz Step Climb de 2.000ft (RVSM exige separação de 1.000ft). Tipicamente a cada 2.5h num 737NG." },
  { id: "ca3", subject: "cruise", q: "Qual a penalidade aproximada voando 4.000ft ABAIXO do Optimum Altitude?", options: ["Mais de 20%", "1 a 2%", "Sem penalidade", "3 a 6%"], correct: 3, explanation: "3 a 6%. Quanto mais baixo, pior: 2000ft abaixo: 1-2%; 4000ft: 3-6%; 8000ft: 9-16%; 12000ft: 16-23%. Voar acima também penaliza (+2000ft: 2-5%)." },
  { id: "ca4", subject: "cruise", q: "O que limita a Maximum Altitude da aeronave?", options: ["Buffet ou empuxo, o menor dos dois", "O tipo de motor da aeronave em uso", "A velocidade do som na altitude atual", "Regulamentação do espaço aéreo controlado"], correct: 0, explanation: "BUFFET (margem entre stall e MMO) OU EMPUXO disponível para manter cruzeiro em ar rarefeito. O MENOR dos dois define o teto. Aeronaves leves: limitadas por buffet. Pesadas: por empuxo." },
  { id: "ci1", subject: "ci", q: "O que é Cost Index (CI)?", options: ["Tarifa cobrada pelo aeroporto destino", "Custo total acumulado do voo", "Custo médio por passageiro embarcado", "Razão entre TRC e Fuel Cost"], correct: 3, explanation: "CI = TRC ÷ Fuel Cost. Define equilíbrio entre voar mais rápido (gasta TRC) e voar mais devagar (gasta combustível). Tradutor de prioridades operacionais em velocidade." },
  { id: "ci2", subject: "ci", q: "O Cost Index é calculado da mesma forma em todos os fabricantes?", options: ["Não, cada fabricante usa unidades diferentes", "Sim, é um número universal", "Sim, mas só em jatos modernos", "Apenas em aeronaves widebody"], correct: 0, explanation: "Cada fabricante define o CI com unidades próprias (hora vs minuto para TRC; libras vs kg para combustível). Por isso, CI=25 num fabricante NÃO significa o mesmo em outro. A INTERPRETAÇÃO do CI também varia." },
  { id: "ci3", subject: "ci", q: "O Cost Index relaciona o que com o que?", options: ["Tempo de voo total com fuel queimado", "Custos relacionados ao tempo com custo do combustível", "Custos fixos com custos variáveis", "MTOW com peso real do voo"], correct: 1, explanation: "CI = Custos Relacionados ao Tempo (TRC) ÷ Custo do Combustível. Define equilíbrio entre voar rápido (gasta TRC) e voar devagar (gasta combustível). Tradutor de prioridades operacionais em velocidade." },
  { id: "ci4", subject: "ci", q: "O que é CI 0?", options: ["Velocidade mínima estrutural", "ECON Speed máxima", "Equivale a MRC", "Equivale a MMO"], correct: 2, explanation: "CI ZERO = MRC. 'Custo de tempo é zero comparado a combustível' → prioriza menor consumo. Matematicamente: TRC÷∞ tende a 0 → fuel cost infinito = CI 0." },
  { id: "ci5", subject: "ci", q: "O que é CI MAX?", options: ["Velocidade do stall", "Velocidade mínima", "Velocidade do menor consumo", "Velocidade próxima de MMO"], correct: 3, explanation: "CI MAX = velocidade próxima de MMO (limite operacional). 'Custo de tempo altíssimo comparado a combustível' → voa o mais rápido possível. Limites: 200, 500, 999 ou 9999 conforme aeronave Boeing." },
  { id: "ci6", subject: "ci", q: "O que é Overhead Difference Fuel?", options: ["Excesso queima 3.5% por hora carregado", "Combustível extra para sobrevoo", "Reserva de combustível para emergência", "Combustível consumido pelo APU em solo"], correct: 0, explanation: "Combustível extra carregado queima cerca de 3.5% do seu volume por hora de voo. Ex.: 2000kg extras em voo de 3h → ~210kg queimados apenas para carregar o excesso. Regra de bolso para jatos." },
  { id: "ci7", subject: "ci", q: "Qual a diferença entre Air Distance e Ground Distance?", options: ["São conceitos totalmente iguais", "Air é com vento, Ground é solo", "Air só é usada em aeronaves jato", "Ground inclui distância sobre o mar"], correct: 1, explanation: "AIR DISTANCE: medida em relação ao AR (afetada por vento — headwind aumenta, tailwind diminui). GROUND DISTANCE: projetada no SOLO (independente de vento). Great Circle: distância mais curta na superfície esférica." },
  { id: "dd1", subject: "drift", q: "O que é Driftdown?", options: ["Configuração específica para descida normal", "Manobra de fuga de turbulência severa", "Procedimento com MCT após falha em cruzeiro", "Procedimento padrão antes da aproximação"], correct: 2, explanation: "Após falha de motor em cruzeiro: ajusta MCT (Maximum Continuous Thrust) nos remanescentes, escolhe velocidade (geralmente Green Dot), desce até velocidade gerar voo nivelado. Manobra clássica de emergência." },
  { id: "dd2", subject: "drift", q: "Qual a velocidade ÓTIMA de driftdown?", options: ["Mach 0.78 fixo em qualquer caso", "VMO ou MMO de operação", "1.3 vezes a velocidade de estol", "Best L/D, conhecido como Green Dot"], correct: 3, explanation: "Optimum Driftdown Speed = Best L/D (Lift over Drag) = melhor gliding speed considerando motor(es) restante(s) em MCT. Airbus/Embraer: 'Green Dot Speed' (ponto verde no airspeed indicator)." },
  { id: "dd3", subject: "drift", q: "O que é Net Driftdown Flight Path (NDF)?", options: ["Trajetória com margens para planejamento", "Trajetória real medida em tempo real", "Trajetória calculada apenas no FMS", "Trajetória só após go-around acionado"], correct: 0, explanation: "TRAJETÓRIA TEÓRICA com margens de segurança subtraídas. Usado pelos despachantes para checar terrain clearance antes do voo. Aparece nos manuais de performance. Aeronave real voa MELHOR (GDF)." },
  { id: "dd4", subject: "drift", q: "Quais as margens de gradiente sobre obstáculos no driftdown?", options: ["1.0% igual para qualquer tipo de aeronave", "Bi 1.1%, tri 1.4%, quad 1.6%", "2.4% padrão fixo para todos os modelos", "Bi 2.4%, quad 3.0% conforme TOGA"], correct: 1, explanation: "Bimotor: +1.1%. Trimotor: +1.4%. Quadrimotor: +1.6%. Com dois motores inop (tri/quad): 0.3% e 0.5%. Mais motores = MAIOR margem exigida (contraintuitivo, mas é regra)." },
  { id: "dd5", subject: "drift", q: "Quais alturas mínimas o driftdown deve cumprir?", options: ["Margens fixas iguais em todos os casos", "Sem regra obrigatória de margem definida", "Obstáculo 2000ft, nivelar 1000ft, hold 1500ft", "Margem padronizada de 500ft segura"], correct: 2, explanation: "1) Limpa obstáculo por mín 2000ft. 2) Nivela pelo menos 1000ft acima de obstáculos. 3) Chega ao alternate com capacidade de HOLDING 1500ft acima. Três margens distintas." },
  { id: "dd6", subject: "drift", q: "Qual a half-width da faixa de análise de terreno (FAA / EASA)?", options: ["10nm / 10nm", "3.0nm / 4.0nm", "5.5nm / 7.0nm", "4.3nm / 5.0nm"], correct: 3, explanation: "FAA: 4.3nm cada lado da rota. EASA: 5.0nm cada lado (mais conservadora). O maior obstáculo dentro dessa faixa é o que o driftdown profile deve superar." },
  { id: "dd7", subject: "drift", q: "Após terminado o driftdown, o piloto tem quais opções?", options: ["Manter velocidade, acelerar ou descer LRC", "Pousar imediatamente sem outras opções", "Aguardar o motor reiniciar sozinho", "Declarar emergência ao ATC e aguardar"], correct: 0, explanation: "A) Mantém velocidade — aeronave recupera altitude conforme fica leve. B) Mantém altitude — acelera gradualmente. C) Desce para FL menor com mais ar, acelera para LRC. Decisão depende de combustível/destino." },
  { id: "ox1", subject: "drift", q: "Em que altitude TODOS os ocupantes precisam de O2 suplementar?", options: ["10.000ft", "14.000ft", "25.000ft", "37.000ft"], correct: 2, explanation: "Acima de 25.000ft: O2 para TODOS. Entre 10-25.000ft: apenas tripulação cockpit. Abaixo de 10.000ft: ninguém precisa. Por isso descida emergencial mira 10.000ft." },
  { id: "ox2", subject: "drift", q: "TUC a 35.000ft em descompressão RÁPIDA é aproximadamente:", options: ["Menor que 5 segundos", "30 segundos a 1 minuto", "2-3 minutos", "15 a 30 segundos"], correct: 3, explanation: "15-30 segundos em descompressão rápida (a 35.000ft). Em descida normal: 30s-1min. Em 40.000ft: 15-20s normal, 7-10s rápida. Por isso a máscara deve ser colocada IMEDIATAMENTE — segundos contam." },
  { id: "ox3", subject: "drift", q: "Pilotos usam que tipo de sistema de oxigênio?", options: ["Cilindro gasoso de O2 puro", "Gerador químico", "Mesmo dos passageiros", "Oxigênio do bleed air"], correct: 0, explanation: "GASEOSO — cilindro dedicado com O2 puro. Fornece 100% por 10min + 110min em fluxo normal a 10.000ft. Sistema mais raro/caro, mas necessário para uso prolongado em cockpit." },
  { id: "ox4", subject: "drift", q: "Passageiros usam que tipo de sistema de oxigênio?", options: ["Cilindro pressurizado com oxigênio", "Gerador químico de clorato e ferro", "Cilindro do APU compartilhado", "Ar comprimido da própria cabine"], correct: 1, explanation: "Gerador QUÍMICO: clorato de sódio + pó de ferro reagem produzindo O2. Aquece a 230°C (cheiro de queimado é normal). Capacidades: 12, 15, 17 ou 22 minutos." },
  { id: "ox5", subject: "drift", q: "As máscaras de O2 podem ser usadas em caso de FUMAÇA na cabine?", options: ["Sim, em qualquer tipo de fumaça densa", "Sim, mas só as máscaras dos pilotos", "Não, misturam ar da cabine contaminado", "Sim, exclusivamente em fumaça densa"], correct: 2, explanation: "NÃO! Máscaras de PASSAGEIROS misturam O2 com ar da cabine. Em caso de fumaça, fariam INALAR a fumaça contínua. Pilotos têm máscara separada com smoke goggles." },
  { id: "ox6", subject: "drift", q: "Cada fileira de assentos tem quantas máscaras?", options: ["Aeronaves quadrimotoras de longo curso", "Voos com tempo total acima de 6 horas", "Voos internacionais de Flag Air Carriers", "Quando a rota tem terreno acima de 8.000ft"], correct: 3, explanation: "Uma máscara A MAIS que o número de assentos (ex.: fileira de 3 = 4 máscaras). Para bebês no colo, animais, comissário no corredor. Todas no mesmo gerador — não é redundância contra falha." },
  { id: "ox7", subject: "drift", q: "Quanto tempo uma descida emergencial leva tipicamente de FL370 a 10.000ft?", options: ["2-3 minutos", "6-7 minutos", "15-20 minutos", "Mais de 30 minutos"], correct: 1, explanation: "Tipicamente 6-7 minutos em jato comercial (737-800). Cobre 40-50nm de distância. Regulamento exige descida dentro de 10 minutos. Limitado pela curva operacional do gerador de O2." },
  { id: "ld1", subject: "land", q: "VREF nunca pode ser menor que:", options: ["Fixa em 1.10 VS para qualquer peso", "Fixa em 130 nós em qualquer aeronave", "Exatamente 1.13 VSR de margem mínima", "VMCL ou 1.23 VSR, o maior dos dois"], correct: 3, explanation: "VREF mínima = MAIOR entre VMCL e 1.23 VSR. Garante controle direcional em landing config E margem mínima ao estol. Antes do VS1G era 1.30 VS — daí a confusão em livros antigos." },
  { id: "ld2", subject: "land", q: "A VAPP é igual a:", options: ["VREF mais um incremento variável", "Exatamente igual à VREF certificada", "VS mais 5 nós de segurança fixa", "1.3 vezes a VREF para qualquer peso"], correct: 0, explanation: "VAPP = VREF + Incremento. Incremento = ½ HWC + Gust, mínimo 5kt, máximo 15kt. Com autothrottle acoplado, fixa em 5kt. Garante margem contra perda de velocidade na final." },
  { id: "ld3", subject: "land", q: "Qual o limite máximo do incremento de VAPP?", options: ["10 nós máximo, mínimo 5 nós", "15 nós, revisado em 2018, antes 20", "20 nós como na regra anterior", "25 nós em qualquer condição"], correct: 1, explanation: "15kt — limite revisado em 2018 (antes era 20kt). VAPP também limitada por Placard Speed - 5kt. Limite alto demais aumenta arrasto e dificulta arredondamento." },
  { id: "ld4", subject: "land", q: "Gradiente mínimo de Approach Climb em BIMOTOR:", options: ["1.6%", "2.4%", "2.1%", "3.2%"], correct: 2, explanation: "2.1% para bimotor, 2.4% para trimotor, 2.7% para quadrimotor. Configuração: motor crítico INOP, flap approach, trem UP, VREF+5. Simula go-around com motor falhado." },
  { id: "ld5", subject: "land", q: "Gradiente do Landing Climb (TODOS motores):", options: ["2.1% apenas para bimotor", "2.7% apenas para quadrimotor", "Varia conforme número motores", "3.2% qualquer aeronave"], correct: 3, explanation: "3.2% para QUALQUER aeronave. Configuração: todos em TOGA, flap pouso, trem DOWN, VREF. Simula rejected landing — capacidade de subir após decisão tardia de go-around." },
  { id: "ld6", subject: "land", q: "Certified Landing Distance em pista SECA representa qual fração da pista disponível?", options: ["60%", "30%", "85%", "100%"], correct: 0, explanation: "60% — distância × 1.67 (ou ÷ 0.6). Sobra 40% de margem operacional. Por isso pousos em pista seca têm muita reserva. Em wet, adiciona-se 15% sem o cap dos 60%." },
  { id: "ld7", subject: "land", q: "Wet Runway: que margem adicional sobre a distância de pista seca?", options: ["0%", "15%", "10%", "50%"], correct: 1, explanation: "15% sobre Certified Landing Distance dry. Em pista SKR (Skid Resistant Runway), pode usar método alternativo wet (mede direto em wet + 15%). No Brasil só SBRJ e SBSP têm certificação SKR." },
  { id: "ld8", subject: "land", q: "Qual o coeficiente de frenagem mínimo do RCC 5 (Good)?", options: ["≥ 0.20", "≥ 0.30", "≥ 0.40", "≥ 0.50"], correct: 2, explanation: "≥ 0.40 — frenagem normal, controle direcional normal. Exemplos: damp, frost, water ≤3mm, slush/snow ≤3mm. Padrão para a maioria das pistas em condição não-extrema." },
  { id: "ld9", subject: "land", q: "RCC 0 (Nil) significa:", options: ["Pista seca completamente sem problemas", "Pouso viável com cuidado adicional", "Apenas pista militar restrita", "Frenagem mínima, pouso proibido"], correct: 3, explanation: "Coeficiente ≤ 0.20. Frenagem MÍNIMA ou inexistente, controle direcional INCERTO. Exemplos: wet ice, slush over ice. Pouso fora de envelope normal — emergência apenas." },
  { id: "ld10", subject: "land", q: "Para autobrake em pista seca, o melhor uso é:", options: ["Nível baixo, complementando com reverso", "Sem autobrake, frenagem manual direta", "MED padrão recomendado em qualquer pista", "Nível máximo MAX para parada rápida"], correct: 0, explanation: "Nível baixo (1-2) + reverso. Autobrake monitora desaceleração: se pouco basta, aplica pouco. Com reverso ajudando, freio é pouco solicitado = menos desgaste/calor. MAX só se realmente precisar." },
  { id: "ld11", subject: "land", q: "QTLW (Quick Turnaround Limit Weight) garante o quê?", options: ["Margem extra de pouso por flap retraído", "Que fuse plugs não derretem em decolagem imediata", "Combustível mínimo para taxi até gate", "Que RTO pode ser feita logo após o pouso"], correct: 1, explanation: "Garante que fuse plugs NÃO derretem durante decolagem imediata após pouso. NÃO garante que RTO funcionará — RTO alta energia ainda pode derreter os plugs. Boeing não fornece tabela para esse caso." },
  { id: "ld12", subject: "land", q: "Após RTO de alta energia, taxiar para esfriar os freios:", options: ["Boa prática, ajuda a dissipar calor", "Não tem efeito significativo nos freios", "Piora — taxi adiciona mais calor", "Aceitável apenas em pistas longas"], correct: 2, explanation: "PIORA. Taxi adiciona MAIS calor (atrito, curvas, freios). Em 2018, B767 fez taxi de ~10min após RTO no JFK; freios pegaram FOGO. Após RTO alta energia: PARAR, aguardar bombeiros e cooldown." },
  { id: "ld13", subject: "land", q: "Frenos de carbono vs aço no pouso (autobrake MAX): qual permite mais peso?", options: ["São funcionalmente idênticos no pouso", "Aço sempre permite mais peso de pouso", "Depende do flap de pouso escolhido", "Carbono permite até 1000 kg a mais"], correct: 3, explanation: "CARBONO — 700-1000kg a mais. Autobrake controla DESACELERAÇÃO; aeronave mais pesada chega mais rápido e usa mais pista. Carbono compensa melhor que aço. Com freio MANUAL, ambos param na mesma distância." },
  { id: "pn1", subject: "misc", q: "Para operar UNRESTRICTED, o ACN da aeronave deve ser:", options: ["≥ PCN", "Irrelevante", "Igual ao PCN", "≤ PCN"], correct: 3, explanation: "ACN ≤ PCN. Se ACN > PCN, operação POSSÍVEL mas restrita (reduz vida do pavimento, exige autorização). Aeronave sempre que possível busca aeroportos onde ACN ≤ PCN." },
  { id: "pn2", subject: "misc", q: "PCN se aplica a pistas de cascalho ou grama?", options: ["Não, apenas a pistas pavimentadas paved", "Apenas em aeroportos internacionais", "Sim, aplica-se a todas as pistas", "Apenas em pistas com PCN homologado ANAC"], correct: 0, explanation: "Apenas a pistas PAVED. PCN = Pavement Classification Number — o nome explicita. Pistas não-paved usam outros critérios definidos pelo operador do aeroporto." },
  { id: "pn3", subject: "misc", q: "No PCN 40/F/C/X/T, a letra F significa:", options: ["Fatigue strength estrutural da subgrade", "Pavimento Flexível em asfalto", "Frequência de uso por tipo de aeronave", "Frente, posição relativa do nariz"], correct: 1, explanation: "F = Flexible (flexível, asfalto). R = Rigid (concreto). Determina como força é distribuída. Flexível: pressão se espalha lateralmente. Rígido: pressão vai verticalmente para subgrade." },
  { id: "et1", subject: "etops", q: "ETOPS 60 significa:", options: ["Certificação especial para até 60 minutos", "Padrão sem certificação ETOPS para bimotor", "Distância máxima de 60 nm da rota", "Aplicação exclusiva a quadrimotores"], correct: 1, explanation: "Padrão default para bimotores SEM ETOPS especial. Pode voar até 60min de aeroporto adequado. Acima, precisa certificação específica (ETOPS 120, 180, 240, 330)." },
  { id: "et2", subject: "etops", q: "Por que a regra original era 60 minutos?", options: ["Limite original imposto pelo FMS antigo", "Regulamento ICAO atualizado em 1990", "Motores a pistão de 1953 falhavam muito", "Limite estrutural da fuselagem pressurizada"], correct: 2, explanation: "1953: motores a pistão tinham alta taxa de falha. Estatística forçou regra de 60min de aeroporto adequado. Mantida no era jato — daí surgiu ETOPS para 'liberar' bimotores confiáveis." },
  { id: "et3", subject: "etops", q: "O que é EEP no ETOPS?", options: ["Engine Emergency Point após falha real", "Estimated End Point da fase de cruzeiro", "Equal Pressure Point entre alternates", "ETOPS Entry Point ao sair do círculo 60min"], correct: 3, explanation: "ETOPS Entry Point — onde aeronave SAI do círculo de 60min de um aeroporto e ENTRA na região ETOPS. A partir daí, regulamentação ETOPS plena se aplica." },
  { id: "et4", subject: "etops", q: "Antes de cruzar o EEP, qual condição obrigatória?", options: ["Tempo no alternate OK 1h antes/1h depois", "Combustível extra de 5% sobre o normal", "Aviso por HF para o centro de controle", "Transmissão SELCAL com a empresa"], correct: 0, explanation: "Tempo (meteorologia) no aeroporto alternate ETOPS deve estar OK desde 1h ANTES até 1h DEPOIS da hora prevista de uso. Se ruim, NÃO pode cruzar EEP — deve aguardar ou desviar." },
  { id: "et5", subject: "etops", q: "O ETOPS Critical Fuel cobre quais cenários?", options: ["Cenário de falha de um motor em cruzeiro", "Falha de motor, descompressão e ambos no pior caso", "Apenas descompressão rápida da cabine", "Vento contrário acima de 50 nós previsto"], correct: 1, explanation: "Em cada ETP avalia: 1) Falha motor, 2) Descompressão, 3) Ambos simultâneos. O PIOR cenário define combustível mínimo no ETP. Se decolagem padrão não basta, adiciona-se ETOPS Critical Fuel." },
  { id: "et6", subject: "etops", q: "O que é EDTO?", options: ["Sinônimo antigo de ETOPS dos anos 1980", "Sistema de planejamento dentro do FMS", "Nome ICAO mais novo, aplica a qualquer aeronave", "Apenas para aeronaves quadrimotores"], correct: 2, explanation: "Extended Diversion Time Operations — ICAO 2003. Substitui ETOPS conceitualmente, mas aplica a QUALQUER aeronave (não só bimotor). Para >2 motores: padrão 180min. Indústria ainda usa 'ETOPS' por hábito." },
  { id: "et7", subject: "etops", q: "Em quadrimotor, o fator limitante de EDTO geralmente é:", options: ["Falha de um motor em cruzeiro de alta", "Autonomia da bateria do APU em standby", "Capacidade das reservas de oxigênio", "Sistema de supressão de fogo no porão"], correct: 3, explanation: "Sistema de SUPRESSÃO DE FOGO nos compartimentos de carga. EDTO quadrimotor = tempo máx supressão de fogo MENOS 15min. Falha de motor raramente é limitante em quad — 3 motores sobram." },
  { id: "me1", subject: "misc", q: "MEL significa o quê?", options: ["Autorização de dispatch com defeito temporário", "Manual de procedimentos de emergência", "Lista de equipamentos mínimos obrigatórios", "Lista de manutenção programada da empresa"], correct: 0, explanation: "Minimum Equipment List = AUTORIZAÇÃO para dispatch com item INOPERATIVE por tempo limitado, sob restrições. NÃO é lista de equipamentos mínimos — esse é o mito comum." },
  { id: "me2", subject: "misc", q: "Item NÃO listado na MEL: pode dispatchar?", options: ["Sempre proibido — sem exceção", "Apenas se for NEF não essencial", "Sempre permitido por padrão", "Apenas se a falha for intermitente"], correct: 1, explanation: "Apenas se for NEF (Non-Essential Furnishings — mesinha, encosto, etc.). Sistemas ESSENCIAIS não listados na MEL: NO-GO, aeronave fica AOG (Aircraft On Ground). MEL não cobre tudo." },
  { id: "me3", subject: "misc", q: "Categoria B de Repair Interval na MEL:", options: ["10 dias-calendário, sem prorrogação", "1 dia-calendário, prorrogável uma vez", "3 dias-calendário, prorrogável uma vez", "120 dias-calendário, sem prorrogação"], correct: 2, explanation: "B = 3 dias-calendário (72h). A=remarks. C=10 dias. D=120 dias. B e C podem ter extensão one-time se notificada ao regulador. Excluindo o dia da anotação no log." },
  { id: "me4", subject: "misc", q: "Em voo, identifica-se uma falha. Usa MEL ou QRH?", options: ["Consulta a MEL ainda em vigor", "FCOM com seu índice operacional", "AFM como referência primária", "QRH, já passou Point of Dispatch"], correct: 3, explanation: "QRH (Quick Reference Handbook) em voo — já passou do Point of Dispatch. MEL é PRÉ-dispatch. Boa prática: depois consultar MEL para próxima etapa (ex.: tankering, peças)." },
  { id: "cw1", subject: "cold", q: "Type I Fluid tem propriedade anti-ice?", options: ["Sim, sempre", "Não, apenas deicing", "Apenas em concentração 100%", "Apenas em turboprops"], correct: 1, explanation: "NÃO — Type I é APENAS DEICING (remove gelo). Não previne reformação. Em precipitação contínua: Type I primeiro (limpa) + Type II/IV depois (protege contra novo acúmulo)." },
  { id: "cw2", subject: "cold", q: "Type IV Fluid é usado como:", options: ["Apenas deicing rápido", "Substituto de óleo", "Anti-icing", "Mistura padrão para turboprop"], correct: 2, explanation: "ANTI-ICING — mais denso, aplicado frio em segundo passo. Cria película protetora contra reformação de gelo. Concentrações comuns: 100%, 75/25 ou 50/50 com água quente." },
  { id: "cw3", subject: "cold", q: "HOT (Holdover Time) começa a contar a partir de quando?", options: ["Liberação para taxi", "Fim da aplicação do Type I", "Fechamento da porta", "Início da aplicação do ANTI-ICE"], correct: 3, explanation: "Início da aplicação do ANTI-ICE (Type II/IV). HOT mede proteção do anti-ice, e essa só começa quando aplicado. Em aplicação two-step, conta a partir do START do Type IV, não do Type I." },
  { id: "cw4", subject: "cold", q: "Temperatura de congelamento do JET A vs JET A-1:", options: ["JET A -40°C, JET A-1 -47°C", "Mesmo valor: -47°C", "JET A -47°C, JET A-1 -40°C", "JET A -50°C, JET A-1 -55°C"], correct: 0, explanation: "JET A: -40°C (usado nos EUA). JET A-1: -47°C (resto do mundo). Voos partindo dos EUA têm maior vigilância. Diferença de 7°C importa em rotas polares." },
  { id: "cw5", subject: "cold", q: "Onde fica a sonda de temperatura de combustível?", options: ["No tanque central protegido", "No tanque da ASA, mais frio", "No reservatório do APU", "No bocal de abastecimento"], correct: 1, explanation: "No TANQUE DA ASA. É o local mais EXPOSTO ao ar frio. Tanque central é 'protegido' pela cabine. Sonda na asa = pior caso = decisão segura. Filosofia conservadora." },
  { id: "cw6", subject: "cold", q: "O combustível em voo pode chegar a temperatura MAIS BAIXA que:", options: ["Acima do OAT na altitude de cruzeiro", "Próximo ao zero absoluto da Kelvin", "TAT, Total Air Temperature do ar", "Tropopausa padrão da atmosfera ISA"], correct: 2, explanation: "Não abaixo de TAT. Combustível equilibra com skin da asa, que equilibra com TAT. Se TAT < freezing point do combustível, há risco — piloto desce/acelera para subir TAT." },
  { id: "cw7", subject: "cold", q: "Boots (botas de degelo) de turboprop podem fazer anti-ice?", options: ["Sim, mas apenas em climb", "Sim, inflando antes", "Sim, com controle automático", "Não — apenas DEICING reativo"], correct: 3, explanation: "NÃO. Boots são APENAS DEICING — inflam para QUEBRAR gelo já formado. Inflar antes = sem efeito. Se gelo passou do alcance, boots não funcionam mais. Timing é crítico." },
  { id: "cw8", subject: "cold", q: "Ice Crystal Icing acontece principalmente:", options: ["Em ar quente próximo a CBs tropicais", "Em ar muito frio abaixo de -40°C", "Em rotas polares durante o inverno", "Em formações de nuvens estratiformes"], correct: 0, explanation: "Em ar QUENTE (tropical), próximo a CBs sem grande desenvolvimento vertical. Partículas pequenas de gelo lançadas acima do topo de CBs e ingestadas pelo motor. Sintomas: cheiro de ozônio, fogo de Santelmo, vibração de motor." },
  { id: "hi1", subject: "misc", q: "Por que aeroportos de alta altitude são mais desafiadores?", options: ["Mais turbulência mecânica de terreno", "Pista geralmente mais curta que outras", "Ar rarefeito reduz empuxo, aumenta TAS", "Atmosfera não cumpre o padrão ISA"], correct: 2, explanation: "Ar rarefeito = menos empuxo. Mesma IAS = TAS muito maior. Aceleração até VR cai. Distâncias aumentam. Boeing: alta altitude > 8.400ft; Airbus > 9.200ft (limites de envelope)." },
  { id: "hi2", subject: "misc", q: "Em alta altitude, VTIRE Limited TOW fica mais frequente porque:", options: ["Pneus mais sensíveis a frio", "PCN é diferente", "Manuais não cobrem alta altitude", "VTIRE é em GROUND SPEED, e TAS é maior"], correct: 3, explanation: "VTIRE é em GROUND SPEED (TAS). Mesma IAS = TAS maior em alta altitude. Aeronave atinge VTIRE em IAS menor. Tire Speed Limited TOW vira limite frequente em La Paz, Lhasa, etc." },
  { id: "hi3", subject: "misc", q: "Largura MÍNIMA recomendada (não exigida) para pista em jato comercial médio:", options: ["30 metros", "20 metros", "15 metros", "45 metros"], correct: 0, explanation: "Cerca de 30m. Cálculo: envergadura entre rodas externas + desvio máx do centerline + offset voluntário. Recomendação dos fabricantes — ICAO/ANAC não fixam mínimo, apenas recomendam." },
  { id: "hi4", subject: "misc", q: "Estatísticamente, narrow runway é mais perigoso?", options: ["Sim, é estatisticamente mais perigosa", "Não, 115 de 117 veer-offs em pistas largas", "Igualmente perigosa em ambos os casos", "Mais perigosa só com peso elevado"], correct: 1, explanation: "NÃO. Estudo Boeing 1995-2002: 115 dos 117 veer-offs em pistas de 45m+ (não narrow). Falsa sensação de segurança em pista larga relaxa atenção do piloto. Em pista narrow, atenção é alta." },
  { id: "at1", subject: "atm", q: "Temperatura padrão ISA ao nível do mar:", options: ["10°C ou 50°F", "0°C ou 32°F", "15°C ou 59°F", "20°C ou 68°F"], correct: 2, explanation: "15°C, 59°F. Gradient: queda de 1.9812°C a cada 1.000ft até tropopausa (36.089ft), depois constante em -56.5°C. Modelo ISA é base de todos os manuais." },
  { id: "at2", subject: "atm", q: "Pressão padrão ISA ao nível do mar:", options: ["29.00 inHg, padrão FAA antigo", "1000 hPa, valor arredondado pela IATA", "1020 hPa em alta latitude", "1013.25 hPa ou 29.92 inHg"], correct: 3, explanation: "1013.25 hPa = 29.92 inHg. Calibração padrão dos altímetros. Em Flight Level, todos voam com QNE 1013 — importa separação, não altitude real sobre o terreno." },
  { id: "at3", subject: "atm", q: "ISA+10 significa:", options: ["Significa temperatura 10°C acima da ISA", "Significa altitude 10.000 ft acima", "Significa pressão 10 hPa acima da ISA", "Significa velocidade 10 nós acima"], correct: 0, explanation: "Temperatura 10°C acima do esperado pela ISA. Ex.: nível do mar com 25°C = ISA+10 (padrão é 15°C). FL350 com -45°C = ISA+10 (padrão é -55°C). Usado em quase toda performance." },
  { id: "at4", subject: "atm", q: "Dia frio (temperatura abaixo de ISA): altímetro mostra altitude:", options: ["Indica altitude igual à real", "Indica MAIOR que real, PERIGOSO", "Indica MENOR que real, seguro", "Não muda em altitude alguma"], correct: 1, explanation: "MAIOR que real — PERIGOSO. Aeronave fica MAIS BAIXA do que o altímetro indica. Pode aproximar terreno demais. Por isso há tabelas de correção em frio. Dia quente: erro 'seguro' (real fica acima do indicado)." },
  { id: "at5", subject: "atm", q: "Density Altitude representa o quê?", options: ["Altitude do altímetro", "Altitude máxima certificada", "Altitude que o avião 'sente'", "Altitude do voo anterior"], correct: 2, explanation: "Altitude que a aeronave SENTE — corrige Pressure Altitude pela temperatura. Calor = density altitude MAIOR (avião sente como mais alto). Performance pior em dias quentes/altas elevações." },
  { id: "at6", subject: "atm", q: "Diferença entre OAT e TAT:", options: ["OAT é só medido com aeronave em solo", "São numericamente o mesmo valor", "TAT é sempre mais frio que OAT", "OAT é direto, TAT inclui compressão do ar"], correct: 3, explanation: "OAT (Outside Air Temp): direto, sem velocidade. SAT é igual ao OAT (ar parado). TAT (Total Air Temp): inclui compressão por velocidade — SEMPRE MAIOR que SAT. Sensores modernos medem TAT." },
  { id: "at7", subject: "atm", q: "Aeronave a Mach 2 em altitude (compressibilidade alta): TAT vs SAT, qual a relação?", options: ["TAT é muito maior que SAT por ram rise", "TAT é igual à SAT em todas velocidades", "TAT é igual à OAT medida no solo", "TAT é negativa enquanto SAT é positiva"], correct: 0, explanation: "Em alta velocidade, compressão do ar causa GRANDE elevação de temperatura (ram rise). A Mach 2, ram rise pode passar de 170°C. SAT é a temperatura REAL do ar parado; TAT é o ar comprimido pela velocidade." },
  { id: "sp1", subject: "spd", q: "IAS (Indicated Airspeed) é:", options: ["Velocidade verdadeira já corrigida", "Velocidade lida diretamente no instrumento", "Mach number convertido para nós", "Velocidade em relação ao solo"], correct: 1, explanation: "Velocidade lida DIRETAMENTE no instrumento. Tem erros de pitot/fricção. É a velocidade que o piloto usa para CONTROLAR: V1, V2, VREF, VR são em IAS. Não corrige para altitude/densidade." },
  { id: "sp2", subject: "spd", q: "Em altitude, mesma IAS resulta em qual TAS?", options: ["Depende exclusivamente do Mach", "TAS igual, IAS é independente", "TAS maior, partículas mais separadas", "TAS menor, partículas mais próximas"], correct: 2, explanation: "TAS MAIOR. Densidade do ar cai com altitude — partículas mais separadas. Para gerar mesma pressão no pitot, aeronave se move mais rápido. Regra prática: TAS aumenta ~2% por cada 1.000ft." },
  { id: "sp3", subject: "spd", q: "Diferença entre TAS e GS:", options: ["Numericamente são valores idênticos", "TAS já inclui correção do Mach, GS não", "TAS opera em FL, GS apenas no solo", "GS = TAS mais ou menos componente de vento"], correct: 3, explanation: "GS = TAS ± vento. Headwind reduz GS, tailwind aumenta. TAS é em relação ao AR; GS é em relação ao SOLO. Para navegação usa GS; para performance aerodinâmica usa TAS/IAS." },
  { id: "sp4", subject: "spd", q: "Velocidade do som depende SÓ de:", options: ["TEMPERATURA do ar, apenas", "Apenas da densidade do ar", "Apenas da pressão atmosférica", "Apenas da umidade relativa"], correct: 0, explanation: "Só de TEMPERATURA. Fórmula: a = 661.4786 × √(T/288.15) em kt, T em Kelvin. ISA SL: ~661kt. FL350 ISA: ~575kt. Por isso Mach é razão TAS/a — varia conforme T." },
  { id: "sp5", subject: "spd", q: "O que é EAS (Equivalent Airspeed)?", options: ["IAS sem erros mecânicos", "CAS corrigida por compressibilidade", "Mach convertido em IAS", "TAS corrigida por densidade"], correct: 1, explanation: "CAS corrigida pela COMPRESSIBILIDADE em altitude. EAS < CAS em altitude/Mach alto. EAS é o speed 'puro' aerodinâmico — base de cálculo do TAS." },
  { id: "cc1", subject: "spd", q: "O que é Coffin Corner?", options: ["Velocidade de stall em flap 40 fixo", "Vstall ≈ MMO em alta altitude", "Limite estrutural máximo da aeronave", "Velocidade mínima de controle no ar"], correct: 1, explanation: "Em ALTA ALTITUDE, Vs aumenta e MMO fixa. Janela operacional estreita perigosamente. Acelerar = MMO. Desacelerar = stall. Aviões têm Max Operating Altitude conservadora para evitar essa região." },
  { id: "cc2", subject: "spd", q: "Por que Vstall AUMENTA com altitude (mesma CAS)?", options: ["Atrito do ar fica maior em altitude", "Combustível torna-se mais denso", "Mach maior, boundary descola cedo", "Pressão baixa empurra ar menos"], correct: 2, explanation: "Em alta altitude, mesma CAS = Mach MAIOR. Compressibilidade muda fluxo: boundary layer descola MAIS CEDO. Reynolds menor também contribui. M crítico onde stall começa cai com altitude." },
  { id: "vd1", subject: "spd", q: "VA (Maneuvering Speed) é:", options: ["Velocidade máxima estrutural permitida", "Mín. onde controle total atinge limite", "Velocidade típica de descida", "Velocidade padrão de aproximação"], correct: 1, explanation: "MÍNIMA velocidade em que aplicar TODO controle atinge load limit (2.5g+ / -1.0g). Abaixo: estola antes de sobrecarregar. Acima: pode quebrar. Cuidado: VA cobre UM movimento único — deflexões repetidas podem quebrar." },
  { id: "vd2", subject: "spd", q: "Deflexões REPETIDAS de comando abaixo de VA:", options: ["Apenas se feito acima da VRA", "Apenas com manete em IDLE", "Podem quebrar estrutura, como AA587", "Sim, é totalmente seguro repetir"], correct: 2, explanation: "PODEM QUEBRAR. VA cobre UM movimento único. AA587 (A300, 2001): piloto aplicou leme repetido após wake turbulence — vertical stabilizer separou. Todos a bordo morreram. Por isso há aviso nos manuais." },
  { id: "vd3", subject: "spd", q: "VB / VRA / Rough Air Speed é a velocidade de:", options: ["Estol em condição de turbulência severa", "Aproximação visual em pouso curto", "Flap full extended em final stable", "Penetração de turbulência, resistir à rajada"], correct: 3, explanation: "Velocidade de penetração de turbulência. Aeronave resiste à rajada vertical máxima (66 ft/s). Em turbulência severa, piloto reduz para VB/VRA para proteger estrutura." },
  { id: "vd4", subject: "spd", q: "VC (Design Cruising Speed) é geralmente igual a:", options: ["Geralmente igual ao VMO ou MMO", "Geralmente igual à VFE máxima", "Geralmente igual ou próximo da VR", "Geralmente igual à VLO de retração"], correct: 0, explanation: "VMO/MMO (Maximum Operating Speed/Mach). VC ≤ 80% × VD. Margem VC-VB permite voar em VB e ter aumento INADVERTIDO de velocidade em turbulência sem exceder VC." },
  { id: "vd5", subject: "spd", q: "VD (Design Dive Speed) é obtida em qual situação?", options: ["Em cruzeiro normal a Mach máximo", "Mergulho 20s de VC, 7.5° e 75% empuxo", "Em aproximação com flap totalmente estendido", "Em voo de teste de stall a 1g"], correct: 1, explanation: "Mergulho de 20 segundos partindo de VC, trajetória 7.5° descendente, 75% do empuxo máximo cruzeiro. Em VD, aeronave NÃO PODE ter vibração, flutter ou comprometimento estrutural." },
  { id: "vd6", subject: "spd", q: "Load factor máximo aeronaves comerciais FLAPS UP:", options: ["4.0g positivos / -2.0g negativos", "3.0g positivos / -1.5g negativos", "2.5g positivos / -1.0g negativos", "1.5g positivos / 0g negativos"], correct: 2, explanation: "FLAPS UP: 2.5g+ / -1.0g. FLAPS DOWN: 2.0g+ / 0g. Margem regulatória para uso normal. Turbulência forte = retrair flaps se possível, voar VB. Cobrado em entrevista." },
  { id: "mac1", subject: "aero", q: "MAC significa o quê?", options: ["Maximum Allowed Center configured", "Manufacturer Aircraft Code identificador", "Mean Aerodynamic Chord", "Maneuvering Aircraft Cross sectional"], correct: 2, explanation: "Mean Aerodynamic Chord — corda aerodinâmica média da asa, representando 'corda média'. Fórmula: Área da Asa ÷ Envergadura. É referência para informar CG em aeronaves grandes." },
  { id: "mac2", subject: "aero", q: "O que é LEMAC?", options: ["Last Empty MAC após combustível", "Length of Engine MAC instalada", "Lift Effective MAC do horizontal", "Leading Edge of MAC, ou 0% MAC"], correct: 3, explanation: "Leading Edge of Mean Aerodynamic Chord — 0% da MAC. TEMAC é Trailing Edge (100%). CG é informado entre LEMAC e TEMAC, em percentual. Ex.: '25% MAC' = 25% do caminho de LEMAC para TEMAC." },
  { id: "mac3", subject: "aero", q: "CG é informado em % MAC mas fisicamente está:", options: ["No eixo longitudinal, projetado da MAC", "Exatamente na asa, no ponto MAC", "Dentro do tanque central de combustível", "Na cauda da aeronave fisicamente"], correct: 0, explanation: "CG real está no EIXO LONGITUDINAL da aeronave. MAC é só uma REFERÊNCIA na asa. O CG é PROJETADO horizontalmente. Falar '25% MAC' indica posição relativa, não literalmente na asa." },
  { id: "cg3", subject: "aero", q: "Qual CG produz MENOR consumo de combustível?", options: ["Forward CG (mais lift positivo)", "Aft CG (menos lift negativo no stab)", "CG neutro entre os limites", "Depende apenas do peso total"], correct: 1, explanation: "AFT CG. Lift negativo do stabilizer fica MENOR → lift total da aeronave fica menor → menos arrasto → menos combustível. Companhias buscam operar próximo do limite aft." },
  { id: "cg4", subject: "aero", q: "Qual CG produz MELHOR controle direcional?", options: ["AFT CG facilita controle assimétrico", "Centro neutro do envelope é ideal", "FORWARD CG, braço de momento maior", "Não há diferença entre posições CG"], correct: 2, explanation: "FORWARD CG. Braço de momento do leme é MAIOR. Mesma força gera mais momento de yaw. Regra: pior caso para controle = AFT CG. Pior para lift = FORWARD CG." },
  { id: "dc1", subject: "desc", q: "Em descida emergencial (descompressão), qual estratégia?", options: ["Maximum Range otimizado", "Min Time, VMO/MMO + speedbrakes", "Maximum Endurance prolongado", "Maximum Angle para pista"], correct: 1, explanation: "Minimum Time — chegar a 10.000ft o mais rápido possível para passageiros respirarem. Diferente de driftdown (que prioriza manter altitude segura sobre terreno)." },
  { id: "dc2", subject: "desc", q: "Transição de Mach para IAS na descida ocorre:", options: ["Sempre a FL250 fixo", "Sempre exatamente em 10.000ft", "Na crossover altitude exata", "Após pedido explícito do ATC"], correct: 2, explanation: "Na crossover altitude (onde IAS escolhida e Mach dão mesma TAS). Manter Mach até baixa altitude faria IAS DISPARAR — excederia VMO. Inverso da subida (IAS→Mach lá em cima)." },
  { id: "dc3", subject: "desc", q: "Regra de bolso para TOD por altitude:", options: ["10nm para cada 1000ft", "1nm para cada 1000ft", "5nm para cada 1000ft", "3nm para cada 1000ft"], correct: 3, explanation: "3nm para cada 1.000ft. Ex.: descer 30.000ft → 90nm de antecedência. Funciona para a maioria dos jatos. Cobrado direto em entrevista — devs decorar." },
  { id: "dc4", subject: "desc", q: "Regra de bolso para DESACELERAÇÃO durante descida:", options: ["1nm para cada 10kt", "1nm para cada 50kt", "5nm para cada 10kt", "10nm para cada 100kt"], correct: 0, explanation: "1nm por cada 10kt de redução. Soma à regra de altitude. Ex.: 30.000ft + 100kt de slow = 90 + 10 = 100nm antes do ponto. Permite cálculo mental rápido em voo." },
  { id: "dc5", subject: "desc", q: "Calcule TOD: descer 30.000ft e desacelerar 100kt:", options: ["50nm", "100nm", "70nm", "150nm"], correct: 1, explanation: "100nm. Cálculo: 30 × 3 = 90nm (altitude) + 100/10 = 10nm (desaceleração) = 100nm de antecedência. Pode-se dividir em fases — resultado idêntico." },
  { id: "rif1", subject: "fuel", q: "O que é Reclearance Inflight (RIF)?", options: ["Decolar com menos fuel, redespachar", "Mudar de alternate ainda em voo", "Reabastecer no destino antes pouso", "Diversão obrigada por falha FMS"], correct: 0, explanation: "Técnica de despacho: planeja voo até aeroporto INTERMEDIÁRIO (reservas completas), 'redespacha' em voo para o destino final. Economiza muito combustível em voos longos." },
  { id: "rif2", subject: "fuel", q: "Por que RIF funciona em voos longos?", options: ["Combustível leve com altitude", "Reserva com fuel flow do final, leve", "Apenas aplicável em ETOPS", "Reduz peso dos passageiros"], correct: 1, explanation: "Reserva é 10% do tempo com fuel flow ANTES do TOD. No final do voo aeronave está LEVE → fuel flow MENOR → reserva calculada menor. Pode poupar 10.000kg+ no Singapore-London." },
  { id: "rif3", subject: "fuel", q: "O que é Reclearance Fix (RF)?", options: ["Aeroporto alternate da rota", "Reparo emergencial de instrumento", "Ponto reavalia fuel para destino", "Reset completo do FMS"], correct: 2, explanation: "Ponto de decisão em voo: combustível atual ≥ mínimo para destino final? SIM → segue. NÃO → desvia para aeroporto intermediário. Tipicamente ~70% da rota planejada." },
  { id: "sfc1", subject: "eng", q: "O que mede o TSFC (Thrust Specific Fuel Consumption)?", options: ["Combustível por unidade de empuxo", "Temperatura interna", "Empuxo máximo do motor", "Velocidade máxima do motor"], correct: 0, explanation: "TSFC = Fuel Flow ÷ Thrust. Mede eficiência: combustível necessário para gerar 1 unidade de empuxo. MENOR valor = MAIS eficiente. Modernos: ~0.4 lb/lbf.h. Antigos: ~0.6." },
  { id: "sfc2", subject: "eng", q: "Como motores modernos atingem maior eficiência?", options: ["Usam ligas avançadas no compressor", "Pegam muito ar e aceleram pouco (high bypass)", "Combustível premium com aditivos", "Pegam pouco ar e aceleram muito (alto Δv)"], correct: 1, explanation: "Filosofia INVERTIDA. F = m × Δv. Para mesmo empuxo, melhor MUITA massa de ar acelerada POUCO. Por isso fans gigantes (high bypass). Bypass ratios 10-12:1 hoje vs 1:1 antigos." },
  { id: "sfc3", subject: "eng", q: "Em 6.000 ciclos, quanto a TSFC aumenta tipicamente?", options: ["10%", "1%", "4%", "20%"], correct: 2, explanation: "Aproximadamente 4%. Motor produz o mesmo empuxo mas consome 4% a mais. Lavagem regular do compressor com água quente reduz: a cada 1.000 ciclos ganho cumulativo de 0.5%; a cada 500 ciclos, 0.75%." },
  { id: "sfc4", subject: "eng", q: "Por que a degradação acontece no motor?", options: ["Erosão dos rolamentos do eixo principal", "Desbalanceamento da ventoinha principal", "Vazamento gradual do óleo de turbina", "Sujeira nas pás do compressor"], correct: 3, explanation: "Sujeira (poeira, sal, fumaça) acumula nas pás do compressor, alterando o perfil aerodinâmico. Mesmo invisível, modifica fluxo de ar → mistura ar-combustível mais rica → TSFC e EGT sobem." },
  { id: "ad1", subject: "aero", q: "Os 2 tipos principais de arrasto são:", options: ["Sustentação e Empuxo", "Parasite e Induced", "Estático e Dinâmico", "Total e Parcial"], correct: 1, explanation: "PARASITE DRAG (forma, atrito, interferência) cresce com velocidade. INDUCED DRAG (resulta da geração de lift) diminui com velocidade. Drag total tem mínimo onde os 2 se igualam — Best L/D." },
  { id: "ad2", subject: "aero", q: "Drag Polar é gráfico de:", options: ["Empuxo vs altitude", "Sustentação vs ângulo", "Drag total vs velocidade", "Combustível vs tempo"], correct: 2, explanation: "Drag total VS velocidade. Formato em 'U': à esquerda induced domina, à direita parasite domina. Ponto mínimo = Best L/D = MRC. Cada peso e altitude tem seu próprio drag polar." },
  { id: "ad3", subject: "aero", q: "O que é Critical Mach (Mcrit)?", options: ["Mach máximo certificado pela autoridade", "Mach onde ocorre o stall em curvas", "Mach mínimo operacional em cruzeiro", "Mach onde aparece ponto sônico na asa"], correct: 3, explanation: "Mach em que, pela 1ª vez, o ar acelerado sobre a curvatura da asa atinge M=1 LOCALMENTE (mesmo que Mach total seja subsônico). Acima disso, ondas de choque começam a se formar." },
  { id: "ad4", subject: "aero", q: "Para que servem ASAS ENFLECHADAS (sweepback)?", options: ["Retardar o aparecimento de ondas de choque", "Reduzir peso estrutural da asa", "Melhorar a manobrabilidade em curvas", "Reduzir o arrasto induzido em baixa velocidade"], correct: 0, explanation: "Retardam ondas de choque. Em asa enflechada, o ar 'percebe' perfil mais fino (apenas componente perpendicular). Mcrit AUMENTA → voo mais rápido sem drag divergence." },
  { id: "ad5", subject: "aero", q: "Aspect Ratio (AR) é:", options: ["Envergadura ÷ comprimento", "Envergadura² ÷ área", "Área ÷ peso", "Sustentação ÷ arrasto"], correct: 1, explanation: "AR = b² ÷ S. Asas longas e estreitas (AR alto) têm MENOS induced drag → melhor L/D. Aeronaves comerciais: AR ~9-10. Caças: AR ~3-4 para manobras." },
  { id: "ad6", subject: "aero", q: "Para que servem WINGLETS?", options: ["Reduzir parasite drag", "Aumentar velocidade máxima", "Reduzir induced drag", "Reduzir peso da asa"], correct: 2, explanation: "Reduzem INDUCED DRAG ao 'esconder' a ponta da asa do escoamento livre, diminuindo vórtices de ponta. Resultado: melhor L/D, fuel mileage e optimum altitude." },
  { id: "ad7", subject: "aero", q: "Stall depende de:", options: ["Velocidade absoluta", "Temperatura externa", "Altitude apenas", "Angle of Attack crítico"], correct: 3, explanation: "Stall depende do AOA CRÍTICO. A 'velocidade de stall' é só a velocidade em que, em voo nivelado, o avião precisa atingir o AOA crítico para gerar lift suficiente. Em manobras com g maior, stall ocorre em velocidade maior." },
  { id: "ad8", subject: "aero", q: "Em curva 60° de bank, stall speed aumenta:", options: ["41%", "20%", "10%", "100%"], correct: 0, explanation: "1.41× (raiz de 2). Load factor em 60° = 2g. Stall speed proporcional a √(load factor). VS 130kt → ~184kt em 60°. Por isso curvas acentuadas em baixa velocidade são perigosas." },
  { id: "wb1", subject: "aero", q: "Por que jatos comerciais queimam combustível do TANK CENTRAL primeiro?", options: ["Tanque central é menor", "Mais acessível", "Centro do CG", "Wing Bending Relief"], correct: 3, explanation: "Wing Bending Relief. Combustível na asa pesa para BAIXO, contrabalançando a sustentação que empurra a asa para CIMA. Queimar das asas DEPOIS preserva esse alívio estrutural pelo máximo tempo." },
  { id: "ha1", subject: "misc", q: "Em high altitude, o raio de curva (vs nível do mar, mesmo IAS e bank):", options: ["Cerca de 60% maior em FL200 vs FL050", "É o mesmo raio para qualquer altitude", "É 60% menor em altitude por menos drag", "Reduz progressivamente com a altitude"], correct: 0, explanation: "60% MAIOR em FL200. Razão: TAS muito maior em alta altitude (mesma IAS) → força centrípeta maior → raio maior. Pilotos devem ANTECIPAR curvas em high altitude." },
  { id: "ha2", subject: "misc", q: "Aproximações em high altitude tendem a exceder qual valor de sink rate?", options: ["500 ft/min", "1.000 ft/min", "2.000 ft/min", "5.000 ft/min"], correct: 1, explanation: "1.000 ft/min (limite de stabilized approach). TAS alta + GS alta → trajetória 3° = descent rate elevado. 150kt IAS @ 8.000ft com tailwind: pode passar de 950ft/min facilmente." },
  { id: "ha3", subject: "misc", q: "Para aumentar peso máximo de pouso em high altitude (limitado Approach Climb):", options: ["Aumentar o flap de pouso para mais lift", "Pousar com velocidade acima do normal", "Reduzir flap, menos drag e melhor gradient", "Aumentar o empuxo de TOGA no go-around"], correct: 2, explanation: "REDUZIR flap. Menos drag = melhor gradiente de Approach Climb. Ex: 737NG pousar com flap 30 (em vez de 40) e go-around com flap 15 (em vez de 1). 737MAX permite até flap 5 no go-around." },
  { id: "ha4", subject: "misc", q: "Melhor horário para operar em high altitude airports:", options: ["Meio-dia com sol intenso e visibilidade", "Não importa o horário para a operação", "Final da tarde com vento favorável", "Horas mais frias da manhã ou da noite"], correct: 3, explanation: "Horas FRIAS. Ar mais frio = mais denso = mais empuxo + melhor performance. Diferença pode chegar a 10-20% no peso máximo entre meio-dia quente e madrugada fria em locais como La Paz, Lhasa." },
  { id: "ha5", subject: "misc", q: "Os requisitos Approach/Landing Climb garantem terrain clearance em high altitude?", options: ["Não, asseguram apenas capacidade de subir", "Sim, ambos requerimentos garantem terrain", "Apenas com flap reduzido para landing", "Apenas em pista molhada ou contaminada"], correct: 0, explanation: "NÃO. Asseguram apenas CAPACIDADE de subir (gradiente). Em Paro (Bhutan, cercado por montanhas 18.000ft), companhia precisa desenvolver procedimentos ESPECÍFICOS para falha de motor independente desses limites." },
  { id: "lf1", subject: "speeds", q: "Em curva 30° de bank em voo nivelado, qual o load factor?", options: ["1.15g", "1.0g", "1.41g", "2g"], correct: 0, explanation: "1.15g (cos 30° = 0.866; 1/0.866 ≈ 1.15). Aumento pequeno. Em 45°: 1.41g. Em 60°: 2g. Em 90° (knife edge): infinito — impossível voo nivelado." },
  { id: "lf2", subject: "speeds", q: "Stall: em altitude, é a IAS ou TAS que importa?", options: ["TAS, sempre relativa ao ar", "IAS ou CAS, refletindo pressão dinâmica", "Ground Speed, em relação ao solo", "Mach Number, próximo de divergência"], correct: 1, explanation: "IAS (ou CAS). Aerodinâmica age sobre PRESSÃO DINÂMICA q = ½ρV², que é o que IAS reflete. Stall speed em CAS NÃO muda com altitude. Mas em TAS, aumenta (mesma CAS = TAS maior em alta)." },
  { id: "hd1", subject: "cruise", q: "Velocidade típica de holding em jato comercial abaixo de FL140:", options: ["Aproximadamente 150 KIAS conforme peso", "Aproximadamente 210 a 230 KIAS padrão", "Aproximadamente 300 KIAS em high alt", "VMO menos 10 nós como margem"], correct: 1, explanation: "Aprox. 210-230 KIAS abaixo de FL140. Acima, 230-265 (FL140-200) e 265-310 (acima FL200) — ICAO standard. Aeronave usa pouco acima da Min Endurance Speed para evitar região instável." },
  { id: "ga1", subject: "land", q: "Qual a sequência padrão de go-around?", options: ["TOGA, gear up imediato e pitch 5°", "Reduzir thrust antes do pitch up", "Apenas TOGA é suficiente para subir", "TOGA, pitch 15°, gear UP, flap retract"], correct: 3, explanation: "1) TOGA. 2) Pitch 15°. 3) Trem UP a positive rate. 4) Flap retract progressivamente conforme aceleração. 5) Acceleration altitude (geralmente 1.000ft AFE). Procedimento treinado em simulador frequentemente." },
  { id: "pn4", subject: "misc", q: "Letra W no PCN (ex: 40/F/B/W/T) significa pressão de pneu:", options: ["Apenas até 181 psi máximos", "Apenas até 73 psi máximos", "Pressão sem limite definido", "Apenas até 254 psi máximos"], correct: 2, explanation: "W = Unlimited (sem limite). X = High (até 254 psi). Y = Medium (até 181 psi). Z = Low (até 73 psi). Aviões com pneus de alta pressão (categoria X) podem operar onde o PCN permite — pressão alta concentra stress no pavimento." },
  { id: "wt1", subject: "weights", q: "O que MEW (Manufacturer Empty Weight) inclui?", options: ["Estrutura mais combustível inutilizável dos tanques", "Estrutura mais pilotos e bagagem completa", "Estrutura, motores, fluidos enclosed e equipamentos mínimos", "Estrutura mais payload em zonas centrais"], correct: 2, explanation: "MEW é o peso da aeronave saindo da fábrica: estrutura, fuselagem, asas, motores, fluidos contidos, assentos, cintos e equipamentos mínimos de emergência (extintores). Sem qualquer item operacional adicional." },
  { id: "wt2", subject: "weights", q: "BEW (Basic Empty Weight) é igual a:", options: ["MEW mais payload de revenue total", "MEW mais combustível mínimo do voo", "MEW mais tripulação técnica completa", "MEW mais Standard Items, fluidos e itens fixos"], correct: 3, explanation: "BEW = MEW + SI. Standard Items incluem combustível inutilizável, óleo dos motores, kits primeiros socorros, lanternas, megafones, O2 portátil, frame galley. Também chamado Dry Empty Weight (DEW)." },
  { id: "wt3", subject: "weights", q: "BOW (Basic Operational Weight) é igual a:", options: ["BEW mais Operational Items, tripulação e suprimentos", "BEW mais payload completo de revenue", "BEW mais combustível total do voo", "BEW mais reservas estatísticas previstas"], correct: 0, explanation: "BOW = BEW + OI. Operational Items incluem pilotos e tripulação com bagagens, manuais, materiais de serviço, água, coletes, ELT portátil, containers. Também chamado Dry Operational Weight (DOW)." },
  { id: "wt4", subject: "weights", q: "ZFW (Zero Fuel Weight) é igual a:", options: ["BOW mais combustível mínimo do voo", "BOW mais payload, ou seja, PAX e carga", "MLW mais trip fuel calculado", "MTOW menos taxi fuel previsto"], correct: 1, explanation: "ZFW = BOW + Payload (passageiros + bagagem + carga revenue). É o peso da aeronave SEM combustível. Limite MZFW protege a junção asa-fuselagem do stress de flexão." },
  { id: "wt5", subject: "weights", q: "TOW (Takeoff Weight ou Brake Release Weight) é igual a:", options: ["MLW mais alternate fuel", "ZFW mais trip fuel apenas", "TW menos taxi fuel", "TW menos trip fuel"], correct: 2, explanation: "TOW = Taxi Weight (TW) − Taxi Fuel = ZFW + Takeoff Fuel. Peso da aeronave NO MOMENTO de brake release. Também chamado Brake Release Weight (BRWT) ou Brake Release Gross Weight (BRGW)." },
  { id: "wt6", subject: "weights", q: "LW (Landing Weight) previsto é igual a:", options: ["ZFW mais reserve fuel", "MZFW menos contingency fuel", "MLW mais 1000kg de margem", "TOW menos trip fuel"], correct: 3, explanation: "LW = TOW − Trip Fuel. Peso PREVISTO no momento do pouso. Inclui taxi fuel, reserve fuel, alternate fuel, hold over alternate e extra fuel — tudo exceto trip fuel queimado em A→B." },
  { id: "wt7", subject: "weights", q: "Por que MLW é MENOR que MTOW?", options: ["Pouso em MLW tem sink rate de 10ft/s, MTOW de 6ft/s", "MLW exige pista molhada padronizada", "MTOW só vale com flap zero ativo", "Diferenças não são técnicas, só comerciais"], correct: 0, explanation: "Trem é certificado para pousos mais 'duros' em MLW (10ft/s) e mais leves em MTOW (6ft/s). Pousos normais são em ~2-3ft/s. MLW define a margem realista para chegadas operacionais." },
  { id: "wt8", subject: "weights", q: "MZFW (Maximum Zero Fuel Weight) protege qual estrutura?", options: ["O eixo do trem principal contra fadiga", "A junção entre asa e fuselagem na raiz", "O conjunto do horizontal stabilizer", "Os hard points dos motores nas asas"], correct: 1, explanation: "MZFW protege a JUNÇÃO ASA-FUSELAGEM. Sem combustível nas asas, todo o lift gerado deve ser resistido na junção. Combustível nas asas (wing bending relief) reduz esse stress — sem ele, o limite vira o MZFW." },
  { id: "wt9", subject: "weights", q: "Por que combustível NAS ASAS reduz o stress estrutural?", options: ["Aumenta a inércia rotacional do voo", "Equilibra o trim de pitch automaticamente", "Wing bending relief contraria o lift", "Refrigera a estrutura da asa"], correct: 2, explanation: "Wing Bending Relief. Lift empurra a asa PARA CIMA. Combustível na asa pesa PARA BAIXO, contrabalançando. Resultado: menos stress na junção wing-root. Por isso queima do tank CENTRAL primeiro — preserva o relief das asas." },
  { id: "fp1", subject: "fuelplan", q: "Combustível mínimo RBAC 91 VFR (aviação geral, voo de dia):", options: ["A→B mais 45 minutos de cruzeiro", "A→B mais 10% do tempo de voo total", "A→B mais alternate mais 30 minutos", "A→B mais 30 minutos de cruzeiro"], correct: 3, explanation: "RBAC 91 VFR diurno: A→B + 30min de endurance em cruzeiro normal. Para voo NOTURNO: +45min em vez de 30min. Regra mais simples por não requerer IFR." },
  { id: "fp2", subject: "fuelplan", q: "Combustível mínimo RBAC 91 IFR (aviação geral):", options: ["A→B mais go-around mais alternate mais 45min", "A→B mais 60 minutos de cruzeiro fixo", "A→B mais 30 minutos de cruzeiro", "A→B mais 10% sobre o trip fuel"], correct: 0, explanation: "RBAC 91 IFR: A→B + Go-around em B + Desvio para C (alternate) + 45min de endurance em cruzeiro normal. Mais conservador que VFR pela imprevisibilidade IFR." },
  { id: "fp3", subject: "fuelplan", q: "Combustível mínimo RBAC 121 JET (com Fuel Data Monitoring):", options: ["A→B mais 10% do trip mais reserve", "A→B mais go-around mais alternate mais 5% mais 30min hold", "A→B mais 45 minutos apenas", "A→B mais alternate mais 15% do tempo"], correct: 1, explanation: "RBAC 121 com FDM: A→B + Go-around + Alternate C + 5% (em vez de 10%) do trip fuel A→B + 30min em holding a 1.500ft sobre alternate. Sem FDM: 10% em vez de 5%." },
  { id: "fp4", subject: "fuelplan", q: "FAA Domestic exige fuel para alternate em qual condição?", options: ["Em todo voo doméstico, sem exceção", "Voos noturnos para fora do território", "Voo maior que 6h, ou tempo ruim no destino", "Rotas internacionais com escala obrigatória"], correct: 2, explanation: "FAA Domestic exige alternate fuel SE: 1) voo > 6h, OU 2) durante 1h antes/depois do ETA, teto previsto < 1.500ft acima do MDA mín, OU 3) vis prevista < 3sm. Outros casos: A→B + 45min basta." },
  { id: "fp5", subject: "fuelplan", q: "FAA Supplemental Operations exige combustível mínimo de:", options: ["45 minutos de endurance em cruzeiro", "10% do tempo total de voo previsto", "Alternate mais 30 minutos de holding", "120 minutos, ou 2 horas, de endurance"], correct: 3, explanation: "Supplemental Operations: A→B + 120min (2h) de endurance em cruzeiro. NÃO requer alternate — pensado para voos remotos (Pacífico, ilhas) onde alternate é impraticável. Ex: voos para Havaí." },
  { id: "fp6", subject: "fuelplan", q: "EASA Jet (Doméstico ou Internacional) exige:", options: ["A→B mais go-around mais alternate mais 5% mais 30min hold", "A→B mais 15% do trip fuel sempre", "A→B mais 30 minutos apenas em cruzeiro", "A→B mais alternate mais 60 minutos"], correct: 0, explanation: "EASA: A→B + Go-around + Alternate + 5% do tempo entre A e B + 30min hold 1.500ft sobre alternate. Os 5% não podem ser MENOS de 5min em holding sobre destino em condições standard." },
  { id: "fp7", subject: "fuelplan", q: "O que é Minimum Fuel Over Destination (MFOD)?", options: ["Reserva mínima da decolagem", "Combustível para C mais 30min de hold a 1500ft", "Margem de 5% sobre o trip fuel total", "Combustível para B mais hold 30min"], correct: 1, explanation: "MFOD = combustível para ir de B (destino) ao C (alternate) + 30min em holding a 1.500ft sobre C. Queimar deste mínimo significa COMPROMISSO de pousar — sem mais opções." },
  { id: "fp8", subject: "fuelplan", q: "Quando deve declarar MAYDAY por combustível?", options: ["Apenas se motor falhar por starvation", "Quando atingir Final Reserve em solo", "Quando antecipar pouso com 30min ou menos de Final Reserve", "Quando o ATC determinar holding adicional"], correct: 2, explanation: "Declarar MAYDAY quando o piloto ANTECIPAR que o pouso ocorrerá com 30min de Final Reserve Fuel OU MENOS. NÃO esperar atingir 30min — declarar quando previr. ATC dá prioridade absoluta." },
  { id: "sn1", subject: "cold", q: "Qual o propósito do SNOWTAM?", options: ["Reportar condições de vento na pista", "Reportar status do iluminamento de pista", "Reportar disponibilidade de equipamentos solo", "Reportar condições de contaminantes na pista"], correct: 3, explanation: "SNOWTAM é boletim codificado informando contaminação da pista por neve, gelo e slush. Tem campos A até T cobrindo aeroporto, pista, comprimento limpo, composição em 3 terços, profundidade, atrito etc." },
  { id: "sn2", subject: "cold", q: "Campo F do SNOWTAM com '4/5/4' indica:", options: ["Tipo de contaminante em cada terço", "Atrito Mu nos terços medidos", "Profundidade em mm nos terços da pista", "Largura limpa em cada terço da pista"], correct: 0, explanation: "Campo F = COMPOSIÇÃO da pista em 3 terços. Cada número codifica tipo de contaminante (ex: 4 = dry snow, 5 = wet snow, 6 = slush). Permite saber qual parte tem qual contaminante." },
  { id: "su1", subject: "eng", q: "Por que pilotos param em ~40% N1 antes de aplicar TOGA?", options: ["Para o ATC confirmar a autorização", "Para o auto-throttle estabilizar a entrada", "Para checar a pressão de óleo dos motores", "Para evitar Asymmetric Spin-Up entre motores"], correct: 3, explanation: "Aceleração do turbofan é NÃO-LINEAR: lenta até 40%, depois rápida. Sem essa pausa, um motor pode passar do ponto antes do outro, ficando 92% vs 52% — assimetria enorme. Causa de veer-offs documentados." },
  { id: "su2", subject: "eng", q: "Asymmetric Spin-Up causa que tipo de evento?", options: ["Veer-off no início da corrida de decolagem", "EGT acima do limite por sobreaquecimento", "Surge de compressor com flameout", "Vibração estrutural do fan blade"], correct: 0, explanation: "Causa de veer-offs no início da decolagem — antes de qualquer velocidade aerodinâmica permitir correção pelo leme. Daí o procedimento de estabilizar em ~40% N1 antes de aplicar TOGA simultaneamente." },
  { id: "nr1", subject: "misc", q: "Operação em pista mais estreita que 30m exige:", options: ["Reduzir o desvio máximo de 30ft para 20ft no V1MCG", "Aumentar o V2 em 5 nós sobre o standard", "Diminuir a temperatura assumida ATM em 10°C", "Operar somente com peso abaixo do MZFW"], correct: 0, explanation: "Reduzir desvio máximo permitido de 30ft (9.14m) para 20ft (6.10m) — V1MCG sobe 4-6kt mas garante controle direcional adequado na pista mais estreita. Alternativa: usar Alternate Forward CG." },
  { id: "fe1", subject: "aero", q: "O que define o Flight Envelope da aeronave?", options: ["Margem de combustível disponível em rotas", "Limite máximo de empuxo do motor em alta", "Combinação de velocidade e altitude com segurança", "Condição de ATC para o espaço aéreo"], correct: 2, explanation: "Combinação de VELOCIDADE × ALTITUDE em que aeronave opera com segurança. Esquerda: stall speed. Direita: VMO/MMO. Topo: max altitude (buffet ou empuxo). Operar fora = risco estrutural ou aerodinâmico." },
  { id: "fe2", subject: "aero", q: "V-n diagram: FLAPS DOWN limita o load factor em:", options: ["+2.5g positivo e -1g negativo", "+3.0g positivo e -1.5g negativo", "+1.5g positivo e -0.5g negativo", "+2.0g positivo, negativo não-testado"], correct: 3, explanation: "FLAPS DOWN: +2.0g positivo. Negativo NÃO-TESTADO (proibido manobras negativas com flap baixado). FLAPS UP: +2.5g/-1g. Stall curve também muda — flap baixado estola em V menor mas com load limit menor." },
  { id: "sw1", subject: "aero", q: "Em asas enflechadas (sweepback), o stall começa em qual região?", options: ["Na raiz da asa, próximo da fuselagem", "Nas pontas da asa, onde ficam os ailerons", "No bordo de ataque ao longo de toda a corda", "Uniformemente em toda a envergadura"], correct: 1, explanation: "Boundary layer detacha PRIMEIRO nas pontas e se espalha para a raiz. PROBLEMA: ailerons ficam nas pontas — perda de aileron antes do stall completo = perda de controle de roll. Daí a necessidade de dispositivos artificiais." },
  { id: "sw2", subject: "aero", q: "O que faz o Stall Strip na asa enflechada?", options: ["Reduz arrasto induzido nas pontas das asas", "Aumenta o aspect ratio efetivo da asa", "Força stall a começar na raiz antes das pontas", "Aumenta o lift máximo da raiz no AOA alto"], correct: 2, explanation: "Stall Strip força o boundary layer a se detachar PRIMEIRO na raiz — antes das pontas. Stall na raiz: buffet detectável + ailerons funcionando. Permite recuperação antes do stall total. Imita comportamento de asa não-enflechada." },
  { id: "pr1", subject: "eng", q: "Em motor turbofan moderno (alto bypass), a maior parte do empuxo vem de:", options: ["Combustão direta no core do motor", "Queima posterior no bocal de escape", "Compressor de alta pressão do motor", "Ar acelerado pelo fan, o bypass"], correct: 3, explanation: "Em motor de ALTO BYPASS (10-12:1), maioria do ar passa por FORA do core (acelerado pelo fan). Esse bypass é a MAIOR parte do empuxo. O core (compressor + combustão + turbina) move o fan e gera empuxo residual." },
  { id: "pr2", subject: "eng", q: "Bypass Ratio significa:", options: ["Massa de ar pelo bypass dividida pelo core", "Pressão de saída do compressor HP", "Razão de combustível para core e fan", "Temperatura de saída sobre temperatura de entrada"], correct: 0, explanation: "Bypass Ratio = MASSA DE AR pelo bypass / MASSA DE AR pelo core. Antigos: 1:1. Modernos: 10-12:1 (10-12× mais ar pelo bypass). Alto bypass = melhor TSFC, mais quieto, melhor empuxo a baixa velocidade." },
  { id: "pr3", subject: "eng", q: "Diferença entre N1 e N2:", options: ["N1 é em RPM, N2 é em porcentagem", "N1 é eixo baixa pressão, N2 é alta pressão", "N1 é compressor, N2 é turbina apenas", "N1 é fan, N2 é a turbina total"], correct: 1, explanation: "N1 = eixo BAIXA pressão (fan + compressor LP + turbina LP). N2 = eixo ALTA pressão (compressor HP + turbina HP). Dois eixos rodam INDEPENDENTEMENTE. Pilotos veem N1 (relevante para empuxo) e N2 (saúde do core)." },
  { id: "ld20", subject: "lmc", q: "Brake Release Tip Up curtailment no envelope CG protege contra:", options: ["Aeronave levantar nariz ao aplicar TOGA", "Tip strike na pista durante a rotação", "Inversão da pressão hidráulica de freios", "Pneu estourar na corrida de decolagem"], correct: 0, explanation: "Brake Release Tip Up = curtailment forward CG para EVITAR que aeronave levante o nariz ao aplicar empuxo de takeoff. Com CG muito aft, stab não gera negative lift suficiente para evitar isso. Maior empuxo = curtailment mais pronunciado." },
  { id: "ld21", subject: "lmc", q: "O Fuel Burn Vector no envelope de CG indica:", options: ["Vetor de empuxo do motor crítico", "Direção do CG conforme queima de combustível", "Saída do combustível pelos drains", "Razão de fuel flow entre tanques"], correct: 1, explanation: "Fuel Burn Vector mostra a DIREÇÃO que o CG se move conforme combustível é queimado. Combustível em diferentes tanques (asa, central) move o CG de forma diferente. O voo deve começar em posição válida que termina em outra posição válida." },
  { id: "rm1", subject: "marks", q: "O cone de aproximação tem qual meia-largura inicial?", options: ["30 metros, expandindo em 10%", "60 metros, expandindo em 15%", "150 metros sem expansão lateral", "300 metros, expandindo em 20%"], correct: 1, explanation: "Cone com meia-largura inicial de 60m, abrindo 15% para cada lado por até 15km. Obstáculos dentro dele com gradient 2% (IFR) ou 2.5% (VFR) podem forçar Displaced Threshold. Similar ao OAA do takeoff." },
  { id: "rm2", subject: "marks", q: "Displaced Threshold tipo 1 (cone de obstáculo) afeta:", options: ["Todos os declared distances", "Apenas TORA e TODA do takeoff", "Apenas LDA do pouso", "Apenas ASDA da pista oposta"], correct: 2, explanation: "Tipo 1 (cone obstáculo): afeta APENAS LDA — para takeoff usa pista completa. Tipo 2 (obras temporárias): afeta TUDO (TORA/TODA/ASDA/LDA). Tipo 3 (stopway permanente): nem para taxi pode usar." },
  { id: "rm3", subject: "marks", q: "Aiming Point no padrão FAA fica a:", options: ["500ft do threshold da pista", "2.000ft do threshold da pista", "1.500ft do threshold da pista", "1.000ft do threshold da pista"], correct: 3, explanation: "FAA: Aiming Point sempre a 1.000ft do threshold. ICAO: 400m (1.312ft) em pistas >= 2.400m, ou 300m se menor. Aiming Point = banda mais LARGA da TDZ, onde o piloto mira (não onde toca)." },
  { id: "rm4", subject: "marks", q: "Em pista < 1.800m, o TDZL (Touchdown Zone Lights) se estende:", options: ["Pela METADE do comprimento da pista", "Sempre 600m do threshold", "Sempre 900m do threshold", "Não há TDZL em pista curta"], correct: 0, explanation: "Em pistas < 1.800m, TDZL vai apenas até METADE do comprimento. Em pistas longas: até 900m do threshold. Atenção: TDZL pode 'enganar' à noite (parece TDZ mais longa)." },
  { id: "rm5", subject: "marks", q: "Nos últimos 600m da pista, as luzes de borda ficam:", options: ["Vermelhas alternadas com brancas", "Âmbar avisando que pista acaba", "Brancas mais intensas iluminadas", "Apagadas para indicar o fim"], correct: 1, explanation: "Luzes de borda viram ÂMBAR nos últimos 600m. Pilotos usam isso para julgar visibilidade em fog. Center lights: alternam vermelho/branco entre 900m e 300m do fim, depois todas vermelhas." },
  { id: "rm6", subject: "marks", q: "Nos últimos 300m da pista, as luzes do center line ficam:", options: ["Alternadas vermelho e branco", "Brancas mais intensas iluminadas", "Todas vermelhas indicando fim", "Apagadas progressivamente"], correct: 2, explanation: "Center lights: brancas até 900m antes do fim. Alternam vermelho/branco entre 900-300m. Nos últimos 300m: TODAS VERMELHAS. Sistema visual para o piloto saber quanto resta de pista durante o landing roll." },
  { id: "rm7", subject: "marks", q: "PAPI com 2 luzes vermelhas e 2 brancas significa:", options: ["Muito alto, descer urgentemente", "Pouco baixo, aumentar empuxo", "Pouco alto, ajustar pitch para baixo", "Na trajetória correta de 3°"], correct: 3, explanation: "2R + 2W = ON PATH (na trajetória 3°). 4R = muito baixo (perigoso). 3R+1W = pouco baixo. 1R+3W = pouco alto. 4W = muito alto. Corredores podem ser de 20', 25' ou 30' de largura conforme calibração." },
  { id: "rm8", subject: "marks", q: "PAPI com 4 luzes vermelhas significa:", options: ["Muito baixo, perigo iminente", "Na trajetória correta de 3°", "Muito alto, reduzir empuxo", "Pouco baixo, ajuste menor"], correct: 0, explanation: "4 vermelhas = MUITO BAIXO. Recovery imediato necessário. Risco de impacto antes do threshold ou de tocar no obstáculo de aproximação. Path mínimo (2.50°) — abaixo disso, sem proteção." },
  { id: "rm9", subject: "marks", q: "PAPI é calibrado para qual tipo de aeronave?", options: ["Sempre Boeing 737 padrão", "A aeronave mais limitante operando regularmente", "A aeronave mais leve operando na pista", "A aeronave média operando na pista"], correct: 1, explanation: "Calibrado para a MAIS LIMITANTE (maior distância olho-roda) — garante MWC adequado. Aeronaves menores também ficam seguras. Calibrar para a menor seria perigoso para a maior. Por isso airports com ampla variedade calibram para o maior." },
  { id: "rm10", subject: "marks", q: "O que é Threshold Crossing Height (TCH)?", options: ["Altura mínima ao decolar acima do threshold", "Altura mínima para iniciar a descida", "Altura do PAPI em relação à pista", "Altura na qual aeronave passa sobre o threshold em path normal"], correct: 3, explanation: "Altura na qual aeronave passa SOBRE o threshold seguindo glide path 3°. Tipicamente 50ft (15m). Diferente para CAT II/III. Aeronaves grandes vs pequenas têm cockpit em alturas diferentes mesmo no mesmo glide path." },
  { id: "td1", subject: "aero", q: "Wingtip vortex se forma por que motivo?", options: ["Geração de empuxo do motor no fan", "Ondas de choque acima de Mach crítico", "Vibração do flap durante o cruzeiro", "Diferença de pressão entre extradorso e intradorso"], correct: 3, explanation: "Embaixo da asa: ALTA pressão. Em cima: BAIXA pressão. Nas pontas (onde asa acaba), o ar de alta pressão flui para o lado de baixa pressão, criando vórtice rotativo. Esse fluxo descendente nas pontas REDUZ lift e GERA induced drag." },
  { id: "td2", subject: "aero", q: "Todo arrasto causado pela geração de lift é:", options: ["Induced drag, induzido pelo lift", "Profile drag, da forma da asa", "Parasite drag, atrito de superfície", "Wave drag, acima de Mach crítico"], correct: 0, explanation: "Por definição: INDUCED DRAG = todo arrasto causado pela criação de sustentação. O wingtip vortex é o mais pronunciado, mas qualquer perturbação aerodinâmica do lift conta. Por isso voo lento (precisa mais lift) tem mais induced drag." },
  { id: "td3", subject: "aero", q: "O Coeficiente de Lift (CL) representa:", options: ["Pressão dinâmica do escoamento livre", "Conjunto de fatores aerodinâmicos não separáveis", "Área de referência da asa estabelecida", "Ângulo de ataque atual da asa em uso"], correct: 1, explanation: "CL reúne fatores que afetam lift mas não podem ser analisados sozinhos: forma da asa, viscosidade, compressibilidade, AOA. Determinado em túnel de vento. Importa CL × S, não o valor exato de S (área de referência)." },
  { id: "td4", subject: "aero", q: "Em alta altitude, a velocidade de stall em CAS:", options: ["Permanece exatamente a mesma", "Diminui pela menor densidade ambiente", "Aumenta pelo efeito Mach e Reynolds", "A TAS muda, mas a CAS não muda"], correct: 2, explanation: "Em altitude: Mach maior para mesma CAS (vel som menor) + Reynolds maior (viscosidade menor com temperatura baixa). Ambos antecipam separação do boundary layer = stall em CAS MAIOR. Por isso 'coffin corner' em altitude extrema." },
  { id: "lf3", subject: "aero", q: "Para gerar o mesmo lift em altitude com ar menos denso, a aeronave precisa:", options: ["Reduzir o ângulo de ataque AOA usado", "Aumentar o flap retraído gradualmente", "Voar em TAS maior, V² compensa a densidade", "Reduzir a área efetiva da asa"], correct: 2, explanation: "Lift depende de ρ × V² × S × CL. Em altitude, ρ menor → precisa V maior para manter L. Como V² entra, basta um aumento pequeno de V em IAS para compensar. Mas em TAS, V cresce bastante — daí 'TAS sobe com altitude para mesma IAS'." },
  { id: "lf4", subject: "aero", q: "Dobrar a velocidade da aeronave (TAS) multiplica o lift gerado por:", options: ["2 vezes, linear com velocidade", "Não há efeito direto no lift", "8 vezes, depende de V³", "4 vezes, depende de V²"], correct: 3, explanation: "Lift ∝ V². Dobrar V multiplica lift por 4. Por isso pequenas variações de velocidade têm efeito enorme. Em emergência de baixa velocidade, ganhar 10kt pode ser decisivo. Já em alta velocidade, perder 10kt importa menos." },
  { id: "fc1", subject: "aero", q: "Aileron controla qual eixo de movimento?", options: ["Longitudinal, gerando roll para os lados", "Lateral, gerando pitch nariz acima/abaixo", "Vertical, gerando yaw para os lados", "Direcional, similar ao rudder"], correct: 0, explanation: "Aileron = EIXO LONGITUDINAL = ROLL. Move em direções opostas — um sobe (asa daquele lado desce) e outro desce (asa sobe). Resultado: aeronave inclina para um lado. Manche para direita: aileron direito SOBE, asa direita DESCE." },
  { id: "fc2", subject: "aero", q: "Elevator controla qual eixo de movimento?", options: ["Longitudinal, gerando roll para os lados", "Lateral, gerando pitch nariz acima/abaixo", "Vertical, gerando yaw para os lados", "Não há eixo específico para o elevator"], correct: 1, explanation: "Elevator = EIXO LATERAL = PITCH. Puxar manche: elevator sobe → cauda gera mais downward lift → nariz sobe. A 'subida' do nariz é CONSEQUÊNCIA da 'descida' da cauda. Daí o nome 'elevator' — eleva a cauda quando puxa." },
  { id: "fc3", subject: "aero", q: "Rudder controla qual eixo de movimento?", options: ["Longitudinal, gerando roll para os lados", "Lateral, gerando pitch nariz acima/abaixo", "Vertical, gerando yaw para os lados", "Direcional, complementando o aileron"], correct: 2, explanation: "Rudder = EIXO VERTICAL = YAW. Pedal direito: rudder vai para direita → cauda empurrada para esquerda → NARIZ vira para direita. Usado em vento cruzado, falha de motor (asymmetric thrust) e coordenação de curvas." },
  { id: "fc4", subject: "aero", q: "Para que servem FLAPS?", options: ["Reduzir o arrasto induzido em cruzeiro", "Reduzir o consumo em alta altitude", "Aumentar a velocidade máxima de cruzeiro", "Aumentar área e curvatura da asa"], correct: 3, explanation: "Flaps aumentam ÁREA (S) e CURVATURA (CL máximo). Permitem mesma sustentação em velocidade MENOR — essencial em takeoff/landing. Múltiplas configurações (1, 5, 15, 25, 30, 40 ou FULL/1+F/2/3 conforme fabricante). Mais flap = mais drag também." },
  { id: "fc5", subject: "aero", q: "SLATS estão localizados em qual parte da asa?", options: ["No bordo de ataque, na frente da asa", "Na ponta da asa, junto do winglet", "No bordo de fuga, ao lado do aileron", "Na raiz, próximo da fuselagem"], correct: 0, explanation: "Slats ficam na BORDA DE ATAQUE. Quando estendidos, movem para frente e abaixo. Junto com flaps são HYPER-LIFT DEVICES. Aumentam AOA crítico — atrasam o stall. Permitem mais lift sem aumentar arrasto tanto quanto flap puro." },
  { id: "fc6", subject: "aero", q: "Quais são os 3 eixos de movimento da aeronave?", options: ["Norte, Sul e Leste para navegação aérea", "Longitudinal, Lateral e Vertical", "Atitude, Velocidade e Altitude operacional", "Pitch, Roll e Glide combinados juntos"], correct: 1, explanation: "LONGITUDINAL (nariz-cauda): roll → ailerons. LATERAL/TRANSVERSAL (entre pontas das asas): pitch → elevator. VERTICAL (cima-baixo): yaw → rudder. Cada eixo tem sua superfície de controle. Manobras precisas combinam todos os três." },
  { id: "ec1", subject: "drift", q: "O que é Enroute Climb Limit Weight?", options: ["Peso máximo para subir até FL410 em cruzeiro", "Peso máximo permitido pelo controlador ATC", "Peso máximo do trem de pouso na decolagem", "Peso máximo para manter 2000ft sobre terreno após falha de motor"], correct: 3, explanation: "Peso MÁXIMO no qual a aeronave consegue manter clearance de 2000ft sobre terreno crítico após falha de motor (driftdown). Determinado pelo PONTO CRÍTICO da rota. Acima desse peso, terreno mais alto não é clareado dentro da margem necessária." },
