  { id: "ec2", subject: "drift", q: "Enroute Climb Limit afeta a TOW em quais rotas?", options: ["Apenas em rotas com terreno crítico, como cordilheiras", "Em todas as rotas comerciais regulamentadas", "Apenas em rotas internacionais sobre o oceano", "Apenas em voos com mais de 6 horas"], correct: 0, explanation: "ECL só afeta TOW em rotas com TERRENO CRÍTICO (montanhas, cordilheiras). Ex: Lima → POA passa pelos Andes. Em rotas sobre planície ou oceano: análise não aplica, MAX TOW não inclui esse limite." },
  { id: "ox6", subject: "drift", q: "Quando é necessário análise detalhada de Oxygen Requirement?", options: ["Aeronaves quadrimotoras de longo curso", "Voos com tempo total acima de 6 horas", "Voos internacionais de Flag Air Carriers", "Quando a rota tem terreno acima de 8.000ft"], correct: 0, explanation: "Análise detalhada de O2 só é necessária quando rota tem terreno >8.000ft. Sem isso, análise é simples: descida emergencial a 10.000ft + 2.000ft clearance. Com terreno alto: cria-se pontos return-to-origin e continue-to-destination + contingency plan." },
  { id: "ox7", subject: "drift", q: "O que é Contingency Plan na análise de oxigênio?", options: ["Backup de bateria do APU durante o cruzeiro", "Reserva de combustível adicional para emergência", "Procedimento alternativo entre pontos de O2 disponíveis", "Lista de aeroportos próximos da rota planejada"], correct: 2, explanation: "Procedimento alternativo para trecho entre os 2 pontos de O2 (RETURN-to-origin e CONTINUE-to-destination). Pode ser alternate intermediário, rota alternativa, escape paths ou redução de payload. Garante descompressão emergencial dentro dos limites de O2." },
  { id: "df1", subject: "cold", q: "Como deve ser removido gelo das pás do fan antes da partida?", options: ["Com fluido deicing tipo I padronizado", "Com ar quente direcionado às pás do fan", "Esperar o sol da manhã derreter naturalmente", "Acionando o starter para girar o motor"], correct: 1, explanation: "Com AR QUENTE — NUNCA com fluido deicing. Fluido pode contaminar a câmara de combustão. Inspeção front+back das pás é obrigatória no walkaround. Procedimento Fan Ice Removal pode acontecer durante taxi se gelo for leve." },
  { id: "csf1", subject: "cold", q: "O que é Cold Soaked Fuel Frost (CSFF)?", options: ["Frost que se forma na cabine pressurizada", "Gelo formado nos motores em altitude", "Frost na asa devido a combustível muito frio", "Frost no para-brisa durante a descida"], correct: 2, explanation: "Frost que se forma na asa SOBRE OU SOB o tanque de combustível, quando fuel está muito frio (após voo longo em altitude). Combustível absorve calor da asa, esfriando-a localmente — frost forma mesmo com OAT acima de zero. ÚNICA exceção permitida ao 'no frost takeoff'." },
  { id: "csf2", subject: "cold", q: "Quais condições permitem decolar COM CSFF na asa?", options: ["Qualquer área de frost com fluido aplicado", "Voos noturnos com autorização do ATC", "Pista molhada com vento favorável de proa", "Área limitada, sem precipitação, OAT ≥ 4°C, fuel ≥ -16°C"], correct: 3, explanation: "Área limitada (designada pelo fabricante, pintada de preto), SEM precipitação, OAT ≥ 4°C E temperatura combustível ≥ -16°C. Se qualquer condição falhar: frost DEVE ser removida. CSFF é a ÚNICA exceção ao 'no frost takeoff' rule." },
  { id: "ai3", subject: "cold", q: "Quando usar anti-ice em TAKEOFF e ground operations?", options: ["OAT abaixo de zero, sem outra condição", "Operação no inverno do hemisfério norte", "Temperatura abaixo de -5°C identificada", "OAT ≤ 10°C E umidade visível simultâneas"], correct: 3, explanation: "2 condições simultâneas: OAT ≤ 10°C E umidade visível (precipitação, água/slush/neve em pista/taxi/tarmac, OU névoa densa restringindo vis a 1.600m/1sm). Anti-ice é OBRIGATÓRIO nesse cenário — não opcional." },
  { id: "ai4", subject: "cold", q: "Por que SAT < -40°C dispensa o uso de engine anti-ice?", options: ["Partículas de gelo não aderem à superfície fria", "O motor naturalmente aquece a essa temperatura", "ATC libera operação especial nessa faixa", "Anti-ice consome muito combustível em frio"], correct: 0, explanation: "Em ar extremamente frio, partículas de gelo são TÃO FRIAS que não conseguem ADERIR às superfícies metálicas — ricocheteiam. Sem aderência, não há acúmulo, não há ameaça. Por isso anti-ice DESLIGA em cruise muito frio (proteção da margem do motor)." },
  { id: "ai5", subject: "cold", q: "Wing anti-ice tem regra clara como engine anti-ice?", options: ["Sim, mesma regra exata de temperatura e moisture", "Não, depende de avaliação subjetiva do piloto", "Sim, mas apenas em climb e descent", "Não, só liga automaticamente pelo FMS"], correct: 1, explanation: "Wing anti-ice: regra subjetiva — usar só em icing FORTE. Indicadores: ice stick na frente do cockpit (Airbus), windshield wiper holder com gelo (Boeing 737). Engine anti-ice: regra clara (TAT ≤ 10°C + SAT ≥ -40°C + umidade)." },
  { id: "di3", subject: "cold", q: "Diferença entre Wing Anti-Icing e Wing Deicing System?", options: ["São termos sinônimos para o mesmo sistema", "Anti-icing é químico, deicing é elétrico apenas", "Anti-icing previne, deicing remove gelo formado", "Anti-icing é em vôo, deicing é apenas em solo"], correct: 2, explanation: "ANTI-ICING (jatos): ar quente bleed para leading edge, superfície fica QUENTE constantemente — gelo NÃO se forma. DEICING (turboprops): boots de borracha INFLAM/desinflam para QUEBRAR gelo já formado. Anti-icing previne; deicing remove." },
  { id: "di4", subject: "cold", q: "Como funciona o anti-ice das aeronaves mais novas que não usam bleed air?", options: ["Através de pulverização química automática", "Vibração mecânica de alta frequência", "Boots infláveis como em turboprops", "Aquecimento elétrico do leading edge"], correct: 3, explanation: "Aquecimento ELÉTRICO do leading edge. Aeronaves com motores muito eficientes (Boeing 787 e similares) usam essa tecnologia. Vantagem: NÃO retira ar do motor (mais empuxo, melhor consumo). Desvantagem: depende de geradores elétricos potentes." },
  { id: "met1", subject: "meteo", q: "Em uma seleção, se perguntam METAR vs SPECI, qual resposta é tecnicamente mais precisa?", options: ["METAR é regular observado; SPECI é observado especial por mudança significativa", "METAR é previsão regular; SPECI é previsão especial para rota", "METAR é observado local; SPECI é aviso em rota da FIR", "Ambos são regulares, mas SPECI traz somente windshear"], correct: 0, explanation: "A diferença central é regularidade e gatilho. Ambos descrevem condições observadas no aeródromo; METAR sai em intervalo regular e SPECI aparece quando ocorre variação significativa entre observações." },
  { id: "met2", subject: "meteo", q: "Quando a letra G aparece no grupo de vento do METAR?", options: ["Quando qualquer rajada passa de 20kt", "Quando a direção varia 60° ou mais", "Quando a máxima excede a média em 10kt ou mais", "Quando o vento médio excede 10kt"], correct: 2, explanation: "G aparece por diferença entre rajada máxima e vento médio. O corte é 10kt ou mais acima da média, por isso 31015G28KT reporta rajada." },
  { id: "met3", subject: "meteo", q: "31015G28KT deve ser lido como:", options: ["310° magnéticos, 15kt sustentado, pico 28kt", "310° verdadeiros, média 15kt, rajada 28kt", "Vento variável entre 310° e 028°, média 15kt", "310° verdadeiros, rajada de 15kt e média 28kt"], correct: 1, explanation: "No METAR a direção é verdadeira e de onde o vento sopra. Os dois dígitos após a direção são a velocidade média; G28 informa a rajada." },
  { id: "met4", subject: "meteo", q: "Qual cenário favorece codificar 280V350 em vez de VRB?", options: ["Variação de 180° ou mais com vento forte", "Direção impossível de determinar pelo sensor", "Variação de 60° a 180° com média abaixo de 3kt", "Variação de 60° ou mais, menor que 180°, com média ≥3kt"], correct: 3, explanation: "Com variação entre 60° e menos de 180° e vento médio de pelo menos 3kt, o METAR informa os extremos com V. VRB fica para vento muito fraco nesse intervalo ou variação ≥180°." },
  { id: "met5", subject: "meteo", q: "No METAR, vento calmo é codificado como:", options: ["00000KT", "VRB00KT", "CALMKT", "000P00KT"], correct: 0, explanation: "A forma padronizada é 00000KT quando a velocidade é inferior a 1kt. VRB não é usado para vento calmo." },
  { id: "met6", subject: "meteo", q: "Visibilidade 9999 em METAR quer dizer:", options: ["Visibilidade exatamente igual a 9.999m", "Visibilidade medida acima de 20km", "Visibilidade predominante de 10km ou mais", "Sensor indisponível para visibilidade"], correct: 2, explanation: "9999 é o código para visibilidade horizontal predominante de 10km ou mais. Não deve ser interpretado como valor exato." },
  { id: "met7", subject: "meteo", q: "Quando informar visibilidade mínima e direção no METAR?", options: ["Sempre que houver qualquer diferença setorial", "Se for <1.500m ou <50% da predominante e <5.000m", "Somente quando houver RVR inferior a 2.000m", "Apenas se a visibilidade predominante for 9999"], correct: 1, explanation: "O reporte setorial aparece quando a mínima é operacionalmente relevante: inferior a 1.500m ou inferior a 50% da predominante e também inferior a 5.000m." },
  { id: "met8", subject: "meteo", q: "R10/P2000 significa:", options: ["RVR da pista 10 abaixo de 2.000m e tendência positiva", "RVR da pista 10 exatamente 2.000m sem tendência", "Visibilidade predominante da pista 10 acima de 2.000m", "RVR da pista 10 maior que o limite mensurável de 2.000m"], correct: 3, explanation: "O P indica 'maior que'. Como 2.000m é o limite superior de avaliação citado, R10/P2000 significa acima do máximo mensurável, não exatamente 2.000m." },
  { id: "met9", subject: "meteo", q: "No grupo RVR, a letra D após o valor indica:", options: ["Tendência descendente do RVR", "Pista direita em operação", "Valor estimado por transmissômetro", "RVR abaixo do mínimo medido"], correct: 0, explanation: "As tendências são U para subindo, D para descendo e N para sem tendência significativa. L/C/R é que distingue pistas paralelas." },
  { id: "met10", subject: "meteo", q: "BR e FG diferem principalmente por:", options: ["Tipo de nuvem associada", "Temperatura do ponto de orvalho", "Faixa de visibilidade horizontal", "Presença obrigatória de precipitação"], correct: 2, explanation: "BR reduz visibilidade para 1.000m até 5.000m inclusive. FG é nevoeiro com visibilidade menor que 1.000m." },
  { id: "met11", subject: "meteo", q: "GR será usado quando o maior granizo observado tiver:", options: ["Qualquer diâmetro mensurável", "5mm ou mais", "Menos de 5mm", "10mm ou mais"], correct: 1, explanation: "O corte do material é 5mm. Abaixo disso usa-se GS para granizo pequeno e/ou pelotas de neve." },
  { id: "met12", subject: "meteo", q: "VC em fenômeno meteorológico significa que ele foi observado:", options: ["Dentro da área de movimento", "A menos de 5km do aeródromo", "Entre 5km e 8km do ARP", "Entre 8km e 16km do ponto de referência"], correct: 3, explanation: "VC é 'na vizinhança' e vale para fenômenos significativos observados entre 8km e 16km do ponto de referência do aeródromo." },
  { id: "met13", subject: "meteo", q: "SQ exige qual condição numérica?", options: ["Aumento brusco de pelo menos 16kt, atingindo 22kt+, por 1min", "Rajada 10kt acima da média durante qualquer período", "Vento médio acima de 22kt por 10 minutos", "Variação direcional de 180° ou mais com precipitação"], correct: 0, explanation: "SQ é uma definição específica: aumento brusco de 16kt ou mais, alcançando 22kt ou mais, sustentado por pelo menos 1 minuto." },
  { id: "met14", subject: "meteo", q: "BKN em METAR representa:", options: ["3 a 4 oitavos", "8 oitavos", "5 a 7 oitavos", "1 a 2 oitavos"], correct: 2, explanation: "BKN é broken/nublado, 5/8 a 7/8. Esse detalhe importa porque BKN já é camada usada para teto em muitos contextos operacionais." },
  { id: "met15", subject: "meteo", q: "SCT018 significa:", options: ["Céu encoberto a 1.800ft", "3/8 a 4/8 com base a 1.800ft", "1/8 a 2/8 com topo a 1.800ft", "5/8 a 7/8 com base a 180ft"], correct: 1, explanation: "SCT é 3/8 a 4/8. Os três dígitos de altura são centenas de pés, então 018 = 1.800ft." },
  { id: "met16", subject: "meteo", q: "No METAR, os tipos de nuvens explicitados após a altura são:", options: ["CI e CS", "SC e ST", "CU e NS", "CB e TCU"], correct: 3, explanation: "O material destaca apenas nuvens convectivas significativas: CB e TCU. As demais camadas aparecem por quantidade e altura, sem tipo." },
  { id: "met17", subject: "meteo", q: "CAVOK exige simultaneamente:", options: ["Vis 10km+, sem nuvem operacional significativa e sem tempo significativo", "Vis 5km+, sem CB e QNH acima de 1013hPa", "Vis 10km+, sem qualquer nuvem em todo horizonte", "Vis 9999 e vento inferior a 10kt"], correct: 0, explanation: "CAVOK substitui grupos de vis/RVR/tempo/nuvens/VV apenas se as condições simultâneas forem atendidas: vis 10km+, sem nuvem significativa e sem fenômeno significativo." },
  { id: "met18", subject: "meteo", q: "NSC aparece quando:", options: ["CAVOK é aplicável e deve ser reforçado", "Não há nuvem alguma no céu", "Não há nuvem significativa, mas CAVOK não é apropriado", "A visibilidade vertical está indisponível"], correct: 2, explanation: "NSC não é sinônimo de CAVOK. Ele indica ausência de nuvens significativas sem restrição de VV quando CAVOK não pode ser usado." },
  { id: "met19", subject: "meteo", q: "Q0995 em METAR significa QNH:", options: ["995,6 hPa arredondado para cima", "995 hPa arredondado para o inteiro inferior", "29,95 inHg convertido para hPa", "QNH abaixo do mínimo operacional"], correct: 1, explanation: "O grupo Q usa hPa inteiro inferior mais próximo. Se o valor for menor que 1000 hPa, entra zero à esquerda, como Q0995." },
  { id: "met20", subject: "meteo", q: "RE no METAR informa fenômeno:", options: ["Ocorrendo exatamente no momento da observação", "Previsto nas próximas 2 horas", "Observado somente por aeronave em voo", "Recente, desde a última observação, mas não nos 10min finais"], correct: 3, explanation: "RE é tempo recente de significado operacional. Ele não está ocorrendo no momento da observação, especialmente nos 10 minutos precedentes." },
  { id: "met21", subject: "meteo", q: "WS R28 no METAR indica:", options: ["Windshear afetando a pista 28", "Vento de superfície da pista 28", "Estado de pista molhada na 28", "RVR com tendência na pista 28"], correct: 0, explanation: "WS + R + designador de pista indica cortante do vento afetando uma pista específica. WS ALL RWY indicaria todas as pistas." },
  { id: "met22", subject: "meteo", q: "A previsão de tendência em METAR/SPECI, quando usada, cobre:", options: ["1 hora após a observação", "Todo o próximo período TAF", "2 horas após a observação", "4 horas após a emissão"], correct: 2, explanation: "A tendência cobre duas horas a partir da hora da observação. O material ressalta que o Brasil não adota essa previsão de tendência." },
  { id: "met23", subject: "meteo", q: "Validade de TAF no Brasil para SBGL e SBGR, segundo o material:", options: ["12 horas como todos nacionais", "30 horas", "24 horas sem exceções", "6 horas por horário sinótico"], correct: 1, explanation: "O texto destaca TAF de 30 horas no Brasil para Galeão e Guarulhos. Nacional padrão é 12h; internacionais podem ter 24h ou 30h." },
  { id: "met24", subject: "meteo", q: "TAF inicia período de validade em quais horários sinóticos citados?", options: ["0100, 0700, 1300 e 1900 UTC", "0300, 0900, 1500 e 2100 UTC", "0000 e 1200 UTC apenas", "0000, 0600, 1200 e 1800 UTC"], correct: 3, explanation: "O material cita quatro inícios de validade: 0000, 0600, 1200 e 1800 UTC. WIND ALOFT é que aparece em 0000 e 1200 UTC." },
  { id: "met25", subject: "meteo", q: "No TAF, o grupo FM:", options: ["Substitui todas as condições prevalecentes anteriores", "Altera somente vento e visibilidade", "Indica flutuação temporária menor que 1h", "Só pode ser usado com PROB30/40"], correct: 0, explanation: "FM cria uma parte independente da previsão. Tudo que era prevalecente antes dele é substituído pelas condições após o FM." },
  { id: "met26", subject: "meteo", q: "BECMG no TAF normalmente não excede:", options: ["30 minutos", "1 hora", "2 horas", "6 horas"], correct: 2, explanation: "O material diz que BECMG normalmente não excede 2h e em nenhum caso pode exceder 4h. É mudança progressiva, não flutuação breve." },
  { id: "met27", subject: "meteo", q: "Depois de um BECMG, se não houver outro grupo mudando a condição:", options: ["As condições anteriores retornam após 1h", "As novas condições prevalecem até o fim da validade", "A previsão fica probabilística", "Somente o vento novo permanece"], correct: 1, explanation: "A menos que outro grupo altere a previsão, as condições dadas após BECMG são previstas prevalecer até o final do período de validade do TAF." },
  { id: "met28", subject: "meteo", q: "TEMPO no TAF é apropriado quando as flutuações:", options: ["Duram 2h e ocupam mais da metade do período", "São definitivas a partir do horário indicado", "Têm probabilidade de 50% ou mais", "Duram menos de 1h cada e somam menos da metade do período"], correct: 3, explanation: "TEMPO descreve flutuações temporárias. Se durarem 1h ou mais, ou somarem metade ou mais do período, a condição deve virar prevalecente/BECMG." },
  { id: "met29", subject: "meteo", q: "PROB no TAF pode ser:", options: ["Somente 30% ou 40%", "10%, 30% ou 50%", "Qualquer valor abaixo de 50%", "Apenas 40% em meteorologia aeronáutica"], correct: 0, explanation: "O grupo PROBxx só admite 30 ou 40. Se a probabilidade for 50% ou maior, deve-se usar FM, BECMG ou TEMPO." },
  { id: "met30", subject: "meteo", q: "Aviso de Aeródromo tem validade máxima de:", options: ["2 horas", "3 horas", "4 horas", "6 horas"], correct: 2, explanation: "O Aviso de Aeródromo não deve exceder 4 horas e deve ser cancelado se as condições deixarem de ocorrer ou de ser previstas." },
  { id: "met31", subject: "meteo", q: "Aviso de Cortante do Vento cobre normalmente até:", options: ["200ft acima da pista", "500m ou 1.600ft acima da pista", "FL100 em área terminal", "10km do ponto de referência"], correct: 1, explanation: "O aviso cobre aproximação, climb-out e pista, normalmente do nível da pista até 500m ou 1.600ft, salvo influência topográfica acima." },
  { id: "met32", subject: "meteo", q: "SIGMET tem validade máxima geral de:", options: ["2 horas", "3 horas", "6 horas sempre", "4 horas"], correct: 3, explanation: "A validade geral do SIGMET é até 4 horas. Apenas cinzas vulcânicas e ciclones tropicais podem chegar a 6 horas." },
  { id: "met33", subject: "meteo", q: "SIGMET de cinzas vulcânicas ou ciclone tropical pode valer até:", options: ["6 horas", "4 horas sem exceção", "8 horas", "12 horas"], correct: 0, explanation: "Essa é a exceção de validade do SIGMET no material: VA e ciclone tropical podem ter validade de até 6 horas." },
  { id: "met34", subject: "meteo", q: "EMBD TS em SIGMET significa trovoada:", options: ["Obscurecida por fumaça ou noite", "Ao longo de uma linha", "Embutida em camadas de nuvens", "Frequente com cobertura acima de 75%"], correct: 2, explanation: "EMBD é embedded: a área de trovoadas está embutida em camadas de nuvens e não pode ser prontamente reconhecida." },
  { id: "met35", subject: "meteo", q: "FRQ TS no contexto de SIGMET indica:", options: ["Trovoada isolada sobre a FIR", "Áreas adjacentes com pouca separação e cobertura máxima >75%", "Trovoada com granizo pequeno abaixo de 5mm", "Linha de trovoadas com espaçamento regular"], correct: 1, explanation: "FRQ descreve trovoadas frequentes: pouca ou nenhuma separação entre áreas adjacentes e cobertura espacial máxima superior a 75%." },
  { id: "met36", subject: "meteo", q: "No SIGMET, TURB não deve ser usado para:", options: ["CAT", "Turbulência em nuvem não convectiva", "Turbulência por vento forte à superfície", "Turbulência em nuvens convectivas"], correct: 3, explanation: "TURB se aplica a CAT, baixos níveis e outros contextos não convectivos. Em CB/trovoada, o fenômeno convectivo deve descrever a ameaça." },
  { id: "met37", subject: "meteo", q: "Onda orográfica severa no material envolve corrente descendente de:", options: ["3m/s ou 600ft/min ou mais", "1m/s ou 200ft/min ou mais", "5m/s ou 1.000ft/min ou mais", "10m/s ou 2.000ft/min ou mais"], correct: 0, explanation: "O critério numérico citado é 3,0 m/s, equivalente a 600 ft/min, associado à turbulência severa observada ou prevista." },
  { id: "met38", subject: "meteo", q: "AIRMET é voltado a fenômenos em rota abaixo de:", options: ["FL050, ou FL100 em montanha", "FL180, ou FL200 em montanha", "FL100, ou FL150 em área montanhosa", "FL250, sem variação por relevo"], correct: 2, explanation: "O AIRMET trata de fenômenos que afetam operações abaixo do FL100, ou FL150 para áreas montanhosas." },
  { id: "met39", subject: "meteo", q: "AIRMET tem validade máxima de:", options: ["2 horas", "4 horas", "6 horas", "12 horas"], correct: 1, explanation: "Assim como outros avisos do bloco, o AIRMET não deve ser superior a 4 horas e deve ser cancelado quando o fenômeno deixa de ocorrer ou ser previsto." },
  { id: "met40", subject: "meteo", q: "GAMET é uma previsão de área para:", options: ["Aeródromos internacionais somente", "Rotas oceânicas acima do FL250", "Ciclones tropicais e cinzas vulcânicas", "Voos em níveis baixos em FIR ou setores"], correct: 3, explanation: "GAMET é previsão de área em linguagem clara abreviada para voos em níveis baixos, referente a FIR ou setores de FIR." },
  { id: "met41", subject: "meteo", q: "A Seção I do GAMET serve principalmente para:", options: ["Respaldar a divulgação de AIRMET", "Informar apenas vento e temperatura em altitude", "Substituir todos os SIGMET aplicáveis", "Codificar imagens de satélite"], correct: 0, explanation: "A Seção I contém fenômenos perigosos em rota para voos baixos e é preparada para respaldar a divulgação de AIRMET." },
  { id: "met42", subject: "meteo", q: "SIGWX do CNMA, segundo o material, é divulgada:", options: ["A cada 12h, somente 0000 e 1200 UTC", "Somente sob demanda operacional", "A cada 6h: 0000, 0600, 1200 e 1800 UTC", "A cada 3h para todos os níveis"], correct: 2, explanation: "As cartas SIGWX são divulgadas a cada 6 horas nos horários sinóticos 0000, 0600, 1200 e 1800 UTC, com horizonte de 24h." },
  { id: "met43", subject: "meteo", q: "WIND ALOFT PROG é confeccionada:", options: ["A cada 6h como SIGWX", "Somente em 0000 e 1200 UTC", "A cada hora junto do METAR", "Apenas quando há SIGMET ativo"], correct: 1, explanation: "O material diferencia WIND ALOFT: confeccionada somente nos horários sinóticos de 0000 e 1200 UTC." },
  { id: "met44", subject: "meteo", q: "Na WIND ALOFT, temperaturas negativas são representadas:", options: ["Com a letra M como no METAR", "Com sinal de menos antes do número", "Entre parênteses", "Sem sinal; positivas usam +"], correct: 3, explanation: "A pegadinha da carta é que temperaturas negativas aparecem sem sinal. As positivas aparecem com '+', para evitar confusão." },
  { id: "met45", subject: "meteo", q: "AIREP especial usa qual designador e quando deve ser transmitida?", options: ["ARS, o mais cedo possível após observar fenômeno perigoso", "ARP, apenas no próximo ponto obrigatório", "AIREP WX, somente após solicitação do órgão ATS", "SIGMET, quando o piloto observa CB"], correct: 0, explanation: "AIREP especial leva ARS e deve ser transmitida tão logo sejam observados fenômenos perigosos à navegação aérea. ARP é usado para rotina com Seção 3." }
];

// === HELPERS ===
function getMateria(key) {
  return MATERIAS.find(m => m.key === key) || MATERIAS[0];
}
function getSubject(key) {
  return SUBJECTS.find(s => s.key === key) || SUBJECTS[0];
}
function getCurrentSubjectOption() {
  if (state.sub !== 'all') return getSubject(state.sub);
  const materia = getMateria(state.materia);
  return {
    icon: materia.icon,
    label: state.materia === 'all' ? 'Todos os assuntos' : `Todos em ${materia.label}`
  };
}
function getMeteoSubjectKey(item) {
  const title = item && item.title ? item.title : '';
  if (title.includes('Validades')) return 'met_validade';
  if (title.includes('METAR') || title.includes('Tempo Presente')) return 'met_metar';
  if (title.includes('TAF')) return 'met_taf';
  if (title.includes('Avisos')) return 'met_warnings';
  if (title.includes('SIGMET')) return 'met_sigmet';
  if (title.includes('AIRMET') || title.includes('GAMET')) return 'met_gamet';
  if (title.includes('SIGWX') || title.includes('WIND')) return 'met_charts';
  if (title.includes('AIREP')) return 'met_airep';

  if (typeof item.id === 'number') {
    const id = item.id;
    if ([744, 781, 784, 785, 799, 806, 809, 812].includes(id)) return 'met_validade';
    if ((id >= 745 && id <= 780) || id === 782) return 'met_metar';
    if (id >= 783 && id <= 793) return 'met_taf';
    if (id >= 794 && id <= 797) return 'met_warnings';
    if (id >= 798 && id <= 806) return 'met_sigmet';
    if (id >= 807 && id <= 808) return 'met_gamet';
    if (id >= 809 && id <= 813) return 'met_charts';
    if (id >= 814 && id <= 821) return 'met_airep';
  }

  const match = String(item.id || '').match(/^met(\d+)$/);
  if (match) {
    const n = Number(match[1]);
    if ([22, 23, 24, 32, 33, 39, 42, 43].includes(n)) return 'met_validade';
    if (n >= 1 && n <= 21) return 'met_metar';
    if (n >= 25 && n <= 29) return 'met_taf';
    if (n >= 30 && n <= 31) return 'met_warnings';
    if (n >= 34 && n <= 38) return 'met_sigmet';
    if (n >= 40 && n <= 41) return 'met_gamet';
    if (n === 44) return 'met_charts';
    if (n === 45) return 'met_airep';
  }
  return 'met_metar';
}
function getItemSubjectKey(item) {
  if (!item) return 'all';
  if (item.subject === 'meteo') return getMeteoSubjectKey(item);
  return item.subject;
}
function itemMatchesMateria(item, materiaKey = state.materia) {
  if (materiaKey === 'all') return true;
  const subject = getSubject(getItemSubjectKey(item));
  return subject && subject.materia === materiaKey;
}
function itemMatchesSelection(item) {
  if (!itemMatchesMateria(item)) return false;
  return state.sub === 'all' || getItemSubjectKey(item) === state.sub;
}
function getBaseCards() {
  return CARDS.filter(itemMatchesSelection);
}
function getItemsForSubject(items, key) {
  if (key === 'all') return items.filter(item => itemMatchesMateria(item));
  return items.filter(item => getItemSubjectKey(item) === key);
}
function getFilteredCards() {
  let base = getBaseCards();
  if (state.flashFilter === 'review') return base.filter(c => state.flashGlobal.review.has(c.id));
  if (state.flashFilter === 'known') return base.filter(c => state.flashGlobal.known.has(c.id));
  return base;
}
function getFilteredQuiz() {
  return QUIZ_QUESTIONS.filter(itemMatchesSelection);
}
function getFilteredRefs() {
  return REF_SECTIONS.filter(itemMatchesSelection);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// === RENDER ===
function render() {
  // Remove any orphan backdrop elements (left behind after sub menu close)
  document.querySelectorAll('.sub-backdrop').forEach(el => el.remove());
  
  const root = document.getElementById('root');
  const subObj = getCurrentSubjectOption();
  const filtered = state.mode === 'flash' ? getFilteredCards() : state.mode === 'quiz' ? getFilteredQuiz() : getFilteredRefs();
  const totalInCat = filtered.length;
  const answeredInCat = state.mode === 'quiz' ? Object.keys(state.quizGlobal.answers).filter(id => filtered.find(q => q.id === id)).length : 0;

  root.innerHTML = `
    <div class="app">
      <div class="header">
        <div class="title">Runway Study</div>
        <div class="subtitle">Seleção de Linha Aérea — GOL / LATAM / Azul</div>
      </div>
      <div class="materia-tabs">
        ${MATERIAS.map(m => `
          <button class="materia-tab ${state.materia === m.key ? 'active' : ''}" onclick="selectMateria('${m.key}')">
            <span>${m.icon}</span><span>${escapeHtml(m.label)}</span>
          </button>
        `).join('')}
      </div>
      <div class="sub-selector">
        <button class="sub-trigger" onclick="toggleSubMenu()">
          <span class="sub-trigger-text"><span class="sub-trigger-icon">${subObj.icon}</span>${escapeHtml(subObj.label)}</span>
          <span class="sub-trigger-chevron">${state.subMenuOpen ? '▲' : '▼'}</span>
        </button>
        ${state.subMenuOpen ? renderSubMenu() : ''}
      </div>
      <div class="tabs">
        <button class="tab ${state.mode === 'flash' ? 'active' : ''}" onclick="setMode('flash')">🃏 Flashcards</button>
        <button class="tab ${state.mode === 'quiz' ? 'active' : ''}" onclick="setMode('quiz')">✏️ Quiz</button>
        <button class="tab ${state.mode === 'ref' ? 'active' : ''}" onclick="setMode('ref')">📋 Referência</button>
      </div>
      <div class="content" id="main-content">
        ${state.mode === 'flash' ? renderFlash() : state.mode === 'quiz' ? renderQuiz() : renderRef()}
      </div>
    </div>
  `;
  if (state.subMenuOpen) {
    const backdrop = document.createElement('div');
    backdrop.className = 'sub-backdrop';
    backdrop.onclick = () => { state.subMenuOpen = false; render(); };
    document.body.appendChild(backdrop);
  }
  if (state.mode === 'quiz' && state.quizScrollY > 0) {
    const c = document.getElementById('main-content');
    if (c) c.scrollTop = state.quizScrollY;
  }
}

function renderSubMenu() {
  const renderOption = (s) => {
    let badge = '';
    if (state.mode === 'quiz') {
      const subQuiz = getItemsForSubject(QUIZ_QUESTIONS, s.key);
      const ans = subQuiz.filter(q => state.quizGlobal.answers[q.id]).length;
      if (ans > 0) badge = `<span class="sub-option-badge">${ans}/${subQuiz.length}</span>`;
    } else if (state.mode === 'flash') {
      const subCards = getItemsForSubject(CARDS, s.key);
      const known = subCards.filter(c => state.flashGlobal.known.has(c.id)).length;
      if (known > 0) badge = `<span class="sub-option-badge">${known}/${subCards.length}</span>`;
    }
    return `<div class="sub-option ${state.sub === s.key ? 'active' : ''}" onclick="selectSub('${s.key}')">
      <span class="sub-option-left"><span>${s.icon}</span><span>${escapeHtml(s.label)}</span></span>
      ${badge}
    </div>`;
  };

  const allLabel = state.materia === 'all' ? 'Todos os assuntos' : `Todos em ${getMateria(state.materia).label}`;
  const allOption = { key: 'all', label: allLabel, icon: getMateria(state.materia).icon };
  let options = [renderOption(allOption)];

  if (state.materia === 'all') {
    MATERIAS.filter(m => m.key !== 'all').forEach(m => {
      options.push(`<div class="sub-group-label">${m.icon} ${escapeHtml(m.label)}</div>`);
      SUBJECTS.filter(s => s.materia === m.key).forEach(s => options.push(renderOption(s)));
    });
  } else {
    SUBJECTS.filter(s => s.materia === state.materia).forEach(s => options.push(renderOption(s)));
  }

  return `<div class="sub-menu">
    ${options.join('')}
  </div>`;
}

function renderFlash() {
  const allCards = getBaseCards();
  const reviewCount = allCards.filter(c => state.flashGlobal.review.has(c.id)).length;
  const knownCount = allCards.filter(c => state.flashGlobal.known.has(c.id)).length;
  const cards = getFilteredCards();

  const filterBar = `
    <div class="filter-bar">
      <button class="filter-btn ${state.flashFilter==='all'?'active':''}" onclick="setFlashFilter('all')">
        📖 Todos <span class="filter-count">${allCards.length}</span>
      </button>
      <button class="filter-btn ${state.flashFilter==='review'?'active-review':''}" onclick="setFlashFilter('review')">
        📚 Revisar <span class="filter-count">${reviewCount}</span>
      </button>
      <button class="filter-btn ${state.flashFilter==='known'?'active-known':''}" onclick="setFlashFilter('known')">
        ✓ Sabidos <span class="filter-count">${knownCount}</span>
      </button>
    </div>`;

  if (cards.length === 0) {
    const msg = state.flashFilter === 'review'
      ? 'Nenhum card marcado para revisar nesta categoria.<br>Use 📚 <b>Revisar depois</b> nos cards para marcá-los.'
      : state.flashFilter === 'known'
      ? 'Nenhum card marcado como sabido nesta categoria.<br>Use ✓ <b>Já sei</b> nos cards para marcá-los.'
      : 'Nenhum flashcard nesta categoria.';
    return `<div class="card-wrap">${filterBar}<div class="done-box" style="margin-top:16px"><p style="text-align:center;color:#64748b;font-size:14px">${msg}</p></div></div>`;
  }

  if (state.flashIdx >= cards.length) state.flashIdx = 0;
  const card = cards[state.flashIdx];
  const known = state.flashGlobal.known.has(card.id);
  const review = state.flashGlobal.review.has(card.id);
  const sub = getSubject(getItemSubjectKey(card));
  return `
    <div class="card-wrap">
      ${filterBar}
      <div class="nav-row">
        <button class="nav-arrow" onclick="prevCard()" ${state.flashIdx === 0 ? 'disabled' : ''}>‹</button>
        ${state.flashEditing
          ? `<input class="nav-input" id="nav-jump" type="number" min="1" max="${cards.length}"
               value="${state.flashIdx + 1}" autofocus
               onblur="commitJump(${cards.length})"
               onkeydown="if(event.key==='Enter')commitJump(${cards.length});if(event.key==='Escape')cancelJump();"
               onclick="this.select()">`
          : `<span class="nav-counter" onclick="startJump()" title="Toque para ir a um número">
               ${state.flashIdx + 1} / ${cards.length} ✎
             </span>`
        }
        <button class="nav-arrow" onclick="nextCard()" ${state.flashIdx === cards.length - 1 ? 'disabled' : ''}>›</button>
      </div>
      <div class="card ${state.flashFlipped ? 'flipped' : ''}" onclick="flipCard()">
        <div class="cat">${sub ? sub.icon + ' ' + escapeHtml(sub.label) : ''}</div>
        <div class="emoji">${card.emoji || '📚'}</div>
        <div class="text">${escapeHtml(state.flashFlipped ? card.a : card.q)}</div>
        <div class="label">${state.flashFlipped ? 'Resposta' : 'Pergunta'}</div>
      </div>
      <button class="flip-btn" onclick="flipCard()">🔄 ${state.flashFlipped ? 'Ver pergunta' : 'Ver resposta'}</button>
      <div class="actions">
        <button class="action-btn action-known" onclick="markKnown('${card.id}')">✓ Já sei</button>
        <button class="action-btn action-review" onclick="markReview('${card.id}')">📚 Revisar depois</button>
      </div>
      <div class="stats">
        Sabidos: ${[...state.flashGlobal.known].filter(id => allCards.find(c => c.id == id)).length} / ${allCards.length}
        · Para revisar: ${reviewCount}
      </div>
      <div style="text-align:center;margin-top:12px">
        ${state.flashConfirmReset
          ? `<div class="reset-confirm">
               <span>Zerar todo o progresso?</span>
               <button class="reset-yes" onclick="confirmReset()">Sim, zerar</button>
               <button class="reset-no" onclick="cancelReset()">Cancelar</button>
             </div>`
          : `<button class="reset-btn" onclick="askReset()">🗑 Zerar progresso</button>`
        }
      </div>
    </div>
  `;
}

function renderQuiz() {
  const questions = getFilteredQuiz();
  if (questions.length === 0) return '<div class="done-box"><h2>Nenhuma questão nesta categoria</h2></div>';
  if (state.quizIdx >= questions.length) state.quizIdx = 0;
  const q = questions[state.quizIdx];
  const answered = state.quizGlobal.answers[q.id];
  const subAnswered = questions.filter(qq => state.quizGlobal.answers[qq.id]).length;
  const correctCount = questions.filter(qq => state.quizGlobal.answers[qq.id] && state.quizGlobal.answers[qq.id].correct).length;
  return `
    <div class="card-wrap">
      <div class="nav-row">
        <button class="nav-arrow" onclick="prevQuiz()" ${state.quizIdx === 0 ? 'disabled' : ''}>‹</button>
        <span class="nav-counter">${state.quizIdx + 1} / ${questions.length}</span>
        <button class="nav-arrow" onclick="nextQuiz()" ${state.quizIdx === questions.length - 1 ? 'disabled' : ''}>›</button>
      </div>
      <div class="quiz-q">${escapeHtml(q.q)}</div>
      ${q.options.map((opt, i) => {
        let cls = 'opt-btn';
        let circleClass = 'opt-circle';
        if (answered) {
          if (i === q.correct) { cls += ' correct'; circleClass += ' green'; }
          else if (i === answered.selected) { cls += ' wrong'; circleClass += ' red'; }
          else { cls += ' dim'; }
        }
        return `<button class="${cls}" ${answered ? '' : `onclick="answerQuiz('${q.id}', ${i})"`}>
          <span class="${circleClass}">${String.fromCharCode(65 + i)}</span>
          <span>${escapeHtml(opt)}</span>
        </button>`;
      }).join('')}
      ${answered ? `
        <div class="expl ${answered.correct ? 'ok' : 'nok'}">
          <div class="expl-title">${answered.correct ? '✓ Correto' : '✗ Incorreto'} — Por quê?</div>
          ${escapeHtml(q.explanation)}
        </div>
        <div class="bottom-bar">
          <button class="btn-primary" onclick="nextQuiz()">Próxima →</button>
        </div>
      ` : ''}
      <div class="stats">
        Respondidas: ${subAnswered}/${questions.length} · Acertos: ${correctCount}
      </div>
      <div style="text-align:center;margin-top:12px"><button class="reset-btn" onclick="resetProgress('quiz')">🗑 Zerar progresso desta categoria</button></div>
    </div>
  `;
}

function renderRef() {
  const sections = getFilteredRefs();
  if (sections.length === 0) return '<div class="done-box"><h2>Nenhuma referência nesta categoria</h2></div>';
  return sections.map(s => `
    <div class="ref-card">
      <div class="ref-header">${s.icon || '📋'} ${escapeHtml(s.title)}</div>
      ${s.items.map(it => `
        <div class="ref-row">
          <div class="ref-label">${escapeHtml(it.label)}</div>
          <div class="ref-value">${escapeHtml(it.value)}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// === ACTIONS ===
function toggleSubMenu() {
  state.subMenuOpen = !state.subMenuOpen;
  render();
}
function selectMateria(key) {
  state.materia = key;
  state.sub = 'all';
  state.subMenuOpen = false;
  state.flashIdx = 0;
  state.quizIdx = 0;
  state.flashFlipped = false;
  state.flashFilter = 'all';
  state.flashEditing = false;
  state.flashConfirmReset = false;
  state.quizScrollY = 0;
  render();
}
function selectSub(key) {
  state.sub = key;
  state.subMenuOpen = false;
  state.flashIdx = 0;
  state.quizIdx = 0;
  state.flashFlipped = false;
  state.flashFilter = 'all';
  state.flashEditing = false;
  state.flashConfirmReset = false;
  state.quizScrollY = 0;
  render();
}
function setMode(m) {
  state.mode = m;
  state.subMenuOpen = false;
  state.flashFlipped = false;
  state.flashEditing = false;
  state.flashConfirmReset = false;
  render();
}
function flipCard() {
  state.flashFlipped = !state.flashFlipped;
  render();
}
function nextCard() {
  const c = getFilteredCards();
  if (state.flashIdx < c.length - 1) {
    state.flashIdx++;
    state.flashFlipped = false;
    render();
  }
}
function prevCard() {
  if (state.flashIdx > 0) {
    state.flashIdx--;
    state.flashFlipped = false;
    render();
  }
}
function markKnown(id) {
  const idn = isNaN(Number(id)) ? id : Number(id);
  state.flashGlobal.known.add(idn);
  state.flashGlobal.review.delete(idn);
  saveProgress();
  advanceCard();
}
function markReview(id) {
  const idn = isNaN(Number(id)) ? id : Number(id);
  state.flashGlobal.review.add(idn);
  state.flashGlobal.known.delete(idn);
  saveProgress();
  advanceCard();
}
function advanceCard() {
  const c = getFilteredCards();
  if (state.flashIdx < c.length - 1) {
    state.flashIdx++;
    state.flashFlipped = false;
    render();
  } else {
    // Last card — flip back, render to show updated stats
    state.flashFlipped = false;
    render();
  }
}
function answerQuiz(id, selected) {
  const q = QUIZ_QUESTIONS.find(qq => qq.id === id);
  if (!q) return;
  const c = document.getElementById('main-content');
  state.quizScrollY = c ? c.scrollTop : 0;
  state.quizGlobal.answers[id] = { selected, correct: selected === q.correct };
  saveProgress();
  render();
}
function nextQuiz() {
  const q = getFilteredQuiz();
  state.quizScrollY = 0;
  if (state.quizIdx < q.length - 1) {
    state.quizIdx++;
    render();
  }
}
function prevQuiz() {
  state.quizScrollY = 0;
  if (state.quizIdx > 0) {
    state.quizIdx--;
    render();
  }
}
function startJump() {
  state.flashEditing = true;
  render();
  setTimeout(() => { const el = document.getElementById('nav-jump'); if (el) { el.focus(); el.select(); } }, 30);
}
function commitJump(total) {
  const el = document.getElementById('nav-jump');
  if (el) {
    const n = parseInt(el.value, 10);
    if (!isNaN(n) && n >= 1 && n <= total) {
      state.flashIdx = n - 1;
      state.flashFlipped = false;
    }
  }
  state.flashEditing = false;
  render();
}
function cancelJump() {
  state.flashEditing = false;
  render();
}
function setFlashFilter(f) {
  state.flashFilter = f;
  state.flashIdx = 0;
  state.flashFlipped = false;
  state.flashEditing = false;
  state.flashConfirmReset = false;
  render();
}
function askReset() {
  state.flashConfirmReset = true;
  render();
}
function cancelReset() {
  state.flashConfirmReset = false;
  render();
}
function confirmReset() {
  // Reset ALL cards in the current subject (regardless of active filter)
  const subCards = getBaseCards();
  subCards.forEach(c => {
    state.flashGlobal.known.delete(c.id);
    state.flashGlobal.review.delete(c.id);
  });
  state.flashConfirmReset = false;
  state.flashIdx = 0;
  state.flashFlipped = false;
  state.flashFilter = 'all';
  saveProgress();
  render();
}
function resetProgress(mode) {
  if (!confirm('Zerar todo o progresso desta categoria?')) return;
  if (mode === 'flash') {
    const cards = getBaseCards();
    cards.forEach(c => {
      state.flashGlobal.known.delete(c.id);
      state.flashGlobal.review.delete(c.id);
    });
  } else if (mode === 'quiz') {
    const qs = getFilteredQuiz();
    qs.forEach(q => delete state.quizGlobal.answers[q.id]);
  }
  saveProgress();
  render();
}

// === KEYBOARD ===
document.addEventListener('keydown', (e) => {
  if (state.mode === 'flash') {
    if (e.key === 'ArrowRight') nextCard();
    else if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  } else if (state.mode === 'quiz') {
    if (e.key === 'ArrowRight') nextQuiz();
    else if (e.key === 'ArrowLeft') prevQuiz();
  }
});

// === INIT ===
render();
</script>
</body>
</html>
