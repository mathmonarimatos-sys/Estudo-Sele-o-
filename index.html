  { id: 347, subject: "obs", q: "O que é VFTO (Final Takeoff Speed)?", a: "É a velocidade de fim de decolagem, atingida ao final do 3º segmento após recolher flaps. Também chamada de Engine Out Takeoff Speed. Deve ser ≥ 1.18 × VSR em configuração limpa.", emoji: "✈️" },
  { id: 348, subject: "obs", q: "Como se calcula o gradiente de subida?", a: "Gradiente (%) = (altura ganha / distância percorrida) × 100. Ou: Gradiente = (Empuxo − Arrasto) / Peso × 100 = (T−D)/W × 100. Se T−D > 0: sobe ou acelera. Se T−D = 0: voo nivelado. Se T−D < 0: perde velocidade ou altitude.", emoji: "📐" },
  { id: 349, subject: "obs", q: "O que é Climb Limited Takeoff Weight?", a: "É o peso máximo que permite cumprir TODOS os 4 segmentos. Normalmente o 2º segmento é o mais limitante (maior gradiente exigido: 2.4% para bimotores).", emoji: "⚖️" },
  { id: 350, subject: "obs", q: "Qual o tempo máximo de uso do TOGA (Takeoff/Go-Around thrust)?", a: "5 minutos (certificação padrão). Existe certificação opcional de 10 minutos (mais cara, usada em aeroportos de alta altitude). Após o TOGA, deve-se reduzir para MCT (Maximum Continuous Thrust).", emoji: "⏱️" },
  { id: 351, subject: "obs", q: "O que é Level Off Limited Takeoff Weight?", a: "É o peso máximo em que a aeronave consegue atingir a acceleration altitude escolhida com EXATAMENTE 5 minutos de TOGA. Se quisesse subir mais, precisaria de mais tempo de TOGA (proibido) ou menos peso.", emoji: "⚖️" },
  { id: 352, subject: "obs", q: "O que é Extended Second Segment e qual a vantagem?", a: "Procedimento em que se usa TOGA até o FIM do 2º segmento (não até o 3º). No 3º segmento já usa MCT. Vantagem: TODOS os 5 minutos de TOGA ficam disponíveis para SUBIR (1º+2º segmentos), permitindo acceleration altitude maior.", emoji: "📈" },
  { id: 353, subject: "obs", q: "Por que nem sempre se escolhe a menor acceleration altitude (400ft)?", a: "Vários motivos: 1) Obstáculos podem exigir altitude maior. 2) Gradientes da SID podem impedir. 3) Automação da aeronave. 4) Experiência da tripulação. Altitude mínima: 400ft AFE.", emoji: "🏔️" },
  { id: 354, subject: "obs", q: "Por que bimotores raramente pedem SID alternativa por gradiente, mas quadrimotores sim?", a: "Bimotor com motor inop tem ~100% de empuxo extra com todos os motores (2→1). Quadrimotor tem apenas ~33% extra (4→3). Então o gradiente all-engine do bimotor é MUITO maior que do quadrimotor, cumprindo SIDs íngremes facilmente.", emoji: "✈️" },
  { id: 355, subject: "obs", q: "A escolha da acceleration altitude afeta o custo de combustível?", a: "SIM, significativamente. Exemplo: 400ft vs 800ft = ~5kg/voo. Com 1.000 decolagens/dia: ~2,3 milhões de litros/ano de economia, podendo passar de $1 milhão/ano.", emoji: "💰" },
  { id: 360, subject: "obs", q: "O que é a técnica de Improved Climb (IC)?", a: "Técnica que aumenta V1, VR e V2 além dos valores padrão para ganhar gradiente de subida. Requer mais pista (não pode ser field limited) e resulta em maior peso máximo quando limitado por subida (climb limited).", emoji: "📈" },
  { id: 361, subject: "obs", q: "Quando posso usar Improved Climb?", a: "SOMENTE quando a pista tem sobra (não é field limited). A técnica usa mais pista para acelerar até V2 maior, então a pista precisa comportar essa aceleração extra.", emoji: "✅" },
  { id: 362, subject: "obs", q: "Em quais situações o Improved Climb NÃO pode ser aplicado?", a: "3 casos: 1) Field limited (pista já no limite). 2) Tire Speed limited. 3) Brake Energy (VMBE) limited. Marcados com (*) no livro. Não afeta limite de Return to Land.", emoji: "🚫" },
  { id: 363, subject: "obs", q: "O que é Improved Climb Limited Takeoff Weight?", a: "É o peso máximo resultante da aplicação da técnica de Improved Climb quando o avião é climb limited. Sempre fica entre o peso climb-limited original e o field-limited.", emoji: "⚖️" },
  { id: 364, subject: "obs", q: "O Improved Climb pode ser aplicado em QUALQUER situação obstacle limited?", a: "NÃO! Depende da posição do obstáculo. Se o obstáculo está DISTANTE: IC funciona (trajetória mais íngreme compensa). Se está PRÓXIMO: IC pode prejudicar, pois o avião decola mais perto do obstáculo.", emoji: "⚠️" },
  { id: 365, subject: "obs", q: "Qual o conceito de 'best angle of climb speed'?", a: "É a velocidade onde o arrasto total é mínimo. Isso dá o maior excesso de empuxo → maior gradiente de subida. Está no equilíbrio entre arrasto parasita (sobe com velocidade) e arrasto induzido (desce com velocidade).", emoji: "📐" },
  { id: 366, subject: "obs", q: "Improved Climb aumenta V1, VR e V2. Qual é a velocidade 'causadora' da melhoria?", a: "V2! O aumento de V2 gera o ganho de gradiente. V1 e VR aumentam apenas como CONSEQUÊNCIA (precisam ser consistentes com o V2 maior). Não é V1 ou VR que melhoram o climb.", emoji: "📊" },
  { id: 367, subject: "obs", q: "Quais são as 4 vantagens do Improved Climb (além do ganho de peso)?", a: "1) Permite assumed temperature maior (economia de empuxo). 2) Menor consumo de combustível com mesmo empuxo. 3) Maior tail clearance (menos tail strike). 4) Mais energia para controle em windshear.", emoji: "✅" },
  { id: 368, subject: "obs", q: "Como o Improved Climb melhora a tail clearance?", a: "V2 maior permite usar flap MENOR. Menos flap = menor atitude de rotação = mais folga da cauda. Mesmo um pequeno aumento de V2 (ex: +5kt) pode aumentar significativamente a tail clearance, reduzindo risco de tail strike.", emoji: "✈️" },
  { id: 369, subject: "obs", q: "Como o Improved Climb economiza combustível?", a: "Para a mesma pista e peso, com V2 maior pode-se usar assumed temperature maior → empuxo reduzido → menor consumo. Exemplo KMCO: RWY 17R (12.000ft) usa V2 172kt e N1 89% vs RWY 18L (10.000ft) com V2 166kt e N1 90.5%.", emoji: "💰" },
  { id: 370, subject: "obs", q: "O que é Tire Speed Limited Takeoff Weight?", a: "É o peso máximo em que VLOF não excede VTIRE. Quando o peso é muito alto em aeroporto quente/alto, a VLOF pode ser > VTIRE, forçando restrição de peso (ou flap maior para reduzir velocidade).", emoji: "🛞" },
  { id: 371, subject: "obs", q: "Do que depende o limite de VTIRE?", a: "Do TIPO DE PNEU (construção) e do FABRICANTE do pneu. Pneus BIAS têm limite menor, pneus RADIAL têm limite maior. O fabricante da aeronave especifica quais pneus são certificados para cada modelo.", emoji: "🛞" },
  { id: 372, subject: "obs", q: "VTIRE é velocidade em relação ao ar ou ao solo?", a: "Em relação ao SOLO (ground speed), NÃO IAS. Por isso aeroportos quentes, de alta altitude, e especialmente com VENTO DE CAUDA agravam o problema (maior GS para mesma IAS).", emoji: "🌡️" },
  { id: 373, subject: "obs", q: "O análise de Tire Speed é para motor inop ou all engine?", a: "ALL ENGINE! Diferente de outras análises que usam motor inop. O pior caso para pneu é decolar com todos os motores (máxima aceleração), pois VLOF é atingida mais cedo e com mais energia.", emoji: "⚠️" },
  { id: 374, subject: "obs", q: "O pneu pode exceder VTIRE em algum momento?", a: "UMA ÚNICA VEZ, por um curto período. Especificação exige que suporte ultrapassar o limite por pouco tempo. Exemplo: pneu de 225mph suporta 250mph 1x; pneu de 235mph suporta 260mph 1x.", emoji: "📊" },
  { id: 375, subject: "obs", q: "Se a rotação é mais lenta que o padrão (2-3°/s), o que acontece?", a: "Atraso na rotação aumenta a corrida de decolagem SIGNIFICATIVAMENTE. 1°/s mais lento pode adicionar até 400m de pista e aumentar muito a VLOF — risco de exceder VTIRE e danificar pneus.", emoji: "⏱️" },
  { id: 376, subject: "obs", q: "Qual a taxa de rotação esperada na decolagem?", a: "Entre 2° e 3° por segundo. Essa é a base dos cálculos de VLOF e distância. Rotação mais lenta = distância maior e VLOF maior. Rotação mais rápida = risco de tail strike.", emoji: "📐" },
  { id: 377, subject: "obs", q: "Soluções quando limitado por Tire Speed?", a: "1) Restringir VR (e portanto VLOF) → Tire Speed Limited TOW. 2) Usar flap MAIOR para reduzir VR — mas isso piora climb/obstacle limit. Geralmente solução 1 é melhor.", emoji: "💡" },
  { id: 380, subject: "obs", q: "Qual o teste de certificação de VMBE (Max Brake Energy)?", a: "Com 90% de freios gastos, o avião executa 3 taxis completos até o threshold da pista. Então, acelera até V1 e para. A aeronave deve parar dentro da distância calculada usando APENAS freios (sem reverso).", emoji: "🔥" },
  { id: 381, subject: "obs", q: "Por que o teste de VMBE usa freios com 90% de desgaste?", a: "Para extrapolar matematicamente o desempenho com 100% de desgaste. O valor calculado (100% worn) é o que vale para a operação. É um dos testes mais CAROS de certificação.", emoji: "🔧" },
  { id: 382, subject: "obs", q: "Após o teste de VMBE, os freios superaquecidos não podem comprometer a segurança da aeronave por quanto tempo?", a: "5 minutos — tempo estimado para chegada dos bombeiros. Pequenas chamas nos freios são esperadas. A estrutura não pode ser comprometida por incêndio/falha durante esse tempo.", emoji: "🚒" },
  { id: 383, subject: "obs", q: "O que é Brake Energy Limited Takeoff Weight?", a: "Peso máximo quando a V1 calculada excede VMBE. A solução é reduzir V1 até VMBE, o que reduz o peso máximo de decolagem. Agravado por: aeroporto alto/quente, vento de cauda, pista em descida.", emoji: "⚖️" },
  { id: 384, subject: "obs", q: "Quais fatores agravam o limite de Brake Energy?", a: "1) Alta elevação. 2) Alta temperatura (dia quente). 3) Vento de cauda. 4) Pista em descida (downhill). Todos aumentam a velocidade no solo (GS) para a mesma IAS, aumentando a energia cinética a ser dissipada.", emoji: "🌡️" },
  { id: 385, subject: "obs", q: "Por que os pneus de avião são preenchidos com NITROGÊNIO, não ar?", a: "Nitrogênio é inerte — não é oxidante nem combustível. Se o pneu superaquecer (freios quentes) e o plug de pressão derreter, o gás escapa sem alimentar o fogo. Ar normal (21% O₂) alimentaria incêndio.", emoji: "🛞" },
  { id: 386, subject: "obs", q: "Qual a função dos plugs fusíveis nos pneus?", a: "São plugs metálicos que derretem em temperatura específica. Se os freios superaquecem, o calor transfere para o gás do pneu, que expande e aumenta a pressão interna. O plug derrete antes da pressão causar explosão, liberando o gás de forma controlada.", emoji: "🔓" },
  { id: 387, subject: "obs", q: "Quais são os 2 tipos de plugs de segurança em um pneu de aeronave?", a: "1) Plug de OVERINFLATION (virado para fora, estoura por pressão excessiva). 2) Plugs INTERNOS fusíveis (derretem por temperatura — quando freios quentes aquecem o gás, o plug derrete antes da pressão explodir o pneu, liberando o gás de forma controlada).", emoji: "🔧" },
  { id: 388, subject: "obs", q: "Quais os 3 testes mais caros de certificação de uma aeronave?", a: "1) VMBE test (freios 90% gastos, 3 taxis, parada de V1). 2) VMU test. 3) Outros de destruição. O teste de VMBE é frequentemente citado como o 2º mais caro.", emoji: "💰" },
  { id: 400, subject: "obs", q: "A qual aeronaves se aplica o limite de Return to Land / Fuel Jettison?", a: "Apenas às aeronaves projetadas APÓS 2006 (FAR 25.1001). Aeronaves com projetos anteriores — independente do ano de fabricação da unidade específica — estão isentas. Foi criado pensando em retornos por emergência médica.", emoji: "📅" },
  { id: 401, subject: "obs", q: "Qual a origem do requisito Return to Land (FAR 25.1001)?", a: "Foi criado para cobrir cenário de retorno após decolagem por emergência médica ou similar. Antes, isso não era considerado na certificação. A aeronave deve ser capaz de atingir gradientes mínimos de go-around na condição de retorno.", emoji: "🏥" },
  { id: 402, subject: "obs", q: "O MLW (Maximum Landing Weight estrutural) é considerado no limite de Return to Land?", a: "NÃO! Regra 1 do FAR 25.1001: o MLW NÃO é fator limitante. O que importa é o gradiente de subida (Landing Climb e Approach Climb), não a estrutura do trem de pouso.", emoji: "⚖️" },
  { id: 403, subject: "obs", q: "Até que altitude a aeronave precisa subir antes do retorno (Return to Land)?", a: "5.000ft AFE. A aeronave decola, sobe até 5.000ft AFE, e então retorna para pouso. Durante esse trajeto, queima combustível.", emoji: "📏" },
  { id: 404, subject: "obs", q: "Aeronave SEM fuel jettison: quanto combustível considerar no cálculo do peso de pouso?", a: "15 minutos de queima de combustível. Peso de pouso = ATOW (Actual Takeoff Weight) - 15min de fuel burn.", emoji: "⛽" },
  { id: 405, subject: "obs", q: "Aeronave COM fuel jettison: quanto combustível considerar?", a: "15 minutos de queima + 15 minutos de dumping. Peso de pouso = ATOW - 15min de burn - 15min de dump. Total de 30 minutos para chegar ao peso de pouso.", emoji: "💧" },
  { id: 406, subject: "obs", q: "Quais os dois requisitos de gradiente avaliados no Return to Land?", a: "1) Landing Climb (VREF): flap de pouso, todos motores, trem down, takeoff power. 2) Approach Climb (VREF + 5kt): flap de approach, motor crítico inop, trem up, takeoff power.", emoji: "📊" },
  { id: 407, subject: "obs", q: "Qual o gradiente mínimo do Landing Climb e para quantos motores?", a: "3.2% ÚNICO para qualquer aeronave (2, 3 ou 4 motores). Todos os motores operando. Flap de pouso, trem down, takeoff power. Velocidade: VREF.", emoji: "📈" },
  { id: 408, subject: "obs", q: "Qual o gradiente mínimo do Approach Climb? Varia com o número de motores?", a: "SIM, varia: 2.1% (bi) / 2.4% (tri) / 2.7% (quad). Motor crítico inop (bi perde 50%, tri perde 33%, quad perde 25% do empuxo). Flap de approach, trem UP, takeoff power. Velocidade: VREF + 5kt.", emoji: "📊" },
  { id: 409, subject: "obs", q: "Por que o Approach Climb tem gradiente MENOR que o Landing Climb?", a: "Porque o Approach Climb considera motor INOP (menos empuxo disponível). O Landing Climb considera todos os motores (mais empuxo, maior gradiente exigido). Compensação justa: quem tem mais motores, gradiente maior.", emoji: "⚖️" },
  { id: 410, subject: "obs", q: "Apesar do nome, o Approach Climb refere-se a qual configuração?", a: "Configuração de MISSED APPROACH (go-around): flap de approach e trem JÁ RECOLHIDO. É a fase após iniciar a arremetida com motor inop. Nome confunde, pois parece ser aproximação normal.", emoji: "🔄" },
  { id: 411, subject: "obs", q: "O que é Fuel Jettison Limited Takeoff Weight / Return to Land Limited TOW?", a: "Peso máximo de decolagem que garante cumprir os gradientes de Landing Climb e Approach Climb após o retorno. Em aeronaves pós-2006, pode ser um dos limitantes do peso de decolagem.", emoji: "⚖️" },
  { id: 412, subject: "obs", q: "Por que alguns fabricantes usam o nome 'Fuel Jettison Limited' mesmo em aeronaves SEM fuel jettison?", a: "Consistência de terminologia em toda a linha de produtos do fabricante. Mesmo sem sistema de dump, mantém-se o mesmo nome. Outros fabricantes usam 'Return to Land Limited' para aeronaves sem dump — mesmo conceito, nome mais claro.", emoji: "📖" },
  { id: 413, subject: "obs", q: "No cálculo de Landing/Approach Climb, qual temperatura e elevação usar?", a: "A TEMPERATURA e ELEVAÇÃO da pista de retorno (origem). Embora o go-around ocorra em altitude um pouco maior, é razoável usar os dados do aeródromo de pouso para simplicidade.", emoji: "🌡️" },
  { id: 420, subject: "eng", q: "O que é Bypass Ratio em motores turbofan?", a: "É a razão entre a massa de ar que passa FORA do core do motor (bypass) e a que passa DENTRO (combustão). Ratios maiores = motor mais eficiente. Motores modernos têm bypass ratio entre 5:1 e 12:1 tipicamente.", emoji: "💨" },
  { id: 421, subject: "eng", q: "O que é Pressure Ratio (razão de compressão)?", a: "É quantas vezes a pressão do ar aumenta ao passar pelos compressores do motor. Motores comerciais modernos têm pressure ratios tipicamente entre 25:1 e 40:1. Quanto maior, mais eficiente o motor (dentro de limites mecânicos).", emoji: "📊" },
  { id: 422, subject: "eng", q: "O que são N1 e N2 em um motor turbofan?", a: "N1 = rotação do fan e compressor de baixa pressão (LP spool). N2 = rotação do compressor de alta pressão (HP spool). São eixos CONCÊNTRICOS independentes. O N2 gira muito mais rápido que o N1.", emoji: "⚙️" },
  { id: 423, subject: "eng", q: "O que são HPT e LPT?", a: "HPT = High Pressure Turbine (move o N2/compressor HP). LPT = Low Pressure Turbine (move o N1/fan + compressor LP). A HPT vem PRIMEIRO (após combustão), depois LPT. Eixos concêntricos.", emoji: "🔧" },
  { id: 424, subject: "eng", q: "Qual a função do starter no motor a jato?", a: "Fornece rotação inicial até o N2 atingir velocidade suficiente para a reação ser auto-sustentada. Depois, o starter é desacoplado. Sem starter, a reação não começa porque o ar não chegaria comprimido na câmara.", emoji: "🔑" },
  { id: 425, subject: "eng", q: "O que é Flat Rate Temperature (FRT)?", a: "Temperatura máxima até a qual o motor produz empuxo MÁXIMO. Também chamada de 'thrust brake temperature'. Referenciada à ISA (ex: ISA+15). Em motores típicos, ISA+15 = 30°C ao nível do mar.", emoji: "🌡️" },
  { id: 426, subject: "eng", q: "No regime PRESSURE LIMITED (abaixo da FRT), o que limita o empuxo?", a: "A PRESSÃO na câmara de combustão. O ar frio/denso produz pressão maior nos compressores. Para não ultrapassar o limite da câmara, o N1/N2 é REDUZIDO. Resultado: empuxo constante mesmo com ar mais denso.", emoji: "❄️" },
  { id: 427, subject: "eng", q: "No regime TEMPERATURE LIMITED (acima da FRT), o que limita o empuxo?", a: "A EGT (Exhaust Gas Temperature). Ar quente entra no motor mais quente, aumenta EGT na saída. Para não exceder o limite de EGT, a razão de compressão é reduzida (menos N1/N2). Resultado: empuxo CAI com temperatura.", emoji: "🔥" },
  { id: 428, subject: "eng", q: "Por que o empuxo é CONSTANTE abaixo da FRT?", a: "Porque a razão de PRESSÃO entre entrada e saída (EPR) permanece a mesma. A pressão na câmara é mantida no limite — o que muda é apenas a rotação. Isso dá a característica 'flat' no gráfico de empuxo × OAT.", emoji: "📊" },
  { id: 429, subject: "eng", q: "O que é EPR (Engine Pressure Ratio)?", a: "É a razão entre a pressão de saída (exaust) e a pressão de entrada do motor. Indica quanto de empuxo o motor está produzindo. Alguns motores usam EPR como parâmetro principal de empuxo (ex: Rolls-Royce RB211).", emoji: "📈" },
  { id: 430, subject: "eng", q: "O que é EGT e por que é crítica para a vida do motor?", a: "Exhaust Gas Temperature — temperatura dos gases na saída (após LPT). Ultrapassar o limite de EGT por mesmo poucos segundos pode exigir inspeção ou revisão. EGT é um dos principais indicadores de saúde do motor.", emoji: "🔥" },
  { id: 431, subject: "eng", q: "Por que motores novos têm MARGEM de EGT maior que motores velhos?", a: "Fabricantes deixam margem entre a EGT máxima alcançada e o limite DE DESIGN. Conforme o motor 'envelhece' (deterioração de palhetas etc.), o EGT para o mesmo empuxo aumenta. Quando a margem acaba, o motor precisa de overhaul.", emoji: "📉" },
  { id: 432, subject: "eng", q: "O que é TOGA (certificação)?", a: "Takeoff/Go-Around Thrust — empuxo máximo que o motor deve manter por pelo menos 5 minutos sem exceder limites operacionais. Certificação padrão é 5 min, mas existe certificação opcional de 10 min.", emoji: "🚀" },
  { id: 433, subject: "eng", q: "O que é MCT (certificação)?", a: "Maximum Continuous Thrust — empuxo que o motor pode entregar CONTINUAMENTE sem limite de tempo. Usado após o TOGA, no 4º segmento da decolagem em diante.", emoji: "♾️" },
  { id: 434, subject: "eng", q: "Os valores de Max Climb e Max Cruise thrust são valores certificados?", a: "NÃO! Aparecem no Operations Manual mas NÃO são valores de certificação (não aparecem no AFM — Airplane Flight Manual). São do operador. Apenas TOGA e MCT são certificados.", emoji: "📖" },
  { id: 435, subject: "eng", q: "Qual a diferença entre Stationary Stages e Rotary Stages no compressor?", a: "ROTARY: palhetas que giram com o eixo (comprimem o ar). STATIONARY (stators): palhetas fixas entre as rotary, que direcionam o fluxo turbulento para a próxima rotary. Sem stators, a turbulência reduziria a eficiência.", emoji: "⚙️" },
  { id: 450, subject: "eng", q: "O que é Reduced Thrust (empuxo reduzido)?", a: "Técnica de decolar com empuxo ABAIXO do TOGA quando a aeronave NÃO está limitada no peso máximo. Usa-se o empuxo necessário para o peso real, economizando vida útil do motor e reduzindo EGT.", emoji: "📉" },
  { id: 451, subject: "eng", q: "Quais são os 2 métodos principais de Reduced Thrust?", a: "1) Assumed Temperature (ATM / Flex Temp) — assume-se temperatura FICTÍCIA maior que a real. 2) Derated Thrust — usa-se um motor 'com certificação de menor empuxo' (thrust rating menor).", emoji: "2️⃣" },
  { id: 452, subject: "eng", q: "O que é Assumed Temperature Method (ATM)?", a: "Piloto informa ao computador uma temperatura MAIOR que a real (ex: real 20°C, assumida 50°C). O computador calcula o empuxo necessário PARA aquela temperatura fictícia, que será menor. Também conhecido como Flex Temp, dependendo do fabricante.", emoji: "🌡️" },
  { id: 453, subject: "eng", q: "Como se diferencia ATM (Assumed Temp) de Derated Thrust?", a: "ATM: N1 e V-speeds aumentam com a temperatura assumida — é apenas uma redução 'virtual'. DERATED: é uma CERTIFICAÇÃO diferente do motor (thrust rating menor) — limita fisicamente o empuxo máximo disponível, mesmo em emergência.", emoji: "🆚" },
  { id: 454, subject: "eng", q: "Em caso de emergência (ex: windshear), é possível voltar para TOGA com ATM?", a: "SIM. ATM é apenas uma redução 'assumida' — o motor mantém toda sua capacidade. O piloto pode avançar as manetes e obter TOGA completo se necessário.", emoji: "🚨" },
  { id: 455, subject: "eng", q: "Em caso de emergência, é possível voltar ao TOGA com Derated Thrust?", a: "NÃO completamente. No Derated, o motor foi CERTIFICADO com menor thrust rating e o empuxo máximo disponível é menor que o TOGA original. O piloto não tem como obter mais empuxo que o certificado.", emoji: "🚫" },
  { id: 456, subject: "eng", q: "Quais são as principais vantagens do Reduced Thrust?", a: "1) Maior VIDA ÚTIL do motor (menor EGT, menos stress). 2) Menor custo de manutenção. 3) Menor RUÍDO na decolagem. 4) Menor consumo momentâneo. O ganho principal é manutenção, que é muito caro.", emoji: "💰" },
  { id: 457, subject: "eng", q: "Quando o Reduced Thrust NÃO pode ser usado?", a: "Quando a aeronave está no peso MÁXIMO permitido para aquela condição (já usando TOGA). Se precisa de TOGA completo, não há margem para reduzir. Também há limites regulatórios (ex: não reduzir mais que 25% do TOGA — varia por operador).", emoji: "🚫" },
  { id: 458, subject: "eng", q: "O Reduced Thrust afeta V1, VR e V2?", a: "SIM. Menor empuxo → menos aceleração → V1, VR e V2 são recalculadas (geralmente MAIORES) para compensar. Especialmente V1: precisa mais velocidade para a parada ser viável.", emoji: "📊" },
  { id: 459, subject: "eng", q: "Qual a regra prática: pista contaminada + Reduced Thrust, pode?", a: "NÃO, regra geral: pista contaminada (não seca nem molhada) EXIGE empuxo máximo. Reduced Thrust geralmente é PROIBIDO em pista contaminada por segurança. Alguns operadores permitem em pista wet com restrições.", emoji: "❄️" },
  { id: 460, subject: "eng", q: "Por que empuxo reduzido reduz a EGT?", a: "Menor empuxo = menor razão de compressão = menos calor gerado = menor EGT. Cada grau a menos de EGT prolonga significativamente a vida da turbina. Por isso as companhias preferem Reduced Thrust sempre que possível.", emoji: "🌡️" },
  { id: 461, subject: "eng", q: "Quem é responsável por decidir usar Reduced Thrust?", a: "A COMPANHIA AÉREA. Cada operador tem sua política, submetida à aprovação do regulador. Pilotos seguem o procedimento definido pela companhia, que calcula se e quanto pode ser reduzido em cada decolagem.", emoji: "🏢" },
  { id: 462, subject: "eng", q: "Qual a redução MÁXIMA de empuxo permitida por ATM?", a: "Geralmente 25% do empuxo máximo certificado. Algumas aeronaves têm certificação especial que permite até 40% via ATM. A regra dos 25% protege a margem de segurança em situações de emergência durante a corrida de decolagem.", emoji: "📉" },
  { id: 463, subject: "eng", q: "Em emergência (windshear) com ATM, o piloto pode avançar manete para TOGA?", a: "SIM! Essa é a diferença CRUCIAL do ATM: o empuxo reduzido é apenas 'virtual' — o piloto pode avançar manete e recuperar TOGA total a qualquer momento durante a decolagem. Com Derated NÃO pode: é um novo limite físico.", emoji: "🚀" },
  { id: 464, subject: "eng", q: "ATM altera a V1(MCG)?", a: "NÃO. V1(MCG) sempre é calculada com base no empuxo MÁXIMO da Rate selecionado (pois pode-se recuperar TOGA). Isso garante controle direcional mesmo se o piloto decidir avançar manete. Já o Derated REDUZ V1(MCG) (novo limite físico).", emoji: "🎯" },
  { id: 465, subject: "eng", q: "Qual a temperatura MÍNIMA que pode ser assumida no ATM?", a: "A MAIOR entre: (1) a FRT da elevação atual, ou (2) OAT + 1°C. Não faz sentido assumir temperatura menor que a real (aumentaria empuxo, o que é proibido). Não faz sentido assumir abaixo da FRT (não reduziria nada, pois nessa faixa empuxo é constante).", emoji: "🌡️" },
  { id: 466, subject: "eng", q: "ATM pode ser usado em pista contaminada ou com anti-skid INOP?", a: "NÃO. Em ambos os casos, ATM é PROIBIDO por regulamento. A pista contaminada exige empuxo máximo. Anti-skid inop deixa a frenagem comprometida — não pode haver redução adicional de margem. Já o Derate pode (em casos raros, INCLUSIVE aumenta peso — V1MCG limited).", emoji: "❄️" },
  { id: 467, subject: "eng", q: "Cada 1°C de aumento na temperatura assumida (ATM) reduz a EGT em quanto?", a: "Aproximadamente 3 a 4°C. Por isso o ATM é tão valioso para vida útil do motor: pequenas reduções de empuxo aplicadas em todo voo geram grandes economias de manutenção (custo de overhaul é proporcional à EGT máxima atingida).", emoji: "🔥" },
  { id: 468, subject: "eng", q: "ATM e Derate podem ser combinados em todos os fabricantes?", a: "NÃO. Alguns fabricantes permitem COMBINAR os dois métodos (ex: derate primeiro + ATM em cima). Outros exigem ESCOLHER apenas um (derate OU temperatura assumida, não ambos). Em qualquer caso, redução combinada respeita o limite regulamentar (~25%).", emoji: "⚖️" },
  { id: 469, subject: "eng", q: "O que é V1(MCG) Limited Takeoff Weight?", a: "Situação RARA onde a balanced V1 calculada cai abaixo de V1(MCG). Como decolar com V1 < V1(MCG) é proibido, a V1 é ELEVADA para V1(MCG), o que aumenta a ASD necessária — então o peso máximo precisa CAIR. Esse novo peso reduzido é o V1(MCG) Limited TOW.", emoji: "⚠️" },
  { id: 470, subject: "eng", q: "Em que situação um motor com MENOS empuxo permite peso de decolagem MAIOR?", a: "Em V1(MCG) Limited TOW! Em pistas curtas/wet/slippery, V1 ideal é muito baixa e fica abaixo do V1(MCG). Empuxo menor REDUZ o V1(MCG), aliviando a penalidade. Por isso, em pistas curtas e escorregadias, fazer um Derate pode AUMENTAR o peso máximo.", emoji: "🔄" },
  { id: 471, subject: "eng", q: "V1(MCG) Limited TOW só ocorre em quais condições típicas?", a: "Pistas CURTAS (tipo Santos Dumont, 1.323m) + condição com V1 baixa (pista molhada/escorregadia/contaminada). Em pistas longas isso não acontece. É uma situação de exceção, mas conhecimento dela é diferencial em entrevista.", emoji: "🛬" },
  { id: 472, subject: "eng", q: "O que é Takeoff Pressure Bump?", a: "Permite que a pressão na câmara de combustão exceda o limite original — aumentando a N1 e consequentemente o EMPUXO em temperaturas baixas. Resulta em mais empuxo disponível mas com EGT atingindo o limite a temperatura MENOR (FRT cai).", emoji: "⬆️" },
  { id: 473, subject: "eng", q: "O que é Takeoff Temperature Bump?", a: "Permite que a EGT máxima opere mais próxima do limite de design (margem reduzida), mantendo o EMPUXO máximo até uma temperatura MAIOR. Resultado: mesmo empuxo, FRT mais alta — útil em aeroportos quentes.", emoji: "🌡️" },
  { id: 474, subject: "eng", q: "Qual a diferença prática entre Pressure Bump e Temperature Bump?", a: "PRESSURE BUMP: aumenta empuxo (atinge o limite em temperatura mais BAIXA). TEMPERATURE BUMP: mantém empuxo até temperatura mais ALTA (atinge o limite em temperatura mais alta). Ambos comprometem a margem do motor — usados onde a aeronave 'precisa de mais'.", emoji: "🔧" },
  { id: 475, subject: "obs", q: "O que é PLTOW (Performance Limited Takeoff Weight)?", a: "É o MENOR entre: Field Limited, Obstacle Limited, Tire Speed Limited e Brake Energy Limited (este conjunto é o RLTOW). Depois compara-se com Climb Limited e Return to Land Limited. O menor de todos = PLTOW.", emoji: "📊" },
  { id: 476, subject: "obs", q: "Quais são os 4 limites estruturais a serem comparados com o PLTOW?", a: "1) MTOW (Maximum Takeoff Weight). 2) MLW + Trip Fuel (para chegar dentro do MLW). 3) MZFW + Takeoff Fuel (para garantir massa de payload). 4) PCN da pista. O MENOR de tudo (incluindo PLTOW) é o Maximum Allowable TOW.", emoji: "🏗️" },
  { id: 477, subject: "obs", q: "O que é Fuel Tankage Limited Weight?", a: "Quando o tanque cheio NÃO oferece autonomia suficiente para a missão, é preciso REDUZIR o peso de decolagem. Aeronave mais leve queima menos por hora, então com o mesmo combustível voa mais tempo/distância. Vira novo limite acima do MZFW.", emoji: "⛽" },
  { id: 478, subject: "obs", q: "Duas aeronaves IDÊNTICAS do mesmo modelo podem ter MTOWs diferentes?", a: "SIM! MTOW é apenas certificação no papel (AFM). A mesma aeronave pode ter várias opções de MTOW certificado — depende do que o operador comprou. A diferença é só o documento. Para mudar, paga-se ao fabricante e atualiza o AFM. Mecanicamente, nada muda.", emoji: "📄" },
  { id: 479, subject: "obs", q: "Por que um operador escolheria um MTOW MENOR (mais barato) na compra?", a: "Custos OPERACIONAIS são proporcionais ao MTOW certificado: taxas aeroportuárias, navegação, seguro, comunicação. Para operação curta (170 PAX em 1.600nm), não precisa de muito range — economiza certificando MTOW menor.", emoji: "💰" },
  { id: 480, subject: "contam", q: "Que percentual de cobertura define uma pista como CONTAMINADA?", a: "25%. Se 25% ou mais da superfície está coberta com contaminante (loose ou solid), a pista é considerada contaminada. Abaixo disso, considera-se wet (apenas para água) ou seca.", emoji: "📏" },
  { id: 481, subject: "contam", q: "Quais são os contaminantes LOOSE (fluidos)?", a: "Água, slush, neve (úmida e seca) e frost. São contaminantes não-sólidos que criam resistência ao movimento do pneu (aumentando arrasto na decolagem). Espessura mínima para contaminação: 3mm (1/8in).", emoji: "💧" },
  { id: 482, subject: "contam", q: "Quais são os contaminantes SOLID?", a: "Gelo, gelo molhado (wet ice) e neve compactada. Permitem aceleração quase normal (não há resistência hidrodinâmica), MAS comprometem severamente: 1) controle direcional, 2) frenagem.", emoji: "🧊" },
  { id: 483, subject: "contam", q: "Hydroplaning Speed depende principalmente de qual variável?", a: "PRESSÃO do pneu — diretamente proporcional à raiz da pressão. Maior pressão = velocidade de hidroplanagem MAIOR. Acima da Hydroplaning Speed com camada de água maior que o sulco do pneu, há HIDROPLANAGEM total (perda completa de atrito com o solo).", emoji: "🌊" },
  { id: 484, subject: "contam", q: "Pista MOLHADA (wet): a aceleração é igual à pista seca?", a: "SIM! Aceleração depende do EMPUXO, não do atrito do pneu. O que muda em pista wet é a FRENAGEM (pior). Em pista CONTAMINADA com camada de água, sim há perda de aceleração (resistência hidrodinâmica do líquido contra o pneu).", emoji: "💦" },
  { id: 485, subject: "contam", q: "Para um bimotor, qual a queda de aceleração com 1 motor inop em pista CONTAMINADA?", a: "Pode ir para ZERO ou NEGATIVA. Bimotor perde 50% do empuxo, e arrasto aumenta (deflexão de leme). Em pista com 6mm de slush, o avião pode até DESACELERAR mesmo com a remanescente em TOGA. Por isso há limites de peso muito agressivos.", emoji: "📉" },
  { id: 486, subject: "contam", q: "Quais são os níveis de braking action?", a: "Good / Good-to-Medium / Medium / Medium-to-Poor / Poor / Nil. Há ainda Dry (sem contaminação) e Nil (sem capacidade de freio — proibido pousar). É o jargão usado em PIREP e ATIS para informar pilotos sobre a frenagem.", emoji: "🚦" },
  { id: 487, subject: "contam", q: "Speedbrakes/spoilers melhoram a frenagem em quanto?", a: "Estudos do fabricante mostram: cerca de +63% mais força de parada em pista SECA e +92% em pista ESCORREGADIA. Por isso a checagem \"SPEEDBRAKES UP\" é vital após pouso — sem eles, a aeronave usa quase o dobro de pista para parar.", emoji: "🛬" },
  { id: 488, subject: "contam", q: "Por que speedbrakes são tão importantes em pista escorregadia?", a: "Spoilers TIRAM SUSTENTAÇÃO da asa, colocando o PESO sobre as rodas. Mais peso na roda = mais atrito disponível com o solo = mais frenagem útil. Em pista escorregadia, atrito é o limite — colocar peso na roda multiplica o efeito do freio.", emoji: "⚙️" },
  { id: 489, subject: "contam", q: "Veer Off Risk: por que o reverso pode causar saída de pista em pista escorregadia?", a: "Se o avião desalinha (vento, falha), o piloto corrige com leme. Mas o REVERSO empurra a aeronave NO SENTIDO contrário do movimento — em pista escorregadia, sem atrito lateral suficiente, isso pode 'puxar' a aeronave para FORA da pista. Sophie's choice: overrun ou veer off.", emoji: "🎯" },
  { id: 490, subject: "contam", q: "Qual a regra geral sobre uso de reverso em escorregada com risco de veer off?", a: "Se há pista SUFICIENTE para parar sem reverso → DESLIGAR reverso (evita veer off). Se não há pista → MANTER reverso (overrun é pior). É decisão de piloto em tempo real. Não há receita única — depende de quanto resta de pista no momento.", emoji: "⚖️" },
  { id: 491, subject: "contam", q: "Qual a espessura MÁXIMA de slush/água para decolagem na maioria dos fabricantes?", a: "Geralmente 1/2in (13mm) — limites tabulados de 1/8in (3mm), 1/4in (6mm) e 1/2in (13mm). Dry snow é exceção: pode ir até 4in (102mm) em alguns fabricantes. Acima disso, decolagem PROIBIDA.", emoji: "📐" },
  { id: 492, subject: "contam", q: "Por que dry snow tem limite tão maior que slush?", a: "Dry snow tem densidade muito menor que água. Os 4in de dry snow têm massa equivalente a poucos mm de slush. A 'resistência' contra o pneu é proporcional à massa que precisa ser deslocada, não ao volume.", emoji: "❄️" },
  { id: 493, subject: "obs", q: "Qual a regra de vento para cálculo de performance?", a: "HEADWIND: máximo 50% pode ser creditado. TAILWIND: mínimo 150% deve ser considerado. Ex.: 10kt headwind = entra como 5kt na tabela. 10kt tailwind = entra como 15kt. Compensa a variabilidade do vento real durante a decolagem.", emoji: "🌬️" },
  { id: 494, subject: "obs", q: "A regra 50%/150% de vento já está nas tabelas de performance?", a: "SIM! As tabelas e gráficos do FCOM/FPPM já aplicam a correção internamente. O piloto coloca o vento REAL (ex.: 10kt headwind) e o sistema aplica os 50%/150% por trás. NÃO se deve aplicar de novo manualmente.", emoji: "📊" },
  { id: 495, subject: "obs", q: "A regra 50%/150% de vento se aplica ao Climb Limited TOW?", a: "NÃO! Climb Limited e Return to Land Limited são baseados em GRADIENTE (ângulo de subida) — independem da distância de pista. Como vento muda a velocidade no solo (GS) mas não a IAS, não afeta a sustentação nem o gradiente.", emoji: "📈" },
  { id: 496, subject: "obs", q: "Quando é obrigatório usar anti-ice na decolagem?", a: "OAT ≤ 10°C E umidade visível na forma de: 1) precipitação (RA/DZ/SN), 2) água/neve/slush parados no pavimento, 3) névoa/nevoeiro denso (visibilidade ≤ 1.600m / 1sm). Ambas as condições devem ocorrer juntas.", emoji: "🧊" },
  { id: 497, subject: "obs", q: "OAT de 8°C com céu claro e taxiway seco: anti-ice é necessário?", a: "NÃO! Falta a 2ª condição (umidade visível). A regra é AND, não OR: temperatura ≤ 10°C SOMADO a umidade visível. Apenas a temperatura baixa não exige anti-ice. Falta de qualquer uma das duas condições → não usar.", emoji: "☀️" },
  { id: 498, subject: "dist", q: "Pista Field Limited: mais flap aumenta ou diminui o peso máximo?", a: "AUMENTA. Mais flap = mais sustentação a menor velocidade = VR/V2 menores = menos pista necessária. Por isso, em pista CURTA, prefere-se flap MAIOR. Mas penaliza Climb/Obstacle (mais arrasto).", emoji: "⬆️" },
  { id: 499, subject: "dist", q: "Pista Obstacle/Climb Limited: mais flap aumenta ou diminui o peso máximo?", a: "DIMINUI. Mais flap = mais arrasto = gradiente de subida MENOR. Em decolagens limitadas por obstáculo ou gradiente, prefere-se flap MENOR. Trade-off clássico: pouco flap pede mais pista, muito flap pede menos gradiente.", emoji: "🏔️" },
  { id: 500, subject: "dist", q: "O que é OPTIMUM FLAP?", a: "É o flap que resulta no MAIOR peso de decolagem APÓS todas as análises (Field, Obstacle, Climb). Cada flap dá um peso máximo diferente — pega-se o menor de cada flap (limitante), depois compara entre flaps. Vence o flap com maior peso final.", emoji: "🎯" },
  { id: 501, subject: "obs", q: "Performance é calculada com qual posição de CG?", a: "Com o CG mais FORWARD (à frente) do envelope certificado. É a posição mais DESFAVORÁVEL: nariz mais pesado, mais difícil rotacionar, exige mais sustentação para mesma V2. Cobre o pior cenário independente do CG real do voo.", emoji: "⚖️" },
  { id: 502, subject: "obs", q: "O que é Alternate Forward CG?", a: "Certificação OPCIONAL que move o limite forward do envelope para TRÁS (envelope menor, mais restrito). Resultado: cálculo de performance usa CG menos forward → V2 pode ser menor → permite maior ATM e mais peso de decolagem. Custa dinheiro de certificação.", emoji: "🎟️" },
  { id: 503, subject: "obs", q: "Alternate Forward CG é diferente de mover o CG para frente?", a: "SIM! O NOME confunde. NÃO se move o CG real para frente — move-se o LIMITE forward do envelope para trás (envelope encolhe). A aeronave fica obrigada a operar com CG menos na frente. Daí o nome 'Alternate Forward Limit CG' seria mais preciso.", emoji: "🔄" },
  { id: 504, subject: "obs", q: "Qual o propósito do Stabilizer Trim na decolagem?", a: "Três objetivos: 1) Adequada força no manche para rotação. 2) Aeronave trimada para V2+incremento no caso All Engine. 3) Aeronave trimada para V2 no caso One Engine Inop. Um único ajuste tem que servir aos três cenários (compromisso).", emoji: "🎚️" },
  { id: 505, subject: "obs", q: "Quais 4 fatores influenciam o Stabilizer Trim de decolagem?", a: "1) ATOW (peso real). 2) Posição do CG. 3) Flap de decolagem. 4) Empuxo do motor. Aeronaves antigas usam empuxo MÁXIMO da Rate (ignoram ATM). Aeronaves mais novas já consideram o empuxo REAL após ATM/derate.", emoji: "📋" },
  { id: 506, subject: "speeds", q: "O que é Vx (Best Angle of Climb)?", a: "Velocidade do maior EXCESSO DE EMPUXO (Thrust - Drag). Resulta no maior ÂNGULO de subida = menor DISTÂNCIA horizontal para alcançar dada altitude. Usada para superar obstáculos próximos, cumprir restrições de SID.", emoji: "📐" },
  { id: 507, subject: "speeds", q: "O que é Vy (Best Rate of Climb)?", a: "Velocidade do maior EXCESSO DE POTÊNCIA (Power available - Power required). Resulta na maior TAXA de subida (ft/min) = menor TEMPO para alcançar altitude. Usada quando ATC pede 'expedite climb'.", emoji: "⏱️" },
  { id: 508, subject: "speeds", q: "Qual a relação entre Vx e Vy?", a: "Vy é SEMPRE MAIOR que Vx. Lembrando: Vx maximiza thrust excess (distância), Vy maximiza power excess (tempo). Como potência = empuxo × velocidade, o ponto de máxima potência sempre fica em velocidade maior que o de máximo empuxo.", emoji: "📊" },
  { id: 509, subject: "speeds", q: "Minimum Fuel Burn Climb Speed é a velocidade de menor consumo durante a subida?", a: "NÃO! É a velocidade de menor consumo TOTAL no voo A→B. Subindo mais rápido (TAS maior) gasta mais por minuto NA subida, mas chega ao FL otimizado mais cedo, gerando economia no cruzeiro que COMPENSA. É 'a resposta certa para a pergunta errada'.", emoji: "⛽" },
  { id: 510, subject: "speeds", q: "O que é Crossover Altitude?", a: "Altitude onde uma IAS escolhida e um número de Mach escolhido representam a MESMA TAS. Abaixo dela, IAS dá menor TAS; acima, o Mach dá menor TAS. Usa-se sempre a MENOR TAS, então: sobe em IAS até o crossover, depois passa a usar Mach.", emoji: "🔀" },
  { id: 511, subject: "speeds", q: "Por que mudar de IAS para Mach na subida?", a: "Manter IAS constante até alto FL faz a aeronave EXCEDER o MMO (Mach máximo operacional). Por isso muda-se para Mach no crossover. Na descida é o INVERSO: começa em Mach, muda para IAS no crossover (caso contrário excede VMO).", emoji: "📉" },
  { id: 512, subject: "cruise", q: "Quais são as 5 estratégias de velocidade em cruzeiro?", a: "1) Maximum Range (MRC) - máximo alcance. 2) Minimum Fuel - menor consumo total (≡ MRC). 3) Minimum Time - menor tempo (MMO). 4) Minimum Cost (Cost Index/ECON). 5) Schedule (RTA) - chegada em horário específico definido pelo ATC ou companhia.", emoji: "🎯" },
  { id: 513, subject: "cruise", q: "O que é MRC (Maximum Range Cruise)?", a: "Velocidade do PICO da curva de Fuel Mileage (NM por kg). Para um dado peso e altitude, é a velocidade que cobre a MAIOR distância por unidade de combustível. Equivale a CI 0 (Cost Index zero).", emoji: "📈" },
  { id: 514, subject: "cruise", q: "O que é LRC (Long Range Cruise)?", a: "Velocidade definida assim: 'penalidade de 1% no fuel mileage em troca de 3-5% de ganho em velocidade'. Sai do pico do gráfico de Fuel Mileage para uma região levemente à direita. Em jatos modernos, esse ganho de velocidade é ainda maior.", emoji: "⏩" },
  { id: 515, subject: "cruise", q: "Quando o conceito de LRC foi criado e por quê?", a: "Anos 1970, com a chegada dos motores de alto bypass (primeira geração de widebodies). Um estudo militar percebeu que valia trocar 1% de combustível por 3-5% de velocidade. Antes disso, motores ineficientes obrigavam a voar quase sempre em MRC.", emoji: "📅" },
  { id: 516, subject: "cruise", q: "LRC é a velocidade para voos de longa distância?", a: "NÃO necessariamente! O nome confunde. LRC pode ser usado em QUALQUER voo. Em voos LONGOS é onde a economia de 1% de combustível é maior em absoluto. Não existe regime 'Short Range Cruise' — em curtos, geralmente usa-se ECON do CI da companhia.", emoji: "❓" },
  { id: 517, subject: "cruise", q: "Para que serve a Holding Speed?", a: "É a velocidade de MAIOR ENDURANCE (tempo no ar) — usada quando o objetivo é PERMANECER no ar, não chegar a algum lugar. Ex.: aguardando melhora do tempo. Equivale (quase) à Minimum Endurance Speed.", emoji: "⏳" },
  { id: 518, subject: "cruise", q: "A Holding Speed é exatamente a Minimum Endurance Speed (ME)?", a: "NÃO — é levemente MAIS RÁPIDA que ME. A ME teórica está em região INSTÁVEL do gráfico de empuxo: pequena perda de velocidade exige MAIS empuxo (back-side da curva). Holding Speed real fica logo após ME, em região estável.", emoji: "⚠️" },
  { id: 519, subject: "cruise", q: "Vento afeta MRC e ECON Speed da mesma forma?", a: "AMBOS são corrigidos pelo vento: HEADWIND aumenta a velocidade (compensa o vento contrário); TAILWIND diminui (aproveita o empurrão), mas NUNCA abaixo de MRC. LRC NÃO é corrigido por vento — é regime fixo definido por peso e altitude.", emoji: "🌬️" },
  { id: 520, subject: "cruise", q: "Para um peso MENOR, MRC e LRC ficam maiores ou menores?", a: "MENORES. Menos peso → menos sustentação necessária → menos arrasto → curva de drag desloca para velocidades menores. Por isso, conforme a aeronave queima combustível e fica mais leve durante o voo, MRC e LRC caem (e a velocidade ótima vai diminuindo).", emoji: "📉" },
  { id: 521, subject: "cruise", q: "O que é Optimum Altitude?", a: "Altitude do MÁXIMO Fuel Mileage para o peso atual. Aeronaves leves têm Optimum Altitude MAIS ALTA (ar rarefeito = menos arrasto induzido). À medida que combustível queima, optimum sobe linearmente.", emoji: "📊" },
  { id: 522, subject: "cruise", q: "O que é Step Climb e quando é feito?", a: "Sobe-se inicialmente 1.000ft ACIMA do Optimum Altitude. Voa até ficar 1.000ft ABAIXO do Optimum (combustível foi queimado, optimum subiu). Aí faz-se Step Climb de 2.000ft (RVSM exige separação de 1.000ft). Tipicamente a cada 2-3 horas de voo em jato comercial.", emoji: "🪜" },
  { id: 523, subject: "cruise", q: "Qual a penalidade de combustível voando 2.000ft ABAIXO do optimum?", a: "1 a 2% de fuel mileage. Voando 4.000ft abaixo: 3-6%. Voando 8.000ft abaixo: 9-16%. Voando 12.000ft abaixo: 16-23%. Voando ACIMA do optimum também penaliza (+2.000ft: 2-5%). Por isso o step climb é estratégia importante.", emoji: "⛽" },
  { id: 524, subject: "cruise", q: "Voar próximo do MMO afeta a Optimum Altitude?", a: "SIM — REDUZ. Velocidades altas (perto do MMO) deslocam a curva de drag para a direita e diminuem o optimum. Em qualquer aeronave, voar mais rápido força operação em FLs ligeiramente menores que o ótimo de menor Mach.", emoji: "📐" },
  { id: 525, subject: "cruise", q: "O que limita a Maximum Altitude de uma aeronave?", a: "Dois fatores: 1) BUFFET (margem de manobra) — perda de envelope entre stall e MMO. 2) EMPUXO disponível para manter cruzeiro em ar rarefeito. O menor dos dois define o teto. Aeronaves leves geralmente são limitadas por buffet; pesadas, por empuxo.", emoji: "🏔️" },
  { id: 526, subject: "ci", q: "O que é Cost Index (CI)?", a: "Razão entre Custos Relacionados ao TEMPO (TRC) e Custos de COMBUSTÍVEL. CI = TRC ÷ Fuel Cost. Define o equilíbrio entre 'voar mais rápido (gasta tempo, paga TRC)' e 'voar mais devagar (gasta combustível)'. Tradutor de prioridades operacionais em velocidade.", emoji: "⚖️" },
  { id: 527, subject: "ci", q: "Como cada fabricante define o Cost Index?", a: "Cada fabricante usa UNIDADES diferentes (horas vs minutos para TRC; libras vs kg para combustível). Por isso CI=25 num fabricante NÃO significa o mesmo em outro. Mesma escala numérica, conceitos distintos.", emoji: "🇺🇸" },
  { id: 528, subject: "ci", q: "Por que o número de CI não é comparável entre fabricantes?", a: "Porque cada fabricante usa unidades de tempo e combustível DIFERENTES. Mesmo conceito de razão (custos-tempo ÷ custos-combustível), mas escalas diferentes. CI=25 num fabricante representa relação custos-velocidade DIFERENTE de outro fabricante.", emoji: "🇪🇺" },
  { id: 529, subject: "ci", q: "O que é ECON Speed?", a: "Velocidade resultante da seleção de CI no FMS. Para CIs típicos de companhia aérea, fica ENTRE MRC e LRC. Quanto MAIOR o CI, mais perto do MMO. Quanto MENOR, mais perto do MRC.", emoji: "💲" },
  { id: 530, subject: "ci", q: "O que é CI 0?", a: "CI ZERO = MRC. Significa: 'custo de tempo é zero comparado ao custo do combustível' — toda decisão prioriza menor consumo. Matematicamente: TRC ÷ ∞ tende a zero, ou seja, fuel cost infinito ↔ CI 0.", emoji: "0️⃣" },
  { id: 531, subject: "ci", q: "O que é CI MAX?", a: "CI MAX = velocidade próxima de MMO (limite operacional). Significa: 'custo de tempo é altíssimo comparado a combustível' — voa tão rápido quanto a aeronave permite. Os números máximos variam (200, 500, 999, 9999 conforme aeronave).", emoji: "🚀" },
  { id: 532, subject: "ci", q: "Quais custos compõem o Time Related Costs (TRC)?", a: "Leasing (fixo, variável ou misto por contrato), MANUTENÇÃO (por ciclo, por hora ou taxa fixa), TRIPULAÇÃO (por hora ou por ciclo), RESERVAS de overhaul. Exclui combustível (que é o denominador da fórmula).", emoji: "💵" },
  { id: 533, subject: "ci", q: "O que é Overhead Difference Fuel?", a: "Excesso de combustível carregado (extra) gera consumo adicional de cerca de 3.5% por hora de voo (regra de bolso para jatos). Ex.: 2.000kg extras em voo de 3h → consumirá ~210kg extras pelo simples fato de carregar peso adicional.", emoji: "⛽" },
  { id: 534, subject: "ci", q: "Quando vale a pena 'tankering' (abastecer extra no aeroporto mais barato)?", a: "Quando o preço no destino > Brake-Even Price Ratio × preço na origem. Tabela típica: a 200nm → 1.015. A 4.000nm → 1.500 (destino precisa ser 50% mais caro). Quanto mais longo o voo, mais o destino precisa estar caro para compensar.", emoji: "💰" },
  { id: 535, subject: "ci", q: "Qual a diferença entre Air Distance, Ground Distance e Great Circle Distance?", a: "AIR DISTANCE: distância medida em relação ao AR (afetada por vento). GROUND DISTANCE: distância projetada no solo (independente de vento). GREAT CIRCLE: distância MAIS CURTA na superfície da Terra esférica (sempre o menor valor).", emoji: "📏" },
  { id: 536, subject: "drift", q: "O que é Driftdown?", a: "Após falha de motor em cruzeiro, ajusta-se MCT (Maximum Continuous Thrust) no(s) motor(es) remanescente(s), escolhe-se uma velocidade (geralmente Green Dot/best L/D), e DESCE-SE até que essa velocidade produza voo nivelado. Manobra de emergência clássica.", emoji: "🛬" },
  { id: 537, subject: "drift", q: "Qual a velocidade ÓTIMA de driftdown?", a: "Optimum Driftdown Speed = Best L/D (Lift over Drag) = melhor \"gliding speed\" considerando o(s) motor(es) restante(s) em MCT. Alguns fabricantes marcam essa velocidade no airspeed indicator com símbolo verde (daí o apelido \"Green Dot Speed\").", emoji: "🟢" },
  { id: 538, subject: "drift", q: "Velocidades MAIORES que a Best L/D no driftdown geram qual perfil?", a: "Velocidades maiores → descida MAIS ÍNGREME → aeronave nivela em altitude MAIS BAIXA. Velocidade muito alta consome mais empuxo apenas para manter velocidade, sobrando menos para sustentação. LRC, por exemplo, alcança maior DISTÂNCIA mas em FL inferior.", emoji: "📉" },
  { id: 539, subject: "drift", q: "O que é Net Driftdown Flight Path (NDF)?", a: "Trajetória teórica utilizada para PLANEJAMENTO de voo. Tem margens de segurança subtraídas do desempenho real. Usado pelos dispatchers para checar terrain clearance antes do voo. É o que aparece nos manuais de performance.", emoji: "📋" },
  { id: 540, subject: "drift", q: "O que é Gross Driftdown Flight Path (GDF)?", a: "Trajetória REAL que a aeronave consegue voar. É a NDF + margem de segurança. É o que o FMC ou FMGS mostra para o piloto em tempo real. Aeronave realmente voa MELHOR que o que está nos manuais (mas planejamento usa o pior caso).", emoji: "📈" },
  { id: 541, subject: "drift", q: "Quais são as margens de segurança (gradiente) sobre obstáculos no driftdown?", a: "Bimotor: +1.1%. Trimotor: +1.4%. Quadrimotor: +1.6%. Em rotas com análise de DUAS falhas (3 ou 4 motores): trimotor +0.3%, quadrimotor +0.5%. Quanto MAIS motores, MAIOR a margem exigida (parece contraintuitivo).", emoji: "📐" },
  { id: 542, subject: "drift", q: "Quais alturas mínimas o driftdown deve cumprir sobre o terreno?", a: "1) Limpar obstáculo por no MÍNIMO 2.000ft durante a descida. 2) NIVELAR pelo menos 1.000ft acima de qualquer obstáculo. 3) ATINGIR o alternate com capacidade de manter HOLDING 1.500ft acima do mesmo. Três margens distintas.", emoji: "🏔️" },
  { id: 543, subject: "drift", q: "Qual a half-width da faixa de análise de terreno no driftdown?", a: "FAA: 4.3nm para cada lado do eixo da rota. EASA: 5.0nm para cada lado. EASA é levemente mais conservadora. A altura do MAIOR obstáculo nessa faixa é o que deve ser superado pelo driftdown profile.", emoji: "🗺️" },
  { id: 544, subject: "drift", q: "Após o driftdown, o piloto tem 3 opções. Quais?", a: "A) MANTÉM velocidade — aeronave fica mais leve e gradualmente RECUPERA altitude. B) MANTÉM altitude — gradualmente ACELERA. C) DESCE para FL mais baixo onde pode acelerar para LRC (mais combustível, mas mais rápido). Decisão depende de combustível e destino.", emoji: "🎯" },
  { id: 545, subject: "drift", q: "Por que curvas no driftdown exigem cálculo especial?", a: "Em curvas, o gradiente de descida AUMENTA (perda de eficiência por carga lateral e bank). Fabricantes fornecem ferramentas específicas para refinar a análise quando há curva na rota de driftdown — terreno e obstáculos são reavaliados considerando esse degrade.", emoji: "📚" },
  { id: 546, subject: "drift", q: "Quem precisa de oxigênio suplementar acima de 10.000ft?", a: "Entre 10.000 e 25.000ft: APENAS a tripulação de cockpit. Acima de 25.000ft: TODOS os ocupantes (cockpit, cabine, passageiros). Abaixo de 10.000ft: ninguém precisa de O2 suplementar. Por isso a descida de emergência tem como meta 10.000ft.", emoji: "🫁" },
  { id: 547, subject: "drift", q: "O que é TUC (Time of Useful Consciousness)?", a: "Tempo entre exposição à pressão reduzida e perda da capacidade de tomar decisões corretas. Em 35.000ft: 30s-1min (descida normal) / 15-30s (descompressão rápida). Em 40.000ft: 15-20s / 7-10s. Por isso máscara DEVE ser colocada IMEDIATAMENTE.", emoji: "⏱️" },
  { id: 548, subject: "drift", q: "Pilotos usam que tipo de sistema de oxigênio?", a: "GASEOSO — oxigênio puro de cilindro dedicado. Deve fornecer 100% por 10min + 110min em fluxo normal a 10.000ft. Suficiente para descida emergencial mais 110min adicionais. É o sistema mais raro e caro, mas necessário para uso prolongado.", emoji: "🛢️" },
  { id: 549, subject: "drift", q: "Passageiros usam que tipo de sistema de oxigênio?", a: "GERADOR QUÍMICO — reação entre clorato de sódio + pó de ferro produz oxigênio. Geradores tipicamente de 12, 15, 17 ou 22 minutos. Reação atinge 230°C — o cheiro de queimado durante a reação é NORMAL (não é incêndio).", emoji: "⚗️" },
  { id: 550, subject: "drift", q: "Por que TODA fileira tem 1 máscara EXTRA?", a: "Para cobrir cenários: bebê no colo de passageiro, animal de estimação, ou comissário no corredor sem acesso à própria estação. Ex.: fileira de 3 assentos = 4 máscaras. Todas conectadas ao MESMO gerador, então não é redundância contra falha.", emoji: "🎭" },
  { id: 551, subject: "drift", q: "As máscaras de oxigênio podem ser usadas para FUMAÇA na cabine?", a: "NÃO! O ar das máscaras de passageiros é MISTURADO com ar da cabine. Em caso de fumaça, isso faz o passageiro INALAR a fumaça contínua. Pilotos têm máscaras separadas com smoke goggles. Para fumaça, abrir gerador é PIOR que não usar.", emoji: "🚫" },
  { id: 552, subject: "drift", q: "Quanto tempo leva uma descida emergencial num jato típico?", a: "Tipicamente 6-7 minutos de FL370 (37.000ft) para 10.000ft. Distância coberta: 40-50nm. A regra é descer 'dentro de 10 minutos'. Para descidas mais longas, depende de capacidade do gerador de O2 (envelope operacional).", emoji: "⏬" },
  { id: 553, subject: "drift", q: "Por que descer durante driftdown é diferente de descer por descompressão?", a: "DRIFTDOWN: máximo PERFORMANCE — mantém altitude segura sobre terreno. DESCOMPRESSÃO: máximo RATE de descida — chega a 10.000ft o mais rápido possível para passageiros respirarem. Prioridades opostas: driftdown preserva altitude, descida emergencial sacrifica altitude.", emoji: "⚔️" },
  { id: 554, subject: "land", q: "O que é VREF (Reference Landing Speed)?", a: "Velocidade referência para cálculos de distância de pouso e gradientes mínimos. A aeronave deve poder fazer curvas com 40° de bank (25° normal + 15° de margem para overshoot) em descida 3°. NUNCA menor que VMCL nem menor que 1.23 × VSR.", emoji: "🛬" },
  { id: 555, subject: "land", q: "VREF mínima é quanto da VSR?", a: "1.23 × VSR (23% acima da velocidade de estol de referência). Antes do conceito de VS1G, era 1.30 × VS. Como VSR ≥ VS1G, VREF garante margem adequada contra estol mesmo em condições adversas.", emoji: "📏" },
  { id: 556, subject: "land", q: "VREF depende do peso?", a: "SIM, diretamente. Como VREF é proporcional à VSR, e VSR depende da sustentação necessária (que depende do PESO), aeronave mais pesada tem VREF MAIOR. Cada aeronave/peso tem seu VREF específico — não há valor fixo.", emoji: "⚖️" },
  { id: 557, subject: "land", q: "O que é VAPP (Final Approach Speed)?", a: "Velocidade na aproximação final com flap de pouso. VAPP = VREF + INCREMENTO. Garante margem contra turbulência ou variação que poderia levar abaixo de VREF. Limite: VAPP ≤ Placard Speed - 5kt.", emoji: "🎯" },
  { id: 558, subject: "land", q: "Como se calcula o incremento da VAPP em relação à VREF?", a: "Incremento = METADE do Headwind Component + a Gust. Mínimo de 5kt, máximo de 15kt (revisado de 20kt em 2018). Com autothrottle acoplado, geralmente fixa em 5kt. Garante margem contra perda de velocidade na final.", emoji: "🧮" },
  { id: 559, subject: "land", q: "Qual a diferença entre Landing Climb e Approach Climb?", a: "LANDING CLIMB: TODOS motores operando, flap de pouso, trem em baixo, MIN 3.2% gradient @ VREF. APPROACH CLIMB: motor crítico INOP, flap de approach, trem RECOLHIDO, gradient 2.1/2.4/2.7% (bi/tri/quad) @ VREF+5. Simula go-around limpo.", emoji: "📈" },
  { id: 560, subject: "land", q: "Qual gradiente mínimo de subida no Approach Climb?", a: "Bimotor: 2.1%. Trimotor: 2.4%. Quadrimotor: 2.7%. Configuração: motor crítico INOP, flap de approach, trem UP. Velocidade: VREF + 5kt. Para EASA, deve cumprir gradiente publicado da carta de aproximação se maior.", emoji: "📐" },
  { id: 561, subject: "land", q: "Qual gradiente do Landing Climb?", a: "3.2% para QUALQUER número de motores. Configuração: TODOS motores em TOGA, flap pouso, trem DOWN. Velocidade: VREF. É um requisito de TOGA — usado em borrachada (rejected landing). Vale para todos os tipos.", emoji: "🚀" },
  { id: 562, subject: "land", q: "O gradiente de go-around da IAC é o mesmo do Approach Climb?", a: "NÃO! São coisas diferentes. IAC (carta) tem gradiente mínimo de 2.5% (ICAO DOC 8168) — pode ser maior se publicado. Approach Climb é certificação de performance (2.1/2.4/2.7%). Atendem a propósitos distintos: IAC para obstáculo, Approach Climb para capacidade.", emoji: "📋" },
  { id: 563, subject: "land", q: "Como começa a contar a distância de pouso certificada?", a: "Inicia a 50ft acima da pista, em velocidade VREF. Termina quando aeronave está PARADA. Para aeronaves DESIGN ANTIGO: flare mínimo, touchdown VREF-5kt, distância de ar fixa de 1.000ft. Para aeronaves DESIGN MAIS NOVO: flare 4.2-4.6s, touchdown VREF -1 a -2%, distância de ar VARIÁVEL.", emoji: "📐" },
  { id: 564, subject: "land", q: "Como se calcula a Certified Landing Distance em pista SECA?", a: "Distância de teste de voo × 1.67 (ou dividida por 0.6). Significa que a distância calculada equivale a apenas 60% da pista disponível — 40% sobrando como margem. Por isso pousos em pista seca têm muito margem operacional.", emoji: "🧮" },
  { id: 565, subject: "land", q: "Qual margem extra é adicionada para Wet/Slippery Runway?", a: "+15% sobre a Certified Landing Distance de pista seca. Esse 15% NÃO precisa caber em 60% da pista — é simplesmente adicionado. Mas em pista escorregada NÃO se pode usar o método alternativo wet — apenas em pista wet com SKR.", emoji: "💧" },
  { id: 566, subject: "land", q: "O que são pistas SKR (Skid Resistant Runway)?", a: "Pistas com SUPERFÍCIE GROOVED (estrias) certificadas. Permitem cálculo de pouso wet por método ALTERNATIVO: usa 1.33 × VSR de approach, mede distância real wet, adiciona 15%. No Brasil: SBRJ (Santos Dumont) e SBSP (Congonhas) têm essa certificação.", emoji: "🇧🇷" },
  { id: 567, subject: "land", q: "Como se chama a distância de pouso calculada SEM o fator de 60%/15%?", a: "UNFACTORED (não fatorada). É a distância real de teste de voo do fabricante. Após aplicar fatores (×1.67 dry ou ×1.15 wet), torna-se FACTORED — a distância usada para certificação e dispatch.", emoji: "📊" },
  { id: 568, subject: "land", q: "Como é estabelecido o Maximum Allowable Landing Weight?", a: "É o MENOR entre: Landing Climb Limit, Approach Climb Limit, Field Limit (performance) E os limites estruturais MLW e PCN. Igual ao TOW, pega-se o menor. Apenas para DESPACHO — em emergência não vale.", emoji: "📊" },
  { id: 569, subject: "land", q: "Freios de CARBONO permitem maior peso de pouso que freios de aço?", a: "SIM, geralmente 700-1.000kg a mais. Com autobrake (deceleração fixa) o avião mais pesado chega mais rápido e usa mais pista. Com FRENAGEM MANUAL MÁXIMA, freio de carbono compensa eficientemente — ambos param na mesma distância apesar do peso maior.", emoji: "⚫" },
  { id: 570, subject: "land", q: "Pneus RADIAL vs BIAS no pouso: qual permite mais peso?", a: "RADIAL — pode permitir VREF até 2kt MAIOR (limite de pneu mais alto). Resultado: peso de pouso maior. Bias tem limite menor, então VREF deve ser limitada, capping no peso de pouso. Pequena diferença, mas afeta certificação.", emoji: "🛞" },
  { id: 571, subject: "land", q: "Alternate Forward CG no pouso aumenta o peso máximo permitido?", a: "SIM, mesmo princípio do takeoff. Com CG menos forward (envelope mais restrito), VREF pode ser MENOR (precisa menos lift), distância de pouso CAI, peso máximo CRESCE. Mas FMC/FMGS NÃO calcula isso — precisa software externo (AFM-DPI, OPT, PET).", emoji: "🔧" },
  { id: 572, subject: "land", q: "O que é TALPA-ARC?", a: "Takeoff and Landing Performance Assessment - Aviation Rulemaking Committee. Comitê criado pela FAA após o acidente do Midway (2005, Chicago) para padronizar avaliação de performance em tempo real durante a aproximação. Resultou na criação do RCC.", emoji: "📋" },
  { id: 573, subject: "land", q: "O que é RCC (Runway Condition Code)?", a: "Tabela criada pelo TALPA-ARC para padronizar braking action. Códigos 0-6: 0=Nil, 1=Poor, 2=Med-Poor, 3=Medium, 4=Good-Med, 5=Good, 6=Dry. Cada código associa coeficiente de frenagem com descrição de contaminante/condição.", emoji: "🚦" },
  { id: 574, subject: "land", q: "RCC 5 (Good): qual o coeficiente de frenagem e exemplos?", a: "Coeficiente ≥ 0.40. Exemplos: damp, frost, wet (≤3mm de água), slush/dry snow/wet snow ≤ 3mm. Frenagem normal, controle direcional normal. É a condição mais comum em pistas tratadas.", emoji: "🟢" },
  { id: 575, subject: "land", q: "RCC 0 (Nil): o que significa?", a: "Coeficiente ≤ 0.20. Frenagem MÍNIMA ou inexistente. Controle direcional INCERTO. Exemplos: wet ice, slush sobre ice, water sobre compacted snow, dry snow sobre ice. POUSO ESSENCIALMENTE PROIBIDO nessa condição — totalmente fora de qualquer envelope.", emoji: "🚫" },
  { id: 576, subject: "land", q: "Nos EUA, qual o formato de reporte de condição de pista usado pela FAA?", a: "FICON (Field Condition Reporting). Pista é dividida em 3 partes iguais, ex.: 'FICON RWY 04 3/5/3' = primeiro terço RCC 3, meio 5, fim 3. Aplica apenas a PISTAS — não taxiways ou tarmac.", emoji: "🇺🇸" },
  { id: 577, subject: "land", q: "Autobrake em pista seca: melhor usar nível baixo (1-2) ou alto (3-MAX)?", a: "NÍVEL BAIXO + reverso. Autobrake monitora DESACELERAÇÃO e ajusta força — se pouco freio basta, aplica pouco; se precisa mais, aumenta. Com reverso ajudando, freio pouco solicitado = MENOS desgaste, MENOS calor.", emoji: "⚙️" },
  { id: 578, subject: "land", q: "O que é Quick Turnaround Limit Weight (QTLW)?", a: "Máximo peso de pouso que permite IMEDIATAMENTE outra decolagem (sem tempo de cooldown dos freios). Calculado com FRENAGEM MÁXIMA MANUAL, pista SECA, SEM reverso — pior caso. Garante que os fuse plugs não derreterão durante o aquecimento subsequente.", emoji: "⏱️" },
  { id: 579, subject: "land", q: "QTLW garante que RTO pode ser executada após o pouso?", a: "NÃO! QTLW só garante que freios não DERRETERÃO os fuse plugs em condição normal. Se houver RTO de alta energia (acima de 120kt), pode sim haver fusão. Fabricantes geralmente NÃO fornecem tabela que garanta novo RTO após o pouso — limitação importante!", emoji: "⚠️" },
  { id: 580, subject: "land", q: "Após RTO, taxiar para esfriar os freios funciona?", a: "NÃO — PIORA! Taxi adiciona MAIS calor ao sistema (atrito, freadas, curvas). Em 1/10/2018, B767 fez taxi por ~10min/6mi após RTO no JFK; os freios PEGARAM FOGO. Após RTO de alta energia: PARAR a aeronave e aguardar bombeiros + tempo de cooldown.", emoji: "🔥" },
  { id: 581, subject: "land", q: "Como se define alta vs baixa energia de freio?", a: "Diferentes fabricantes usam velocidades distintas como divisor (tipicamente entre 80-100kt). Acima do limite = alta energia (RTO só por motivo crítico — risco real de fuse plugs). Abaixo = baixa energia (RTO por qualquer motivo). Maioria dos acidentes de runway excursion em RTO acontece acima de 120kt.", emoji: "⚡" },
  { id: 582, subject: "misc", q: "O que é PCN (Pavement Classification Number)?", a: "Número + 4 letras que descreve a pista paved. Ex.: PCN 40/F/C/X/T. NÚMERO: força do pavimento. F/R: Flexível (asfalto) ou Rígido (concreto). A/B/C/D: subgrade. W/X/Y/Z: pressão máx do pneu. T/U: método de avaliação técnico ou empírico.", emoji: "🛣️" },
  { id: 583, subject: "misc", q: "O que é ACN (Aircraft Classification Number)?", a: "Número que indica o impacto da aeronave no pavimento. Para operação UNRESTRICTED, ACN ≤ PCN. Operar com ACN > PCN é POSSÍVEL mas reduz a vida útil do pavimento — exige autorização especial.", emoji: "✈️" },
  { id: 584, subject: "misc", q: "PCN se aplica a pistas de grama ou cascalho?", a: "NÃO. PCN é apenas para pistas PAVIMENTADAS. Pistas não-paved (grama/cascalho) usam outros critérios definidos pelo operador do aeroporto. Por isso o nome 'Pavement' Classification Number.", emoji: "🌱" },
  { id: 585, subject: "misc", q: "Subgrade C (PCN 40/F/C/X/T) significa o quê?", a: "Subgrade C = baixa compactação da camada sob o asfalto. Categorias: A (alta), B (média), C (baixa), D (ultra-baixa). Subgrade mais compactada = mais peso suporta. Subgrade categoria é fator crítico no peso operacional máximo.", emoji: "🏗️" },
  { id: 586, subject: "etops", q: "O que é ETOPS?", a: "Extended-range Twin-engine Operational Performance Standards. Permite que aeronaves bimotoras voem ALÉM de 60min de distância de aeroporto adequado (a regra original de 1953 com motores a pistão). Sem ETOPS = limite de 60min. Com ETOPS = 120/180/240/330min.", emoji: "🌊" },
  { id: 587, subject: "etops", q: "Por que o limite original era 60 minutos?", a: "Em 1953, motores a PISTÃO tinham alta taxa de falha (maior potência = maior risco). Estatística mostrou que sair de 60min de aeroporto adequado era arriscado. Regra mantida quando motores a jato chegaram, embora muito mais confiáveis — daí surgiu o ETOPS para 'liberar' essa restrição.", emoji: "📅" },
  { id: 588, subject: "etops", q: "ETOPS 60 significa o quê?", a: "Padrão DEFAULT para bimotores SEM certificação ETOPS especial. Pode voar até 60min de aeroporto adequado em qualquer ponto da rota. Acima disso, precisa certificação ETOPS específica (120, 180, 240, 330min).", emoji: "🕐" },
  { id: 589, subject: "etops", q: "O que é EEP (ETOPS Entry Point)?", a: "Ponto onde a aeronave sai do círculo de 60min de um aeroporto e ENTRA na região ETOPS. A partir daí, regulamentação ETOPS se aplica plenamente — incluindo verificação do tempo no alternate antes de cruzar.", emoji: "🟡" },
  { id: 590, subject: "etops", q: "O que é EXP (ETOPS Exit Point)?", a: "Ponto onde aeronave volta a estar a menos de 60min de aeroporto adequado e SAI da região ETOPS. Antes do EXP: regra ETOPS plena. Após: regra geral. Voos como Brasil-Europa têm EEP e EXP definidos no plano.", emoji: "🟢" },
  { id: 591, subject: "etops", q: "Antes de cruzar o EEP, o que o piloto deve verificar?", a: "Condições METEOROLÓGICAS no aeroporto alternate ETOPS — devem estar acima do mínimo desde 1h ANTES até 1h DEPOIS da hora prevista de uso. Se o tempo estiver ruim, NÃO pode cruzar o EEP — deve aguardar ou desviar.", emoji: "🌧️" },
  { id: 592, subject: "etops", q: "O que é ETP (Equal Time Point)?", a: "Equal Time Point — ponto onde o tempo de voo para 2 alternates ETOPS é IGUAL. Antes do ETP, mais perto do alternate A; depois, mais perto de B. Diferente do círculo ETOPS (sem vento), ETP considera VENTO previsto. Mudança de alternate é feita no ETP.", emoji: "🎯" },
  { id: 593, subject: "etops", q: "O que é ETOPS Critical Fuel?", a: "Para cada ETP, calcula-se combustível necessário considerando 3 cenários: 1) Falha de motor, 2) Descompressão, 3) Falha + descompressão. Aeronave deve ter combustível para o PIOR cenário ao passar pelo ETP. Se decolagem padrão não basta, adiciona-se ETOPS Critical Fuel.", emoji: "⛽" },
  { id: 594, subject: "etops", q: "ETOPS Critical Fuel inclui quais margens?", a: "Combustível para: 1) Chegar ao alternate. 2) 15min de holding. 3) 1 IFR approach + go-around. 4) 1 VFR approach. 5) +5% extra por wind diferente. 6) +5% por performance. 7) Extra para ICE se previsto.", emoji: "🧊" },
  { id: 595, subject: "etops", q: "O que é EDTO?", a: "Extended Diversion Time Operations — nome dado pela ICAO em 2003. Substitui ETOPS, mas se aplica a QUALQUER aeronave de transporte (não só bimotores). Para >2 motores, padrão é 180min. Maioria da indústria ainda usa o termo 'ETOPS' por hábito.", emoji: "🌐" },
  { id: 596, subject: "etops", q: "Para QUADRIMOTOR, qual o tempo padrão de diversion sem certificação especial?", a: "180 minutos (EDTO). O fator limitante de EDTO em quadrimotores raramente é falha de motor — é o sistema de SUPRESSÃO DE FOGO nos compartimentos de carga. ETOPS quadrimotor é limitado por: tempo máximo de supressão de fogo MENOS 15min.", emoji: "🔥" },
  { id: 597, subject: "misc", q: "O que é MEL?", a: "Minimum Equipment List — documento que AUTORIZA dispatch com equipamento INOPERATIVE por tempo limitado. NÃO é lista de equipamentos mínimos obrigatórios (mito comum). É a permissão legal para voar com defeito, sob restrições.", emoji: "📋" },
  { id: 598, subject: "misc", q: "Equipamentos NÃO listados na MEL: pode despachar mesmo assim?", a: "DEPENDE. Se for equipamento não-essencial à airworthiness (NEF — Non-Essential Furnishings, como mesinha quebrada): PODE dispatchar. Se for sistema essencial não listado na MEL: NO-GO. Aeronave fica AOG (Aircraft On Ground).", emoji: "🛑" },
  { id: 599, subject: "misc", q: "Como a MEL garante segurança operacional?", a: "Três tipos de restrições: 1) LIMITAÇÕES (ex.: 'não voar em condições de icing'). 2) TRANSFERÊNCIA de função (ex.: 'painel de áudio falho → usar outros'). 3) PENALIDADES de performance (ex.: 'reduzir TOW em 2.000kg'). Mais REPAIR INTERVAL.", emoji: "🛡️" },
  { id: 600, subject: "misc", q: "Quais são as categorias de Repair Interval da MEL?", a: "A: tempo especificado em 'Remarks' (caso a caso). B: 3 dias-calendário (72h). C: 10 dias-calendário (240h). D: 120 dias-calendário (2880h). Categorias B e C podem ter extensão one-time se notificada ao regulador.", emoji: "📅" },
  { id: 601, subject: "misc", q: "O que é Point of Dispatch?", a: "Momento a partir do qual MEL deixa de ser aplicável e passa-se a usar QRH (Quick Reference Handbook). Antes: problema = consulta MEL. Após: problema = checklist QRH. Geralmente definido como 'aplicação de empuxo para taxi de decolagem'.", emoji: "🚀" },
  { id: 602, subject: "misc", q: "Em voo, identifica-se uma falha. Consulta MEL ou QRH?", a: "QRH (já passou do point of dispatch). MAS é boa prática consultar MEL DEPOIS — para verificar se a próxima etapa pode ser dispatched. Ex.: tankering para evitar pouso em local sem peças. Antecipa problemas no próximo trecho.", emoji: "📖" },
  { id: 603, subject: "cold", q: "Por que GELO na asa é tão perigoso?", a: "Acumulação modifica o aerofólio: arrasto aumenta MAIS de 40%, sustentação CAI até 30%, velocidade de estol DISPARA. Asa que deveria gerar sustentação vira uma 'bagunça aerodinâmica'. Acidente clássico: Air Florida 90 (1982, Washington DC) — 74 mortos.", emoji: "❄️" },
  { id: 604, subject: "cold", q: "Quais são os tipos de fluido de degelo/anti-gelo?", a: "TYPE I: deicing (remove gelo). Aplicado quente, sob pressão. Sem anti-icing. TYPE II/IV: anti-icing (previne reformação). Aplicado denso, frio. TYPE III: igual ao II mas para turboprops. Concentrações: 100%, 75/25 ou 50/50 com água quente.", emoji: "💦" },
  { id: 605, subject: "cold", q: "O Type I tem propriedades anti-ice?", a: "NÃO! Type I é APENAS DEICING (remove gelo existente). Não previne reformação. Por isso, em condição de precipitação contínua, usa-se Type I primeiro (para limpar) e Type II/IV depois (para proteger contra novo acúmulo).", emoji: "🚫" },
  { id: 606, subject: "cold", q: "O que é Type III Fluid?", a: "Fluido específico para TURBOPROPS. Propriedades de Type I e II combinadas em aplicação única. Hélice gira a alta velocidade — gelo formado seria lançado contra fuselagem (por isso turboprops geralmente têm estrutura reforçada perto da hélice).", emoji: "🛩️" },
  { id: 607, subject: "cold", q: "O que é HOT (Holdover Time)?", a: "Tempo que a superfície da aeronave RESISTE a nova formação de gelo após aplicação de fluido. Tabela depende do tipo de fluido, concentração, temperatura e tipo de precipitação. CONTAGEM começa no INÍCIO da aplicação (não no fim).", emoji: "⏱️" },
  { id: 608, subject: "cold", q: "Em aplicação two-step (Type I + Type IV), HOT conta a partir de quando?", a: "A partir do INÍCIO da aplicação do ANTI-ICE (Type IV) — não a partir do Type I. Faz sentido: HOT mede proteção do anti-ice, e essa só começa quando o anti-ice é aplicado.", emoji: "🕐" },
  { id: 609, subject: "cold", q: "Qual a temperatura de congelamento dos combustíveis JET A, JET A-1 e JET B?", a: "JET A: -40°C (usado nos EUA). JET A-1: -47°C (usado no resto do mundo). JET B: usado apenas em regiões remotas (Canadá, Rússia, Alasca). Voos EUA precisam vigilância maior — diferença de 7°C importa.", emoji: "🛢️" },
  { id: 610, subject: "cold", q: "Onde fica a sonda de temperatura de combustível?", a: "No TANQUE DA ASA. Por que? É o local MAIS frio (mais exposto ao ar). Tanque central fica 'protegido' pela cabine de passageiros (calor humano + ar condicionado). Sonda na asa = pior caso = decisão segura.", emoji: "🌡️" },
  { id: 611, subject: "cold", q: "Qual a temperatura mínima que o combustível pode chegar?", a: "Empiricamente: NÃO ABAIXO da TAT (Total Air Temperature). Combustível chega em equilíbrio com a skin da asa, e skin chega em equilíbrio com TAT. Por isso, se TAT < freezing point do combustível, há risco — piloto deve descer ou acelerar para aumentar TAT.", emoji: "🌬️" },
  { id: 612, subject: "cold", q: "O que é Ice Crystal Icing?", a: "Fenômeno em ar QUENTE (tropical) próximo de CBs sem grande desenvolvimento vertical. Partículas de gelo MUITO PEQUENAS são lançadas acima do topo de CBs e ingestadas pelo motor. Sintomas: chuva, TAT próximo de zero, cheiro de ozônio, fogo de Santelmo, vibração de motor.", emoji: "⚡" },
  { id: 613, subject: "cold", q: "Tail/empenagem da maioria dos JETLINERS tem anti-ice?", a: "NÃO — a maioria não tem anti-ice nem na cauda nem em parte da asa. Cada aeronave deve provar que aguenta voar com até 3in de gelo acumulado em superfícies não protegidas (deicing boots em turboprops cumprem esse papel).", emoji: "✈️" },
  { id: 614, subject: "cold", q: "Boots (botas de degelo) de turboprop podem ser usadas como anti-ice?", a: "NÃO! Boots são APENAS DEICING. Funcionam inflando para QUEBRAR gelo já formado. Inflar antes do gelo se formar = sem efeito. Se gelo já passou do alcance das boots (atrás delas), elas não conseguem remover. Por isso turboprops precisam VIGILÂNCIA constante em condição icing.", emoji: "🎈" },
  { id: 615, subject: "misc", q: "Por que aeroportos de ALTA ALTITUDE são desafiadores?", a: "Ar rarefeito = menos empuxo de motor. Mesma IAS é TAS muito maior — todas distâncias aumentam. Aceleração até VR cai drasticamente. Cada fabricante define \"alta altitude\" pelos limites do envelope de certificação de seus testes (tipicamente 8.000-9.500ft).", emoji: "🏔️" },
  { id: 616, subject: "misc", q: "Em aeroporto de alta altitude, qual conceito de VTIRE vira mais limitante?", a: "VTIRE é em GROUND SPEED (TAS). Em alta altitude, mesma IAS = TAS muito maior. Por isso aeronaves em La Paz (13.300ft) atingem VTIRE em IAS bem menor que em SBGR (sea level). Tire Speed Limited TOW vira mais frequente.", emoji: "🛞" },
  { id: 617, subject: "misc", q: "Qual a largura MÍNIMA recomendada para pista em jatos comerciais?", a: "Cerca de 30m, recomendação dos fabricantes. Cálculo: envergadura entre rodas externas + desvio máximo do centerline permitido (~9m cada lado) + offset inicial voluntário. ICAO/ANAC NÃO exigem mínimo formal — é apenas recomendação.", emoji: "📏" },
  { id: 618, subject: "misc", q: "Estatisticamente, narrow runway é mais perigoso?", a: "NÃO conforme estudos do fabricante (1995-2002): 115 dos 117 veer-offs ocorreram em pistas de 45m+ (não narrow). Apenas 1 em pista de 30m e 1 em 42m. Conclusão: pistas mais largas dão FALSA SENSAÇÃO de segurança — pilotos relaxam atenção.", emoji: "📊" },
  { id: 619, subject: "atm", q: "Qual a temperatura padrão no nível do mar segundo ISA?", a: "15°C (59°F). Gradient: -1.9812°C a cada 1.000ft até a tropopausa (36.089ft ISA), onde fica constante em -56.5°C. Esse é o modelo padrão usado por TODOS os manuais de performance.", emoji: "🌡️" },
  { id: 620, subject: "atm", q: "Qual a pressão padrão ao nível do mar segundo ISA?", a: "1013.25 hPa = 29.92 inHg. Calibração padrão de altímetros. Em FL (Flight Level), todos voam com QNE 1013 — separação entre aeronaves importa, não altitude real.", emoji: "📏" },
  { id: 621, subject: "atm", q: "O que é ISA Deviation?", a: "Diferença entre temperatura REAL e a esperada pelo modelo ISA. Ex: nível do mar com 25°C → ISA+10 (10°C acima do padrão 15°C). 35.000ft com -58°C → ISA-3 (3°C abaixo do padrão -55°C). Usada em quase todas tabelas de performance.", emoji: "📐" },
  { id: 622, subject: "atm", q: "Qual a diferença entre Pressure Altitude e Density Altitude?", a: "PRESSURE Altitude: altitude do altímetro com QNE 1013. Compara pressão atual ao modelo ISA. DENSITY Altitude: altitude que a aeronave 'sente' — corrige Pressure Altitude pela temperatura. Calor → density altitude MAIOR (avião sente como mais alto).", emoji: "🌡️" },
  { id: 623, subject: "atm", q: "Quando Indicated Altitude é PERIGOSAMENTE diferente da real?", a: "Em dias FRIOS (temperatura abaixo de ISA). O altímetro mostra ALTITUDE MAIOR que a real — pode levar a aproximar terreno demais. Por isso há tabelas de correção para procedimentos em frio. Quente: erro 'seguro' (real fica abaixo do indicado).", emoji: "❄️" },
  { id: 624, subject: "atm", q: "Qual a diferença entre OAT, SAT e TAT?", a: "OAT (Outside Air Temperature): leitura DIRETA, sem efeito de velocidade — só serve com aeronave parada. SAT (Static Air Temperature): ar parado em movimento (mesmo valor que OAT). TAT (Total Air Temperature): ar comprimido por velocidade (sempre MAIOR que SAT). Sensores modernos medem TAT.", emoji: "🌡️" },
  { id: 625, subject: "atm", q: "Qual a relação entre TAT e SAT?", a: "TAT = SAT corrigida pela COMPRESSÃO do ar (ram rise). Em baixa velocidade: TAT ≈ SAT. Em alta velocidade: TAT MUITO maior (a Mach 2, diferença pode passar de 170°C). Fórmula geral: TAT depende do Mach² e do Recovery Factor da sonda. Sondas modernas: RF próximo de 1.", emoji: "🧮" },
  { id: 626, subject: "atm", q: "Por que NÃO se usa um termômetro simples a alta velocidade?", a: "Por compressibilidade: acima de ~190kt ou M 0.3, o ar não pode ser considerado incompressível. A leitura do termômetro fica COMPLETAMENTE distorcida — não mede nem OAT nem TAT. Por isso jatos usam sondas TAT (com hole de baixa velocidade interna).", emoji: "🔬" },
  { id: 627, subject: "atm", q: "Quanto vale 1 minuto de circunferência máxima da Terra?", a: "1 milha náutica (NM). A Terra tem 360° × 60' = 21.600 NM de circunferência máxima. Definição original que conecta navegação geográfica e medida de distância. Velocidade em NM/h = knots.", emoji: "🌐" },
  { id: 628, subject: "spd", q: "O que é IAS (Indicated Airspeed)?", a: "Velocidade lida DIRETAMENTE no instrumento. Baseada em pressão dinâmica do pitot menos pressão estática. Tem vários erros (instalação do pitot, fricção, etc). É a velocidade que o piloto usa para controlar o avião — V1, V2, VREF são em IAS.", emoji: "📊" },
  { id: 629, subject: "spd", q: "O que é CAS (Calibrated Airspeed)?", a: "IAS CORRIGIDA dos erros de posição do pitot, fricção mecânica e desalinhamento. Quase igual à IAS em aviões modernos — diferença geralmente < 2kt. É a base de cálculo de outras velocidades (EAS, TAS).", emoji: "🔧" },
