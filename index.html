  { id: 630, subject: "spd", q: "O que é EAS (Equivalent Airspeed)?", a: "CAS corrigida pela COMPRESSIBILIDADE do ar (efeito de Mach em altitude). Em baixa altitude: EAS ≈ CAS. Em alta altitude/alta velocidade: EAS < CAS (a compressibilidade aumenta artificialmente o impacto no pitot). É o speed 'puro' aerodinâmico.", emoji: "🌪️" },
  { id: 631, subject: "spd", q: "O que é TAS (True Airspeed)?", a: "Velocidade VERDADEIRA da aeronave em relação ao ar. Corrige EAS pela DENSIDADE (altitude e temperatura). Em altitude, partículas estão mais separadas → mesma IAS = TAS maior. É a velocidade usada para navegação (junto com vento dá GS).", emoji: "🚀" },
  { id: 632, subject: "spd", q: "O que é Mach Number?", a: "Razão TAS ÷ velocidade do som. M 1.0 = velocidade do som. A velocidade do som depende SÓ da TEMPERATURA: a = 661.4786 × √(T/288.15) kt. No nível do mar ISA: a ≈ 661kt. Em FL350 ISA: a ≈ 575kt.", emoji: "💨" },
  { id: 633, subject: "spd", q: "O que é GS (Ground Speed)?", a: "Velocidade da aeronave em relação ao SOLO. GS = TAS + Vento. Headwind reduz GS, tailwind aumenta. Usada para cálculo de tempo de voo, ETA. GS varia muito ao longo do voo; TAS é fixa para um par (altitude, IAS) e ISA.", emoji: "🌍" },
  { id: 634, subject: "spd", q: "Por que TAS aumenta com altitude (mesma IAS)?", a: "Densidade do ar CAI com altitude. Para gerar a mesma pressão dinâmica no pitot (mesma IAS), a aeronave precisa se mover MAIS RÁPIDO entre as partículas mais separadas. Regra prática: TAS aumenta ~2% para cada 1.000ft (até a tropopausa).", emoji: "📈" },
  { id: 635, subject: "spd", q: "O que é Air Miles vs Ground Miles?", a: "AIR MILES: distância no ar (relativa ao ar). Usada por aeronaves em performance/combustível. GROUND MILES: distância no SOLO. Headwind: ground miles < air miles (avião 'progride menos' no solo). Tailwind: ground miles > air miles. Importante em flight planning.", emoji: "🛤️" },
  { id: 636, subject: "spd", q: "O que é Coffin Corner?", a: "Em ALTA ALTITUDE, a velocidade de estol (Vs) e a Mach máxima (MMO) se aproximam — janela operacional fica muito estreita. Acelerar = MMO. Desacelerar = stall. Acidente clássico: Pinnacle 3701 (2004). Por isso aviões têm Maximum Operating Altitude conservadora.", emoji: "⚰️" },
  { id: 637, subject: "spd", q: "Por que a velocidade de stall AUMENTA com altitude (mesma CAS)?", a: "Em alta altitude, mesma CAS = MACH MAIOR. Compressibilidade muda comportamento do fluxo: descolamento da camada limite (boundary layer) acontece MAIS CEDO. Reynolds menor (ar viscoso) também contribui. Por isso M crítico (onde stall começa) cai com altitude.", emoji: "📉" },
  { id: 638, subject: "spd", q: "O que é VA (Maneuvering Speed)?", a: "MÍNIMA velocidade em que aplicar todo o controle ENCOSTA o limite de carga (2.5g positivos / -1.0g). Abaixo de VA: aeronave ESTOLA antes de sobrecarregar. Acima: pode QUEBRAR estrutura. Há acidentes históricos por aplicação ALTERNADA repetida de leme acima de VA — estabilizador vertical separou.", emoji: "🎢" },
  { id: 639, subject: "spd", q: "VA é segura para deflexões repetidas?", a: "NÃO! VA cobre UM ÚNICO movimento completo de comando. Deflexões REPETIDAS em direções opostas podem exceder a carga limite mesmo abaixo de VA. AA587 mostrou isso: leme repetido após wake turbulence quebrou o vertical stabilizer.", emoji: "⚠️" },
  { id: 640, subject: "spd", q: "O que é VB (Maximum Gust Speed)?", a: "Velocidade que a aeronave deve resistir à RAJADA VERTICAL máxima (66 ft/s). Frequentemente chamada de VRA (Rough Air Speed) ou Turbulent Air Penetration Speed. Em turbulência forte: piloto reduz para VB/VRA para proteger a estrutura.", emoji: "💨" },
  { id: 641, subject: "spd", q: "O que é VC (Design Cruising Speed)?", a: "Velocidade igual ou menor que 80% de VD. Geralmente igual à VMO/MMO (Maximum Operating Speed/Mach). Margem entre VB e VC permite o piloto voar em VB e enfrentar AUMENTO INADVERTIDO de velocidade em turbulência sem exceder VC.", emoji: "✈️" },
  { id: 642, subject: "spd", q: "O que é VD (Design Dive Speed)?", a: "Velocidade atingida em mergulho de 20 segundos partindo de VC com 7.5° de trajetória descendente e 75% do empuxo de cruzeiro máximo. Em VD, a aeronave NÃO PODE exibir vibração, flutter ou qualquer característica que comprometa a integridade estrutural.", emoji: "🚀" },
  { id: 643, subject: "spd", q: "Qual o load factor máximo certificado para aeronaves comerciais?", a: "FLAPS UP: 2.5g positivos / -1.0g negativos. FLAPS DOWN: 2.0g positivos / 0g (não testam negativo). Por isso turbulência severa = retrair flaps se possível, e voar VB. Margem regulamentar para uso normal e adverso.", emoji: "📊" },
  { id: 644, subject: "aero", q: "O que é MAC (Mean Aerodynamic Chord)?", a: "Corda aerodinâmica MÉDIA — linha imaginária do bordo de ataque ao bordo de fuga, representando a \"corda média\" da asa. Usada como REFERÊNCIA para informar CG em aeronaves grandes. Conceito: área da asa dividida pela envergadura dá uma \"corda equivalente\" para uso técnico.", emoji: "📐" },
  { id: 645, subject: "aero", q: "O que são LEMAC e TEMAC?", a: "LEMAC: Leading Edge of Mean Aerodynamic Chord (0% MAC). TEMAC: Trailing Edge MAC (100% MAC). CG é informado como % da MAC entre esses pontos. Ex.: 'CG 25% MAC' = está a 25% da distância de LEMAC até TEMAC.", emoji: "📏" },
  { id: 646, subject: "aero", q: "Como o CG informado em % de MAC é projetado na fuselagem?", a: "MAC é uma linha NA ASA, mas o CG físico está no EIXO LONGITUDINAL da aeronave. O CG é PROJETADO horizontalmente da posição na asa para o eixo. Reportar '25% MAC' indica posição relativa na asa, não literalmente no ar.", emoji: "🛩️" },
  { id: 647, subject: "aero", q: "Por que avião precisa do horizontal stabilizer?", a: "Sem ele, peso (no CG) e lift (no CP — centro de pressão) criariam DESEQUILÍBRIO. Como CG geralmente fica ATRÁS do CP (peso atrás do lift), o nariz CAIRIA. O stabilizer cria 'negative lift' atrás, equilibrando a 'gangorra'.", emoji: "⚖️" },
  { id: 648, subject: "aero", q: "Qual CG dá MENOR consumo de combustível: forward ou aft?", a: "AFT! Com CG aft, o lift necessário no stabilizer (negativo) é MENOR. Lift total da aeronave = peso + |lift negativo|. Menor lift negativo = menor lift total = MENOR ARRASTO = menos combustível. Companhia ganha com CG aft.", emoji: "💰" },
  { id: 649, subject: "aero", q: "Qual CG dá MELHOR controle direcional: forward ou aft?", a: "FORWARD! Com CG forward, o BRAÇO de momento do leme é MAIOR. Mesma força do leme gera mais momento de yaw. Daí a regra: 'pior caso para CONTROLE = AFT CG'; 'pior caso para LIFT = FORWARD CG'. Performance é calculada no pior caso para cada análise.", emoji: "🎯" },
  { id: 650, subject: "aero", q: "Coffin Corner: por que aviões evitam essa região?", a: "Combinação de altitude + peso onde Vs ≈ MMO. Janela operacional fica STREITA. Stall a 0.5g por leve perturbação. Falha de pitch trim pode levar a stall ou overspeed irrecuperável. Quanto mais leve a aeronave, mais alto pode subir sem entrar nessa região.", emoji: "🪦" },
  { id: 651, subject: "desc", q: "Quais as 5 estratégias de velocidade na descida?", a: "1) MAXIMUM RANGE (≈ Green Dot Speed). 2) MAXIMUM ENDURANCE. 3) MINIMUM TIME (VMO/MMO + speedbrakes). 4) MAXIMUM ANGLE (descida íngreme). 5) COMPANY POLICY (geralmente baseada em CI). Todas usam motores em IDLE.", emoji: "🎯" },
  { id: 652, subject: "desc", q: "Em descida emergencial (descompressão), qual velocidade?", a: "MINIMUM TIME — MMO ou VMO + speedbrakes deployed. Objetivo: chegar a 10.000ft o MAIS RÁPIDO possível para passageiros respirarem sem O2. Diferente de driftdown (que prioriza performance, não rate de descida).", emoji: "🚨" },
  { id: 653, subject: "desc", q: "Como funciona a transição IAS/Mach na DESCIDA?", a: "INVERSO da subida! Em altitude começa com MACH. Quando IAS escolhida e Mach dão mesma TAS (crossover altitude), transição para IAS. Se mantivesse Mach até baixa altitude, IAS dispararia → excederia VMO.", emoji: "🔀" },
  { id: 654, subject: "desc", q: "Regra de bolso para TOD (Top of Descent) por altitude?", a: "**3nm para cada 1.000ft** de descida. Ex.: descer de FL380 para 5.000ft = 33.000ft → precisa 99nm de antecedência. Funciona para a maioria dos jatos. Erra um pouco em casos extremos de peso/vento, mas é mental e útil.", emoji: "📐" },
  { id: 655, subject: "desc", q: "Regra de bolso para DESACELERAÇÃO durante descida?", a: "**1nm para cada 10kt** de redução de velocidade. Ex.: reduzir de 280kt para 250kt = 30kt → +3nm de antecedência. Combina com a regra de altitude (3nm/1.000ft). Soma as duas para TOD completo.", emoji: "🧮" },
  { id: 656, subject: "desc", q: "Exemplo: descer de FL380 a 5.000ft com slowdown 280→170kt em 5.000ft. Calcule TOD.", a: "Altitude: 33.000ft × 3 = 99nm. Velocidade: 110kt × 1 = 11nm. TOD = 99 + 11 = **110nm antes do ponto**. Pode dividir em fases (33+5 = 38nm de descida em duas fases) — resultado matemático idêntico.", emoji: "🎯" },
  { id: 657, subject: "desc", q: "Por que ATC frequentemente atrapalha o TOD planejado?", a: "ATC precisa SEPARAR fluxos de tráfego em aeroportos movimentados. Mesmo com TOD ideal calculado, controlador pede descer ANTES para encaixar entre outros aeronaves. Resultado: descida com motores acima de IDLE → mais combustível queimado.", emoji: "📡" },
  { id: 658, subject: "fuel", q: "O que é Reclearance Inflight (RIF)?", a: "Técnica de despacho que permite COLOCAR MENOS COMBUSTÍVEL na decolagem para voos longos. Planeja-se voo até aeroporto intermediário (com reservas completas), depois 'redespacha' em voo para o destino final. Economiza muito combustível em voos transoceânicos.", emoji: "🌍" },
  { id: 659, subject: "fuel", q: "Por que RIF funciona em voos longos?", a: "Reserva legal é calculada como 10% do TEMPO DE VOO com fuel flow no momento ANTES do TOD. No final do voo, aeronave está MUITO mais leve → fuel flow MUITO menor que no início. Reserva calculada nesse momento é menor que a calculada com fuel flow do início.", emoji: "📉" },
  { id: 660, subject: "fuel", q: "O que é Reclearance Fix (RF)?", a: "Ponto da rota onde o piloto reavalia: 'Combustível atual ≥ mínimo para chegar ao destino final?'. Se SIM: segue para destino final. Se NÃO: desvia para aeroporto intermediário (que estava no plano original). Tipicamente fica ~70% da rota.", emoji: "📍" },
  { id: 661, subject: "fuel", q: "O que é Reclearance Fuel?", a: "Diferença entre o combustível de decolagem original (caso completo) e o usado com RIF. Pode chegar a 10.000kg+ em voos longos. Ex: Singapore→London via RIF economiza ~10.190kg de combustível na decolagem.", emoji: "⛽" },
  { id: 662, subject: "fuel", q: "RIF passa pelo RF com combustível ABAIXO do mínimo. O que fazer?", a: "Contactar despachante da empresa para REAVALIAÇÃO do mínimo (com dados meteorológicos atualizados). Se reavaliação valida = OK para prosseguir. Caso contrário, DEVE desviar para aeroporto intermediário. Cruzar RF abaixo do mínimo + decidir continuar = infração séria.", emoji: "📡" },
  { id: 663, subject: "eng", q: "O que é TSFC (Thrust Specific Fuel Consumption)?", a: "Mede EFICIÊNCIA do motor: quanto combustível para gerar 1 unidade de empuxo. TSFC = Fuel Flow ÷ Thrust. Unidades: lb/lbf.h ou kg/N.h. Quanto MENOR o valor, MAIS eficiente. Motores modernos (LEAP, PW4000): TSFC ~0.4. Antigos (JT8D): ~0.6 — diferença enorme.", emoji: "⛽" },
  { id: 664, subject: "eng", q: "Como motores modernos são mais eficientes que antigos?", a: "Filosofia INVERTIDA. Motores antigos pegam POUCO ar e jogam MUITO RÁPIDO. Modernos pegam MUITA massa de ar (high bypass) e jogam LEVEMENTE. Mesmo empuxo (Newton: F = m × Δv), mas combustível menor. Por isso fans são gigantes em motores modernos.", emoji: "💨" },
  { id: 665, subject: "eng", q: "Quanto a TSFC aumenta com a DEGRADAÇÃO do motor?", a: "Em 6.000 ciclos, TSFC aumenta ~4% (motor produz mesmo empuxo mas consome 4% a mais). LAVAGEM regular do compressor reduz: a cada 1.000 ciclos = 0.5% ganho cumulativo. A cada 500 ciclos = 0.75% ganho. Por isso companhias têm cronograma rigoroso de wash.", emoji: "📉" },
  { id: 666, subject: "eng", q: "Por que a degradação acontece no motor?", a: "Acúmulo de SUJEIRA nas pás do compressor. Partículas (poeira, fumaça, sal) aderem ao perfil aerodinâmico das pás, modificando-as. Mesmo invisíveis a olho nu, alteram o fluxo de ar → mistura ar-combustível levemente mais rica → TSFC sobe + EGT sobe.", emoji: "🧹" },
  { id: 667, subject: "eng", q: "Engine wash com água quente: qual o efeito imediato e duradouro?", a: "IMEDIATO: redução drástica do TSFC (pás voltam ao perfil original). DURADOURO: NÃO permanente — a sujeira volta a acumular gradualmente. Por isso wash é PROCEDIMENTO REGULAR (cada X ciclos), não solução única. Aeronaves novas têm sensores que indicam quando lavar.", emoji: "💧" },
  { id: 668, subject: "aero", q: "Quais são os 2 tipos PRINCIPAIS de arrasto?", a: "1) PARASITE DRAG (parasita): resistência da forma, atrito superficial, interferência. CRESCE com a velocidade. 2) INDUCED DRAG (induzido): resulta da geração de sustentação (vortices nas pontas da asa). DIMINUI com velocidade. Drag total tem ponto mínimo onde os 2 se igualam.", emoji: "💨" },
  { id: 669, subject: "aero", q: "O que é Drag Polar?", a: "Gráfico que mostra DRAG TOTAL em função da VELOCIDADE. Formato característico em 'U': à esquerda induced drag domina, à direita parasite drag domina. O ponto MÍNIMO = velocidade do Best L/D = MRC. Cada aeronave/peso/altitude tem seu drag polar.", emoji: "📊" },
  { id: 670, subject: "aero", q: "O que é Critical Mach Number (Mcrit)?", a: "Mach em que pela primeira vez aparece um POINT SÔNICO sobre a asa (mesmo com Mach total subsônico, o ar acelerado sobre a curvatura da asa atinge M=1 localmente). Acima dele, ondas de choque começam a se formar — daí em diante, arrasto aumenta exponencialmente.", emoji: "🔊" },
  { id: 671, subject: "aero", q: "O que é Drag Divergence Mach?", a: "Mach a partir do qual o arrasto começa a CRESCER RAPIDAMENTE devido a ondas de choque. Fica entre Mcrit e Mach 1. É o LIMITE PRÁTICO da operação subsônica eficiente. Aeronaves comerciais voam logo abaixo (margem de buffet/manobra).", emoji: "⚡" },
  { id: 672, subject: "aero", q: "Para que servem as ASAS ENFLECHADAS (sweepback)?", a: "RETARDAM o aparecimento de ondas de choque. Em uma asa enflechada, o ar percebe um perfil MAIS FINO (apenas a componente perpendicular do escoamento conta para Mcrit). Resultado: asa enflechada tem Mcrit MAIOR → vôo mais rápido sem drag divergence.", emoji: "✈️" },
  { id: 673, subject: "aero", q: "O que é Aspect Ratio (AR) da asa?", a: "Razão entre ENVERGADURA² e ÁREA da asa. AR = b² ÷ S. Asas longas e estreitas (planador, AR alto) têm MENOS induced drag → melhor L/D. Aeronaves comerciais têm AR moderado (~9-10). Aviões caça têm AR baixo (~3-4) para manobras.", emoji: "📐" },
  { id: 674, subject: "aero", q: "Para que servem WINGLETS?", a: "Reduzem o INDUCED DRAG ao \"esconder\" a ponta da asa do escoamento livre, diminuindo a intensidade dos vórtices de ponta. Resultado: melhor L/D, melhor fuel mileage, Optimum Altitude maior. Aeronaves antigas sem winglets podem ter retrofit instalado pelo operador.", emoji: "🛩️" },
  { id: 675, subject: "aero", q: "O que é Angle of Attack (AOA / α)?", a: "Ângulo entre a CORDA da asa e o vetor de VELOCIDADE relativa do ar. NÃO confundir com pitch (atitude). Em descida com nariz para baixo, AOA pode estar ALTO. Stall depende do AOA crítico, não da velocidade. Por isso aviões modernos têm AOA indicator.", emoji: "📐" },
  { id: 676, subject: "aero", q: "Stall depende da velocidade ou do AOA?", a: "Do AOA CRÍTICO. A 'velocidade de stall' é apenas a velocidade onde, em vôo nivelado, o avião precisa atingir o AOA crítico para gerar sustentação suficiente. Em manobras com g maior (curva acentuada), o stall ocorre em VELOCIDADE MAIOR (mesmo AOA crítico).", emoji: "⚠️" },
  { id: 677, subject: "aero", q: "Velocidade de stall em curva 60° de bank é quanto maior?", a: "1.41× a velocidade de stall em vôo reto (√2). Em 60° bank, load factor = 2g — aeronave precisa gerar lift 2× peso. Mais lift = AOA maior em mesma velocidade = stall mais cedo. Por isso curvas acentuadas em baixa velocidade são PERIGOSAS.", emoji: "🌀" },
  { id: 678, subject: "aero", q: "Para que serve o Boundary Layer Control?", a: "Controla a camada de ar 'colada' à superfície da asa. Em ângulos de ataque altos, o boundary layer pode SEPARAR e causar stall prematuro. Slats e dispositivos de borda de ataque ENERGIZAM o boundary layer, atrasando a separação → aeronave atinge AOA maior antes de stall.", emoji: "🪶" },
  { id: 679, subject: "aero", q: "Por que jatos comerciais queimam combustível do TANK CENTRAL antes das ASAS?", a: "WING BENDING RELIEF. Combustível na asa pesa PARA BAIXO, contrabalançando a sustentação que empurra a asa PARA CIMA. Queimar das asas DEPOIS preserva esse alívio estrutural pelo máximo tempo possível. Asa cheia = menos fadiga de longo prazo.", emoji: "🛢️" },
  { id: 680, subject: "misc", q: "Em high altitude, o raio de curva é quanto maior que ao nível do mar?", a: "Aproximadamente 60% MAIOR a FL200 vs FL050 (mesma IAS e bank). Em FL200 com 25° bank a 140kt: ~2.269m de raio vs 1.408m em FL050. Razão: TAS muito maior → centripetal force maior → raio maior. PILOTOS precisam ANTECIPAR curvas em alta altitude.", emoji: "🌀" },
  { id: 681, subject: "misc", q: "Por que aproximações em high altitude tendem a EXCEDER 1.000ft/min?", a: "Limite de stabilized approach é 1.000ft/min sink rate. Em alta altitude, mesma IAS = TAS muito maior + ground speed alto. Para manter trajetória 3°, descent rate = GS × 5.18. Ex.: 150kt IAS em 8.000ft com 10kt tailwind → GS 183kt → 952ft/min (próximo do limite).", emoji: "📉" },
  { id: 682, subject: "misc", q: "Como AUMENTAR peso máximo de pouso em high altitude (limitado por Approach Climb)?", a: "REDUZIR o flap. Ex: pousar com flap menor + go-around com flap ainda menor → menos arrasto = melhor gradiente. Aeronaves novas permitem combinações de flap mais agressivas (até pousar com flap intermediário e ir embora com flap pequeno) — isso permite mais peso permitido.", emoji: "🔧" },
  { id: 683, subject: "misc", q: "Dica para operar em high altitude airports?", a: "Operar nas HORAS MAIS FRIAS do dia (manhã/noite). Ar mais frio = mais denso = mais empuxo + melhor performance. Diferença pode ser de 10-20% no peso máximo permitido entre meio-dia (quente) e madrugada (frio) em locais como La Paz.", emoji: "🌙" },
  { id: 684, subject: "misc", q: "Em high altitude airports, a 'regra dos 10kt = 1nm' funciona para desaceleração?", a: "PODE EXCEDER 1nm. Ar rarefeito = menos arrasto aerodinâmico para desacelerar. TAS alta + arrasto reduzido = mais distância para perder velocidade. SEMPRE planejar margem extra para desacelerar em alta altitude. Subestimar = approach unstabilized.", emoji: "⏱️" },
  { id: 685, subject: "misc", q: "Os requisitos Landing Climb/Approach Climb garantem terrain clearance em high altitude?", a: "NÃO! Eles só asseguram CAPACIDADE de subir (gradiente). Em locais como Paro (Bhutan) cercado por montanhas de 18.000ft, a companhia DEVE desenvolver procedimentos ESPECÍFICOS para falha de motor — independente dos limites Landing/Approach Climb.", emoji: "🏔️" },
  { id: 686, subject: "eng", q: "Por que motores modernos usam motores GIGANTES (alto bypass)?", a: "Pela equação F = m × Δv (Newton 2ª lei). Para mesmo empuxo, melhor pegar MUITA massa e acelerar POUCO. Eficiência energética: KE = ½mv² — dobrar massa custa 2x energia, mas dobrar velocidade custa 4x. Bypass ratios de 10-12:1 hoje vs 1:1 em motores antigos.", emoji: "💨" },
  { id: 687, subject: "speeds", q: "Stall: em altitude, é a IAS ou TAS que importa?", a: "IAS (ou CAS). Aerodinâmica age sobre PRESSÃO DINÂMICA (q = ½ρV²) — que é o que IAS reflete. Por isso a stall speed em CAS NÃO MUDA com altitude (em primeiro grau). Mas em TAS, a stall speed AUMENTA com altitude (porque a mesma CAS = TAS maior em alta).", emoji: "📊" },
  { id: 688, subject: "speeds", q: "O que é Coffin Corner?", a: "Região em altitudes muito altas onde STALL SPEED (IAS) sobe + MMO (IAS) desce — convergindo num único ponto. Acima dele, qualquer perturbação leva a stall OU a Mach buffet. Aeronaves comerciais voam BEM ABAIXO desse ponto. Aeronaves militares de altíssima altitude (U-2, SR-71) operavam perto.", emoji: "⚠️" },
  { id: 689, subject: "speeds", q: "Em curva 30° de bank, qual o load factor?", a: "1.15g (cos 30° = 0.866; 1/0.866 = 1.15). Aumento pequeno. Em 45°: 1.41g. Em 60°: 2g. Em 90° (knife edge — impossível voo nivelado): infinito. Por isso curvas comerciais geralmente são limitadas a 30° (15° normais, 25° em final).", emoji: "🔄" },
  { id: 690, subject: "speeds", q: "Em curva 45° de bank, stall speed aumenta quanto?", a: "1.19× (raiz quadrada do load factor 1.41g). Ex.: VS 130kt → VS 154kt em 45° bank. Em 60° bank: 1.41× (raiz de 2). VS 130kt → VS 184kt. Por isso aproximações em vento forte (que exigem mais bank) precisam de velocidade extra.", emoji: "🌀" },
  { id: 691, subject: "cruise", q: "Velocidade típica de holding em jato comercial é qual?", a: "Aproximadamente 210-230 KIAS abaixo de FL140; 230-265 KIAS entre FL140-FL200; 265-310 KIAS acima de FL200 (holding standards ICAO). Aeronave geralmente usa um pouco acima da Min Endurance Speed para evitar a região INSTÁVEL (back-side of the power curve).", emoji: "⏳" },
  { id: 692, subject: "land", q: "Qual a sequência de configuração em GO-AROUND padrão?", a: "1) TOGA. 2) Pitch inicial 15°. 3) Trem UP (a positive rate). 4) FLAP retract progressivamente conforme aceleração. 5) Acceleration altitude: aceleração para clean speed. 6) Normalmente 1.000ft AFE como acceleration altitude. Procedimento é treinado em simulador frequentemente.", emoji: "🔄" },
  { id: 693, subject: "misc", q: "Pneu de aeronave: pressão máxima informada pelo PCN?", a: "Letra W/X/Y/Z após subgrade. W = Unlimited. X = High (até 254 psi). Y = Medium (até 181 psi). Z = Low (até 73 psi). Aviões grandes com pneus de alta pressão (X) podem operar onde PCN permite — pressão alta cria stress concentrado no pavimento.", emoji: "🛞" },
  { id: 694, subject: "lmc", q: "O que é Loading Schedule?", a: "Documento que define COMO o avião deve ser carregado. Lista compartimentos, capacidade máxima de peso/volume, limites de tamanho. Cabine de carga geralmente tem zonas A, B, C, D, E numbered. Loading deve respeitar Loading Schedule para CG e estrutura.", emoji: "📋" },
  { id: 695, subject: "lmc", q: "O que é Trim Sheet?", a: "Documento ANTIGO em papel para CALCULAR posição do CG manualmente, antes do FMS. Pilotos preenchiam pesos/momentos por estação e calculavam CG. Hoje substituído por software (load planning system), mas ainda é base para entender o cálculo.", emoji: "📑" },
  { id: 696, subject: "weights", q: "O que é MEW (Manufacturer Empty Weight)?", a: "Peso da aeronave ao SAIR DA FÁBRICA: estrutura, fuselagem, asas, motores, fluidos enclosed, assentos, cintos e equipamentos mínimos de emergência (extintores). É o PESO ZERO de referência, antes de adicionar qualquer item operacional ou de equipagem.", emoji: "🏭" },
  { id: 697, subject: "weights", q: "O que é BEW (Basic Empty Weight) e como difere do MEW?", a: "BEW = MEW + Standard Items (SI). SI inclui: combustível inutilizável dos tanques, óleo do motor, fluidos não-utilizáveis, kits de primeiros socorros, lanternas, megafones, garrafas de O2 portáteis, frame do galley, eletrônicos básicos. Também chamado Dry Empty Weight (DEW).", emoji: "📦" },
  { id: 698, subject: "weights", q: "O que é BOW (Basic Operational Weight) e como difere do BEW?", a: "BOW = BEW + Operational Items (OI). OI inclui: pilotos e tripulação de cabine com bagagens, manuais de navegação, materiais de serviço (comida, bebida, louça, guardanapos), água potável, coletes salva-vidas, ELT portátil, containers e pallets de carga. Também chamado Dry Operational Weight (DOW).", emoji: "👥" },
  { id: 699, subject: "weights", q: "O que é ZFW (Zero Fuel Weight)?", a: "ZFW = BOW + PAYLOAD. Payload = passageiros + bagagem + carga revenue. É o peso da aeronave SEM nenhum combustível a bordo. Ponto importante para limites estruturais (MZFW limita o stress na raiz da asa).", emoji: "0️⃣" },
  { id: 700, subject: "weights", q: "O que é Total Fuel e como se divide?", a: "Combustível TOTAL a bordo no engine start. Divide em: 1) TAXI FUEL (queimado até a pista). 2) TRIP FUEL (origem→destino). 3) FUEL OVER DESTINATION = Reserve + Alternate + Hold Over Alternate + Extra.", emoji: "⛽" },
  { id: 701, subject: "weights", q: "O que é Taxi Weight (TW) ou Ramp Weight?", a: "TW = ZFW + Total Fuel. É o peso TOTAL da aeronave no início do taxi (antes da pista). Também chamado Ramp Weight. Inclui o combustível que será queimado durante o taxi até o ponto de decolagem.", emoji: "🛞" },
  { id: 702, subject: "weights", q: "O que é TOW (Takeoff Weight) ou Brake Release Weight (BRWT)?", a: "TOW = TW − Taxi Fuel = ZFW + Takeoff Fuel. Peso da aeronave NO MOMENTO DE BRAKE RELEASE (início da corrida). Também chamado Brake Release Weight (BRWT) ou Brake Release Gross Weight (BRGW).", emoji: "🚀" },
  { id: 703, subject: "weights", q: "O que é Landing Weight (LW)?", a: "LW = TOW − Trip Fuel. Peso PREVISTO da aeronave no momento do pouso, considerando todo o combustível previsto para a viagem. Inclui taxi fuel, reserve fuel, alternate fuel, hold over alternate fuel e extra fuel — tudo exceto trip fuel.", emoji: "🛬" },
  { id: 704, subject: "weights", q: "O que é MTOW (Maximum Takeoff Weight)?", a: "Peso máximo CERTIFICADO para decolagem. Definido pelo fabricante com base na capacidade do trem de pouso (FAR 25.473): trem deve suportar pouso na MTOW com sink rate de 6ft/s ou 360ft/min. Operador pode comprar várias opções de MTOW para o mesmo modelo.", emoji: "🔝" },
  { id: 705, subject: "weights", q: "O que é MLW (Maximum Landing Weight)?", a: "Peso máximo CERTIFICADO para pouso. Trem deve suportar pouso na MLW com sink rate de 10ft/s ou 600ft/min (mais agressivo que o MTOW). Por isso MLW < MTOW. Excedê-lo significa pouso 'overweight' — requer inspeção de manutenção.", emoji: "🔽" },
  { id: 706, subject: "weights", q: "Por que MLW é MENOR que MTOW?", a: "O trem é certificado para pousos mais 'duros' (10ft/s) no MLW, mas pousos mais leves (6ft/s) no MTOW. Não faria sentido permitir pouso em MTOW com sink rate de 6ft/s — uma chegada típica é entre 2-3ft/s. MLW define a margem realista de pousos normais.", emoji: "⬇️" },
  { id: 707, subject: "weights", q: "O que é MZFW (Maximum Zero Fuel Weight)?", a: "Peso máximo SEM combustível. Limitado pela estrutura da RAIZ DA ASA (junção asa-fuselagem). Combustível NAS ASAS gera momento contrário à sustentação (wing bending relief). Sem fuel, todo o peso da fuselagem precisa ser suportado pela asa sozinha — daí o limite.", emoji: "💎" },
  { id: 708, subject: "weights", q: "Por que MZFW existe?", a: "Protege a JUNÇÃO ASA-FUSELAGEM da fadiga. Sem combustível nas asas, todo lift é gerado nas asas mas resistido na junção root. Combustível NA ASA pesa para baixo, reduzindo o stress. Por isso MZFW é independente de MTOW — pode ter MZFW alto e MTOW baixo, ou vice-versa.", emoji: "🛠️" },
  { id: 709, subject: "fuelplan", q: "Qual o combustível mínimo na RBAC 91 VFR (aviação geral)?", a: "Combustível para A→B + 30min de endurance em CRUZEIRO normal (de dia). Se qualquer parte do voo for à noite: +45min em vez de 30min. Para aviação GERAL apenas. Regra mais simples por não exigir IFR.", emoji: "☀️" },
  { id: 710, subject: "fuelplan", q: "Qual o combustível mínimo na RBAC 91 IFR?", a: "Combustível para A→B + Go-around em B + Desvio para C (alternate) + 45min de endurance em CRUZEIRO normal. Mais conservador que VFR pela imprevisibilidade de condições IFR.", emoji: "🛰️" },
  { id: 711, subject: "fuelplan", q: "Qual o combustível mínimo na RBAC 121 JET (Doméstico ou Internacional)?", a: "Combustível para A→B + Go-around em B + Desvio para C + 10% de massa do trip fuel (A→B) + 30min de endurance em HOLDING a 1.500ft sobre alternate. Com Fuel Data Monitoring: pode reduzir o 10% para 5%.", emoji: "🇧🇷" },
  { id: 712, subject: "fuelplan", q: "Qual a regra de combustível FAA Domestic Operations?", a: "A→B + 45min de endurance em CRUZEIRO normal calculado pelo fuel flow ANTES do TOD. Não exige alternate em TODOS os casos — só se: 1) voo > 6h, ou 2) tempo no destino abaixo de 1500ft de teto OU vis abaixo 3sm na hora prevista (±1h).", emoji: "🇺🇸" },
  { id: 713, subject: "fuelplan", q: "Qual a regra de combustível FAA Flag Operations (internacional)?", a: "A→B + Go-around em B + Desvio para C + 10% do TEMPO entre A e B (em fuel flow) + 30min em holding a 1.500ft sobre alternate. Similar à RBAC 121, mas FAA usa 10% do TEMPO de voo (não da massa).", emoji: "🌐" },
  { id: 714, subject: "fuelplan", q: "Qual a regra de combustível FAA Supplemental Operations?", a: "A→B + 120min (2 horas) de endurance em CRUZEIRO normal. NÃO requer alternate — pensado para voos remotos (ex: Pacífico, ilhas) onde o alternate pode estar tão longe que se torna impraticável. Exemplo: voos para Havaí.", emoji: "🏝️" },
  { id: 715, subject: "fuelplan", q: "Qual a regra de combustível EASA Jet?", a: "A→B + Go-around em B + Desvio para C + 5% do TEMPO entre A e B + 30min em holding a 1.500ft sobre alternate. Aqueles 5% NÃO podem ser menos de 5min de endurance em holding sobre destino em condições standard.", emoji: "🇪🇺" },
  { id: 716, subject: "fuelplan", q: "O que é Minimum Fuel Over Destination (MFOD)?", a: "Combustível mínimo que permite ir de B (destino) para C (alternate) + 30min em holding a 1.500ft sobre C. Quando o piloto começa a queimar deste mínimo, ele se COMPROMETEU com um pouso (em B ou C — sem mais opções).", emoji: "🎯" },
  { id: 717, subject: "fuelplan", q: "O que é Final Reserve Fuel?", a: "Combustível equivalente a 30min de endurance em HOLDING SPEED a 1.500ft acima do aeroporto. Se piloto perceber que vai pousar com 30min ou MENOS de combustível, deve declarar MAYDAY (emergência por combustível) — independente do total a bordo.", emoji: "🆘" },
  { id: 718, subject: "fuelplan", q: "Quando declarar MAYDAY por combustível?", a: "Quando piloto antecipa que o POUSO ocorrerá com 30min de Final Reserve Fuel OU MENOS. NÃO esperar atingir 30min para declarar — declarar quando previr essa situação. ATC dá prioridade absoluta.", emoji: "📡" },
  { id: 719, subject: "fuelplan", q: "Em que condições FAA Domestic exige fuel para o alternate?", a: "1) Voo mais longo que 6 horas, OU 2) Durante 1h antes/depois do ETA, teto previsto < 1.500ft acima do MDA mínimo, OU 3) Visibilidade prevista < 3 milhas. Outros casos: alternate dispensável, basta A→B + 45min.", emoji: "📋" },
  { id: 720, subject: "fuelplan", q: "Qual a diferença entre 10% do TEMPO (FAA) e 10% da MASSA (RBAC)?", a: "FAA Flag: 10% do TEMPO total de voo entre A e B. RBAC 121 Jet: 10% da MASSA do trip fuel A→B. Numericamente diferentes — fuel flow varia ao longo do voo (peso diminui), então 10% tempo ≠ 10% massa. RBAC tende a ser ligeiramente menos conservador.", emoji: "⚖️" },
  { id: 721, subject: "cold", q: "O que é SNOWTAM?", a: "Boletim informando condições da pista (contaminantes neve/gelo/slush). Tem formato codificado com letras A até T — cada letra representa um campo: A = aeroporto, B = data/hora, C = pista, D = comprimento limpo, E = largura limpa, F = composição em 3 terços, G = profundidade, H = atrito, etc.", emoji: "❄️" },
  { id: 722, subject: "cold", q: "Como é a representação simplificada de SNOWTAM no METAR?", a: "8 dígitos no final do METAR (ex: '10590592'). Cada algarismo/par codifica: 1º = pista, 2º = depósito, 3º = cobertura %, 4-5 = profundidade média, 6-7 = atrito ou ação de frenagem, 8 = condições adicionais. Apps decodificam automaticamente.", emoji: "📝" },
  { id: 723, subject: "cold", q: "No SNOWTAM, campo F com '4/5/4' significa:", a: "Composição da pista em 3 terços (primeiro/meio/último). Cada número codifica o tipo de contaminante (0-9): ex. 4 = dry snow, 5 = wet snow, 6 = slush, 7 = ice. Permite saber exatamente que parte da pista tem qual contaminante.", emoji: "🔢" },
  { id: 724, subject: "eng", q: "Por que pilotos param em ~40% de N1 antes de aplicar TOGA na decolagem?", a: "Para EVITAR Asymmetric Spin-Up. Motores turbofan têm aceleração NÃO-LINEAR: ficam lentos do idle até ~40%, depois aceleram rapidamente. Se um motor passar do ponto antes do outro, fica em 92% enquanto o outro está em 52% — assimetria enorme e veer-off.", emoji: "⚡" },
  { id: 725, subject: "eng", q: "O que é Asymmetric Spin-Up?", a: "Desequilíbrio de empuxo entre motores durante a aceleração inicial devido à característica NÃO-LINEAR da aceleração do turbofan. Pode causar veer-off no início da decolagem ANTES de qualquer velocidade aerodinâmica permitir correção pelo leme. Causa de incidentes documentados.", emoji: "↔️" },
  { id: 726, subject: "eng", q: "O que é Engine Spool Up?", a: "Tempo que o motor leva para atingir empuxo máximo a partir de idle. Motor a pistão: resposta quase imediata. Motor turbofan: significativo — lento até 40%, rápido depois. Por isso piloto avança thrust gradualmente, deixa estabilizar em ~40% N1 e depois empurra para TOGA.", emoji: "⏱️" },
  { id: 727, subject: "misc", q: "Operação em pista MAIS ESTREITA que 30m exige o quê?", a: "Aumentar margem de segurança no V1(MCG). 2 opções: 1) Reduzir o desvio máximo permitido de 30ft (9.14m) para 20ft (6.10m) — V1MCG sobe 4-6kt mas pista precisa ser MAIS LONGA. 2) Aplicar ALTERNATE FORWARD CG — V1MCG cai e dá margem extra de controle.", emoji: "📐" },
  { id: 728, subject: "misc", q: "Por que reduzir desvio máx de 30ft para 20ft aumenta o V1(MCG)?", a: "V1MCG é definida como capacidade de controlar a aeronave após falha de motor sem desviar mais de X. Reduzindo X (30→20ft), exige-se MAIOR efetividade do leme — só atinge isso com MAIOR velocidade. Portanto V1MCG sobe.", emoji: "🎯" },
  { id: 729, subject: "misc", q: "V1(MCG) considera vento cruzado nos cálculos?", a: "NÃO. Definição padrão de V1MCG NÃO inclui crosswind. Entretanto, fabricantes garantem que os crosswind máximos demonstrados (publicados no FCOM) são adequados para falha de motor em V1MCG operando em pista de 45m. Para pistas mais estreitas: análise extra necessária.", emoji: "🌬️" },
  { id: 730, subject: "aero", q: "O que é Flight Envelope?", a: "Combinação de limites de VELOCIDADE e ALTITUDE em que a aeronave pode operar com segurança. Esquerda: stall speed (VSR varia com peso). Direita: VMO/MMO (estrutural). Topo: altitude máxima certificada (buffet ou empuxo). Operar FORA = risco estrutural ou aerodinâmico.", emoji: "📊" },
  { id: 731, subject: "aero", q: "O que é Environmental Envelope?", a: "Combinação de altitude × temperatura em que a aeronave pode operar. Define MÍNIMA OAT (operação fria — combustível, hidráulico, sistemas) e MÁXIMA OAT (operação quente — performance, EGT) em cada FL. Pousos/decolagens têm envelope mais restrito.", emoji: "🌡️" },
  { id: 732, subject: "aero", q: "Em V-n diagram, o que muda quando FLAPS DOWN vs FLAPS UP?", a: "FLAPS UP: load factor positivo até +2.5g, negativo até -1g. FLAPS DOWN: positivo até +2.0g, NEGATIVO não-testado (proibido manobras negativas com flap baixado). Stall curve também muda — flap baixado estola em velocidade MENOR mas com load limit menor.", emoji: "📐" },
  { id: 733, subject: "aero", q: "Em asas ENFLECHADAS (sweepback), o stall começa onde?", a: "Nas PONTAS da asa. Boundary layer detacha primeiro nas tips e se espalha para a raiz. Problema: ailerons ficam nas pontas — perda de aileron = perda de controle de roll ANTES do stall completo. Daí a importância de avisar o stall antes.", emoji: "↗️" },
  { id: 734, subject: "aero", q: "O que é Stall Strip e para que serve?", a: "Pequeno dispositivo na BORDA DE ATAQUE da asa (entre fuselagem e motor) que FORÇA o boundary layer a se detachar PRIMEIRO na RAIZ — antes das pontas. Ao stall acontecer na raiz, há buffet detectável e ailerons continuam funcionando. Permite recuperação antes do stall total.", emoji: "🔻" },
  { id: 735, subject: "aero", q: "Por que asas COMUNS (não-enflechadas) tem stall que começa na raiz?", a: "Característica natural devido ao perfil aerodinâmico. Asas retangulares/trapezoidais simples estolam primeiro na raiz e isso é DESEJÁVEL — ailerons continuam funcionando nas pontas. Por isso aviões com sweepback precisam de stall strip artificial para 'imitar' esse comportamento.", emoji: "🪶" },
  { id: 736, subject: "eng", q: "Como o turbofan gera empuxo?", a: "Acelerando MASSA DE AR (Newton 2ª lei: F = m × Δv). Empuxo total tem 2 partes: 1) BYPASS — ar que passa por FORA do core (acelerado pelo fan), 2) CORE — ar que passa pelo compressor + combustão + turbina. Em motores high-bypass: maior parte do empuxo vem do bypass.", emoji: "🌪️" },
  { id: 737, subject: "eng", q: "O que é Bypass Ratio?", a: "Razão entre MASSA DE AR pelo BYPASS / MASSA DE AR pelo CORE. Motores antigos: ~1:1 (parte igual). Modernos: 10-12:1 (maioria do ar pelo bypass). Alto bypass = melhor TSFC, mais quieto, melhor empuxo a baixa velocidade. Por isso fans modernos são gigantes.", emoji: "📊" },
  { id: 738, subject: "eng", q: "Diferença entre N1 e N2 em motor turbofan?", a: "N1 = rotação do EIXO BAIXA pressão (fan + compressor LP + turbina LP). N2 = rotação do EIXO ALTA pressão (compressor HP + turbina HP). Os 2 eixos rodam INDEPENDENTEMENTE em diferentes RPMs. Pilotos veem N1 (mais relevante para empuxo) e N2 (saúde do core).", emoji: "🔄" },
  { id: 739, subject: "eng", q: "Por que motores modernos têm 2 spools (N1 e N2)?", a: "Eficiência aerodinâmica. Estágios HP precisam girar RÁPIDO (alta pressão, alta velocidade). Estágios LP precisam girar mais DEVAGAR (pás maiores, fan grande). Em motor de eixo único, ambos teriam que girar igual — comprometendo um lado. Dois eixos permite OTIMIZAR cada um.", emoji: "⚙️" },
  { id: 740, subject: "lmc", q: "Quais são os 5 limites do CG envelope?", a: "1) WING LOAD — estresse na asa (forward CG mais restrito). 2) TAIL LOAD / STABILITY — capacidade do horizontal stab (aft CG). 3) MAIN GEAR — peso na perna principal. 4) BRAKE RELEASE TIP UP — proteção contra cauda no solo em alta potência. 5) FUEL BURN VECTOR — direção do consumo durante o voo.", emoji: "📐" },
  { id: 741, subject: "lmc", q: "O que é Brake Release Tip Up?", a: "Curtailment do CG envelope (forward) para EVITAR que a aeronave LEVANTE O NARIZ ao aplicar empuxo de takeoff. Com CG muito aft, o stab não consegue gerar negative lift suficiente para evitar isso. Quanto MAIOR o empuxo, MAIS pronunciado é o cut.", emoji: "🚀" },
  { id: 742, subject: "lmc", q: "Para que serve o Fuel Burn Vector no envelope de CG?", a: "Mostra a DIREÇÃO que o CG se MOVE conforme o combustível é queimado. Combustível fica em diferentes tanques (asa, centro) e queimar de tanques diferentes move o CG. O voo deve começar com CG numa posição onde a queima leva a outra posição válida — não saindo do envelope.", emoji: "➡️" },
  { id: 743, subject: "lmc", q: "Cargo Distribution Limitation: o que é?", a: "Restrição de quanto peso pode-se colocar em cada compartimento de carga. Não é só sobre CG — alguns compartimentos têm LIMITE ESTRUTURAL de peso por área. Exemplo: 'compartimento 1: máx 5.000kg'. Loading Schedule especifica isso.", emoji: "📦" },
  { id: 744, subject: "meteo", q: "METAR vs SPECI: qual diferença um entrevistador espera ouvir?", a: "METAR é o informe meteorológico REGULAR de aeródromo, emitido em intervalos regulares de 1h. SPECI é o informe ESPECIAL, emitido entre METARs quando há variação significativa nas condições observadas.", emoji: "🕒" },
  { id: 745, subject: "meteo", q: "SPECI é previsão ou observação?", a: "Observação. Ele descreve condições meteorológicas observadas no aeródromo, assim como o METAR. A diferença é o gatilho: mudança significativa entre observações regulares.", emoji: "👁️" },
  { id: 746, subject: "meteo", q: "Qual a sequência básica de leitura de um METAR/SPECI?", a: "Identificação, vento, visibilidade, RVR se houver, tempo presente, nuvens ou VV, temperatura/dew point, QNH e suplementares condicionais como RE, windshear, mar/ondas e pista.", emoji: "📋" },
  { id: 747, subject: "meteo", q: "O que significa RMK no METAR e qual a pegadinha?", a: "RMK inicia uma seção com informações decididas nacionalmente. Pegadinha: essa seção não é divulgada internacionalmente como parte padronizada principal.", emoji: "📝" },
  { id: 748, subject: "meteo", q: "AUTO antes do grupo de vento no METAR indica o quê?", a: "Mensagem gerada por estação automática sem intervenção humana. No material, aplica-se aos horários em que o aeródromo não está em funcionamento.", emoji: "🤖" },
  { id: 749, subject: "meteo", q: "No METAR, a direção do vento é verdadeira ou magnética?", a: "Verdadeira. É a direção de ONDE o vento sopra, arredondada para a dezena de graus mais próxima. Piloto deve lembrar que ATIS/torre operacional pode usar referências diferentes conforme contexto.", emoji: "🧭" },
  { id: 750, subject: "meteo", q: "Quando uma rajada entra no METAR com a letra G?", a: "Quando a velocidade máxima do vento excede a velocidade média em 10kt ou mais. Ex.: 31015G28KT = média 15kt, rajada 28kt.", emoji: "💨" },
  { id: 751, subject: "meteo", q: "31015G28KT em um METAR significa exatamente o quê?", a: "Vento de 310° verdadeiros, velocidade média 15kt e rajada máxima 28kt. A rajada só aparece porque excede a média em pelo menos 10kt.", emoji: "🌬️" },
  { id: 752, subject: "meteo", q: "Quando usar 280V350 em vez de VRB no METAR?", a: "Quando a direção varia 60° ou mais, mas menos de 180°, e a velocidade média é de 3kt ou mais. Informam-se os extremos em sentido horário com V entre eles.", emoji: "↔️" },
  { id: 753, subject: "meteo", q: "Quando o vento é codificado como VRB?", a: "Quando varia 60° ou mais e menos de 180° com velocidade média inferior a 3kt; ou quando varia 180° ou mais com qualquer velocidade; ou quando não se consegue determinar uma direção única.", emoji: "🔄" },
  { id: 754, subject: "meteo", q: "Como são codificados vento calmo e vento de 100kt ou mais?", a: "Vento calmo, abaixo de 1kt: 00000KT. Vento de 100kt ou mais: velocidade precedida de P, como 240P99KT.", emoji: "📡" },
  { id: 755, subject: "meteo", q: "Quando a visibilidade é reportada como 9999?", a: "Quando a visibilidade horizontal predominante é de 10km ou mais. Não significa infinito; significa que o código atingiu o patamar operacional de 10km+.", emoji: "👀" },
  { id: 756, subject: "meteo", q: "Quando a visibilidade mínima também deve aparecer no METAR?", a: "Quando difere da predominante e é inferior a 1.500m, ou quando é inferior a 50% da predominante e inferior a 5.000m. A direção geral é indicada se aplicável.", emoji: "🧭" },
  { id: 757, subject: "meteo", q: "Quando o RVR entra no METAR?", a: "Quando a visibilidade predominante ou o RVR de uma pista disponível para pouso for inferior a 2.000m. O grupo é R + pista + / + valor em metros.", emoji: "🛬" },
  { id: 758, subject: "meteo", q: "R10/P2000 e R10/M0050: como interpretar?", a: "P2000 significa RVR acima do máximo mensurável de 2.000m. M0050 significa abaixo do mínimo mensurável de 50m. P e M são limites de medição, não valores exatos.", emoji: "📏" },
  { id: 759, subject: "meteo", q: "No RVR, o que significam U, D e N após o valor?", a: "U = tendência ascendente, D = tendência descendente, N = sem tendência significativa. Se não houver informação de tendência, nenhuma letra é incluída.", emoji: "📈" },
  { id: 760, subject: "meteo", q: "Como combinar mais de um fenômeno de tempo presente no METAR?", a: "Fenômenos diferentes podem aparecer em grupos separados, até três. Mais de uma forma de precipitação entra em um único grupo, com o tipo predominante primeiro.", emoji: "🌧️" },
  { id: 761, subject: "meteo", q: "BR vs FG: qual a diferença operacional em visibilidade?", a: "BR é névoa úmida com visibilidade de 1.000m a 5.000m inclusive. FG é nevoeiro quando gotículas/cristais reduzem a visibilidade para menos de 1.000m.", emoji: "🌫️" },
  { id: 762, subject: "meteo", q: "MIFG, BCFG e PRFG têm qual ideia comum?", a: "São variações de nevoeiro com visibilidade aparente menor que 1.000m através da camada, mas com particularidades: baixo, em bancos ou parcial no aeródromo.", emoji: "🌁" },
  { id: 763, subject: "meteo", q: "GR e GS: onde está o corte de granizo?", a: "GR é granizo quando o maior diâmetro observado é 5mm ou mais. GS é granizo pequeno, abaixo de 5mm, e/ou pelotas de neve.", emoji: "🧊" },
  { id: 764, subject: "meteo", q: "O qualificador FZ pode acompanhar quais fenômenos no METAR?", a: "FZ indica gotas ou precipitação em congelamento e pode acompanhar FG, DZ ou RA. Ex.: FZFG, FZDZ, FZRA.", emoji: "❄️" },
  { id: 765, subject: "meteo", q: "VC no METAR significa o quê e qual distância importa?", a: "VC é 'na vizinhança'. Usa-se para fenômenos significativos observados entre 8km e 16km do ponto de referência do aeródromo.", emoji: "📍" },
  { id: 766, subject: "meteo", q: "Quando reportar TS no METAR?", a: "Quando trovões são ouvidos ou raios/relâmpagos são detectados no aeródromo. Se houver precipitação, TS vem seguido sem espaço pela precipitação, como TSRA.", emoji: "⛈️" },
  { id: 767, subject: "meteo", q: "SQ no METAR exige quais números?", a: "Aumento brusco do vento de pelo menos 16kt, atingindo 22kt ou mais, e permanecendo por pelo menos 1 minuto. É uma definição numérica, não só 'vento forte'.", emoji: "💨" },
  { id: 768, subject: "meteo", q: "FEW, SCT, BKN e OVC representam quanto de céu coberto?", a: "FEW 1-2 oitavos, SCT 3-4, BKN 5-7 e OVC 8 oitavos. Em entrevista, BKN já conta como teto porque é nuvem quebrada/nublada.", emoji: "☁️" },
  { id: 769, subject: "meteo", q: "Como interpretar SCT018?", a: "Nuvens esparsas, 3/8 a 4/8, com base a 1.800ft. A altura é em centenas de pés e arredondada para baixo.", emoji: "📐" },
  { id: 770, subject: "meteo", q: "Quais tipos de nuvens são explicitados no METAR?", a: "Somente nuvens convectivas significativas: CB para cumulonimbus e TCU para towering cumulus/cumulus congestus.", emoji: "⛈️" },
  { id: 771, subject: "meteo", q: "Por que pode aparecer um quarto grupo de nuvens no METAR?", a: "Porque CB ou TCU significativos devem ser informados mesmo se já houver três camadas pela regra normal. Convectiva significativa não fica escondida por limite de três grupos.", emoji: "⚠️" },
  { id: 772, subject: "meteo", q: "O que significa //////CB?", a: "Há trovões/raios, mas não é possível determinar quantidade e altura do CB por céu obscurecido ou camada muito baixa. O CB é reconhecido, mas a base/quantidade não.", emoji: "🌫️" },
  { id: 773, subject: "meteo", q: "Quando usar visibilidade vertical VV no METAR?", a: "Quando o céu está obscurecido e detalhes de nebulosidade não podem ser observados, mas há visibilidade vertical disponível. Ex.: VV003 = 300ft; VV/// = informação indisponível.", emoji: "⬆️" },
  { id: 774, subject: "meteo", q: "CAVOK substitui quais grupos e exige quais condições?", a: "Substitui visibilidade, RVR, tempo presente, nuvens e VV quando há visibilidade de 10km+ em todo o horizonte, nenhuma nuvem operacionalmente significativa e nenhum fenômeno significativo.", emoji: "✅" },
  { id: 775, subject: "meteo", q: "NSC é igual a CAVOK?", a: "Não. NSC indica ausência de nuvens de significado operacional e sem restrição de VV, mas CAVOK não é apropriado. Pode haver, por exemplo, visibilidade que não atende ao CAVOK.", emoji: "☁️" },
  { id: 776, subject: "meteo", q: "Como temperaturas negativas aparecem no METAR?", a: "Com a letra M antes do valor. Ex.: 02/M01 = temperatura +2°C e ponto de orvalho -1°C. Valores de -9 a +9 usam dois dígitos.", emoji: "🌡️" },
  { id: 777, subject: "meteo", q: "Como o QNH é arredondado no METAR?", a: "Para o hectopascal inteiro inferior mais próximo. Ex.: 1012,4 vira Q1012; 995,6 vira Q0995. Em alguns países aparece A em polegadas de mercúrio.", emoji: "🧭" },
  { id: 778, subject: "meteo", q: "Tempo recente RE cobre qual janela?", a: "Fenômenos observados desde a última observação regular, inclusive, até a próxima observação, mas não ocorrendo nos 10 minutos precedentes ao horário da observação atual.", emoji: "⏱️" },
  { id: 779, subject: "meteo", q: "Windshear no METAR é informado em qual camada?", a: "Ao longo das trajetórias de decolagem ou aproximação entre o nível da pista e 500m, ou 1.600ft, quando significativo e reportável localmente ou por aeronave.", emoji: "⚡" },
  { id: 780, subject: "meteo", q: "WS R10 e WS ALL RWY: diferença prática?", a: "WS R10 indica windshear afetando pista específica. WS ALL RWY indica windshear em todas as pistas do aeródromo.", emoji: "🛫" },
  { id: 781, subject: "meteo", q: "Previsão de tendência em METAR/SPECI vale quanto tempo?", a: "Quando adotada, cobre 2 horas a partir da hora da observação. O material destaca que essa previsão de tendência não é adotada pelo Brasil.", emoji: "🕑" },
  { id: 782, subject: "meteo", q: "Trend BECMG vs TEMPO no METAR: diferença central?", a: "BECMG descreve mudança esperada que se estabelece; TEMPO descreve flutuações temporárias, cada uma com duração inferior a 1h e total inferior à metade do período previsto.", emoji: "🔁" },
  { id: 783, subject: "meteo", q: "O que é TAF?", a: "Previsão de aeródromo: descrição completa das condições meteorológicas previstas durante o período de validez, incluindo mudanças significativas para operações aéreas.", emoji: "📄" },
  { id: 784, subject: "meteo", q: "Qual a validade do TAF segundo o material?", a: "12h para planejamento de aeródromos nacionais; 24h ou 30h para internacionais. No Brasil, TAF de 30h é confeccionado para SBGL e SBGR.", emoji: "📅" },
  { id: 785, subject: "meteo", q: "Quais horários de início de validade do TAF são citados?", a: "0000, 0600, 1200 e 1800 UTC. O grupo de validade informa dia/hora de início e dia/hora de término.", emoji: "🕕" },
  { id: 786, subject: "meteo", q: "TX28/1018Z TN20/1109Z em TAF indica o quê?", a: "Temperatura máxima prevista de 28°C às 1800Z do dia 10 e mínima prevista de 20°C às 0900Z do dia 11.", emoji: "🌡️" },
  { id: 787, subject: "meteo", q: "No TAF, o que o grupo FM faz com as condições anteriores?", a: "FM inicia uma parte independente da previsão. Todas as condições prevalecentes dadas antes do FM são substituídas pelas novas condições após o FM.", emoji: "➡️" },
  { id: 788, subject: "meteo", q: "No TAF, quanto pode durar um BECMG?", a: "Normalmente não excede 2h e em nenhum caso pode exceder 4h. Após BECMG, as novas condições tendem a prevalecer até o fim do período ou até novo grupo.", emoji: "⏳" },
  { id: 789, subject: "meteo", q: "Qual pegadinha de nuvens no BECMG?", a: "Após BECMG, normalmente só entram elementos que mudam significativamente; mas, para nebulosidade, todos os grupos de nuvens significativos devem ser informados, inclusive camadas que não mudam.", emoji: "☁️" },
  { id: 790, subject: "meteo", q: "No TAF, quando NÃO usar TEMPO e preferir BECMG?", a: "Se a flutuação temporária durar 1h ou mais em cada caso, ou se o total das flutuações somar metade ou mais do período indicado. TEMPO é para flutuação curta.", emoji: "🧠" },
  { id: 791, subject: "meteo", q: "Depois que termina um período TEMPO, o que acontece com a previsão?", a: "As condições retornam às condições anteriores à previsão temporária. TEMPO não substitui permanentemente a condição prevalecente.", emoji: "🔙" },
  { id: 792, subject: "meteo", q: "PROB no TAF aceita quais probabilidades?", a: "Somente PROB30 e PROB40. Se a probabilidade for 50% ou mais, a confiança é alta e deve-se usar FM, BECMG ou TEMPO, não PROB50.", emoji: "🎲" },
  { id: 793, subject: "meteo", q: "PROB é sempre seguido de quê?", a: "De grupo horário ou de grupo de mudança TEMPO. PROB indica chance de ocorrência; TEMPO indica que a flutuação é esperada dentro de duração limitada.", emoji: "📊" },
  { id: 794, subject: "meteo", q: "Aviso de Aeródromo protege principalmente o quê?", a: "Aeronaves no solo, inclusive estacionadas, instalações e serviços do aeródromo contra condições adversas. Não é uma mensagem de fenômeno em rota.", emoji: "🏢" },
  { id: 795, subject: "meteo", q: "Qual validade máxima de Aviso de Aeródromo?", a: "Não deve ser superior a 4 horas. Deve ser cancelado quando as condições deixam de ocorrer ou não são mais previstas no aeródromo.", emoji: "⏱️" },
  { id: 796, subject: "meteo", q: "Aviso de Cortante do Vento cobre qual fase e camada?", a: "Aproximação, subida inicial/decolagem e aeronaves na pista durante pouso ou corrida de decolagem; normalmente do nível da pista até 500m/1.600ft.", emoji: "⚡" },
  { id: 797, subject: "meteo", q: "Qual validade máxima do Aviso de Cortante do Vento?", a: "Não deve ser superior a 4 horas. Cancela-se após reports de aeronaves não constatando mais windshear ou quando não for mais previsto.", emoji: "🕓" },
  { id: 798, subject: "meteo", q: "O que é SIGMET?", a: "Mensagem de vigilância, em linguagem clara abreviada, sobre ocorrência ou previsão de fenômenos meteorológicos em rota que podem afetar a segurança das operações aéreas e sua evolução.", emoji: "🚨" },
  { id: 799, subject: "meteo", q: "Qual validade máxima de SIGMET?", a: "Até 4 horas. Exceção: SIGMET de cinzas vulcânicas e ciclones tropicais pode chegar a 6 horas.", emoji: "🌋" },
  { id: 800, subject: "meteo", q: "OBSC, EMBD, FRQ e SQL em SIGMET de trovoada significam o quê?", a: "OBSC: obscurecida; EMBD: embutida; FRQ: frequente, com pouca ou nenhuma separação e cobertura >75%; SQL: em linha, com pouco ou nenhum espaço entre células.", emoji: "⛈️" },
  { id: 801, subject: "meteo", q: "Por que TURB não deve ser usado para turbulência convectiva em SIGMET?", a: "Porque TURB se refere a turbulência em níveis baixos, vento forte à superfície, remoinhos, turbulência em nuvem não convectiva ou CAT. Turbulência associada a CB é descrita pelo fenômeno convectivo.", emoji: "🌀" },
  { id: 802, subject: "meteo", q: "Quando ICE e FZRA aparecem em SIGMET?", a: "ICE indica formação de gelo severa, exceto em nuvens convectivas. FZRA indica formação de gelo severa devida à chuva congelante.", emoji: "❄️" },
  { id: 803, subject: "meteo", q: "MTW severa exige qual critério numérico?", a: "Onda orográfica severa acompanhada de corrente descendente de 3m/s ou mais, equivalente a 600ft/min, e/ou turbulência severa observada ou prevista.", emoji: "🏔️" },
  { id: 804, subject: "meteo", q: "Em SIGMET, INTSF, WKN e NC indicam o quê?", a: "Mudança prevista de intensidade: INTSF intensificando, WKN enfraquecendo e NC sem mudança.", emoji: "📈" },
  { id: 805, subject: "meteo", q: "O que é AIRMET?", a: "Mensagem sobre ocorrência ou previsão de fenômenos em rota, abaixo do FL100 ou FL150 em áreas montanhosas, que afetem a segurança e não estejam incluídos na Seção I do GAMET.", emoji: "🛩️" },
  { id: 806, subject: "meteo", q: "Qual validade máxima de AIRMET?", a: "Não deve ser superior a 4 horas. Deve ser cancelado quando o fenômeno deixa de ocorrer ou deixa de ser previsto na área.", emoji: "🕓" },
  { id: 807, subject: "meteo", q: "O que é GAMET?", a: "Previsão de área, em linguagem clara abreviada, para voos em níveis baixos em uma FIR ou setores. Cobre SFC até FL100, ou FL150 em região montanhosa.", emoji: "🗺️" },
  { id: 808, subject: "meteo", q: "Quais são as duas seções do GAMET?", a: "Seção I: fenômenos perigosos em rota para voos baixos, usada para respaldar AIRMET. Seção II: informações adicionais requeridas para voos em níveis baixos.", emoji: "📑" },
  { id: 809, subject: "meteo", q: "SIGWX elaborada pelo CNMA cobre qual horizonte?", a: "Cartas SIGWX são previsões de tempo significativo para as próximas 24h, divulgadas a cada 6h nos horários sinóticos 0000, 0600, 1200 e 1800 UTC.", emoji: "🗺️" },
  { id: 810, subject: "meteo", q: "Em SIGWX, ISOL/OCNL/FRQ/EMBD referem-se a quê?", a: "À distribuição de CB: ISOL individuais, OCNL bem separados, FRQ com pequena ou nenhuma separação, EMBD embutidos em camadas ou encobertos por névoa seca.", emoji: "⛈️" },
  { id: 811, subject: "meteo", q: "Como são mostradas alturas de nuvens em SIGWX?", a: "Em níveis de voo, geralmente topo sobre base. XXX indica que topo ou base está fora da camada da atmosfera da carta. SFC indica nível do solo.", emoji: "📏" },
  { id: 812, subject: "meteo", q: "WIND ALOFT PROG é confeccionada em quais horários?", a: "Nos horários sinóticos de 0000 e 1200 UTC, com dados de radiossondagem e imagens/fotografias de satélite meteorológico.", emoji: "🕛" },
  { id: 813, subject: "meteo", q: "Na carta WIND ALOFT, direção do vento e temperatura têm quais pegadinhas?", a: "Direção em graus verdadeiros, indicando de onde o vento vem. Temperatura negativa aparece sem sinal; temperatura positiva aparece com '+'.", emoji: "🌡️" },
  { id: 814, subject: "meteo", q: "O que é AIREP e por que importa?", a: "Relato de aeronave em voo. Complementa dados sinóticos e pode originar SIGMET ou emendas de previsão, pois informa fenômenos observados na prática.", emoji: "✈️" },
  { id: 815, subject: "meteo", q: "ARP vs ARS em AIREP: qual diferença?", a: "ARP identifica aeronotificação de rotina que contém Seção 3. ARS identifica AIREP especial, transmitida o mais cedo possível ao observar fenômeno perigoso.", emoji: "📡" },
  { id: 816, subject: "meteo", q: "Quais seções da AIREP são obrigatórias ou condicionais?", a: "Seção 1 é obrigatória. Seção 2 vai quando solicitada pelo explorador/representante ou julgada necessária. Seção 3 entra nos pontos de notificação meteorológica indicados.", emoji: "📋" },
  { id: 817, subject: "meteo", q: "Na AIREP, a hora reportada deve ser qual?", a: "A hora verdadeira em UTC em que a aeronave está na posição, não a hora de origem nem a hora de transmissão da notificação.", emoji: "⏱️" },
  { id: 818, subject: "meteo", q: "Na AIREP, quando usar FL e quando usar altitude em pés?", a: "Usa-se nível de voo com 3 algarismos quando o ajuste é QNE. Usa-se altitude em pés quando o ajuste é QNH.", emoji: "🧭" },
  { id: 819, subject: "meteo", q: "Formação de gelo moderada vs severa em AIREP?", a: "Moderada: mudança de rumo e/ou altitude pode ser considerada. Severa: mudança de rumo e/ou altitude é considerada essencial.", emoji: "❄️" },
  { id: 820, subject: "meteo", q: "Quais fenômenos exigem AIREP especial?", a: "Turbulência severa, gelo severo, onda orográfica severa, trovoada, trovoada com granizo, tempestade severa de areia/poeira e nuvem de cinzas vulcânicas.", emoji: "🚨" },
  { id: 821, subject: "meteo", q: "Quando uma trovoada deve ser registrada em AIREP especial?", a: "Quando estiver obscurecida por névoa seca, embutida em nuvens, espalhada por área extensa ou formando linha de trovoada. Não é qualquer CB isolado sem relevância operacional.", emoji: "⛈️" }
];
const QUIZ_QUESTIONS=[
  { id: "m1", subject: "marks", q: "Qual o comprimento da TDZ quando a LDA ≥ 2.400m?", options: ["900m", "750m", "600m", "1.200m"], correct: 0, explanation: "A resposta é 900m porque o Anexo 14 da ICAO determina que, para pistas com LDA ≥ 2.400m, a TDZ sempre terá 900m (3.000ft). Esse é o comprimento máximo — pistas menores têm TDZ proporcionalmente menor." },
  { id: "m2", subject: "marks", q: "Segundo a ICAO, a que distância do threshold fica o Aiming Point em pistas ≥ 2.400m?", options: ["300m", "400m", "305m", "500m"], correct: 1, explanation: "A resposta é 400m porque a ICAO define essa distância para pistas ≥ 2.400m. O '1.000ft' (~305m) é regra da FAA. O nome 'one thousand feet mark' só é literalmente correto no padrão FAA ou, pela ICAO, em pistas entre 1.200m e 2.400m." },
  { id: "m3", subject: "marks", q: "Quantas luzes brancas tem cada conjunto lateral do TDZL?", options: ["2", "4", "3", "5"], correct: 2, explanation: "A resposta é 3 porque o ICAO define 3 luzes brancas de cada lado da linha central. Somente pistas com 60m de largura usam 4 luzes." },
  { id: "m4", subject: "marks", q: "A partir de quantos metros do fim as RCL ficam TODAS vermelhas?", options: ["900m", "600m", "150m", "300m"], correct: 3, explanation: "A resposta é 300m porque as RCL seguem: brancas → alternando vermelho/branco (900m do fim) → todas vermelhas (últimos 300m). Os 300m vermelhos são o último aviso." },
  { id: "m5", subject: "marks", q: "Em pistas < 1.800m, até onde vão as TDZL?", options: ["Metade da pista", "600m", "900m", "Até a TDZ pintada"], correct: 0, explanation: "A resposta é 'metade da pista' porque é a ÚNICA exceção à regra de 900m. Ex: pista de 1.500m → TDZL até 750m." },
  { id: "m6", subject: "marks", q: "Quando as Runway Edge Lights mudam para âmbar?", options: ["Últimos 900m", "Últimos 600m", "Últimos 300m", "Últimos 1.000m"], correct: 1, explanation: "A resposta é 600m. NÃO confunda com as RCL que mudam a 900m. As de borda (RL) mudam mais tarde, nos últimos 600m." },
  { id: "m7", subject: "marks", q: "TDZ pintada em pista com LDA de 2.100m?", options: ["900m", "750m", "600m", "450m"], correct: 2, explanation: "A resposta é 600m porque 2.100m < 2.400m, então a TDZ é reduzida. Mas as TDZL vão até 900m — armadilha à noite." },
  { id: "m8", subject: "marks", q: "Existe marcação específica para decolagem?", options: ["Sim, marcações TDZ específicas", "Sim, Aiming Point indica início", "Sim, setas pintadas no piso", "Não, apenas os números de pista"], correct: 3, explanation: "Não existe. TODAS as marcações servem para o pouso. Os números são apenas identificação da pista." },
  { id: "l1", subject: "lmc", q: "O que é um Last Minute Change (LMC)?", options: ["Um novo loadsheet completo e refeito", "Recálculo completo de performance", "Atualização tardia no loadsheet finalizado", "Uma mudança de rota de voo"], correct: 2, explanation: "LMC é uma atualização tardia no loadsheet JÁ FINALIZADO, sem refazer o documento. É permitido porque situações como no-show de passageiros ou troca de voo acontecem frequentemente." },
  { id: "l2", subject: "lmc", q: "Quem define as regras de como fazer um LMC?", options: ["ICAO diretamente", "O DECEA", "O fabricante da aeronave", "Cada companhia aérea"], correct: 3, explanation: "Cada companhia desenvolve sua política, submete ao regulador e, após aprovada, essa política é fiscalizada. Pode variar inclusive entre tipos de aeronave na mesma companhia." },
  { id: "l3", subject: "lmc", q: "Após um LMC, qual NÃO é uma condição obrigatória?", options: ["Notificar todos os passageiros", "CG dentro do envelope certificado", "TOW menor que MTOW calculado", "Combustível acima do mínimo requerido"], correct: 0, explanation: "Notificar passageiros NÃO é requisito. As condições são: TOW < MTOW, ZFW < MZFW, CG no envelope, limites de compartimento, e combustível acima do mínimo." },
  { id: "l4", subject: "lmc", q: "Quando a maioria das companhias exige loadsheet NOVO em vez de LMC?", options: ["Mudança > 3 PAX", "Alteração de combustível", "Qualquer mudança de carga", "Mudança de destino"], correct: 1, explanation: "Alterações de combustível são críticas para o CG. A maioria das companhias exige recálculo completo, embora algumas permitam LMC para pequenas quantidades." },
  { id: "l5", subject: "lmc", q: "Por que aeronave mais leve pode ter MAIS problema com LMC?", options: ["Aeronave leve consome mais combustível", "Aeronave leve precisa de pista maior", "Envelope mais restritivo em peso baixo", "Aeronave leve tem menos compartimentos"], correct: 2, explanation: "Muitas aeronaves têm envelopes MAIS restritivos em pesos baixos. A mesma carga movida afeta o CG proporcionalmente mais quando a aeronave é leve." },
  { id: "l6", subject: "lmc", q: "Se dangerous goods mudam de posição, o que fazer?", options: ["Apenas anotar no log de bordo", "Notificar ATC imediatamente", "Descarregar toda a carga", "Emendar NOTOC e entregar ao comandante"], correct: 3, explanation: "Deve-se verificar a segregação, emendar o NOTOC, entregar ao comandante (que confirma recebimento), e manter cópia acessível até a chegada." },
  { id: "f1", subject: "fuel", q: "RBAC 91.151 — VFR totalmente diurno: reserva de combustível?", options: ["20min", "30min", "45min", "60min"], correct: 1, explanation: "30min em cruzeiro normal (RBAC 91.151). Esse regulamento trata da aviação geral em VFR. Se qualquer trecho for noturno, sobe para 45min — ainda dentro do mesmo RBAC 91.151." },
  { id: "f2", subject: "fuel", q: "RBAC 121.645 — Jatos comerciais: contingência de combustível A→B?", options: ["5% calculado pelo tempo total de voo", "15 minutos de holding fixo", "10% do combustível total em massa", "45 minutos de cruzeiro econômico"], correct: 2, explanation: "10% da MASSA de combustível requerida de A→B (RBAC 121.645). Desde 2020, a ANAC mudou de '10% do tempo' para '10% da massa'. Pode ser 5% com sistema de monitoramento. Mínimo: 5min de holding sobre o destino." },
  { id: "f3", subject: "fuel", q: "FAR 121.639 — Doméstico (48 estados + DC): reserva de combustível?", options: ["30 minutos de holding no destino", "10% do tempo total entre pontos", "2 horas de cruzeiro econômico em LRC", "45 minutos pelo fuel flow pré-descida"], correct: 3, explanation: "45min calculados com base no fuel flow observado antes do top of descent (FAR Part 121.639). Diferente da ANAC que usa 30min de holding e da EASA que também usa 30min de holding." },
  { id: "f4", subject: "fuel", q: "EASA AMC1 CAT.OP.MPA.191 — Contingência para jatos?", options: ["5% do tempo A→B com mínimo de 5min", "10% do tempo de voo A→B", "45 minutos de cruzeiro", "10% do combustível total"], correct: 0, explanation: "EASA usa 5% do TEMPO de voo A→B (AMC1 CAT.OP.MPA.191), não do combustível como a ANAC. Mínimo: 5min de holding sobre o destino em condições padrão." },
  { id: "f5", subject: "fuel", q: "RBAC 121.645 — Sem alternativa: quanto de combustível extra?", options: ["45min cruzeiro", "2 horas cruzeiro", "1 hora cruzeiro", "30min holding"], correct: 1, explanation: "A→B + 2 horas em cruzeiro normal (RBAC 121.645). Só vale para voo INTERNACIONAL, tempo A→B < 6h, e condições meteorológicas específicas (teto e visibilidade)." },
  { id: "f6", subject: "fuel", q: "O que é MFOD (Minimum Fuel Over Destination)?", options: ["Combustível mínimo ao decolar", "Combustível máximo operacional", "Combustível mínimo ao chegar no destino", "Combustível mínimo no aeroporto alternativo"], correct: 2, explanation: "MFOD = combustível mínimo sobre o destino (B). Equivale ao combustível para ir de B→C (alternativa) mais 30min de holding sobre C. Nesse ponto, o piloto DEVE ter decidido onde pousar (B ou C). A partir daqui, qualquer consumo adicional elimina opções." },
  { id: "f7", subject: "fuel", q: "Quando declarar MAYDAY por combustível?", options: ["Quando restar exatamente 45 minutos", "Quando restar exatamente 15 minutos", "Quando restar exatamente 60 minutos", "Quando prever pouso com 30 min ou menos"], correct: 3, explanation: "Quando o piloto PREVÊ pouso com 30min ou menos. A palavra-chave é PREVER — não esperar chegar a 30min. Pousar com < 30min sem ter declarado MAYDAY gera problemas com as autoridades." },
  { id: "f8", subject: "fuel", q: "MINIMUM FUEL vs MAYDAY: qual a diferença?", options: ["MIN FUEL alerta, MAYDAY exige pouso urgente", "São conceitos equivalentes", "MIN FUEL é sempre mais grave", "MAYDAY só se usa para pane técnica"], correct: 0, explanation: "MINIMUM FUEL: a clearance atual permite pousar com pouco mais de 30min, mas qualquer atraso adicional forçará emergência. MAYDAY: piloto prevê pouso com 30min ou menos. A diferença é: um é aviso, o outro é emergência declarada." },
  { id: "f9", subject: "fuel", q: "FAR 121.639/645 — Sem alternativa (FAA): visibilidade mínima?", options: ["Mínima para operação VFR", "Visibilidade 3sm e teto 1.000ft por 1h", "Mínima exigida pela companhia", "Dependente do tipo de aeronave"], correct: 1, explanation: "FAA usa statute miles: ≥ 2mi acima do requerido pela IAP OU 3mi, o que for MAIOR (FAR 121.639/645). Já a ANAC usa km: ≥ 3km acima do requerido ou 5km." },
  { id: "f10", subject: "fuel", q: "RBAC 121.645 — Em 2020, o que mudou na contingência brasileira?", options: ["Mudou de 10% do tempo para 10% da massa", "Passou a exigir 45min de holding", "Mudou de 10% para 5% do tempo", "Nenhuma mudança foi aplicada"], correct: 0, explanation: "Antes de 2020: 10% do TEMPO de voo A→B (como a FAA internacional). Após 2020: 10% da MASSA de combustível A→B. Também passou a permitir 5% com fuel data monitoring. O autor questiona se a mudança foi intencional." },
  { id: "f11", subject: "fuel", q: "FAR 121.645 — Internacional: como é calculada a contingência?", options: ["10% da massa de combustível", "10% do TEMPO de voo A→B", "5% do tempo", "45min fixos"], correct: 1, explanation: "FAA internacional (FAR 121.645) usa 10% do TEMPO de voo A→B, calculado com fuel flow observado antes do top of descent. Diferente da ANAC que usa 10% da massa de combustível." },
  { id: "f12", subject: "fuel", q: "RBAC 91.167 — IFR aviação geral: reserva de combustível?", options: ["2h cruzeiro", "30min cruzeiro", "45min cruzeiro", "30min holding"], correct: 2, explanation: "45min em potência de cruzeiro normal (RBAC 91.167). Diferente do VFR diurno (30min, RBAC 91.151) e do VFR noturno (45min, RBAC 91.151)." },
  { id: "s1", subject: "speeds", q: "Qual velocidade de estol é medida por acelerômetro e qual a tolerância?", options: ["VS1G, com 0,05G", "VS, com 0,1G", "VSR, com 0,05G", "VMU, com 0,1G"], correct: 0, explanation: "VS1G é medida pelo acelerômetro sob o assento do piloto. A tolerância de 0,05G evita registros falsos por turbulência. VS depende da percepção subjetiva do piloto, por isso VS1G foi criada — para ser objetiva e reprodutível." },
  { id: "s2", subject: "speeds", q: "Qual a relação correta entre VS, VS1G e VSR?", options: ["VSR < VS1G < VS", "VS < VS1G ≤ VSR", "VS1G < VS < VSR", "VS = VS1G = VSR"], correct: 1, explanation: "VS < VS1G ≤ VSR. VS é a menor (percepção do piloto). VS1G é medida instrumentalmente quando o load factor cai de 1G. VSR é escolhida pelo fabricante (FAR Part 25) e deve ser ≥ VS1G. Na prática, fabricantes usam VSR = VS1G." },
  { id: "s3", subject: "speeds", q: "A margem mínima do stall warning em relação ao estol é:", options: ["3kt acima ou 3% acima do CAS, o maior", "7kt acima ou 7% acima do CAS, o maior", "5kt acima ou 5% acima do CAS, o maior", "10kt fixos para qualquer aeronave"], correct: 2, explanation: "5kt ou 5% CAS, o que for MAIOR. Ex.: se 5% da CAS = 7kt, o aviso deve ocorrer pelo menos 7kt antes do estol (não 5kt). Garante margem adequada em todas as faixas de velocidade." },
  { id: "s4", subject: "speeds", q: "Com qual posição de CG a VMU é testada e por quê?", options: ["AFT, pior para controle", "AFT, menor sustentação", "Neutro, padrão de teste", "FORWARD, mais difícil de rotacionar"], correct: 3, explanation: "CG FORWARD porque é a posição mais desfavorável para rotação — com CG à frente, o nariz é mais pesado e mais difícil de levantar. Também usa baixo empuxo para que a componente vertical do motor não ajude a descolar." },
  { id: "s5", subject: "speeds", q: "Na determinação da VMCG, qual a posição do CG e por quê?", options: ["AFT, pior para controle direcional", "Forward, pior para rotação", "Neutro, condição padrão", "Forward, mais estável"], correct: 0, explanation: "CG AFT porque é a posição mais desfavorável para controle DIRECIONAL. Com CG à ré, o braço do leme é menor, reduzindo sua eficácia. Note: VMU usa CG forward (rotação), mas VMCG usa CG aft (controle) — pergunta clássica de entrevista!" },
  { id: "s6", subject: "speeds", q: "Qual o desvio lateral máximo permitido da linha central ao demonstrar VMCG?", options: ["15ft", "30ft", "20ft", "50ft"], correct: 1, explanation: "30ft (≈ 9m) de desvio máximo da centerline durante a demonstração de VMCG. Compare com a VMCA, que permite 20° de desvio de heading (não lateral, mas angular)." },
  { id: "s7", subject: "speeds", q: "Se a temperatura aumenta, o que acontece com a VMCG?", options: ["Aumenta", "Não muda", "Diminui", "Depende do peso"], correct: 2, explanation: "VMCG DIMINUI. Mais temperatura → menos densidade → menos empuxo do motor restante → menos assimetria → menos velocidade necessária para controle. Mesmo raciocínio para aumento de altitude." },
  { id: "s8", subject: "speeds", q: "VMCA deve ser ≤ a quanto da VSR?", options: ["1.05 × VSR", "1.10 × VSR", "1.20 × VSR", "1.13 × VSR"], correct: 3, explanation: "VMCA ≤ 1.13 × VSR (FAR Part 25). Se a VMCA excedesse muito a velocidade de estol, seria impossível manter velocidade segura com motor inoperante. Em algumas aeronaves, VMCA é até menor que VS — nesse caso a demonstração em voo é impossível e ela é calculada." },
  { id: "s9", subject: "speeds", q: "Em um bimotor a jato com empuxos diferentes, qual é o motor crítico para VMCG?", options: ["O de menor empuxo", "O de maior empuxo", "Qualquer um", "O mais próximo da fuselagem"], correct: 0, explanation: "O de MENOR empuxo. Se ele falhar, sobra o de MAIOR empuxo — criando a MAIOR assimetria e exigindo mais velocidade para controle. Para SUBIDA, é o inverso: o crítico é o de maior empuxo (pior rate of climb sem ele)." },
  { id: "s10", subject: "speeds", q: "Qual motor é o crítico em um quadrimotor?", options: ["O motor mais próximo da raiz da asa", "O que está abaixo do centro de pressão", "O motor mais distante do eixo longitudinal", "O motor com menor braço de momento"], correct: 2, explanation: "Motores EXTERNOS. Maior braço de momento em relação ao eixo da aeronave → exige mais deflexão de leme → gera mais arrasto. Com empuxos iguais, qualquer motor externo é igualmente crítico. Vale para VMCG e subida." },
  { id: "s11", subject: "speeds", q: "Em bimotor a hélice com rotação no MESMO sentido, qual o motor crítico?", options: ["Direito", "Depende da altitude", "Não há motor crítico", "Esquerdo"], correct: 3, explanation: "O ESQUERDO é o crítico (hélices girando para o mesmo lado). A pá que desce tem maior AoA que a que sobe (P-factor), gerando empuxo assimétrico. Se o esquerdo falha, o yaw moment é pior. Com hélices CONTRA-ROTATIVAS, não há motor crítico." },
  { id: "s12", subject: "speeds", q: "Por que bimotores leves (FAR Part 23) não têm VMCG?", options: ["Só decolam com pistas sem contaminantes", "São aeronaves pequenas demais", "Leme é suficiente para controle em baixa velocidade", "Regulamentação FAR 23 é mais permissiva"], correct: 0, explanation: "Nesses aviões, falha de motor na decolagem = ABORTAR, mesmo já no ar com trem baixo. Não há exigência de continuar mono-motor no solo, então VMCG é desnecessária. A linha vermelha no ASI mostra VMCA, não VMCG." },
  { id: "s13", subject: "speeds", q: "A regulamentação exige que o piloto possua habilidades excepcionais para demonstrar VMCG/VMCA?", options: ["Sim, é exigida formação de piloto de teste", "Não, são habilidades de piloto operacional", "Habilidades intermediárias entre as duas", "Habilidades excepcionais somente para a VMCA"], correct: 1, explanation: "NÃO. A regulamentação exige explicitamente que o piloto não necessite de habilidades excepcionais para manter controle. As velocidades devem ser alcançáveis por qualquer piloto qualificado." },
  { id: "s14", subject: "speeds", q: "Qual o bank máximo permitido na demonstração de VMCA?", options: ["0° (asas niveladas)", "3° para o motor inop.", "5° para o lado do motor operativo", "10° para qualquer lado"], correct: 2, explanation: "Até 5° de bancada para o lado OPOSTO ao motor inoperante (ou seja, para o lado do motor que está funcionando). Isso ajuda a controlar o yaw. Na VMCG, as asas ficam niveladas (no solo)." },
  { id: "s15", subject: "speeds", q: "V1 é corretamente chamada de velocidade de:", options: ["Decisão", "Controle", "Rotação", "Ação"], correct: 3, explanation: "AÇÃO, não decisão. Em V1 o piloto já deve ter EXECUTADO a primeira ação de parada (manetes, freios, speedbrakes). O termo 'decision speed' é um misnomer clássico — não há tempo para decidir, o reconhecimento e reação levam 1 segundo (a falha ocorre em VEF, 1s antes)." },
  { id: "s16", subject: "speeds", q: "VEF ocorre quanto tempo antes de V1?", options: ["1 segundo", "0,5 segundo", "2 segundos", "3 segundos"], correct: 0, explanation: "1 segundo. Testes demonstraram que o piloto leva ~1s para reconhecer a falha e reagir. VEF é a velocidade máxima em que o motor PODE falhar e o piloto ainda conseguir rejeitar antes de V1. Não confunda com a velocidade em que o motor realmente falhou em um evento." },
  { id: "s17", subject: "speeds", q: "Qual é o limite INFERIOR de V1?", options: ["Não há limite inferior regulamentado", "A maior entre V1MCG e VMCG mais 1 segundo", "Exatamente a VR menos 5 nós da pista", "Igual à VMU certificada para o peso"], correct: 1, explanation: "V1(MCG), que é a velocidade 1 segundo APÓS VMCG. O regulador definiu VMCG como VEF mínimo (não V1 mínimo) para eliminar o 'limbo'. Se VMCG fosse o V1 mínimo, uma falha entre VMCG e V1 não teria solução (não poderia continuar nem parar)." },
  { id: "s18", subject: "speeds", q: "Qual é o limite SUPERIOR de V1?", options: ["A velocidade VR de rotação", "A velocidade VMBE de freios", "O menor entre VR e VMBE", "O maior entre VR e VMBE"], correct: 2, explanation: "V1 ≤ VR (não pode rejeitar após iniciar rotação) E V1 ≤ VMBE (freios devem suportar a energia). O limite superior é o MENOR dos dois. Fórmula completa: V1(MCG) ≤ V1 ≤ min(VR, VMBE)." },
  { id: "s19", subject: "speeds", q: "O que é VMBE e por que garante integridade por 5 minutos?", options: ["Vel. máxima de freio; 5min para resfriar", "Vel. de brake release; 5min de segurança", "Vel. mínima de freio; 5min de taxi", "Vel. máxima de freio; 5min para bombeiros chegarem"], correct: 3, explanation: "VMBE = Maximum Brake Energy Speed. Os 5 minutos são o tempo estimado para chegada dos bombeiros após uma RTO em alta velocidade. Os freios devem absorver toda a energia cinética sem comprometer a estrutura nesse período. Pequenas chamas são esperadas e aceitáveis." },
  { id: "s20", subject: "speeds", q: "Motor falha a 97kt. VMCG=100kt, V1=100kt. O que fazer?", options: ["Situação impossível na prática", "Rejeitar imediatamente", "Continuar a decolagem", "Declarar emergência e parar"], correct: 0, explanation: "LIMBO! Não pode continuar (97kt < VMCG = sem controle) nem parar (97kt + 1s reação → ação acima de V1). Essa situação NÃO ocorre na prática porque V1(MCG) = VMCG + 1s, ou seja, V1 mínimo real seria 105kt (não 100kt), eliminando a faixa de limbo." },
  { id: "s21", subject: "speeds", q: "Quantas V1 podem existir para uma mesma decolagem?", options: ["Duas (Go e Stop)", "Apenas uma", "Depende da companhia", "Três (MCG, operacional, VR)"], correct: 1, explanation: "Apenas UMA. Embora V1 represente simultaneamente uma velocidade máxima (para parar na ASDA) e mínima (para continuar na TODA), a regulamentação exige uma V1 ÚNICA para cada decolagem." },
  { id: "s22", subject: "speeds", q: "V1 como máximo se refere a parar dentro de qual distância?", options: ["TORA", "TODA", "ASDA", "LDA"], correct: 2, explanation: "ASDA (Accelerate-Stop Distance Available). V1 máximo garante que se o piloto agir em V1, a aeronave para dentro da ASDA. V1 como mínimo se refere a continuar e atingir a altura requerida dentro da TODA (Takeoff Distance Available)." },
  { id: "s23", subject: "speeds", q: "VR deve ser ≥ a quanto da VMCA?", options: ["1.00 VMCA", "1.13 VMCA", "1.10 VMCA", "1.05 VMCA"], correct: 3, explanation: "VR ≥ 1.05 × VMCA (105%). A margem de 5% garante que ao iniciar a rotação o piloto já está confortavelmente acima da velocidade mínima de controle no ar, mesmo com motor crítico inoperante." },
  { id: "s24", subject: "speeds", q: "Qual a taxa de rotação prevista em VR com motor falhado?", options: ["2 a 3°/s", "1 a 2°/s", "3 a 5°/s", "5 a 7°/s"], correct: 0, explanation: "2 a 3° por segundo. Essa taxa permite atingir V2 a 35ft acima da pista. Se nenhum motor falha, a mesma VR é usada, mas a velocidade a 35ft será 10-25kt acima de V2 (mais aceleração disponível)." },
