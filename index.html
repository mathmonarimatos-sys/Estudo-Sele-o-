<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Runway Study — Seleção de Linha Aérea</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light only}
html{background:#f8fafc;color:#0f172a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh;overflow-x:hidden}
#root{min-height:100vh;display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:600px;margin:0 auto;width:100%;background:#f8fafc}
.header{padding:18px 20px 8px;background:#0f172a;color:#fff}
.title{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.subtitle{font-size:12px;color:#94a3b8;margin-top:2px;font-weight:500}
.sub-selector{position:relative;padding:14px 20px;background:#fff;border-bottom:1px solid rgba(15,23,42,.06);z-index:50}
.materia-tabs{display:flex;gap:8px;padding:12px 20px 0;background:#fff}
.materia-tab{flex:1;min-height:40px;padding:10px 8px;border:2px solid rgba(15,23,42,.08);border-radius:12px;background:#fff;color:#475569;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}
.materia-tab.active{border-color:#4338ca;background:#eef2ff;color:#4338ca}
.materia-tab:active{transform:scale(0.98)}
.sub-trigger{width:100%;padding:14px 16px;background:#fff;color:#0f172a;border:2px solid rgba(15,23,42,.08);border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:inherit}
.sub-trigger:active{transform:scale(0.98)}
.sub-trigger-text{display:flex;align-items:center;gap:10px}
.sub-trigger-icon{font-size:20px}
.sub-trigger-chevron{font-size:12px;color:#64748b}
.sub-menu{position:absolute;top:100%;left:20px;right:20px;background:#fff;border:2px solid rgba(15,23,42,.08);border-top:none;border-radius:0 0 12px 12px;max-height:400px;overflow-y:auto;box-shadow:0 10px 25px rgba(0,0,0,.1);z-index:60}
.sub-option{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid rgba(15,23,42,.04);color:#334155;font-size:14px;font-weight:500;background:#fff;justify-content:space-between}
.sub-option:last-child{border-bottom:none}
.sub-option:active{background:rgba(99,102,241,.06)}
.sub-option.active{background:rgba(99,102,241,.08);color:#4338ca;font-weight:600}
.sub-option-left{display:flex;align-items:center;gap:10px}
.sub-option-badge{background:#4338ca;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.sub-group-label{padding:10px 16px 6px;color:#64748b;background:#f8fafc;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid rgba(15,23,42,.04)}
.sub-backdrop{position:fixed;inset:0;z-index:40;background:transparent}
.tabs{display:flex;background:#fff;padding:0 20px;border-bottom:1px solid rgba(15,23,42,.06)}
.tab{flex:1;padding:14px 8px;background:none;border:none;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{color:#4338ca;border-bottom-color:#4338ca}
.content{flex:1;padding:20px;background:#f8fafc;overflow-y:auto}
.card-wrap{position:relative}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav-arrow{width:42px;height:42px;border-radius:12px;background:#fff;color:#334155;border:2px solid rgba(15,23,42,.08);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;font-family:inherit;font-weight:600}
.nav-arrow:disabled{opacity:0.3;cursor:not-allowed}
.nav-counter{color:#64748b;font-size:13px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:8px;border:1.5px dashed transparent;transition:border-color 0.15s}
.nav-counter:hover,.nav-counter:active{border-color:#a5b4fc;background:#f5f3ff}
.nav-input{width:90px;text-align:center;font-size:13px;font-weight:700;padding:4px 8px;border:2px solid #4338ca;border-radius:8px;font-family:inherit;color:#4338ca;background:#eef2ff;outline:none}
.card{background:#fff;color:#0f172a;border-radius:20px;padding:30px 24px;min-height:280px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.06);transition:transform 0.3s;position:relative;-webkit-user-select:none;-moz-user-select:none;user-select:none;touch-action:manipulation;-webkit-touch-callout:none}
.card:active{transform:scale(0.99)}
.card.flipped{background:linear-gradient(135deg,#0f172a,#1e293b);color:#f1f5f9}
.card .cat{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px}
.card.flipped .cat{color:#94a3b8}
.card .emoji{font-size:36px;margin-bottom:16px}
.card .text{font-size:17px;font-weight:500;text-align:center;line-height:1.5;color:inherit}
.card .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;margin-top:18px}
.actions{display:flex;gap:10px;margin-top:14px}
.action-btn{flex:1;padding:16px 8px;border-radius:14px;font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;-webkit-tap-highlight-color:rgba(255,255,255,0.3);box-shadow:0 3px 10px rgba(0,0,0,0.08)}
.action-btn:active{transform:scale(0.97)}
.action-known{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.action-review{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff}
.flip-btn{width:100%;background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff;border:none;border-radius:14px;padding:14px 18px;margin-top:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation;-webkit-tap-highlight-color:rgba(255,255,255,0.3);box-shadow:0 4px 12px rgba(99,102,241,.25)}
.flip-btn:active{transform:scale(0.98)}
.action-btn{flex:1;padding:14px 8px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.action-known{background:#10b981;color:#fff}
.action-review{background:#f59e0b;color:#fff}
.quiz-q{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:22px;color:#0f172a;background:transparent}
.opt-btn{width:100%;background:#fff;color:#1e293b;border:2px solid rgba(15,23,42,.08);border-radius:14px;padding:16px 18px;margin-bottom:10px;text-align:left;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:12px;font-family:inherit;line-height:1.5}
.opt-btn.correct{background:#ecfdf5;color:#065f46;border-color:#10b981}
.opt-btn.wrong{background:#fef2f2;color:#991b1b;border-color:#ef4444}
.opt-btn.dim{background:#f8fafc;color:#94a3b8}
.opt-circle{width:28px;height:28px;border-radius:50%;background:rgba(15,23,42,.06);color:#64748b;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.opt-circle.green{background:#10b981;color:#fff}
.opt-circle.red{background:#ef4444;color:#fff}
.expl{background:#fff;color:#334155;border-radius:14px;padding:18px;margin-top:14px;font-size:14px;line-height:1.6;border:2px solid rgba(15,23,42,.06)}
.expl.ok{background:#ecfdf5;border-color:#10b981}
.expl.nok{background:#fef2f2;border-color:#ef4444}
.expl-title{font-weight:700;margin-bottom:6px;font-size:13px;text-transform:uppercase;letter-spacing:0.05em}
.ref-card{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ref-header{font-size:16px;font-weight:700;color:#0f172a;margin-bottom:14px;background:rgba(15,23,42,.03);padding:10px 14px;border-radius:10px;display:flex;align-items:center;gap:8px}
.ref-row{display:flex;padding:8px 0;border-bottom:1px solid rgba(15,23,42,.05);color:#334155;font-size:13px;line-height:1.5}
.ref-row:last-child{border-bottom:none}
.ref-label{flex:0 0 38%;color:#64748b;font-weight:600;padding-right:10px}
.ref-value{flex:1;color:#0f172a}
.stats{color:#64748b;font-size:12px;font-weight:600;margin-top:14px;text-align:center}
.bottom-bar{position:sticky;bottom:0;background:#fff;padding:12px 20px;border-top:1px solid rgba(15,23,42,.06);display:flex;gap:8px;align-items:center}
.btn-primary{flex:1;background:#0f172a;color:#fff;padding:14px 18px;border:none;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
.btn-primary:active{transform:scale(0.98)}
.btn-secondary{background:rgba(15,23,42,.05);color:#334155;padding:10px 16px;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.done-box{background:linear-gradient(135deg,#ecfdf5,#f0fdf4);color:#0f172a;padding:30px 20px;border-radius:20px;text-align:center;margin:20px 0}
.done-box h2{font-size:22px;font-weight:800;margin-bottom:8px}
.done-box p{color:#475569;font-size:14px;margin-bottom:16px}
.reset-btn{background:#fef2f2;color:#991b1b;padding:10px 16px;border:1px solid #fecaca;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;margin-top:10px}
.reset-confirm{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:10px}
.reset-confirm span{font-size:13px;color:#64748b;font-weight:600}
.reset-yes{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;touch-action:manipulation}
.reset-no{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;touch-action:manipulation}
.filter-bar{display:flex;gap:6px;margin-bottom:12px}
.filter-btn{flex:1;padding:8px 4px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;color:#64748b;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;touch-action:manipulation}
.filter-btn:active{transform:scale(0.97)}
.filter-btn.active{border-color:#4338ca;background:#eef2ff;color:#4338ca}
.filter-btn.active-review{border-color:#d97706;background:#fffbeb;color:#d97706}
.filter-btn.active-known{border-color:#059669;background:#f0fdf4;color:#059669}
.filter-count{font-size:11px;font-weight:700;opacity:0.8}
/* FORCE LIGHT MODE — override navigator dark mode */
@media (prefers-color-scheme: dark){
  html,body{background:#f8fafc !important;color:#0f172a !important}
  .content{background:#f8fafc !important}
  .quiz-q{color:#0f172a !important;background:transparent !important}
  .opt-btn{background:#fff !important;color:#1e293b !important;border:2px solid rgba(15,23,42,.08) !important}
  .opt-btn.correct{background:#ecfdf5 !important;color:#065f46 !important;border-color:#10b981 !important}

  .opt-circle.green{background:#10b981 !important;color:#fff !important}
  .opt-circle.red{background:#ef4444 !important;color:#fff !important}

  .expl.ok{background:#ecfdf5 !important}
  .expl.nok{background:#fef2f2 !important}
  .card{background:#fff !important;color:#0f172a !important}
  .card.flipped{background:linear-gradient(135deg,#0f172a,#1e293b) !important;color:#f1f5f9 !important}
  .ref-card{background:#fff !important}
  .ref-header{color:#0f172a !important;background:rgba(15,23,42,.03) !important}
  .ref-row{color:#334155 !important}
  .ref-label{color:#64748b !important}
  .ref-value{color:#0f172a !important}
  .materia-tabs{background:#fff !important}
  .materia-tab{background:#fff !important;color:#475569 !important;border-color:rgba(15,23,42,.08) !important}
  .materia-tab.active{background:#eef2ff !important;color:#4338ca !important;border-color:#4338ca !important}
  .sub-trigger{background:#fff !important;color:#0f172a !important}
  .sub-menu{background:#fff !important}
  .sub-option{color:#334155 !important;background:#fff !important}
  .sub-option.active{background:rgba(99,102,241,.08) !important;color:#4338ca !important}
  .tabs{background:#fff !important}

</style>

<script>

  { key: "all", label: "Tudo", icon: "📚" },
  { key: "performance", label: "Performance", icon: "✈️" },

];
const SUBJECTS=[
  { key: "all", label: "Todos os assuntos", icon: "📚", materia: "all" },
  { key: "marks", label: "Marcações & Luzes", icon: "🛬", materia: "performance" },
  { key: "atm", label: "Atmosfera & Altitudes", icon: "🌡️", materia: "performance" },
  { key: "spd", label: "Tipos de Velocidade", icon: "📊", materia: "performance" },
  { key: "aero", label: "Aerodinâmica & MAC", icon: "✈️", materia: "performance" },
  { key: "desc", label: "Descida & TOD", icon: "📉", materia: "performance" },
  { key: "lmc", label: "LMC", icon: "📋", materia: "performance" },

  { key: "speeds", label: "Velocidades", icon: "⚡", materia: "performance" },
  { key: "dist", label: "Distâncias de Pista", icon: "📏", materia: "performance" },
  { key: "obs", label: "Obstáculos & Subida", icon: "🏔️", materia: "performance" },
  { key: "eng", label: "Motores & Empuxo", icon: "🔧", materia: "performance" },
  { key: "contam", label: "Pista Contaminada", icon: "❄️", materia: "performance" },
  { key: "cruise", label: "Cruzeiro", icon: "✈️", materia: "performance" },
  { key: "ci", label: "Cost Index", icon: "💲", materia: "performance" },
  { key: "drift", label: "Falha em Cruzeiro", icon: "🆘", materia: "performance" },
  { key: "land", label: "Pouso & VREF", icon: "🛬", materia: "performance" },
  { key: "etops", label: "ETOPS / EDTO", icon: "🌊", materia: "performance" },
  { key: "cold", label: "Operação a Frio", icon: "🥶", materia: "performance" },
  { key: "misc", label: "Diversos (PCN, MEL)", icon: "📚", materia: "performance" },
  { key: "weights", label: "Pesos Operacionais", icon: "⚖️", materia: "performance" },
  { key: "fuelplan", label: "Planejamento Fuel", icon: "🛢️", materia: "performance" },
  { key: "met_validade", label: "Validades", icon: "⏱️", materia: "meteo" },
  { key: "met_metar", label: "METAR / SPECI", icon: "📄", materia: "meteo" },
  { key: "met_taf", label: "TAF", icon: "🔁", materia: "meteo" },
  { key: "met_warnings", label: "Avisos", icon: "🚨", materia: "meteo" },
  { key: "met_sigmet", label: "SIGMET / AIRMET", icon: "⛈️", materia: "meteo" },
  { key: "met_gamet", label: "GAMET", icon: "🗺️", materia: "meteo" },
  { key: "met_charts", label: "SIGWX / WIND", icon: "🌬️", materia: "meteo" },
  { key: "met_airep", label: "AIREP", icon: "✈️", materia: "meteo" },
];
const CARDS=[
  { id: 1, subject: "marks", q: "Qual é o comprimento da TDZ quando a LDA ≥ 2.400m?", a: "900m (3.000ft) a partir do início da LDA.", emoji: "📏" },
  { id: 2, subject: "marks", q: "Onde fica o Aiming Point segundo a ICAO para pistas ≥ 2.400m?", a: "A 400m (1.312ft) do threshold — e NÃO a 1.000ft como no padrão FAA.", emoji: "🎯" },
  { id: 3, subject: "marks", q: "Quando o Aiming Point fica a 1.000ft do threshold pela ICAO?", a: "Quando a LDA é maior que 1.200m e menor que 2.400m.", emoji: "🎯" },
  { id: 4, subject: "marks", q: "Qual a diferença ICAO vs FAA na posição do Aiming Point?", a: "FAA: sempre 1.000ft. ICAO: 400m para pistas ≥ 2.400m; 1.000ft para pistas entre 1.200m e 2.400m.", emoji: "🌍" },
  { id: 5, subject: "marks", q: "Até onde vão as TDZL (Touchdown Zone Lights)?", a: "Até 900m do início da LDA. Exceção: pistas < 1.800m → até metade do comprimento.", emoji: "💡" },
  { id: 6, subject: "marks", q: "Quantas luzes brancas tem cada conjunto lateral do TDZL?", a: "3 de cada lado (4 se a pista tiver 60m de largura).", emoji: "💡" },
  { id: 7, subject: "marks", q: "Pista LDA 2.100m: TDZ pintada vs TDZL?", a: "TDZ pintada: 600m. TDZL: 900m. Piloto pode ser induzido a erro à noite.", emoji: "⚠️" },
  { id: 8, subject: "marks", q: "Pista LDA 1.500m: até onde vão as TDZL?", a: "750m (metade da pista, pois < 1.800m).", emoji: "💡" },
  { id: 9, subject: "marks", q: "Quando as Runway Edge Lights (RL) mudam para âmbar?", a: "Nos últimos 600m de pista.", emoji: "🟡" },
  { id: 10, subject: "marks", q: "Como se comportam as RCL nos últimos 900m?", a: "900m→300m: alternando vermelho/branco. Últimos 300m: todas vermelhas.", emoji: "🔴" },
  { id: 11, subject: "marks", q: "Espaçamento das Runway Edge Lights?", a: "Entre 30 e 60 metros entre si.", emoji: "🛬" },
  { id: 12, subject: "marks", q: "Onde estão as recomendações ICAO para pintura de pista?", a: "No Anexo 14 da ICAO.", emoji: "📖" },
  { id: 13, subject: "marks", q: "País é obrigado a seguir o padrão ICAO?", a: "Não, mas deve publicar as diferenças.", emoji: "📖" },
  { id: 14, subject: "marks", q: "Existe marcação de pista específica para DECOLAGEM?", a: "Não. Exceto os números (identificação), todas as marcações servem para o pouso.", emoji: "✈️" },
  { id: 20, subject: "lmc", q: "O que é um LMC (Last Minute Change)?", a: "É uma atualização tardia em um loadsheet já finalizado, sem precisar refazer o documento principal ou gerar um novo.", emoji: "📋" },
  { id: 21, subject: "lmc", q: "Existe regulamentação definindo COMO fazer um LMC?", a: "Não. Cada companhia desenvolve sua própria política, submete ao regulador para aprovação, e depois essa política é fiscalizada.", emoji: "📋" },
  { id: 22, subject: "lmc", q: "Quais são as 5 condições que devem ser garantidas após um LMC?", a: "1) TOW < MTOW. 2) ZFW < MZFW. 3) CG dentro do envelope. 4) Limites de compartimento (peso/volume) respeitados. 5) Combustível não reduzido abaixo do mínimo.", emoji: "✅" },
  { id: 23, subject: "lmc", q: "Quando a maioria das companhias exige um novo loadsheet em vez de LMC?", a: "Quando há alterações em quantidade ou posição de combustível, pela criticidade do impacto no CG.", emoji: "⛽" },
  { id: 24, subject: "lmc", q: "Quais são as 6 informações mínimas de um LMC?", a: "1) Carga alterada. 2) Peso da carga. 3) Localização atual. 4) Natureza da mudança (+/-). 5) Nova localização (se a bordo). 6) Peso total e variação de índice.", emoji: "📝" },
  { id: 25, subject: "lmc", q: "O que deve ser feito com o NOTOC em caso de mudança de posição de dangerous goods?", a: "Verificar segregação, emendar o NOTOC e entregá-lo ao comandante antes da partida. O comandante deve confirmar recebimento.", emoji: "☢️" },
  { id: 26, subject: "lmc", q: "Por que uma aeronave mais leve pode ter problemas maiores com LMC?", a: "Porque muitas aeronaves têm envelopes de voo MAIS restritivos em pesos baixos. Uma mesma carga afeta o CG proporcionalmente mais.", emoji: "⚖️" },
  { id: 27, subject: "lmc", q: "Quem pode fazer cálculos de LMC?", a: "Somente pessoal devidamente treinado, com dados de peso e índice disponíveis, que entenda a condição de W&B antes e depois da mudança.", emoji: "👨‍✈️" },
  { id: 28, subject: "lmc", q: "Por que operadores pedem trim significativamente AFT?", a: "Para melhor eficiência de combustível. Isso reduz as margens disponíveis para LMC.", emoji: "📐" },
  { id: 30, subject: "fuel", q: "RBAC 91.151 — VFR diurno (aviação geral): combustível mínimo na soltura de freios?", a: "Combustível de A até B + 30min em potência de cruzeiro normal. (RBAC 91.151)", emoji: "☀️" },
  { id: 31, subject: "fuel", q: "RBAC 91.151 — VFR com trecho noturno: qual a diferença na reserva?", a: "A reserva sobe de 30min para 45min. (Ainda RBAC 91.151 — qualquer trecho fora do período diurno)", emoji: "🌙" },
  { id: 32, subject: "fuel", q: "RBAC 91.167 — IFR (aviação geral): combustível mínimo?", a: "A→B + arremetida em B + desvio para C + 45min em cruzeiro normal. (RBAC 91.167)", emoji: "🧭" },
  { id: 33, subject: "fuel", q: "RBAC 121.645 — Jatos/turboélices comerciais: combustível mínimo?", a: "A→B + arremetida + B→C + contingência 10% do combustível (massa) A→B + 30min de holding a 1.500ft sobre C. (RBAC 121.645)", emoji: "✈️" },
  { id: 34, subject: "fuel", q: "RBAC 121.645 — Quando a contingência pode ser 5% em vez de 10%?", a: "Quando o operador tem sistema de monitoramento de dados de combustível (fuel data monitoring). Mínimo em qualquer caso: 5min de holding sobre o destino. (RBAC 121.645)", emoji: "📊" },
  { id: 35, subject: "fuel", q: "FAR 121.639 — Doméstico (48 estados + DC): combustível mínimo?", a: "A→B + arremetida + B→C (se alternativa requerida) + 45min baseado no fuel flow observado antes do top of descent. (FAR Part 121.639)", emoji: "🇺🇸" },
  { id: 36, subject: "fuel", q: "FAR 121.645 — Internacional (ou fora dos 48 estados): combustível mínimo?", a: "A→B + arremetida + B→C + 10% do TEMPO de voo A→B (fuel flow antes do TOD) + 30min de holding a 1.500ft sobre C. (FAR Part 121.645)", emoji: "🌎" },
  { id: 37, subject: "fuel", q: "EASA AMC1 CAT.OP.MPA.191 — Jatos: combustível mínimo?", a: "A→B + arremetida + B→C + 5% do TEMPO A→B (mín. 5min de holding sobre destino) + 30min de holding a 1.500ft sobre C. (AMC1 CAT.OP.MPA.191)", emoji: "🇪🇺" },
  { id: 38, subject: "fuel", q: "RBAC 121.645 — Quando pode despachar SEM alternativa?", a: "Voo internacional, tempo A→B < 6h, teto ≥ 1.500ft acima da MDA ou 2.000ft acima da elevação (o maior), visibilidade ≥ 3km acima do requerido ou 5km (o maior). Janela: 1h antes a 1h depois do ETA.", emoji: "🏝️" },
  { id: 39, subject: "fuel", q: "Sem alternativa (ANAC/FAA): quanto combustível na soltura de freios?", a: "Combustível de A→B + 2 horas em cruzeiro normal. (RBAC 121.645 / FAR 121.645)", emoji: "⏱️" },
  { id: 40, subject: "fuel", q: "O que é MFOD (Minimum Fuel Over Destination)?", a: "Quando o piloto tem combustível apenas para B→C + 30min de holding sobre C. Nesse ponto DEVE ter comprometido pouso em B ou em C.", emoji: "⚠️" },
  { id: 42, subject: "fuel", q: "Quando declarar MINIMUM FUEL ao ATC?", a: "Quando a clearance atual permite pousar com pouco mais de 30min, mas qualquer atraso adicional forçará declaração de emergência.", emoji: "🟡" },
  { id: 44, subject: "fuel", q: "O que deve ser considerado no planejamento de combustível em TODAS as regulamentações?", a: "Start/taxi/APU, MEL/CDL, peso real de decolagem, procedimentos ATC, atrasos previstos, meteorologia (vento, temp., turbulência), rota completa (SID, AWY, STAR, IAP).", emoji: "📝" },
  { id: 45, subject: "fuel", q: "FAR 121.639/645 — Sem alternativa (FAA): requisitos meteorológicos?", a: "Tempo A→B < 6h, teto ≥ 1.500ft acima MDA ou 2.000ft acima elevação, visibilidade ≥ 2 statute miles acima do requerido ou 3 statute miles. Janela: 1h antes a 1h depois do ETA.", emoji: "🇺🇸" },
  { id: 46, subject: "fuel", q: "Qual a diferença entre ANAC e FAA na contingência de combustível?", a: "ANAC (RBAC 121.645): 10% da MASSA de combustível A→B. FAA (FAR 121.645): 10% do TEMPO de voo A→B calculado no fuel flow antes do TOD. EASA: 5% do tempo.", emoji: "🔄" },
  { id: 47, subject: "fuel", q: "RBAC 121.645 — Em 2020, o que mudou na contingência brasileira?", a: "Mudou de '10% do tempo de voo A→B' para '10% da massa de combustível A→B'. Também passou a permitir 5% com sistema de monitoramento.", emoji: "📅" },
  { id: 50, subject: "speeds", q: "Qual a diferença entre VS (Stall Speed) e VS1G?", a: "VS depende da percepção do piloto (subjetiva). VS1G é medida por acelerômetro sob o assento — registra a velocidade quando o fator de carga cai abaixo de 1G (objetivo e reprodutível).", emoji: "📉" },
  { id: 51, subject: "speeds", q: "Qual a tolerância usada no acelerômetro durante ensaios de VS1G e por quê?", a: "0,05G de tolerância. Evita registros falsos por pequenas turbulências. Por definição, VS1G é a velocidade quando o load factor ainda é 1G.", emoji: "📏" },
  { id: 52, subject: "speeds", q: "Qual a relação entre VS, VS1G e VSR?", a: "VS < VS1G ≤ VSR. A VSR (Reference Stall Speed) é definida pelo fabricante conforme FAR Part 25 e deve ser ≥ VS1G.", emoji: "📐" },
  { id: 53, subject: "speeds", q: "O que é VSR e quem a define? (FAR Part 25)", a: "VSR (Reference Stall Speed) é a velocidade de referência de estol escolhida pelo fabricante para cálculos de performance. Deve ser ≥ VS1G. Na prática, fabricantes usam VSR = VS1G.", emoji: "📖" },
  { id: 54, subject: "speeds", q: "Qual a margem mínima exigida para o stall warning em relação ao estol?", a: "O aviso deve ocorrer pelo menos 5kt OU 5% da CAS acima da velocidade de estol — o que for MAIOR.", emoji: "🔔" },
  { id: 55, subject: "speeds", q: "O que é VMU (Minimum Unstick Speed)?", a: "É a menor velocidade em que a aeronave consegue sair do solo. Testada com CG na posição mais DIANTEIRA (forward) e com baixo empuxo para minimizar o efeito de sustentação do motor.", emoji: "🛫" },
  { id: 56, subject: "speeds", q: "Por que a VMU é testada com CG forward e baixo empuxo?", a: "CG forward é a posição mais desfavorável para rotação (mais difícil levantar o nariz). Baixo empuxo evita que a componente vertical do empuxo ajude a aeronave a descolar.", emoji: "⚖️" },
  { id: 57, subject: "speeds", q: "Qual acidente motivou a criação da VMU?", a: "Um DeHavilland Comet (G-ALYZ) em Roma-Ciampino nos anos 1950. O piloto rotou cedo demais, tocou a cauda no solo, e a aeronave não conseguiu acelerar nem descolar naquela atitude.", emoji: "✈️" },
  { id: 58, subject: "speeds", q: "O que é VMCG e qual sua definição?", a: "Minimum Control Speed on the Ground: menor velocidade em que o piloto consegue controlar a aeronave NO SOLO usando apenas superfícies aerodinâmicas, após falha súbita do motor crítico.", emoji: "🛞" },
  { id: 59, subject: "speeds", q: "Quais são as 5 condições para determinação da VMCG?", a: "1) CG na posição mais AFT. 2) Motor(es) operativo(s) em empuxo máximo de decolagem. 3) Peso máximo de decolagem. 4) SEM efeito de vento. 5) Desvio máximo de 30ft da linha central.", emoji: "📋" },
  { id: 60, subject: "speeds", q: "O que acontece com a VMCG quando a altitude aumenta?", a: "VMCG DIMINUI. Maior altitude → menor densidade → menor empuxo → menor assimetria de empuxo → menos velocidade necessária para controle.", emoji: "🏔️" },
  { id: 61, subject: "speeds", q: "O que acontece com a VMCG quando a temperatura aumenta?", a: "VMCG DIMINUI. Maior temperatura → menor densidade → menor empuxo → menor assimetria → menor VMCG. Mesma lógica da altitude.", emoji: "🌡️" },
  { id: 62, subject: "speeds", q: "O que é VMCA e quais as diferenças em relação à VMCG?", a: "Minimum Control Speed in the Air. Diferenças: bancada de até 5° para o lado do motor operativo, desvio máximo de 20° do heading inicial (não 30ft), sem efeito solo, e VMCA ≤ 1.13 × VSR.", emoji: "🌤️" },
  { id: 63, subject: "speeds", q: "Por que em algumas aeronaves a VMCA não pode ser demonstrada em voo?", a: "Porque nessas aeronaves a VMCA é INFERIOR à velocidade de estol (VS). O piloto mantém controle até o avião estolar — não há como voar abaixo do estol para demonstrar. Nesses casos, VMCA é estabelecida por CÁLCULO.", emoji: "✈️" },
  { id: 64, subject: "speeds", q: "O que é Motor Crítico?", a: "É o motor cuja falha deixa a aeronave na condição MAIS desfavorável. Pode ser diferente dependendo do que está sendo avaliado (controle vs. subida).", emoji: "🔧" },
  { id: 65, subject: "speeds", q: "Em um bimotor a jato com empuxos diferentes, qual é o motor crítico para VMCG?", a: "O de MENOR empuxo. Porque se ele falhar, o motor de MAIOR empuxo (o que sobra) criará a maior assimetria, exigindo maior velocidade de controle.", emoji: "🔧" },
  { id: 66, subject: "speeds", q: "Em um bimotor a jato com empuxos diferentes, qual o motor crítico para SUBIDA?", a: "O de MAIOR empuxo. Porque se ele falhar, restará o motor com MENOR empuxo, resultando na pior razão de subida.", emoji: "📈" },
  { id: 67, subject: "speeds", q: "Em um quadrimotor, qual é o motor crítico e por quê?", a: "Qualquer motor EXTERNO. Se falhar, o braço de momento em relação ao eixo da aeronave é maior, exige mais deflexão de leme, gera mais arrasto. Vale para VMCG e subida (considerando empuxos iguais).", emoji: "✈️" },
  { id: 68, subject: "speeds", q: "O que é P-factor em motores a hélice e como afeta o motor crítico?", a: "A pá que desce tem maior ângulo de ataque que a que sobe (motor inclinado). Isso cria empuxo assimétrico. Em hélices girando no mesmo sentido, o motor esquerdo é o crítico. Com contra-rotação, não há motor crítico.", emoji: "🔄" },
  { id: 69, subject: "speeds", q: "A regulamentação exige habilidade excepcional do piloto para demonstrar VMCG/VMCA?", a: "NÃO. A regulação exige que o piloto NÃO necessite de habilidades excepcionais para manter o controle da aeronave.", emoji: "👨‍✈️" },
  { id: 70, subject: "speeds", q: "Qual o limite máximo que a VMCA deve respeitar em relação à VSR?", a: "VMCA ≤ 1.13 × VSR. Ou seja, a velocidade mínima de controle no ar não pode exceder 13% acima da velocidade de referência de estol.", emoji: "📐" },
  { id: 71, subject: "speeds", q: "Por que bimotores leves (FAR Part 23) não têm VMCG publicada?", a: "Porque nesses aviões o piloto SEMPRE deve abortar a decolagem se um motor falhar, mesmo já estando no ar com trem baixado. Não precisam continuar a decolagem mono-motor, então VMCG é desnecessária. A linha vermelha no ASI mostra VMCA.", emoji: "🛩️" },
  { id: 80, subject: "speeds", q: "V1 é uma velocidade de 'decisão' ou de 'ação'? Por quê?", a: "De AÇÃO. O termo 'decision speed' é um misnomer. Em V1 o piloto deve já ter EXECUTADO a primeira ação para parar (puxar manetes, aplicar freios, speedbrakes). Não há tempo para decidir — a decisão já foi tomada.", emoji: "⚡" },
  { id: 81, subject: "speeds", q: "V1 como velocidade MÁXIMA: qual a definição completa?", a: "É a maior velocidade em que o piloto deve já ter tomado a primeira AÇÃO para parar a aeronave, de forma que ela consiga parar dentro da ASDA (Accelerate-Stop Distance Available).", emoji: "🛑" },
  { id: 82, subject: "speeds", q: "V1 como velocidade MÍNIMA: qual a definição completa?", a: "É a menor velocidade em que, após falha do motor crítico em VEF, a aeronave consegue continuar a decolagem com segurança e atingir a altura mínima requerida dentro da TODA (Takeoff Distance Available).", emoji: "🛫" },
  { id: 83, subject: "speeds", q: "O que é VEF e qual sua relação com V1?", a: "VEF (Velocity of Engine Failure) ocorre 1 segundo ANTES de V1. É a velocidade MÁXIMA em que o motor pode falhar e o piloto ainda conseguir rejeitar a decolagem. O 1 segundo representa o tempo de reconhecimento e reação do piloto.", emoji: "⏱️" },
  { id: 84, subject: "speeds", q: "Por que VEF é exatamente 1 segundo antes de V1?", a: "Porque testes demonstraram que o piloto leva aproximadamente 1 segundo entre perceber a falha e executar a primeira ação de parada. Se o motor falha em VEF, no momento da ação o avião já está em V1.", emoji: "⏱️" },
  { id: 85, subject: "speeds", q: "Qual é a V1 mínima possível e como é chamada?", a: "V1(MCG) — é a velocidade que ocorre 1 segundo APÓS VMCG. O regulador definiu que VMCG é o VEF mínimo (não o V1 mínimo), eliminando o 'limbo' entre VMCG e V1.", emoji: "📐" },
  { id: 86, subject: "speeds", q: "O que é o 'limbo' entre VMCG e V1 e como foi resolvido?", a: "Se o motor falha entre VMCG e V1: não pode continuar (abaixo de VMCG, sem controle direcional) nem parar (1s de reação colocaria a ação acima de V1). Solução: VMCG vira o VEF mínimo, e V1(MCG) = VMCG + 1 segundo.", emoji: "🤔" },
  { id: 87, subject: "speeds", q: "Qual é a V1 máxima possível?", a: "V1 ≤ VR (velocidade de rotação) E V1 ≤ VMBE (Maximum Brake Energy Speed). A V1 máxima é o MENOR entre VR e VMBE.", emoji: "📐" },
  { id: 88, subject: "speeds", q: "Quais são os limites SUPERIOR e INFERIOR de V1?", a: "LIMITE INFERIOR: V1 não pode ser menor que V1(MCG) — é a velocidade mínima de controle direcional após falha. LIMITE SUPERIOR: V1 não pode ser maior que VR (já estaria rotacionando) e nem maior que VMBE (excederia a energia máxima do freio).", emoji: "📏" },
  { id: 89, subject: "speeds", q: "O que é VMBE (Maximum Brake Energy Speed)?", a: "É a velocidade máxima a partir da qual os freios conseguem absorver toda a energia cinética da aeronave sem comprometer a estrutura por pelo menos 5 minutos (tempo estimado para chegada dos bombeiros). Pequenas chamas nos freios são esperadas.", emoji: "🔥" },
  { id: 90, subject: "speeds", q: "Por que a VMBE garante integridade por 5 minutos?", a: "5 minutos é o tempo estimado para os bombeiros chegarem. Nesse período, a estrutura deve estar segura contra incêndio não contido ou falha do sistema de freios. Após uma RTO (Rejected Takeoff) em alta velocidade, os freios ficam extremamente quentes.", emoji: "🚒" },
  { id: 91, subject: "speeds", q: "A regulamentação permite mais de uma V1 para uma mesma decolagem?", a: "NÃO. Embora V1 represente um máximo e um mínimo, deve haver uma ÚNICA V1 para cada decolagem.", emoji: "1️⃣" },
  { id: 92, subject: "speeds", q: "Se o motor falha a 97kt, V1=100kt e VMCG=100kt, o que fazer?", a: "LIMBO! Não pode continuar (abaixo de VMCG) nem parar (1s de reação → ação acima de V1). Essa situação é impossível na prática porque V1(MCG) garante que V1 mínimo = VMCG + 1s, eliminando essa faixa.", emoji: "⚠️" },
  { id: 93, subject: "speeds", q: "VEF é a velocidade em que SEU motor falhou em um evento real?", a: "NÃO! VEF é a velocidade MÁXIMA em que o motor PODE falhar e o piloto ainda conseguir rejeitar. É um parâmetro de certificação/planejamento, não o registro de um evento específico.", emoji: "❌" },
  { id: 100, subject: "speeds", q: "O que é VR (Rotation Speed) e qual a taxa de rotação prevista?", a: "Velocidade em que o piloto inicia a rotação (levantar o nariz). Com motor falhado em VEF, a taxa de rotação de 2 a 3° por segundo deve permitir atingir V2 a 35ft acima da pista.", emoji: "🔄" },
  { id: 101, subject: "speeds", q: "VR deve ser igual ou maior que quanto da VMCA?", a: "VR ≥ 1.05 × VMCA (105% da velocidade mínima de controle no ar).", emoji: "📐" },
  { id: 102, subject: "speeds", q: "Se NENHUM motor falha, o que acontece com a velocidade ao atingir 35ft?", a: "A velocidade será 10 a 25kt ACIMA de V2 (varia conforme o modelo). O piloto rota na mesma VR, mas com todos os motores a aceleração é maior.", emoji: "📈" },
  { id: 103, subject: "speeds", q: "O que é VLOF (Liftoff Speed)?", a: "É a velocidade em que a aeronave perde contato com o solo. Resulta da VR e deve ser ≤ VTIRE (limite de velocidade do pneu).", emoji: "🛫" },
  { id: 104, subject: "speeds", q: "Qual a relação entre VLOF e VMU com todos os motores operando?", a: "VLOF ≥ 1.10 × VMU(n), onde n = número de motores. Com todos os motores, a aceleração é alta, então exige-se 10% acima da VMU.", emoji: "📐" },
  { id: 105, subject: "speeds", q: "Qual a relação entre VLOF e VMU com um motor inoperante?", a: "VLOF ≥ 1.05 × VMU(n-1). Com motor falhado a aceleração cai, então a margem exigida é menor: 5% acima da VMU.", emoji: "📐" },
  { id: 106, subject: "speeds", q: "O que é VTIRE e por que importa?", a: "É o limite de velocidade que o pneu suporta antes de falhar, definido pelo FABRICANTE DO PNEU (não da aeronave). VLOF deve ser ≤ VTIRE. Se excedida, há risco de delaminação e perda da banda de rodagem.", emoji: "🛞" },
  { id: 107, subject: "speeds", q: "Por que estar acima de VMU em VLOF evita tail strike?", a: "Porque VMU é a menor velocidade para descolar, testada com o maior pitch possível (cauda tocando o solo). Se VLOF > VMU, a aeronave decola com atitude menor que a de tail strike.", emoji: "✈️" },
  { id: 108, subject: "speeds", q: "O que é V2 (Takeoff Safety Speed) e em que ponto é atingida?", a: "É a velocidade alcançada a 35ft acima da pista, considerando falha do motor crítico em VEF. Garante os gradientes mínimos de subida exigidos na certificação.", emoji: "🛫" },
  { id: 109, subject: "speeds", q: "V2 deve ser ≥ a quanto de VSR e VMCA?", a: "V2 ≥ 1.13 × VSR E V2 ≥ 1.10 × VMCA. Ambos os critérios devem ser atendidos simultaneamente.", emoji: "📐" },
  { id: 110, subject: "speeds", q: "Qual capacidade de manobra a V2 deve permitir conforme FAR 25.143?", a: "Bancada de até 30° antes de ativar o stall warning (stick shaker). Porém: 30° = 15° de uso planejado + 15° de margem de segurança. O piloto deve planejar usar no máximo 15° em V2.", emoji: "🔔" },
  { id: 111, subject: "speeds", q: "V2 era 1.20 VS antes. Por que mudou para 1.13 VSR?", a: "Com a introdução da VS1G/VSR (mais alta que VS), todas as velocidades referenciadas ao estol foram recalculadas. A diferença foi de ~7%. V2: 1.20VS → 1.13VSR. VREF: 1.30VS → 1.23VSR. VFTO: 1.25VS → 1.18VSR.", emoji: "📖" },
  { id: 112, subject: "speeds", q: "Qual a sequência típica das velocidades de decolagem?", a: "VS → VMCG → VEF → V1 → VR → VLOF → V2 (a 35ft). A sequência não é rígida: em alguns fabricantes a VMCA pode ser menor que VS (não demonstrável em voo). VTIRE limita VLOF.", emoji: "📊" },
  { id: 113, subject: "speeds", q: "VREF mudou de quanto para quanto com a introdução da VS1G?", a: "De 1.30 × VS para 1.23 × VSR. A redução de 7% reflete que VSR > VS, mantendo a mesma margem real de segurança.", emoji: "📖" },
  { id: 120, subject: "dist", q: "Qual a diferença entre TOR/TOD/ASD e TORA/TODA/ASDA?", a: "Sem o 'A' = distância que o AVIÃO usa (performance). Com o 'A' (Available) = distância que a PISTA oferece. TOR ≤ TORA, TOD ≤ TODA, ASD ≤ ASDA.", emoji: "📏" },
  { id: 121, subject: "dist", q: "EO-GO (Engine Out Go): até que screenheight em pista seca vs molhada?", a: "Pista SECA: 35ft. Pista MOLHADA/contaminada/escorregadia: 15ft. É a distância do brake release até esse ponto.", emoji: "🛫" },
  { id: 122, subject: "dist", q: "AE-GO (All Engines Go): como se calcula a Takeoff Distance?", a: "Distância do brake release até 35ft (qualquer condição de pista) + 15% dessa distância de referência.", emoji: "✈️" },
  { id: 123, subject: "dist", q: "Clearway pode ser usado no EO-GO em pista molhada?", a: "NÃO! O clearway só pode ser usado no EO-GO em pista SECA. Em qualquer outra condição (wet/slippery/contaminated), o clearway deve ser completamente desconsiderado no EO-GO.", emoji: "❌" },
  { id: 124, subject: "dist", q: "Clearway pode ser usado no AE-GO em pista molhada?", a: "SIM! O clearway pode ser usado no AE-GO tanto em pista seca quanto molhada. Porém no EO-GO só em pista seca.", emoji: "✅" },
  { id: 125, subject: "dist", q: "Quanto do clearway pode ser usado no EO-GO? (FAR 25.113, pista seca)", a: "Até 50% (metade) da distância aérea do EO-GO pode ser voada sobre o clearway.", emoji: "📐" },
  { id: 126, subject: "dist", q: "Como calcular quanto clearway usar no AE-GO? (resumo)", a: "1) Medir brake release até metade entre VLOF e 35ft. 2) Multiplicar por 1.15 (115%). 3) Calcular distância aérea total (VLOF até o fim dos 115%). 4) Até 50% dessa distância aérea pode ser sobre clearway.", emoji: "🧮" },
  { id: 127, subject: "dist", q: "O que é Takeoff Run (TOR) quando NÃO há clearway?", a: "É IGUAL à Takeoff Distance (TOD). Brake release até screenheight (EO-GO: 35ft ou 15ft) ou brake release até 35ft +15% (AE-GO).", emoji: "📏" },
  { id: 128, subject: "dist", q: "O que é TOR no EO-GO quando HÁ clearway em pista seca?", a: "Distância do brake release até o ponto MÉDIO entre liftoff e 35ft. Diferente da TOD, que vai até o screenheight.", emoji: "📏" },
  { id: 129, subject: "dist", q: "Onde TOR deve caber e onde TOD deve caber?", a: "TOR ≤ TORA (superfície pavimentada, sem o stopway). TOD ≤ TODA (inclui clearway, se disponível).", emoji: "📐" },
  { id: 130, subject: "dist", q: "O que é TORA em relação à pista física?", a: "TORA = toda a superfície PAVIMENTADA da pista, EXCLUINDO qualquer stopway.", emoji: "🛤️" },
  { id: 131, subject: "dist", q: "O que é TODA?", a: "TODA = TORA + Clearway (se disponível). É a distância total disponível para a decolagem, incluindo a área sobrevoável após o fim da pista.", emoji: "🛤️" },
  { id: 132, subject: "dist", q: "O que é Accelerate-Stop Distance (ASD)?", a: "Distância do brake release até a parada completa, após acelerar até VEF, perder o motor crítico, e rejeitar em V1. ~2/3 acelerando, ~1/3 parando (estatística, não regra).", emoji: "🛑" },
  { id: 133, subject: "dist", q: "O que é ASDA?", a: "ASDA = TORA + Stopway (se disponível). É a distância total disponível para acelerar e parar.", emoji: "🛤️" },
  { id: 134, subject: "dist", q: "O que é um Stopway e quando pode ser usado?", a: "Área pavimentada após a TORA (pintada com chevrons amarelos). Só pode ser usada para PARAR após RTO. NÃO pode ser usada para pouso nem para iniciar a corrida de decolagem.", emoji: "🟡" },
  { id: 135, subject: "dist", q: "Um stopway pode ser usado na frenagem do pouso?", a: "NÃO! Apesar do nome 'STOPway', ele só serve para parada após rejeição de decolagem (RTO). O pouso usa apenas a LDA.", emoji: "❌" },
  { id: 136, subject: "dist", q: "O que é um Clearway?", a: "Área livre de obstáculos ALÉM do fim da TORA, sobre a qual a aeronave pode sobrevoar durante a decolagem. Faz parte da TODA mas NÃO da TORA.", emoji: "🌿" },
  { id: 137, subject: "dist", q: "Proporção típica da ASD: quanto é aceleração e quanto é frenagem?", a: "Aproximadamente 2/3 acelerando e 1/3 parando (estatística para avião médio em pista seca). Não é regra, apenas referência.", emoji: "📊" },
  { id: 138, subject: "dist", q: "Quais são as 4 distâncias declaradas e o que cada uma cobre?", a: "TORA: pista pavimentada disponível para corrida de decolagem (sem stopway). ASDA: TORA + Stopway (aceleração e parada). TODA: TORA + Clearway (decolagem e subida inicial até 35ft). LDA: pista efetivamente disponível para pouso (pode ser menor que TORA por threshold deslocado).", emoji: "📝" },
  { id: 140, subject: "dist", q: "Como se mede a Landing Distance (LD)?", a: "De um ponto a 50ft acima da pista até a parada completa. Assim como a TOD, inclui uma distância aérea e uma distância no solo.", emoji: "🛬" },
  { id: 141, subject: "dist", q: "Um displaced threshold afeta as distâncias de decolagem?", a: "NÃO afeta nenhuma distância de decolagem, independente da cabeceira em uso. Porém REDUZ a LDA quando o pouso é feito na direção do displaced threshold. Pousando na direção oposta, a área (setas brancas) pode ser usada.", emoji: "🔀" },
  { id: 142, subject: "dist", q: "Quais as dimensões mínimas e máximas de um clearway?", a: "Largura mínima: 75m para cada lado do eixo (150m total). Comprimento máximo: 50% da TORA. Obstáculos permitidos se abaixo da rampa de 1.25% a partir do fim da TORA.", emoji: "📐" },
  { id: 143, subject: "dist", q: "Que obstáculos são permitidos dentro de um clearway?", a: "Apenas os que ficam abaixo de uma rampa imaginária de 1.25% a partir do fim da TORA. Exceção: luzes de threshold com até 0.66m (26in) de altura nas laterais da pista.", emoji: "💡" },
  { id: 144, subject: "dist", q: "Quais os requisitos de um stopway quanto à largura e resistência?", a: "Deve ser pelo menos tão largo quanto a pista e capaz de suportar o peso da aeronave sem causar danos. Luzes no fim da TORA/início do stopway devem ser rentes ao solo ou frangíveis.", emoji: "🛑" },
  { id: 145, subject: "dist", q: "O que é RESA (Runway End Safety Area)?", a: "Área ao fim da pista para proteger ocupantes em caso de overrun. Padrão ICAO para toda pista. NÃO pode ser computada na TORA, ASDA ou LDA. Não precisa suportar o peso da aeronave nem ser pavimentada.", emoji: "🟩" },
  { id: 146, subject: "dist", q: "Qual o comprimento mínimo e recomendado da RESA segundo a ICAO?", a: "Mínimo: 90m além do runway strip (= 150m total, pois o strip tem 60m). Recomendado: 180m além do strip (= 240m total). Largura mínima: 2× a largura da pista.", emoji: "📏" },
  { id: 147, subject: "dist", q: "O que é runway strip e qual sua dimensão mínima?", a: "É a distância mínima entre o fim da pista e o limite físico do aeródromo (cerca). Mínimo: 60m. O comprimento da RESA é medido ALÉM do strip.", emoji: "🛤️" },
  { id: 148, subject: "dist", q: "O que é EMAS e para que serve?", a: "Engineered Material Arresting System — concreto especial que se esfarela quando a aeronave passa, dissipando energia cinética e parando o avião. Pode ser instalado na RESA.", emoji: "🧱" },
  { id: 149, subject: "dist", q: "RESA precisa ser pavimentada ou suportar o peso da aeronave?", a: "NÃO. Diferente do stopway, a RESA não precisa suportar peso nem ser pavimentada. Pode ser gramada, com cascalho, ou ter EMAS. O objetivo é apenas garantir segurança dos ocupantes em overrun.", emoji: "🌿" },
  { id: 150, subject: "dist", q: "Uma RESA pode ser também um clearway?", a: "SIM, se atender aos requisitos: largura ≥ 75m de cada lado, comprimento ≤ 50% TORA, obstáculos abaixo de 1.25%, e dentro dos limites do aeródromo. Ambos podem coexistir na mesma área.", emoji: "✅" },
  { id: 151, subject: "dist", q: "Como se implementa RESA em aeroportos antigos que não a tinham?", a: "Recua-se o início da pista utilizável criando um displaced threshold. A área 'perdida' vira RESA. Se a área atender aos requisitos, também pode virar clearway (compensando parcialmente a perda). Ex.: Porto Seguro, Brasil.", emoji: "🏗️" },
  { id: 152, subject: "dist", q: "Olhando para uma pista, como saber se o displaced threshold é por obstáculo ou por RESA?", a: "NÃO dá para saber visualmente. A única forma é consultar os valores oficiais de TORA, TODA, ASDA e LDA publicados para aquela pista e deduzir o motivo.", emoji: "🔍" },
  { id: 153, subject: "dist", q: "Uma RESA afeta a TODA?", a: "Pode NÃO afetar se a área da RESA também funcionar como clearway. Nesse caso, TODA permanece inalterada. TORA e ASDA são reduzidas. LDA é a mais afetada (reduzida nos dois lados).", emoji: "📊" },
  { id: 154, subject: "dist", q: "Displaced threshold criado por RESA pode ser usado na TORA?", a: "NÃO. Diferente de um displaced threshold convencional (por obstáculo na aproximação), que pode ser usado na TORA, o que existe por causa de RESA não pode ser computado.", emoji: "❌" },
  { id: 160, subject: "dist", q: "No cálculo da ASD, qual o período de transição entre V1 e o início real da desaceleração?", a: "2 segundos. Nesse intervalo o avião passa por V1 ainda acelerando e só depois começa a desacelerar. Se o fabricante provar que leva mais que 2s, o tempo real (maior) deve ser usado.", emoji: "⏱️" },
  { id: 161, subject: "dist", q: "Por que os fabricantes usam um tempo de transição maior que o real no cálculo da ASD?", a: "Por CONSERVADORISMO. Embora o processo real (de VEF até começar a desacelerar) leve cerca de 1,4 segundos, os fabricantes usam até ~4 segundos (acima dos 2s exigidos pela regulamentação). Isso cria margem de segurança no cálculo da ASD.", emoji: "🛡️" },
  { id: 162, subject: "dist", q: "No cálculo da ASD em pista SECA, pode-se considerar o uso de reversor?", a: "NÃO. Em pista seca, o reversor não pode ser considerado no cálculo. Porém, na prática o piloto vai usá-lo em uma RTO real — isso gera margem adicional de segurança.", emoji: "🚫" },
  { id: 163, subject: "dist", q: "Em pista MOLHADA, quantos reversores podem ser considerados no cálculo da ASD?", a: "Todos MENOS 1. É opcional para o operador considerar. Ex.: bimotor pode usar 1 reversor no cálculo.", emoji: "💧" },
  { id: 164, subject: "dist", q: "Em pista CONTAMINADA, quantos reversores podem ser considerados no cálculo da ASD?", a: "TODOS os reversores podem ser considerados. É opcional para o operador.", emoji: "🌧️" },
  { id: 165, subject: "dist", q: "Qual posição de CG é usada no cálculo da ASD e por quê?", a: "CG o mais FORWARD possível. Isso coloca menos pressão no trem principal e nos freios, resultando na pior condição de frenagem (mais conservador).", emoji: "⚖️" },
  { id: 166, subject: "dist", q: "Por que a distância calculada da ASD tende a ser MAIOR que a real?", a: "Três fatores somam a favor da segurança: 1) Margem do fabricante (tempo de transição maior que o real). 2) CG forward (pior frenagem). 3) Reversor não contabilizado em pista seca (mas piloto usa na prática).", emoji: "📊" },
  { id: 167, subject: "dist", q: "Na regra atual, como é tratado o período de transição na ASD?", a: "Como velocidade CONSTANTE durante 2 segundos. Na regra anterior, considerava-se que o avião ainda estava acelerando. A regra atual é ligeiramente menos conservadora.", emoji: "📖" },
  { id: 170, subject: "dist", q: "Por que o screenheight do EO-GO cai de 35ft (seca) para 15ft (molhada)?", a: "Em pista molhada V1 é menor (frenagem pior). A 'distância' V1→VR fica grande. Com aceleração mono-motor muito baixa, VR é atingida mais perto do fim da pista, impossibilitando 35ft. Regulador reduziu screenheight mas proibiu clearway.", emoji: "💧" },
  { id: 171, subject: "dist", q: "A aceleração de um avião muda entre pista seca e molhada?", a: "NÃO! A aceleração depende dos motores (empuxo para trás), não das rodas. Seca ou molhada, a aceleração é IDÊNTICA. O que muda é a FRENAGEM (atrito pneu-solo reduzido pela água).", emoji: "✈️" },
  { id: 172, subject: "dist", q: "Em pista molhada vs seca (mesmo peso), quais V-speeds mudam?", a: "SOMENTE V1 muda (diminui, porque precisa de mais pista para frear). VR e V2 NÃO mudam — dependem de peso, densidade do ar e outros fatores, não da condição da pista.", emoji: "📊" },
  { id: 173, subject: "dist", q: "Qual a ordem de grandeza da queda de aceleração de um bimotor ao perder 1 motor?", a: "Aproximadamente 75% de queda — tipicamente de ~4kt/s com ambos para ~1kt/s mono-motor. Por isso a distância entre V1 e VR em pista molhada (V1 baixo) se torna crítica.", emoji: "📉" },
  { id: 174, subject: "dist", q: "Em pista molhada, a velocidade ao screenheight (15ft) é V2?", a: "NÃO! V2 é atingida a 35ft. A 15ft a velocidade será MENOR que V2, pois o avião ainda está acelerando entre 15ft e 35ft.", emoji: "⚠️" },
  { id: 175, subject: "dist", q: "No EO-GO, a falha do motor é considerada como fuel cutoff ou idle?", a: "FUEL CUTOFF (empuxo zero) no motor crítico. Isso dá o pior cenário para a continuação da decolagem. Para o ACCEL-STOP, usa-se idle (empuxo residual), pois a RTO com empuxo residual é PIOR para frear.", emoji: "🔧" },
  { id: 176, subject: "dist", q: "Por que o ACCEL-STOP usa empuxo residual (idle) em vez de fuel cutoff?", a: "Porque uma RTO com todos os motores em idle (empuxo residual) demora MAIS para parar do que com um motor realmente desligado. Sem reversor em pista seca, o empuxo residual atrapalha a frenagem. É o pior cenário para parada.", emoji: "🛑" },
  { id: 177, subject: "dist", q: "A rejeição de decolagem sempre é causada por falha de motor?", a: "NÃO. Inicialmente a regulamentação só previa falha de motor, mas percebeu-se que outros fatores (pneu estourado, fogo, alerta falso etc.) podem levar à RTO. Se o evento deixa empuxo residual, a distância de parada é MAIOR.", emoji: "📖" },
  { id: 180, subject: "dist", q: "Por que a AE-GO (115%) precisa ser avaliada se é sempre menor que a EO-GO?", a: "A distância real AE-GO é menor, mas a regulamentação exige 115% dessa distância. Esse acréscimo de 15% pode fazer a AE-GO×1.15 ser MAIOR que a EO-GO, especialmente em quadrimotores.", emoji: "📐" },
  { id: 181, subject: "dist", q: "Quais são as 3 distâncias comparadas para definir o FAR Field Length Required?", a: "1) ASD (Accelerate-Stop Distance). 2) EO-GO (Takeoff Distance com motor inop.). 3) 115% da AE-GO (All Engine GO). O MAIOR dos três é o FAR Field Length Required.", emoji: "📊" },
  { id: 182, subject: "dist", q: "Em BIMOTORES, qual distância costuma ser a limitante?", a: "ASD ou EO-GO (na maioria dos casos com peso médio e empuxo máximo). A AE-GO×1.15 raramente limita em bimotores, pois a perda de 50% do empuxo torna a EO-GO muito maior que a AE-GO.", emoji: "✈️" },
  { id: 183, subject: "dist", q: "Por que a AE-GO×1.15 limita mais frequentemente em QUADRIMOTORES?", a: "Porque perder 1 de 4 motores = apenas 25% de perda de empuxo. A EO-GO não é muito maior que a AE-GO. Como o avião é pesado e leva muita pista para acelerar, AE-GO×1.15 frequentemente supera a EO-GO.", emoji: "✈️" },
  { id: 184, subject: "dist", q: "O que é Field Limited Takeoff Weight?", a: "É o peso MÁXIMO de decolagem permitido para uma determinada pista. É a perspectiva inversa: em vez de 'quanto de pista preciso para esse peso', é 'quanto de peso posso levar nessa pista'.", emoji: "⚖️" },
  { id: 185, subject: "dist", q: "O que é o Dry Check e quando é necessário?", a: "É a verificação de que o peso calculado para pista MOLHADA não excede o permitido para pista SECA. Em casos específicos (pista curta, grooved, SK-R), o peso wet pode ser maior que o dry — e isso é PROIBIDO pela regulamentação.", emoji: "🔍" },
  { id: 186, subject: "dist", q: "Como o peso wet pode ser MAIOR que o dry em pistas SK-R (Skid Resistant)?", a: "Pistas SK-R (grooved) têm frenagem similar em seca e molhada. MAS: em pista molhada o reversor pode ser contabilizado no ASD, e em seca NÃO. Esse crédito extra pode resultar em peso wet > dry.", emoji: "💧" },
  { id: 187, subject: "dist", q: "Se o cálculo dá peso wet > peso dry, qual peso usar na decolagem em pista molhada?", a: "O peso DRY (menor). Mesmo que o cálculo esteja correto, a regulamentação PROÍBE decolar de pista molhada com peso maior que o permitido para pista seca. O Dry Check garante isso.", emoji: "⚖️" },
  { id: 188, subject: "dist", q: "Bimotor perde 1 motor: quanto % de empuxo perde? E quadrimotor?", a: "Bimotor: perde 50% (sobra 1 de 2). Quadrimotor: perde 25% (sobram 3 de 4). Por isso a EO-GO do quadrimotor não é tão maior que a AE-GO.", emoji: "📊" },
  { id: 190, subject: "dist", q: "Ao entrar na pista para decolar, sempre sobra um trecho de pista atrás. A regulamentação exige correção?", a: "A maioria dos países NÃO exige (mas EASA exige). Muitos operadores aplicam voluntariamente as correções usando tabelas fornecidas pelos fabricantes.", emoji: "📐" },
  { id: 191, subject: "dist", q: "Por que as correções de line up são DIFERENTES para TORA/TODA e ASDA?", a: "Na parada (ASDA), mede-se até o nariz parar dentro da pista. Na decolagem (TORA/TODA), mede-se até o ponto mais baixo da aeronave a 35ft (trem principal). A diferença entre as penalidades é a distância nariz → trem principal.", emoji: "📏" },
  { id: 192, subject: "dist", q: "O que é Rolling Takeoff e por que os fabricantes recomendam?", a: "O piloto NÃO para na pista — começa a aumentar potência durante o alinhamento e aplica empuxo de decolagem assim que alinhado. A pista 'perdida' torna-se desprezível pois o avião já tem velocidade. Também reduz risco de FOD e compressor stall em vento cruzado.", emoji: "🛫" },
  { id: 193, subject: "dist", q: "Quais as duas grandes vantagens operacionais do Rolling Takeoff?", a: "1) Reduz significativamente o risco de FOD (Foreign Object Damage) nos motores. 2) Diminui a chance de compressor stall durante decolagens com vento cruzado forte.", emoji: "✅" },
  { id: 194, subject: "dist", q: "Por que seguir a linha amarela do taxiway ao entrar na pista pode ser perigoso?", a: "A linha amarela foi feita para SAIR da pista, não para entrar. Seguindo-a (especialmente em saídas de alta velocidade), o piloto faz uma curva mais aberta e perde mais pista do que o previsto nas tabelas de line up correction.", emoji: "⚠️" },
  { id: 195, subject: "dist", q: "Como o piloto deve entrar na pista segundo o FCTM?", a: "Seguindo o procedimento do FCTM do fabricante, NÃO a linha amarela. A entrada correta minimiza a perda de pista e corresponde aos valores das tabelas de line up corrections.", emoji: "📖" },
  { id: 200, subject: "speeds", q: "Se você aumenta a V1, o que acontece com a distância EO-GO e por quê?", a: "A EO-GO DIMINUI. Com V1 mais alta, o motor falha mais tarde → a aeronave já está mais rápida → precisa acelerar menos mono-motor até VR/V2 → atinge o screenheight mais cedo.", emoji: "📉" },
  { id: 201, subject: "speeds", q: "Se você aumenta a V1, o que acontece com a ASD (distância de parada) e por quê?", a: "A ASD AUMENTA. V1 mais alta = mais velocidade acumulada ao rejeitar → precisa de mais pista para desacelerar e parar. Também acelerou por mais tempo antes da rejeição.", emoji: "📈" },
  { id: 202, subject: "speeds", q: "A escolha de V1 afeta a distância de decolagem com todos os motores (AE-GO)?", a: "NÃO. A AE-GO não depende de V1 porque nenhum motor falha — a aceleração nunca é reduzida abruptamente. V1 só afeta EO-GO e ASD.", emoji: "✈️" },
  { id: 203, subject: "speeds", q: "Se colocarmos ASD e EO-GO em um gráfico em função de V1, que formato aparece?", a: "Um 'X': ASD sobe (reta vermelha) e EO-GO desce (reta verde) conforme V1 aumenta. O FAR Field Length Required é sempre o topo desse X, formando um 'V' invertido.", emoji: "📊" },
  { id: 204, subject: "speeds", q: "O que é Balanced V1?", a: "É a V1 onde ASD = EO-GO (as duas retas se cruzam). Nesse ponto, a pista requerida é a MENOR possível para aquele peso. A 'balança' entre parar e continuar está equilibrada.", emoji: "⚖️" },
  { id: 205, subject: "speeds", q: "O que é Balanced Field Length?", a: "É a condição em que ASD = EO-GO para um dado peso e V1. É a menor pista necessária usando o Balanced V1. NÃO tem relação com a pista física — é uma condição do AVIÃO.", emoji: "⚖️" },
  { id: 206, subject: "speeds", q: "Balanced field length significa que o avião usa TODA a pista disponível?", a: "NÃO! É um erro comum. Balanced field significa apenas que ASD = EO-GO. O avião pode ter balanced field usando muito MENOS pista do que a disponível.", emoji: "❌" },
  { id: 207, subject: "speeds", q: "Balanced field length tem alguma relação com TORA = TODA = ASDA?", a: "NENHUMA! Outro erro comum. Ter distâncias declaradas iguais é característica da PISTA. Balanced field é condição do AVIÃO (ASD = EO-GO). São conceitos totalmente independentes.", emoji: "❌" },
  { id: 208, subject: "speeds", q: "Existe 'balanced field' para pouso?", a: "NÃO! Balanced field é um conceito exclusivo de DECOLAGEM. Não existe balanced field para pouso. É um erro grave confundir os dois.", emoji: "❌" },
  { id: 209, subject: "speeds", q: "O que é VGO?", a: "É a V1 mínima que permite CONTINUAR a decolagem após falha de motor e atingir o screenheight dentro da TODA. Avião leve → VGO baixa. Avião pesado → VGO alta (mais perto de VR).", emoji: "🟢" },
  { id: 210, subject: "speeds", q: "O que é VSTOP?", a: "É a V1 máxima que permite PARAR dentro da ASDA após rejeição de decolagem. Avião leve → VSTOP alta (freia fácil). Avião pesado → VSTOP baixa (difícil frear, precisa começar antes).", emoji: "🔴" },
  { id: 211, subject: "speeds", q: "Por que VGO e VSTOP se comportam de forma OPOSTA com o aumento de peso?", a: "Mais peso → mais difícil acelerar mono-motor (VGO sobe, precisa de mais velocidade inicial). Mais peso → mais difícil frear (VSTOP desce, precisa rejeitar mais cedo). As linhas convergem até se encontrar no peso máximo.", emoji: "📊" },
  { id: 212, subject: "speeds", q: "O que representa a 'área verde' no gráfico VGO × VSTOP?", a: "É a faixa de V1 válidas para cada peso. Qualquer V1 dentro dessa área atende AMBAS as condições (pode parar E pode continuar). Avião leve = área grande. Avião pesado = área estreita até um único ponto.", emoji: "🟩" },
  { id: 213, subject: "speeds", q: "No peso máximo de decolagem para aquela pista, quantas opções de V1 existem?", a: "UMA ÚNICA. É o ponto onde VGO e VSTOP se encontram. Não há margem para escolha — é o Balanced V1 naquele peso máximo. Qualquer peso acima não tem V1 válida.", emoji: "1️⃣" },
  { id: 214, subject: "speeds", q: "Como um STOPWAY permite aumentar o peso máximo de decolagem?", a: "Com stopway, a ASDA aumenta → VSTOP sobe (pode rejeitar em velocidade mais alta) → a interseção VGO×VSTOP se desloca para a DIREITA (peso maior). Para aproveitar, V1 deve ser AUMENTADA em relação ao balanced original.", emoji: "🛑" },
  { id: 215, subject: "speeds", q: "Como um CLEARWAY permite aumentar o peso máximo de decolagem?", a: "Com clearway (pista seca), a TODA aumenta → VGO desce (pode continuar com V1 mais baixa) → interseção se desloca para a DIREITA (peso maior). Para aproveitar, V1 deve ser DIMINUÍDA em relação ao balanced original.", emoji: "🌿" },
  { id: 216, subject: "speeds", q: "Stopway: V1 sobe ou desce para ganhar peso? E clearway?", a: "STOPWAY → V1 SOBE (mais pista para parar). CLEARWAY → V1 DESCE (mais espaço para continuar). Ambos aumentam o peso máximo, mas por mecanismos OPOSTOS.", emoji: "⚡" },
  { id: 217, subject: "speeds", q: "O que é Optimum V1?", a: "É a V1 que resulta no MAIOR peso de decolagem possível para aquela pista. Pode ser balanced (sem stopway/clearway) ou unbalanced (aproveitando stopway ou clearway). É a V1 que o despachante deve buscar.", emoji: "🎯" },
  { id: 218, subject: "speeds", q: "Optimum V1 é sempre igual a Balanced V1?", a: "NÃO. Em pista sem stopway nem clearway, Optimum = Balanced. Mas se houver stopway ou clearway, o Optimum V1 será DIFERENTE do balanced para maximizar o peso de decolagem.", emoji: "📐" },
  { id: 219, subject: "speeds", q: "Uma aeronave leve tem muitas ou poucas opções de V1 numa dada pista?", a: "MUITAS opções (área verde ampla). A aeronave acelera e freia facilmente, então há uma faixa larga entre VGO e VSTOP. Conforme o peso aumenta, as opções diminuem até restar uma única V1.", emoji: "📊" },
  { id: 220, subject: "speeds", q: "Com V1 baixa, qual distância tende a ser a limitante: ASD ou EO-GO?", a: "A EO-GO. V1 baixa → motor falha cedo → muita aceleração mono-motor necessária → EO-GO fica longa. A ASD será curta (pouca velocidade para frear).", emoji: "📏" },
  { id: 221, subject: "speeds", q: "Com V1 alta, qual distância tende a ser a limitante?", a: "A ASD. V1 alta → muita velocidade acumulada → precisa de muita pista para parar. A EO-GO será curta (motor falhou tarde, pouca aceleração mono-motor necessária).", emoji: "📏" },
  { id: 230, subject: "speeds", q: "Quando o operador é OBRIGADO a usar uma V1 diferente da balanced?", a: "Quando a balanced V1 calculada cai fora dos limites: 1) Abaixo de V1(MCG) → ajustar para V1(MCG). 2) Acima de VR → ajustar para VR. 3) Acima de VMBE → ajustar para VMBE. Pode haver penalidade de peso.", emoji: "⚠️" },
  { id: 231, subject: "speeds", q: "Se a balanced V1 calculada for menor que V1(MCG), o que fazer?", a: "Descartar o resultado e ajustar V1 = V1(MCG). Decolagem com V1 abaixo de V1(MCG) é PROIBIDA — sem controle direcional em caso de falha. Pode haver penalidade de peso.", emoji: "🚫" },
  { id: 232, subject: "speeds", q: "Se a balanced V1 calculada for maior que VR, o que fazer?", a: "Ajustar V1 = VR. Seria absurdo aceitar rejeição APÓS iniciar a rotação. V1 > VR não tem lógica operacional.", emoji: "🚫" },
  { id: 233, subject: "speeds", q: "Se a balanced V1 calculada for maior que VMBE, qual o risco?", a: "Os freios podem falhar — a energia cinética excede a capacidade de absorção. V1 deve ser reduzida para VMBE. Pode haver penalidade de peso.", emoji: "🔥" },
  { id: 234, subject: "speeds", q: "Se o piloto calcular V1 errada e ela estiver mais alta do que deveria, o que acontece no cenário de PARAR?", a: "A aeronave chega ao fim da pista ainda com velocidade significativa. Quanto maior o erro, maior a velocidade residual. Risco de excursão de pista.", emoji: "⚠️" },
  { id: 235, subject: "speeds", q: "Se o piloto calcular V1 errada e ela estiver mais alta do que deveria, o que acontece no cenário de CONTINUAR?", a: "A aeronave atinge o screenheight com sobra — estará ACIMA de 35ft no fim da pista. Para o GO, V1 mais alta que o necessário é conservador.", emoji: "📈" },
  { id: 236, subject: "speeds", q: "Os gráficos de erro de V1 (ΔV1) para STOP valem para quais aeronaves?", a: "Para BIMOTORES apenas. Em tri/quadrimotores, a perda de 1 motor é proporcionalmente menor, então o efeito é diferente.", emoji: "✈️" },
  { id: 240, subject: "speeds", q: "Nas estatísticas de RTO (1960-2003), em que faixa de velocidade acontecem a maioria das rejeições?", a: "76% ocorrem abaixo de 80kt (baixa energia). Apenas 2% ocorrem acima de 120kt. RTOs em alta velocidade são raros mas extremamente perigosos.", emoji: "📊" },
  { id: 241, subject: "speeds", q: "Das excursões de pista por RTO, quantas % foram causadas por manobras APÓS V1?", a: "55%! Mais da metade dos overruns aconteceram porque pilotos rejeitaram acima de V1, quando já deveriam ter continuado a decolagem.", emoji: "🔴" },
  { id: 242, subject: "speeds", q: "Das RTOs em alta energia, quanto % são causadas por falha de motor?", a: "Apenas 21%. Os 79% restantes são causas não-motor: pneu/roda (22%), configuração (12%), indicação/luz (14%), coordenação de tripulação (10%), bird strike (7%), ATC (2%).", emoji: "📊" },
  { id: 243, subject: "speeds", q: "O que define a região de BAIXA energia e ALTA energia na decolagem?", a: "Um limite de velocidade definido pelo fabricante (tipicamente abaixo de 80-100kt = baixa energia). Na baixa energia, RTO é segura para qualquer motivo. Na alta energia, SOMENTE para questões safety-critical: fogo, falha de motor, windshear.", emoji: "⚡" },
  { id: 244, subject: "speeds", q: "Na região de alta energia, quais são os 3 motivos principais que justificam uma RTO?", a: "1) Fogo (motor, APU, carga — qualquer). 2) Falha de motor (qualquer deterioração de empuxo). 3) Windshear. Dica mnemônica: 'YAW or YELL' — yaw = falha de motor, yell = alarme de fogo/windshear.", emoji: "🔥" },
  { id: 245, subject: "speeds", q: "O que significa a regra 'YAW or YELL' para decisão de RTO em alta energia?", a: "YAW = a aeronave guinhou (falha de motor). YELL = algum alarme tocou (fogo tem sino, windshear tem alerta aural). Se não há yaw nem yell, NÃO rejeitar em alta energia.", emoji: "📢" },
  { id: 246, subject: "speeds", q: "Um pneu estoura durante a corrida de decolagem em alta velocidade. Deve-se rejeitar?", a: "NÃO! RTO por falha de pneu em alta velocidade NÃO é recomendada. Há grande chance de excursão de pista. O mais seguro é continuar, queimar combustível e pousar mais leve no destino ou alternativa. O avião foi projetado para parar com FREIOS funcionando, não com pneus estourados.", emoji: "🛞" },
  { id: 247, subject: "speeds", q: "A falha de um pneu pode ser confundida com falha de motor. Por quê?", a: "Porque a explosão do pneu em alta velocidade pode causar uma guinada (yaw), similar à falha de motor. O piloto deve verificar os instrumentos de motor antes de reagir instintivamente ao yaw.", emoji: "⚠️" },
  { id: 250, subject: "speeds", q: "Como o PESO afeta V1, VR e V2?", a: "Peso maior → V1, VR e V2 AUMENTAM. Mais peso = mais difícil acelerar com motor falhado, então V1 sobe. VR e V2 sobem porque precisam de mais velocidade para sustentar o peso.", emoji: "⚖️" },
  { id: 251, subject: "speeds", q: "Como a DENSIDADE DO AR afeta as velocidades de decolagem?", a: "Menor densidade (altitude alta ou temperatura alta) → menor empuxo → velocidades ficam mais próximas entre si → V1 e VR aumentam, V2 diminui. O compromisso reduz o gap entre as velocidades.", emoji: "🌡️" },
  { id: 252, subject: "speeds", q: "Como o FLAP de decolagem afeta as velocidades?", a: "Mais flap → mais sustentação a menor velocidade → VR e V2 DIMINUEM. Como V1 ≤ VR, V1 também diminui.", emoji: "📐" },
  { id: 253, subject: "speeds", q: "Como o VENTO afeta V1? E VR/V2?", a: "Vento de proa → V1 AUMENTA (mais fácil parar contra o vento). Vento de cauda → V1 DIMINUI. VR e V2 NÃO são afetadas pelo vento.", emoji: "💨" },
  { id: 254, subject: "speeds", q: "Como o SLOPE (inclinação da pista) afeta V1? E VR/V2?", a: "Subida (uphill) → V1 AUMENTA (mais fácil parar subindo). Descida (downhill) → V1 DIMINUI. VR e V2 NÃO são afetadas pelo slope.", emoji: "⛰️" },
  { id: 260, subject: "dist", q: "Como se calcula o slope médio da pista?", a: "Diferença de elevação entre os thresholds ÷ comprimento da pista. Problema: cartas de aeroporto mostram TDZE (elevação da zona de toque, ~300m do threshold), não a elevação exata do threshold.", emoji: "📐" },
  { id: 261, subject: "dist", q: "Por que a variação de slope ao longo da pista é um problema real?", a: "O computador calcula slope médio (ex: 0%). Mas se a pista sobe nos primeiros 2/3 e desce no último 1/3, a aeronave atinge V1 mais perto do fim (subiu contra gravidade), e freia descendo (pior). Resultado: excursão de pista mesmo com V1 'correta'.", emoji: "⚠️" },
  { id: 262, subject: "dist", q: "Existe solução definitiva para o problema de variação de slope?", a: "NÃO existe solução definitiva. Todas as companhias conhecidas calculam o slope médio e ignoram variações. O AOC (Airport Obstacle Chart) mostra o perfil real, mas nem todos aeroportos publicam.", emoji: "🔍" },
  { id: 300, subject: "obs", q: "Qual a margem vertical mínima sobre obstáculos na saída segundo FAA/ANAC?", a: "35ft verticalmente acima do obstáculo. Alternativa: 200ft horizontalmente dentro dos limites do aeroporto e 300ft horizontalmente fora dele.", emoji: "📐" },
  { id: 301, subject: "obs", q: "E segundo ICAO/EASA?", a: "35ft para saídas retas (≤15° de desvio). Para curvas >15°: EASA exige 50ft de margem. A ICAO/EASA não oferece a alternativa horizontal como a FAA.", emoji: "📐" },
  { id: 302, subject: "obs", q: "O que é a OAA (Obstacle Accountability Area)?", a: "É a área em forma de cone a partir do fim da pista onde todos os obstáculos devem ser considerados. Ela se alarga conforme a distância e se estende até a aeronave atingir 1.500ft AFE.", emoji: "🟩" },
  { id: 303, subject: "obs", q: "Qual a taxa de alargamento da OAA segundo a FAA? E segundo a ICAO/EASA?", a: "FAA: 6.25% para cada lado. ICAO/EASA: 12.5% para cada lado (o DOBRO da FAA). Resultado: a OAA ICAO é mais larga e mais restritiva (mais obstáculos considerados).", emoji: "📊" },
  { id: 304, subject: "obs", q: "Qual a largura máxima da OAA para a FAA e para a ICAO?", a: "FAA: 4.000ft total (2.000ft cada lado). ICAO: 1.200m total. São essencialmente o mesmo valor, apenas em unidades diferentes.", emoji: "📏" },
  { id: 305, subject: "obs", q: "Qual a largura inicial da OAA para a FAA?", a: "Começa com 200ft de meia-largura no fim da pista até o limite do aeroporto. Depois salta para 300ft e alarga a 6.25% até atingir a largura máxima de 4.000ft.", emoji: "📏" },
  { id: 306, subject: "obs", q: "Qual a largura inicial da OAA para a ICAO/EASA?", a: "60m + metade da envergadura da aeronave, OU 90m — o que for MENOR. Depois de 60m do fim da pista (runway strip), alarga a 12.5% para cada lado.", emoji: "📏" },
  { id: 307, subject: "obs", q: "Para saídas com curva >15°, como muda a largura máxima da OAA?", a: "Aumenta para 6.000ft (FAA) / 1.800m (ICAO). Essencialmente o mesmo valor em unidades diferentes.", emoji: "🔄" },
  { id: 308, subject: "obs", q: "O que é o AOC (Airport Obstacle Chart) e qual o gradiente mínimo para um obstáculo aparecer?", a: "É a carta que mostra todos os obstáculos significativos na saída. Só aparecem os que ultrapassam um plano imaginário ascendente de 1.2% a partir do fim da pista.", emoji: "📋" },
  { id: 309, subject: "obs", q: "No Brasil, quem publica o AOC e qual padrão usa?", a: "O DECEA publica, seguindo padrão ICAO (180m de largura inicial, alargamento 12.5%). Porém a ANAC (RBAC 121.189) usa o texto da FAA (35ft + 200ft/300ft horizontal). Maioria das companhias brasileiras segue ICAO por bom senso.", emoji: "🇧🇷" },
  { id: 310, subject: "obs", q: "O que é a Net Flight Path (NFP)?", a: "É a trajetória que garante que a aeronave sobrevoa todo obstáculo na OAA por pelo menos 35ft (FAA) ou 50ft em curvas >15° (EASA). A NFP é igual para toda aeronave do mesmo tipo.", emoji: "✈️" },
  { id: 311, subject: "obs", q: "O que é a Gross Flight Path (GFP) e como difere da NFP?", a: "GFP = NFP + margem extra de segurança. A margem depende do número de motores: 2 motores = +0.8%, 3 motores = +0.9%, 4 motores = +1.0%. A GFP NÃO pode ser invadida em nenhum momento.", emoji: "📈" },
  { id: 312, subject: "obs", q: "Qual a margem extra adicionada à NFP para obter a GFP em um bimotor?", a: "0.8% de gradiente extra. Para trimotor: 0.9%. Quadrimotor: 1.0%. Essa margem compensa erros de pilotagem e condições meteorológicas diferentes das previstas.", emoji: "📐" },
  { id: 313, subject: "obs", q: "O que é Obstacle Limited Takeoff Weight?", a: "É o peso máximo que permite à aeronave cumprir a GFP, sobrevoando todos os obstáculos com a margem mínima. É o peso com motor crítico inoperante desde VEF.", emoji: "⚖️" },
  { id: 314, subject: "obs", q: "A trajetória real do avião é uma reta como a GFP?", a: "NÃO. A trajetória real é uma PARÁBOLA porque o motor perde empuxo com a altitude. O software calcula uma altitude-alvo sobre o obstáculo e determina peso/empuxo/velocidade para atingi-la.", emoji: "📉" },
  { id: 315, subject: "obs", q: "Como V1 afeta o sobrevoo de obstáculos?", a: "V1 maior → EO-GO menor → aeronave fica airborne mais cedo → mais distância do obstáculo → gradiente de subida necessário é MENOR → permite MAIS peso. Quando limitado por obstáculo, AUMENTAR V1 é vantajoso.", emoji: "⚡" },
  { id: 316, subject: "obs", q: "Por que curvas durante a subida pioram o gradiente de subida?", a: "Em curva, parte da sustentação é usada para virar, reduzindo a componente vertical. O software atual não calcula isso bem, então os engenheiros aumentam ARTIFICIALMENTE a altura dos obstáculos na curva para compensar.", emoji: "🔄" },
  { id: 317, subject: "obs", q: "O que é OCS (Obstacle Clearance Surface)?", a: "É o plano imaginário que parte do DER (departure end of runway) até o topo do obstáculo. O gradiente desse plano é o OCS. Mínimo: 2.5% (DOC 8168 e TERPS).", emoji: "📐" },
  { id: 318, subject: "obs", q: "O que é ROC (Required Obstacle Clearance)?", a: "É a margem de segurança adicionada ao OCS. No DOC 8168: fixo em 0.8%. No TERPS (EUA): ROC = OCS × 0.76 (ou seja, sempre 24% do PDG).", emoji: "📐" },
  { id: 319, subject: "obs", q: "O que é PDG (Procedure Design Gradient)?", a: "PDG = OCS + ROC. É o gradiente publicado na SID. Mínimo: 2.5% + 0.8% = 3.3% (equivale a 200ft/NM). Se maior, a altitude/altura é publicada na carta.", emoji: "📈" },
  { id: 320, subject: "obs", q: "SIDs são projetadas para todos os motores ou para motor inoperante?", a: "Para TODOS OS MOTORES (DOC 8168 PANS OPS). A companhia aérea é responsável por criar procedimento de contingência para falha de motor. Se a aeronave sobe 6% com motor inop mas a SID pede 8%, basta cumprir com todos os motores.", emoji: "✈️" },
  { id: 321, subject: "obs", q: "No DOC 8168, como é tratado um obstáculo em uma curva da SID?", a: "O OCS é traçado até um ponto 246ft (75m) ACIMA do topo do obstáculo, não até o topo dele. Isso compensa a perda de gradiente durante a curva.", emoji: "🔄" },
  { id: 322, subject: "obs", q: "Qual a diferença entre DOC 8168 e TERPS na forma de calcular o ROC?", a: "DOC 8168: ROC fixo em 0.8%. TERPS: ROC = OCS ÷ 0.76, ou seja, ROC = 24% do PDG publicado. No gradiente mínimo (3.3%), ambos dão ROC = 0.8% (equivalentes).", emoji: "📊" },
  { id: 323, subject: "obs", q: "Nem todo gradiente elevado em uma SID é por causa de obstáculos. O que mais pode causar?", a: "Questões de controle de tráfego aéreo (ATC). Muitas SIDs têm gradientes altos por separação de tráfego, não por obstáculos. O piloto precisa verificar a razão no procedimento.", emoji: "📡" },
  { id: 324, subject: "obs", q: "A OAA se estende até que altura?", a: "Até a aeronave atingir 1.500ft AFE (Above Field Elevation). Após isso, os obstáculos deixam de ser relevantes e altitudes como MVA, MSA ou MEA passam a valer.", emoji: "📏" },
  { id: 325, subject: "obs", q: "A 10km do aeroporto a aeronave pode estar a ~710ft. A 1.500ft AFE pode estar a ~28.8km. O AOC cobre até onde?", a: "O AOC cobre apenas ~10km. Entre 10km e ~28.8km há uma zona de incerteza. O piloto deve consultar outras fontes (Jeppesen, NOTAMs, FAA Form 5010, cartas topográficas, até Google Earth).", emoji: "🗺️" },
  { id: 330, subject: "obs", q: "O que é uma EO-SID e quem é responsável por criá-la?", a: "Engine Out SID: procedimento de contingência para falha de motor na saída. O OPERADOR (companhia aérea) é responsável, não a FAA/EASA/ANAC. Reguladores apenas aprovam. Se não há obstáculos, pode ser 'siga a SID publicada'.", emoji: "📋" },
  { id: 331, subject: "obs", q: "Em curva com motor inoperante, o que acontece com o raio de curva?", a: "Depende de QUAL motor falhou. Falha do motor INTERNO (virando para o motor operativo): raio MAIOR. Falha do motor EXTERNO (virando para o lado do motor falhado): raio MENOR. Mesmo banco, raios diferentes.", emoji: "🔄" },
  { id: 332, subject: "obs", q: "O que é Radius Turn Limited Takeoff Weight?", a: "Peso máximo limitado pelo raio de curva. Em aeroportos de alta altitude cercados por montanhas (ex: Cusco, Peru), o raio de curva pode ser maior que o vale. Solução: pesos menores (menor V2 → menor TAS → menor raio) ou bancos maiores.", emoji: "🏔️" },
  { id: 333, subject: "obs", q: "A fórmula do raio de curva é R = V²/(g×tanθ). Como reduzir o raio?", a: "Reduzir V (menor peso → menor V2 → menor TAS) OU aumentar θ (mais banco, mas cuidado com stall margin). Peso menor é mais seguro, mas limita a carga.", emoji: "📐" },
  { id: 334, subject: "obs", q: "Após falha de motor na decolagem, qual a ordem de prioridades do piloto?", a: "AVIATE, NAVIGATE, COMMUNICATE. Primeiro voar o avião, depois navegar, por último comunicar ao ATC. Essa ordem é universal — nunca comunique antes de controlar a aeronave.", emoji: "📡" },
  { id: 340, subject: "obs", q: "Quantos segmentos tem a decolagem e qual o objetivo de cada um?", a: "4 segmentos (todos com motor crítico inop desde VEF): 1º) Recolher trem. 2º) Subir até acceleration altitude. 3º) Acelerar até VFTO (recolher flaps). 4º) Subir até 1.500ft ou livre de obstáculos.", emoji: "📊" },
  { id: 341, subject: "obs", q: "1º Segmento: configuração, velocidade e gradiente mínimo?", a: "Empuxo de decolagem, flap de decolagem, trem RECOLHENDO. Velocidade: V2. De 35ft até trem recolhido. Gradiente mínimo: >0% (bi) / 0.3% (tri) / 0.5% (quad).", emoji: "1️⃣" },
  { id: 342, subject: "obs", q: "2º Segmento: configuração, velocidade e gradiente mínimo?", a: "Empuxo de decolagem, flap de decolagem, trem RECOLHIDO. Velocidade: V2. Do trem recolhido até acceleration altitude. Gradiente mínimo: 2.4% (bi) / 2.7% (tri) / 3.0% (quad). SEGMENTO MAIS LIMITANTE.", emoji: "2️⃣" },
  { id: 343, subject: "obs", q: "3º Segmento: configuração, velocidade e gradiente mínimo?", a: "Empuxo de decolagem, flap RECOLHENDO, trem UP. ACELERANDO de V2 até VFTO. Na acceleration altitude. Gradiente: 1.2% (bi) / 1.5% (tri) / 1.7% (quad). NÃO é para subir — é excesso de energia para ACELERAR.", emoji: "3️⃣" },
  { id: 344, subject: "obs", q: "4º Segmento: configuração, velocidade e gradiente mínimo?", a: "Empuxo MÁXIMO CONTÍNUO (MCT), flap UP, trem UP. Velocidade: VFTO (Final Takeoff Speed). Da acceleration altitude até 1.500ft AFE ou livre de obstáculos. Gradiente: 1.2% (bi) / 1.5% (tri) / 1.7% (quad).", emoji: "4️⃣" },
  { id: 345, subject: "obs", q: "O gradiente do 3º segmento (1.2%/1.5%/1.7%) significa que o avião SOBE nesse gradiente?", a: "NÃO! Erro comum. O 3º segmento é NIVELADO (mesma altitude). O gradiente representa excesso de energia que DEVE EXISTIR, mas é usado para ACELERAR (de V2 até VFTO), não para subir.", emoji: "⚠️" },
  { id: 346, subject: "obs", q: "O gradiente do 2º segmento é medido em que momento exato?", a: "É um gradiente MOMENTÂNEO, medido no instante em que o trem termina de recolher. Conforme a aeronave sobe, o motor perde empuxo com a altitude e o gradiente real DIMINUI.", emoji: "📉" },
