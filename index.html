  { id: "s25", subject: "speeds", q: "VLOF com todos os motores deve ser ≥ a quanto da VMU?", options: ["1.05 VMU(n)", "1.10 VMU(n)", "1.13 VMU(n)", "1.20 VMU(n)"], correct: 1, explanation: "VLOF ≥ 1.10 × VMU(n) com todos os motores. A margem de 10% é maior porque com todos os motores a aceleração é alta e o avião sai do solo rapidamente. Com motor falhado: VLOF ≥ 1.05 × VMU(n-1) — margem menor porque a aceleração cai." },
  { id: "s26", subject: "speeds", q: "VLOF com motor inoperante deve ser ≥ a quanto da VMU?", options: ["1.10 VMU(n)", "1.10 VMU(n-1)", "1.05 VMU(n-1)", "1.13 VMU(n-1)"], correct: 2, explanation: "VLOF ≥ 1.05 × VMU(n-1). Com motor falhado a aceleração é menor, então a margem exigida cai de 10% para 5%. O (n-1) indica VMU com um motor a menos. Estar acima de VMU garante decolagem com atitude menor que tail strike." },
  { id: "s27", subject: "speeds", q: "O que VTIRE limita e quem a define?", options: ["VR, fabricante da aeronave", "V1, fabricante da aeronave", "V2, ICAO", "VLOF, fabricante do pneu"], correct: 3, explanation: "VTIRE é definida pelo fabricante do PNEU e limita a VLOF: VLOF ≤ VTIRE. Se a VLOF excede o limite, os pneus podem delaminar ou falhar na corrida de decolagem. O fabricante da aeronave especifica quais pneus são certificados." },
  { id: "s28", subject: "speeds", q: "V2 deve ser ≥ a quanto de VSR e VMCA?", options: ["1.13 VSR e 1.10 VMCA", "1.10 VSR e 1.05 VMCA", "1.20 VSR e 1.13 VMCA", "1.13 VSR e 1.13 VMCA"], correct: 0, explanation: "V2 ≥ 1.13 × VSR E V2 ≥ 1.10 × VMCA. Ambos devem ser atendidos. O 1.13 VSR substituiu o antigo 1.20 VS quando a definição de estol mudou para VS1G/VSR (~7% de diferença)." },
  { id: "s29", subject: "speeds", q: "Qual banco máximo a V2 deve permitir antes do stick shaker (FAR 25.143)?", options: ["15°", "30°", "25°", "20°"], correct: 1, explanation: "30° TOTAL antes do stall warning. MAS: são 15° de uso planejado + 15° de margem de segurança (turbulência). Na prática, o piloto deve planejar usar no MÁXIMO 15° de bank em V2. Essa divisão 'uso + margem' se aplica sempre que a regulamentação menciona bank antes do estol." },
  { id: "s30", subject: "speeds", q: "V2 era 1.20 VS. Com VS1G/VSR mudou para quanto?", options: ["1.10 VSR", "1.15 VSR", "1.13 VSR", "1.18 VSR"], correct: 2, explanation: "1.13 VSR. Como VSR > VS (mais conservadora), a relação caiu ~7% para manter a mesma margem real. Outras mudanças: VREF de 1.30VS → 1.23VSR, VFTO de 1.25VS → 1.18VSR. Valores antigos não estão 'errados' — referem-se a aeronaves certificadas pela regra anterior." },
  { id: "s31", subject: "speeds", q: "Em que altura acima da pista a V2 é atingida?", options: ["15ft", "25ft", "50ft", "35ft"], correct: 3, explanation: "35ft acima da pista, considerando falha do motor crítico em VEF. Se todos os motores estão operando, a velocidade a 35ft será 10-25kt acima de V2 (excesso de energia). O 35ft é o 'screen height' padrão para decolagem." },
  { id: "s32", subject: "speeds", q: "Se nenhum motor falha, a velocidade a 35ft será:", options: ["10-25kt ACIMA de V2", "Igual a V2", "10-25kt ABAIXO de V2", "Exatamente VMCA"], correct: 0, explanation: "10 a 25kt ACIMA de V2 (varia por modelo). O piloto rota na mesma VR, mas com todos os motores a aceleração é muito maior, então a velocidade acumulada a 35ft excede V2. V2 é calculada para o pior caso (motor falhado)." },
  { id: "d1", subject: "dist", q: "O 'A' em TORA, TODA, ASDA e LDA significa:", options: ["Available, disponível em inglês", "Aircraft, aeronave em inglês", "Actual, real em inglês", "Approach, aproximação em inglês"], correct: 0, explanation: "Available = disponível. SEM o 'A' (TOR, TOD, ASD, LD) = distância que o AVIÃO precisa. COM o 'A' = distância que a PISTA oferece. A performance é aprovada quando a distância do avião ≤ a disponível." },
  { id: "d2", subject: "dist", q: "EO-GO em pista seca: screenheight é de quantos ft?", options: ["15ft", "35ft", "25ft", "50ft"], correct: 1, explanation: "35ft em pista SECA. Em pista wet/slippery/contaminated, a screenheight do EO-GO cai para 15ft. O AE-GO usa sempre 35ft independente da condição da pista." },
  { id: "d3", subject: "dist", q: "EO-GO em pista MOLHADA: screenheight é de quantos ft?", options: ["35ft", "25ft", "15ft", "50ft"], correct: 2, explanation: "15ft! Essa é uma diferença crucial: pista seca = 35ft, qualquer outra condição = 15ft para o EO-GO. Motivo: com motor falhado em superfície degradada, a aeronave tem menos performance, então o critério é mais conservador (menor altura)." },
  { id: "d4", subject: "dist", q: "AE-GO: como se calcula a Takeoff Distance?", options: ["Brake release até 35ft", "Brake release até VLOF + 15%", "Brake release até 50ft", "Brake release até 35ft + 15%"], correct: 3, explanation: "Brake release até 35ft + 15% dessa distância. O fator de 1.15 se aplica em QUALQUER condição de pista para o AE-GO. Isso garante margem para o caso improvável de falha de motor durante o AE-GO." },
  { id: "d5", subject: "dist", q: "Clearway pode ser usado no EO-GO em pista contaminada?", options: ["Não, apenas em pista totalmente seca", "Sim, até 25% da clearway disponível", "Sim, até 50% da clearway total", "Sim, sem qualquer restrição de uso"], correct: 0, explanation: "NÃO! O clearway no EO-GO só é permitido em pista SECA (FAR 25.113). Em qualquer outra condição (wet, slippery, contaminated), o clearway deve ser COMPLETAMENTE desconsiderado do cálculo EO-GO. O AE-GO pode usar clearway em pista seca ou molhada." },
  { id: "d6", subject: "dist", q: "FAR 25.113: quanto do clearway pode ser usado no EO-GO (pista seca)?", options: ["25% da distância aérea", "50% da distância aérea", "100% da distância aérea", "75% da distância aérea"], correct: 1, explanation: "Até 50% (metade) da distância aérea do EO-GO pode ser voada sobre o clearway. A mesma regra de 50% da distância aérea se aplica ao AE-GO, porém o cálculo da distância aérea é diferente (envolve ponto médio entre VLOF e 35ft × 1.15)." },
  { id: "d7", subject: "dist", q: "ASDA é igual a:", options: ["TORA + Clearway", "TODA + Stopway", "TORA + Stopway", "LDA + Stopway"], correct: 2, explanation: "ASDA = TORA + Stopway. O stopway só serve para parar após RTO (rejeição de decolagem). NÃO pode ser usado para pouso nem para iniciar corrida de decolagem. TODA = TORA + Clearway." },
  { id: "d8", subject: "dist", q: "Um stopway pode ser usado para frenagem no POUSO?", options: ["Sim, sempre", "Sim, em emergência", "Sim, se pista seca", "Não, nunca"], correct: 3, explanation: "NUNCA! Apesar do nome 'STOPway', ele serve EXCLUSIVAMENTE para parada após RTO. O pouso usa apenas a LDA. Também não pode ser usado para iniciar a corrida de decolagem." },
  { id: "d9", subject: "dist", q: "Quando NÃO há clearway, o TOR é igual a:", options: ["TOD", "VLOF", "ASDA", "TORA"], correct: 0, explanation: "Sem clearway, TOR = TOD. É a mesma distância: brake release até screenheight (EO-GO) ou brake release até 35ft + 15% (AE-GO). A diferença entre TOR e TOD SÓ aparece quando há clearway disponível." },
  { id: "d10", subject: "dist", q: "Com clearway em pista seca, o TOR do EO-GO é medido até:", options: ["Até 35ft acima da pista líquida", "Até o liftoff inicial real", "Ponto médio entre liftoff e 35ft", "Até o fim da TORA pavimentada"], correct: 2, explanation: "Ponto MÉDIO entre liftoff e 35ft. Isso é diferente da TOD, que vai até 35ft. A porção entre o ponto médio e o screenheight pode usar o clearway. Essa distinção existe porque TOR deve caber na TORA (pista pavimentada) e TOD na TODA (inclui clearway)." },
  { id: "d11", subject: "dist", q: "Proporção típica da ASD (pista seca): aceleração vs frenagem?", options: ["3/4 aceleração, 1/4 frenagem", "50/50", "1/3 aceleração, 2/3 frenagem", "2/3 aceleração, 1/3 frenagem"], correct: 3, explanation: "Aproximadamente 2/3 acelerando e 1/3 parando. É uma estatística para avião médio em pista seca, NÃO uma regra. Na prática, varia conforme peso, velocidade e condição de pista." },
  { id: "d12", subject: "dist", q: "Qual a cor dos chevrons que identificam um stopway?", options: ["Amarelos", "Brancos", "Vermelhos", "Verdes"], correct: 0, explanation: "Chevrons AMARELOS pintados no pavimento. A área do stopway é pavimentada (capaz de suportar a aeronave), mas não faz parte da TORA — é um acréscimo à ASDA." },
  { id: "d13", subject: "dist", q: "A Landing Distance é medida a partir de que altura?", options: ["15ft", "50ft", "35ft", "100ft"], correct: 1, explanation: "50ft acima da pista até a parada completa. Atenção: a screenheight de pouso (50ft) é DIFERENTE da de decolagem (35ft seca / 15ft wet para EO-GO). Pergunta clássica de entrevista." },
  { id: "d14", subject: "dist", q: "Displaced threshold afeta a distância de DECOLAGEM?", options: ["Sim, reduz TORA", "Sim, reduz TODA", "Não afeta nenhuma", "Apenas se a pista for molhada"], correct: 2, explanation: "NÃO afeta nenhuma distância de decolagem, em nenhuma direção. Afeta apenas a LDA, e somente quando se pousa NA DIREÇÃO do displaced threshold. Pousando no sentido oposto, a área com setas brancas pode ser usada." },
  { id: "d15", subject: "dist", q: "Largura mínima de um clearway é:", options: ["90m de cada lado", "60m de cada lado", "45m de cada lado", "75m de cada lado"], correct: 3, explanation: "75m para cada lado do eixo da pista = 150m de largura total. O comprimento máximo é 50% da TORA. Obstáculos são permitidos se abaixo da rampa de 1.25% a partir do fim da TORA." },
  { id: "d16", subject: "dist", q: "Comprimento máximo de um clearway é:", options: ["50% da TORA", "25% da TORA", "75% da TORA", "100% da TORA"], correct: 0, explanation: "50% da TORA. A largura mínima é 75m de cada lado (150m total). Obstáculos são permitidos se abaixo de uma rampa de 1.25%. Exceção: luzes de threshold ≤ 0.66m (26in) nas laterais." },
  { id: "d17", subject: "dist", q: "A inclinação máxima de obstáculos permitidos em um clearway é:", options: ["0.5%", "1.25%", "1.0%", "2.0%"], correct: 1, explanation: "1.25% de inclinação a partir do fim da TORA. Qualquer obstáculo abaixo dessa rampa imaginária é permitido. Única exceção: luzes de threshold com até 0.66m nas laterais." },
  { id: "d18", subject: "dist", q: "Comprimento mínimo real da RESA segundo a ICAO é:", options: ["60m", "90m", "150m", "240m"], correct: 2, explanation: "150m na prática = runway strip de 60m + 90m além. O Anexo 14 diz '90m além do strip', mas na prática total = 150m. Recomendado: 240m (= 60m strip + 180m). Largura mínima: 2× a largura da pista." },
  { id: "d19", subject: "dist", q: "RESA precisa suportar o peso da aeronave?", options: ["Depende do tipo do pavimento", "Sim, carga estrutural máxima exigida", "Sim, mas com margem de segurança", "Não, apenas manter o avião íntegro"], correct: 3, explanation: "NÃO! Diferente do stopway (que deve suportar a aeronave sem danos), a RESA pode ser gramada, cascalhada, ou ter EMAS (concreto que se esfarela). O objetivo é segurança dos ocupantes, não integridade da aeronave." },
  { id: "d20", subject: "dist", q: "RESA pode funcionar simultaneamente como clearway?", options: ["Sim, se atender os requisitos de clearway", "Não pode ser usada como clearway", "Pode em pista seca, não em wet", "Pode somente em pistas com 240m ou menos"], correct: 0, explanation: "SIM, se atender: largura ≥ 75m/lado, comprimento ≤ 50% TORA, obstáculos abaixo de 1.25%, dentro do aeródromo. Exemplo real: Porto Seguro (Brasil), onde a RESA virou clearway após implementação." },
  { id: "d21", subject: "dist", q: "Visualmente, como distinguir um displaced threshold por obstáculo vs por RESA?", options: ["Pela cor da pintura da pista", "Impossível, só pelos valores publicados", "Pelo tamanho do threshold pintado", "Pela presença de luzes de borda"], correct: 1, explanation: "IMPOSSÍVEL distinguir visualmente! A única forma é consultar os valores publicados de TORA, TODA, ASDA e LDA e deduzir. O de obstáculo pode ser usado na TORA; o de RESA NÃO pode." },
  { id: "d22", subject: "dist", q: "Ao implementar RESA em aeroporto antigo, qual distância é MAIS afetada?", options: ["TORA", "TODA", "LDA", "ASDA"], correct: 2, explanation: "LDA é a mais afetada porque sofre redução nos DOIS lados: o displaced threshold reduz LDA na direção do pouso, e a RESA no outro extremo também pode reduzir. TODA pode não ser afetada se a RESA virar clearway." },
  { id: "d23", subject: "dist", q: "Qual o período de transição creditado no cálculo da ASD entre V1 e o início da desaceleração?", options: ["4 segundos", "1 segundo", "3 segundos", "2 segundos"], correct: 3, explanation: "2 segundos é o mínimo exigido pela regulamentação. Se o fabricante provar que leva MAIS que 2s, o tempo real deve ser usado. Na regra atual, a velocidade é tratada como constante nesse período. Na regra anterior, considerava-se ainda acelerando." },
  { id: "d24", subject: "dist", q: "A margem conservadora do fabricante no cálculo da ASD consiste em:", options: ["Usar tempo de transição maior que o real", "Reduzir o tempo de transição previsto", "Ignorar completamente o CG", "Assumir pista sempre molhada"], correct: 0, explanation: "Fabricantes usam tempo de transição (entre VEF e início da desaceleração) MAIOR do que o real medido em testes. A regulamentação exige 2s, mas fabricantes usam mais (até ~4s), criando margem significativa a favor da segurança." },
  { id: "d25", subject: "dist", q: "No cálculo da ASD em pista SECA, o reversor pode ser considerado?", options: ["Sim, todos os reversores instalados", "Não, reverso não conta em pista seca", "Sim, todos exceto um para margem", "Só o do motor crítico inoperante"], correct: 1, explanation: "NÃO pode ser considerado em pista seca. Em pista molhada: todos menos 1 (opcional). Em pista contaminada: todos (opcional). Na prática, o piloto USA reversor em uma RTO real, gerando margem adicional não contabilizada." },
  { id: "d26", subject: "dist", q: "Em pista contaminada, quantos reversores podem ser considerados na ASD?", options: ["Nenhum", "Todos menos 1", "Todos", "Todos menos 2"], correct: 2, explanation: "TODOS os reversores, opcionalmente. Compare: pista seca = nenhum, pista molhada = todos menos 1, pista contaminada = todos. A lógica é que em superfícies degradadas os freios são menos eficazes, então o reversor é necessário no cálculo." },
  { id: "d27", subject: "dist", q: "Qual posição de CG é usada no cálculo da ASD?", options: ["Depende da companhia", "AFT", "Neutro", "FORWARD"], correct: 3, explanation: "CG FORWARD. Com CG à frente, há MENOS peso sobre o trem de pouso principal e os freios, resultando em menor eficácia de frenagem. É a condição mais conservadora. NÃO confunda com VMCG (que usa CG aft para controle direcional)." },
  { id: "d28", subject: "dist", q: "Por que a ASD calculada tende a ser maior que a distância real de parada?", options: ["Margem do fabricante mais CG forward mais reversor", "Porque o cálculo usa CG aft", "Porque considera vento de cauda forte", "Porque usa o peso mínimo operacional"], correct: 0, explanation: "Três fatores somam: 1) fabricantes usam tempo de transição maior que o real (~2-4s vs ~1,4s). 2) CG forward = pior frenagem. 3) Reversor não contabilizado em pista seca, mas o piloto usa na prática. Tudo favorece a segurança." },
  { id: "d29", subject: "dist", q: "Por que o screenheight cai de 35ft para 15ft em pista molhada no EO-GO?", options: ["Menor sustentação em pista molhada", "V1 menor, VR perto do fim, impossível 35ft", "Exigência da regulamentação europeia", "Para reduzir consumo de combustível"], correct: 1, explanation: "Em pista molhada, V1 diminui (frenagem pior). O gap V1→VR fica enorme. Com aceleração mono-motor baixíssima, VR acontece muito perto do fim da pista, impossibilitando atingir 35ft. O regulador reduziu o screenheight mas PROIBIU clearway no EO-GO wet." },
  { id: "d30", subject: "dist", q: "A aceleração do avião muda entre pista seca e molhada?", options: ["Sim, é menor na molhada", "Sim, é maior na molhada", "Não muda", "Depende do peso"], correct: 2, explanation: "NÃO muda! Aceleração vem dos motores (empuxo), não das rodas. Seca ou molhada, a aceleração é IDÊNTICA. O que muda é a frenagem (atrito pneu-solo reduzido pela água). Por isso V1 muda mas VR e V2 não." },
  { id: "d31", subject: "dist", q: "Mesmo peso, pista seca vs molhada: quais V-speeds mudam?", options: ["Nenhuma", "Somente V2", "V1, VR e V2", "Somente V1"], correct: 3, explanation: "SOMENTE V1 diminui. VR e V2 dependem de peso e densidade do ar, não da condição de pista. V1 cai porque precisa começar a frear mais cedo para compensar a menor eficácia dos freios na pista molhada." },
  { id: "d32", subject: "dist", q: "No EO-GO, a falha é considerada como:", options: ["Fuel cutoff com empuxo zero", "Idle com empuxo residual", "50% de empuxo", "Depende do fabricante"], correct: 0, explanation: "FUEL CUTOFF (empuxo zero) no motor crítico — o pior cenário para continuar a decolagem. Para o ACCEL-STOP, usa-se IDLE (empuxo residual), pois frear com empuxo residual é PIOR que frear sem motor. Cada cálculo usa o cenário mais desfavorável." },
  { id: "d33", subject: "dist", q: "Por que o ACCEL-STOP usa idle em vez de fuel cutoff?", options: ["É tecnicamente mais realista no teste", "Idle produz empuxo residual no freio", "A regulamentação obriga este método", "É mais simples para cálculo manual"], correct: 1, explanation: "Com idle, há empuxo residual que se OPÕE à frenagem. Sem reversor (pista seca), a parada demora mais com motor em idle do que com motor desligado. É o pior cenário para PARAR. No EO-GO, fuel cutoff é o pior para CONTINUAR. Cada cálculo maximiza o risco." },
  { id: "d34", subject: "dist", q: "Qual a ordem de grandeza da queda de aceleração de um bimotor ao perder 1 motor?", options: ["Queda de aproximadamente 25%", "Queda de aproximadamente 50%", "Queda de aproximadamente 75%", "Não há queda significativa"], correct: 2, explanation: "Queda de aproximadamente 75% (tipicamente de ~4kt/s com ambos para ~1kt/s mono-motor). Por isso, em pista molhada com V1 baixo, a distância entre V1 e VR é percorrida lentamente, e VR acaba muito perto do fim da pista." },
  { id: "d35", subject: "dist", q: "O FAR Field Length Required é o _____ entre ASD, EO-GO e 115% AE-GO:", options: ["ASD sempre", "Médio", "Menor", "Maior"], correct: 3, explanation: "O MAIOR dos três. A pista deve acomodar o pior cenário: seja parar (ASD), continuar mono-motor (EO-GO), ou garantir margem com todos os motores (AE-GO×1.15). Qualquer que for a maior distância, essa é a exigida." },
  { id: "d36", subject: "dist", q: "Em BIMOTORES, qual distância é MAIS RARAMENTE a limitante?", options: ["115% AE-GO em campo limpo", "ASD em pista contaminada", "EO-GO com obstáculo próximo", "Distância de pouso em pista wet"], correct: 0, explanation: "115% AE-GO raramente limita em bimotores. Perder 1 de 2 motores = 50% do empuxo, fazendo a EO-GO ser muito maior que a AE-GO. Mesmo com +15%, a AE-GO×1.15 quase nunca supera a EO-GO ou a ASD." },
  { id: "d37", subject: "dist", q: "Em QUADRIMOTORES, a AE-GO×1.15 limita mais frequentemente porque:", options: ["Porque são aeronaves mais lentas", "Perdem apenas 25% do empuxo total disponível", "Porque usam pistas mais curtas", "Porque têm mais freios ativos"], correct: 1, explanation: "Perdem apenas 25% do empuxo (3 de 4 sobram). A EO-GO não é muito maior que a AE-GO. Mas como o avião é pesado, a AE-GO já é longa. Com +15%, frequentemente supera a EO-GO." },
  { id: "d38", subject: "dist", q: "O que é Field Limited Takeoff Weight?", options: ["Peso sem passageiros", "Peso mínimo para decolagem", "Peso máximo para uma determinada pista", "Peso de combustível máximo"], correct: 2, explanation: "Peso MÁXIMO de decolagem para uma pista específica. É a perspectiva inversa: em vez de calcular quanta pista um peso exige, calcula-se quanto peso a pista permite. O menor entre os três cenários (ASD, EO-GO, AE-GO×1.15) define o peso limite." },
  { id: "d39", subject: "dist", q: "O que é o Dry Check?", options: ["Testar os freios em pista seca", "Verificar se a pista está seca", "Checar o nível de combustível", "Garantir que peso wet ≤ peso dry"], correct: 3, explanation: "Garantir que o peso permitido para pista MOLHADA não exceda o permitido para pista SECA. Em pistas SK-R (grooved), o crédito do reversor em pista wet pode dar peso wet > dry — e a regulamentação PROÍBE isso. Deve-se usar o peso dry (menor)." },
  { id: "d40", subject: "dist", q: "Como é possível que o peso limitante em pista wet seja MAIOR que em dry?", options: ["Em pistas SK-R com crédito de reversor wet", "Não é tecnicamente possível", "Porque a V1 calculada é menor", "Porque a V2 calculada é maior"], correct: 0, explanation: "Pistas SK-R (Skid Resistant/grooved) têm frenagem similar em seca e molhada. MAS em pista wet o reversor pode ser contabilizado na ASD, e em seca NÃO. Esse crédito extra do reversor pode resultar em ASD menor → peso limitante maior → peso wet > dry." },
  { id: "d41", subject: "dist", q: "Se o cálculo dá FLTOW wet = 78t e FLTOW dry = 76t, qual usar em pista wet?", options: ["78t do cálculo wet", "76t do cálculo dry", "77t como média", "Depende da companhia"], correct: 1, explanation: "76t (o dry). A regulamentação PROÍBE decolar de pista molhada com peso maior que o permitido em pista seca. O Dry Check impõe: FLTOW wet ≤ FLTOW dry. Sempre o menor prevalece." },
  { id: "d42", subject: "dist", q: "As penalidades de line up correction são iguais para TORA/TODA e ASDA?", options: ["Sim, mesma penalidade nas duas", "Depende da rotação do trem principal", "Não, ASDA mede o nariz e TORA o trem", "Não, TORA penaliza sempre mais"], correct: 2, explanation: "São DIFERENTES. Na parada (ASDA), a aeronave deve parar com o nariz ainda na pista. Na decolagem (TORA/TODA), mede-se o ponto mais baixo a 35ft (trem principal). A diferença entre as penalidades = distância nariz ↔ trem principal." },
  { id: "d43", subject: "dist", q: "O Rolling Takeoff reduz principalmente o risco de:", options: ["Perda de comunicação com a torre", "Tail strike e overrun", "Estouro de pneu e aquecimento de freio", "FOD e compressor stall em vento cruzado"], correct: 3, explanation: "FOD (Foreign Object Damage) — ao não parar na pista com motores em alta potência, objetos não são sugados. E compressor stall — vento cruzado forte com aeronave parada e potência máxima pode causar stall no compressor. A técnica rolling evita ambos." },
  { id: "d44", subject: "dist", q: "A linha amarela do taxiway serve para ENTRAR ou SAIR da pista?", options: ["Sair", "Entrar", "Ambos", "Depende do aeroporto"], correct: 0, explanation: "SAIR da pista! A linha amarela guia a aeronave DA pista PARA o taxiway. Seguir essa linha ao ENTRAR (especialmente em saídas de alta velocidade) faz uma curva mais aberta, desperdiçando mais pista que o previsto nas tabelas de correction." },
  { id: "v1a", subject: "speeds", q: "Se você AUMENTA a V1, a distância para continuar a decolagem com motor falhado:", options: ["Aumenta", "Depende do peso", "Não muda", "Diminui"], correct: 3, explanation: "DIMINUI. Com V1 mais alta, o motor falha mais tarde, a aeronave já está mais rápida, e precisa de menos aceleração mono-motor para atingir VR/V2. A EO-GO encurta. Porém a ASD aumenta (mais velocidade para frear)." },
  { id: "v1b", subject: "speeds", q: "A escolha de V1 afeta a distância AE-GO (todos os motores)?", options: ["Não afeta", "Sim, V1 baixa aumenta AE-GO", "Sim, V1 alta aumenta AE-GO", "Depende da condição da pista"], correct: 0, explanation: "NÃO afeta. Na AE-GO nenhum motor falha, então a aceleração nunca é reduzida. V1 só importa quando há falha (EO-GO) ou rejeição (ASD). A AE-GO é constante para um dado peso." },
  { id: "v1c", subject: "speeds", q: "O que é Balanced V1?", options: ["V1 = VR", "V1 onde ASD = EO-GO", "V1 que usa toda a pista", "V1 máxima possível"], correct: 1, explanation: "É a V1 onde a ASD é EXATAMENTE igual à EO-GO. Nesse ponto, a pista requerida é a MENOR possível para aquele peso. As distâncias de parar e continuar estão 'em equilíbrio'." },
  { id: "v1d", subject: "speeds", q: "Balanced field length significa que o avião usa toda a pista disponível?", options: ["Sim, incluindo o uso pleno do stopway", "Sim, mas excluindo qualquer clearway", "Não, significa apenas que ASD iguala EO-GO", "Sim, ocupa toda a distância disponível"], correct: 2, explanation: "NÃO! Erro muito comum. Balanced field = ASD = EO-GO para aquele peso. O avião pode ter balanced field usando MUITO MENOS pista do que a disponível. Não tem relação com o tamanho da pista." },
  { id: "v1e", subject: "speeds", q: "Uma pista com TORA = TODA = ASDA é um 'balanced field'?", options: ["Sim, pista balanceada e balanced field são iguais", "Não, exige também stopway igual a TORA", "Sim, contanto que não exista clearway", "Não, balanced field é da aeronave, não da pista"], correct: 3, explanation: "NÃO. Distâncias declaradas iguais = característica da PISTA (sem stopway nem clearway). Balanced field = condição do AVIÃO (ASD = EO-GO). São conceitos independentes. Pergunta clássica de entrevista!" },
  { id: "v1f", subject: "speeds", q: "Existe balanced field para pouso?", options: ["Não, é exclusivo de decolagem", "Sim, mas só em pista seca", "Sim, quando LD = LDA", "Sim, quando usa toda a LDA"], correct: 0, explanation: "NÃO existe. Balanced field é um conceito EXCLUSIVAMENTE de decolagem (relação ASD × EO-GO). Confundir isso com pouso é um erro grave." },
  { id: "v1g", subject: "speeds", q: "O que é VGO e como se comporta com o aumento de peso?", options: ["V1 fixa independente do peso", "V1 mínima para continuar — sobe com peso", "V1 mínima para continuar — desce com peso", "V1 máxima para parar — desce com peso"], correct: 1, explanation: "VGO = V1 mínima para CONTINUAR após falha. Avião leve → VGO baixa (acelera fácil mono-motor). Pesado → VGO alta (precisa de mais velocidade inicial porque acelera mal mono-motor). VGO SOBE com o peso." },
  { id: "v1h", subject: "speeds", q: "O que é VSTOP e como se comporta com o aumento de peso?", options: ["V1 mínima para continuar — sobe com peso", "V1 mínima para continuar — desce com peso", "V1 máxima para parar — desce com peso", "V1 máxima para parar — sobe com peso"], correct: 2, explanation: "VSTOP = V1 máxima para PARAR na ASDA. Avião leve → VSTOP alta (freia fácil). Pesado → VSTOP desce (mais difícil frear, precisa começar mais cedo). É o OPOSTO do VGO." },
  { id: "v1i", subject: "speeds", q: "No peso máximo para uma pista, quantas opções de V1 existem?", options: ["Duas opções, VGO e VSTOP", "Nenhuma opção viável", "Várias opções disponíveis", "Apenas uma, onde VGO = VSTOP"], correct: 3, explanation: "APENAS UMA. No peso máximo, VGO e VSTOP se encontram em um único ponto. Não há margem — é a única V1 que permite tanto parar quanto continuar. Acima desse peso, não existe V1 válida." },
  { id: "v1j", subject: "speeds", q: "Como um STOPWAY aumenta o peso máximo de decolagem?", options: ["Aumenta VSTOP, V1 sobe e peso aumenta", "Reduz a distância AE-GO calculada", "Reduz a VGO necessária no segundo segmento", "Aumenta o gradient de subida líquido"], correct: 0, explanation: "Stopway → mais ASDA → VSTOP sobe (pode rejeitar mais tarde) → a interseção VGO×VSTOP desloca para peso MAIOR. Para aproveitar, V1 deve SUBIR em relação ao balanced original." },
  { id: "v1k", subject: "speeds", q: "Como um CLEARWAY aumenta o peso máximo de decolagem?", options: ["Aumenta a VSTOP necessária", "Reduz VGO, V1 desce, permite mais peso", "Aumenta a distância AE-GO", "Reduz a ASD calculada"], correct: 1, explanation: "Clearway (pista seca) → mais TODA → VGO desce (pode continuar com V1 mais baixa) → interseção desloca para peso MAIOR. Para aproveitar, V1 deve DESCER. Mecanismo OPOSTO ao stopway." },
  { id: "v1l", subject: "speeds", q: "Para aproveitar um stopway, V1 deve ser ___. Para aproveitar um clearway, V1 deve ser ___:", options: ["Aumentada / Aumentada", "Diminuída / Aumentada", "Aumentada / Diminuída", "Diminuída / Diminuída"], correct: 2, explanation: "STOPWAY → V1 SOBE (mais pista para parar, então rejeita mais tarde). CLEARWAY → V1 DESCE (mais espaço para continuar, então aceita falha mais cedo). Ambos AUMENTAM o peso máximo, por caminhos opostos." },
  { id: "v1m", subject: "speeds", q: "O que é Optimum V1?", options: ["Mesma V1 do balanced field original", "V1 conservadora por margem teórica", "V1 ajustada para coincidir com a VR", "V1 que maximiza o peso para a pista"], correct: 3, explanation: "É a V1 que resulta no MAIOR peso possível. Pode ser balanced (pista sem stopway/clearway) ou unbalanced (aproveitando stopway ou clearway). É o que o despachante/sistema de performance busca." },
  { id: "v1n", subject: "speeds", q: "Com V1 baixa, qual distância tende a limitar? Com V1 alta?", options: ["EO-GO / ASD", "AE-GO / ASD", "ASD / EO-GO", "ASD / AE-GO"], correct: 0, explanation: "V1 baixa → EO-GO limita (motor falha cedo, muita aceleração mono-motor). V1 alta → ASD limita (muita velocidade para frear). É o fundamento do gráfico em X." },
  { id: "v1o", subject: "speeds", q: "Uma aeronave operando BEM ABAIXO do peso máximo tem muita ou pouca flexibilidade na escolha de V1?", options: ["Pouca", "Muita", "Igual ao peso máximo", "Nenhuma"], correct: 1, explanation: "MUITA flexibilidade (área verde ampla no gráfico). Leve = acelera e freia fácil, então há muitas V1 válidas entre VGO e VSTOP. Conforme o peso sobe, as opções estreitam até restar uma única V1 no peso máximo." },
  { id: "v2a", subject: "speeds", q: "Se a balanced V1 calculada for menor que V1(MCG), o que acontece?", options: ["Decolagem é cancelada imediatamente", "Usa-se a VMCG como nova V1", "V1 é ajustada para V1MCG, com penalidade", "Mantém-se a balanced V1 calculada"], correct: 2, explanation: "V1 é ajustada para V1(MCG). Decolar com V1 < V1(MCG) é PROIBIDO (sem controle direcional). Lembrando: V1(MCG) = VMCG + 1 segundo. Pode haver penalidade de peso dependendo da pista." },
  { id: "v2b", subject: "speeds", q: "55% das excursões de pista por RTO foram causadas por:", options: ["Pista molhada sem speedbrake ativado", "Falha mecânica do sistema de freios", "Falha de motor abaixo da V1 calculada", "Manobras de rejeição acima da V1"], correct: 3, explanation: "55% dos overruns aconteceram porque pilotos rejeitaram APÓS V1, quando já deveriam ter continuado! É a principal causa de acidentes em RTO. Por isso a disciplina de V1 é tão enfatizada." },
  { id: "v2c", subject: "speeds", q: "Na região de ALTA energia, qual regra mnemônica ajuda a decidir Go/No-Go?", options: ["YAW or YELL", "PUSH or PULL", "CHECK and STOP", "LOOK and LISTEN"], correct: 0, explanation: "YAW or YELL. YAW = guinada = falha de motor. YELL = alarme sonoro = fogo (sino) ou windshear (alerta). Se não há yaw nem yell na alta energia, NÃO rejeitar. Atenção: estouro de pneu pode causar yaw falso!" },
  { id: "v2d", subject: "speeds", q: "Pneu estoura a alta velocidade durante a decolagem. O que fazer?", options: ["RTO imediata", "Continuar a decolagem", "Aplicar reversor e parar", "Depende da velocidade"], correct: 1, explanation: "CONTINUAR! RTO por pneu em alta velocidade tem altíssima chance de excursão de pista. O avião foi projetado para parar com freios funcionando, NÃO com pneus estourados. Continue, queime combustível, pouse mais leve. Cuidado: o yaw do pneu pode parecer falha de motor — cheque os instrumentos!" },
  { id: "v2e", subject: "speeds", q: "Na região de BAIXA energia (tipicamente abaixo de 80-100kt), pode-se rejeitar por qualquer motivo?", options: ["Decisão depende da condição da pista", "Não, só por fogo em motor declarado", "Sim, RTO é segura nessa faixa de velocidade", "Não, só por falha confirmada de motor"], correct: 2, explanation: "SIM. Na baixa energia, RTO é segura para QUALQUER discrepância. A aeronave tem pouca velocidade e para facilmente. Na alta energia, SOMENTE safety-critical: fogo, falha de motor, windshear. O limite exato (80 ou 100kt) depende do fabricante." },
  { id: "v2f", subject: "speeds", q: "Como o VENTO afeta V1?", options: ["Vento de proa diminui V1, cauda aumenta", "Vento afeta VR e V2, mas não V1", "Vento afeta apenas a VR, não V1", "Vento de proa aumenta V1, cauda diminui"], correct: 3, explanation: "Vento de PROA → V1 AUMENTA (mais fácil parar contra o vento, permite rejeitar mais tarde). Vento de CAUDA → V1 DIMINUI (mais difícil parar, precisa rejeitar antes). VR e V2 NÃO são afetadas pelo vento." },
  { id: "v2g", subject: "speeds", q: "Quais fatores afetam V1 mas NÃO afetam VR e V2?", options: ["Vento e slope da pista", "Flap e densidade do ar", "Peso e temperatura ambiente", "Todos afetam VR e V2"], correct: 0, explanation: "VENTO e SLOPE afetam apenas V1, não VR/V2. Vento: afeta frenagem (V1). Slope: uphill facilita frenagem (V1↑), downhill dificulta (V1↓). VR e V2 dependem de peso, ar e flap — não de condições do solo." },
  { id: "v2h", subject: "speeds", q: "Mais FLAP de decolagem: V1, VR e V2 aumentam ou diminuem?", options: ["Todas as três aumentam juntas", "Todas as três diminuem juntas", "V1 desce, VR e V2 sobem", "V1 sobe, VR e V2 descem"], correct: 1, explanation: "TODAS diminuem. Mais flap = mais sustentação a menor velocidade → VR e V2 descem. Como V1 ≤ VR, V1 também desce." },
  { id: "v2i", subject: "dist", q: "Uma pista sobe nos primeiros 2/3 e desce no último 1/3. O slope médio é 0%. Qual o problema?", options: ["A AE-GO aumenta indevidamente", "O clearway fica inutilizável", "V1 atingida tarde e freia em descida", "Nenhum, slope médio é suficiente"], correct: 2, explanation: "O computador calcula slope 0% e assume pista plana. Na realidade, o avião sobe (acelera devagar) → atinge V1 mais PERTO do fim da pista. Depois, freia DESCENDO (pior). Resultado: pode exceder a pista mesmo com V1 tecnicamente 'correta'. Problema conhecido, sem solução definitiva." },
  { id: "v2j", subject: "dist", q: "A carta do aeroporto mostra TDZE. Isso é a elevação exata do threshold?", options: ["Sim, é a elevação exata", "Depende da regulamentação", "Apenas em pistas longas", "Não, TDZE fica ~300m após o threshold"], correct: 3, explanation: "NÃO. TDZE = Touchdown Zone Elevation, um ponto ~300m dentro da pista. A elevação real do threshold pode ser diferente. O AOC (Airport Obstacle Chart) mostra o perfil real, mas nem todos aeroportos publicam." },
  { id: "ob1", subject: "obs", q: "Margem vertical mínima sobre obstáculos na saída (FAA/ICAO saída reta):", options: ["15ft", "35ft", "25ft", "50ft"], correct: 1, explanation: "35ft para saídas retas em ambos os padrões. A EASA aumenta para 50ft em curvas com mais de 15° de desvio. A FAA também oferece alternativa horizontal (200ft/300ft) mas a ICAO/EASA não." },
  { id: "ob2", subject: "obs", q: "A OAA da ICAO/EASA alarga a que taxa? E a da FAA?", options: ["ICAO 6.25%, FAA 12.5%", "Ambas usam 12.5%", "ICAO 12.5%, FAA 6.25%", "Ambas usam 6.25%"], correct: 2, explanation: "ICAO/EASA: 12.5% cada lado (o DOBRO). FAA: 6.25% cada lado. Resultado: a OAA ICAO é mais larga, captura mais obstáculos, e é MAIS restritiva. A largura máxima é essencialmente igual (~4.000ft / ~1.200m)." },
  { id: "ob3", subject: "obs", q: "Qual a margem extra (gradiente) adicionada à NFP para formar a GFP em um BIMOTOR?", options: ["+1.0%", "+0.5%", "+0.9%", "+0.8%"], correct: 3, explanation: "+0.8% para bimotor. +0.9% para trimotor. +1.0% para quadrimotor. Essa margem extra compensa erros de pilotagem e condições meteorológicas adversas. GFP = NFP + margem." },
  { id: "ob4", subject: "obs", q: "O que é Obstacle Limited Takeoff Weight?", options: ["Peso máximo para cumprir GFP mono-motor", "Peso máximo limitado pela pista", "Peso máximo estrutural certificado", "Peso máximo de combustível total"], correct: 0, explanation: "É o peso máximo que permite sobrevoo de TODOS os obstáculos na OAA respeitando a GFP, com motor crítico inoperante desde VEF. Diferente do Field Limited TOW (pista) e do Structural Limited TOW (MTOW)." },
  { id: "ob5", subject: "obs", q: "Quando limitado por obstáculo, V1 deve ser aumentada ou diminuída para ganhar peso?", options: ["V1 deve ser reduzida (aumenta AE-GO)", "V1 deve ser aumentada (mais ASD útil)", "V1 deve permanecer balanced fixa", "V2 deve subir para compensar V1"], correct: 1, explanation: "AUMENTADA. V1 maior → airborne mais cedo → mais distância do obstáculo → gradiente necessário MENOR → permite MAIS peso. É o oposto do clearway (que pede V1 menor). Grande oportunidade de unbalancing." },
  { id: "ob6", subject: "obs", q: "O gradiente mínimo de uma SID (PDG) é:", options: ["2.5% ou 150ft/NM", "5.0% ou 300ft/NM", "3.3% ou 200ft/NM", "4.0% ou 240ft/NM"], correct: 2, explanation: "3.3% = OCS mínimo (2.5%) + ROC (0.8%) = PDG mínimo. Equivale a 200ft/NM. Se obstáculos exigem mais, a altitude é publicada na carta. O PDG mínimo se aplica tanto no DOC 8168 quanto no TERPS." },
  { id: "ob7", subject: "obs", q: "SIDs são projetadas para voar com:", options: ["Depende da SID", "Motor inoperante", "Empuxo reduzido", "Todos os motores"], correct: 3, explanation: "TODOS OS MOTORES (DOC 8168 PANS OPS). A companhia aérea desenvolve procedimento de contingência para motor inop. Se a SID exige 8% mas a aeronave faz 6% com motor inop., basta cumprir 8% com todos os motores — não precisa trocar de SID." },
  { id: "ob8", subject: "obs", q: "No TERPS (EUA), o ROC é sempre ___% do PDG publicado:", options: ["24%", "10%", "20%", "15%"], correct: 0, explanation: "24% do PDG publicado (ROC = OCS ÷ 0.76, ou seja, ROC = PDG × 24%). No DOC 8168, ROC é fixo em 0.8%. No gradiente mínimo (3.3%), ambos dão o mesmo resultado: 3.3% × 24% = 0.8%." },
  { id: "ob9", subject: "obs", q: "Para obstáculos em uma curva da SID (DOC 8168), o OCS é traçado até:", options: ["O topo do obstáculo", "246ft acima do obstáculo", "35ft acima do obstáculo", "50ft acima do obstáculo"], correct: 1, explanation: "246ft (75m) ACIMA do topo do obstáculo, não até o topo. Isso compensa a perda de gradiente de subida durante a curva, já que o software não calcula bem a performance em curva com motor inop." },
  { id: "ob10", subject: "obs", q: "A OAA se estende até a aeronave atingir:", options: ["500ft AFE", "1.500ft AFE", "1.000ft AFE", "2.000ft AFE"], correct: 1, explanation: "1.500ft AFE. Após essa altura, obstáculos não são mais relevantes e altitudes como MVA, MSA ou MEA garantem separação do terreno. Porém o AOC cobre apenas ~10km (~710ft AFE) — entre 10km e ~28.8km há incerteza." },
  { id: "ob11", subject: "obs", q: "Qual a diferença entre FAA e ICAO/EASA na largura INICIAL da OAA?", options: ["FAA usa 90m e ICAO usa 200ft", "Iguais nos dois reguladores em 200ft", "FAA usa 200ft, ICAO 60m+meia envergadura", "FAA usa 300ft e ICAO usa 180m"], correct: 2, explanation: "FAA: 200ft de meia-largura até o limite do aeroporto, depois 300ft. ICAO: 60m + metade da envergadura, OU 90m (o que for MENOR), depois alarga a 12.5%. São abordagens bem diferentes." },
  { id: "ob12", subject: "obs", q: "OCS mínimo é 2.5%. Somando ROC de 0.8%, o PDG mínimo é 3.3%. Isso equivale a:", options: ["100ft/NM", "150ft/NM", "250ft/NM", "200ft/NM"], correct: 3, explanation: "200ft/NM é o gradiente mínimo padrão para SIDs. Se não há obstáculos, toda SID tem pelo menos 3.3% (200ft/NM). Gradientes maiores são publicados com a altitude correspondente." },
  { id: "cl1", subject: "obs", q: "Qual segmento de decolagem é geralmente o MAIS limitante para o peso?", options: ["1º segmento", "4º segmento", "2º segmento", "3º segmento"], correct: 2, explanation: "O 2º segmento, porque exige o MAIOR gradiente mínimo: 2.4% para bimotores (vs >0% no 1º, 1.2% no 3º e 4º). É feito com flap de decolagem e trem recolhido, em V2, com motor inop. Peso alto = gradiente insuficiente." },
  { id: "cl2", subject: "obs", q: "Gradiente mínimo do 2º segmento para bimotor / trimotor / quadrimotor:", options: ["3.3% / 3.6% / 3.9%", "1.2% / 1.5% / 1.7%", ">0% / 0.3% / 0.5%", "2.4% / 2.7% / 3.0%"], correct: 3, explanation: "2.4% / 2.7% / 3.0%. São os gradientes mais exigentes de todos os segmentos. O 1º segmento pede >0%/0.3%/0.5%. O 3º e 4º pedem 1.2%/1.5%/1.7%." },
  { id: "cl3", subject: "obs", q: "O 3º segmento exige gradiente de 1.2%. Isso significa que o avião SOBE a 1.2%?", options: ["Não, é excesso para acelerar nivelado", "Sim, o avião sobe a 1.2% padrão", "Sim, mas apenas em emergência declarada", "Depende do peso real de decolagem"], correct: 0, explanation: "NÃO sobe! O 3º segmento é na acceleration altitude (nivelado). O gradiente de 1.2% é o excesso de energia que deve EXISTIR, mas é usado para ACELERAR de V2 até VFTO e recolher os flaps. Pergunta clássica de entrevista!" },
  { id: "cl4", subject: "obs", q: "No 4º segmento, qual empuxo é usado?", options: ["TOGA prolongado por mais 5 minutos", "MCT — Maximum Continuous Thrust", "Empuxo de subida selecionado CLB", "Empuxo reduzido de cruzeiro econômico"], correct: 1, explanation: "MCT — empuxo máximo contínuo (sem limite de tempo). O TOGA (usado nos 3 primeiros segmentos) tem limite de 5 minutos. No 4º segmento a aeronave já está em flap UP, acelerando até VFTO, subindo até 1.500ft." },
  { id: "cl5", subject: "obs", q: "Qual o tempo máximo de TOGA na certificação padrão?", options: ["3 minutos (até 2007)", "15 minutos para aeronaves cargueiras", "5 minutos (padrão atual)", "10 minutos com aprovação especial"], correct: 2, explanation: "5 minutos. Existe certificação opcional de 10 minutos (mais cara, manutenção diferente), usada em aeroportos de alta altitude. Após o TOGA, deve-se reduzir para MCT. A escolha da acceleration altitude está ligada a esse limite." },
  { id: "cl6", subject: "obs", q: "O que é Level Off Limited Takeoff Weight?", options: ["Peso máximo estrutural da aeronave", "Peso limitado pela pista disponível", "Peso limitado pelo 2º segmento de subida", "Peso que usa exatos 5min de TOGA até accel. alt."], correct: 3, explanation: "É quando a acceleration altitude escolhida faz o avião usar EXATAMENTE 5 minutos de TOGA para chegar lá. Para subir mais alto → mais tempo de TOGA → ou reduz peso ou usa Extended Second Segment / certificação de 10min." },
  { id: "cl7", subject: "obs", q: "O que é Extended Second Segment?", options: ["TOGA até fim do 2º segmento, MCT no 3º", "Usar TOGA por exatos 10 minutos", "Pular completamente o 2º segmento", "Usar flap até o 4º segmento"], correct: 0, explanation: "Usa TOGA até o FIM do 2º segmento, depois MCT no 3º. Todos os 5 minutos de TOGA ficam para SUBIR (1º+2º), permitindo acceleration altitude mais alta sem penalidade de peso. Não requer certificação extra, apenas treinamento." },
  { id: "cl8", subject: "obs", q: "Por que bimotor raramente pede SID alternativa por gradiente, mas quadrimotor sim?", options: ["Bimotor simplesmente é mais leve", "Bimotor tem 100% extra; quadrimotor só 33%", "Bimotor usa mais flap de decolagem", "Quadrimotor tem mais arrasto parasita"], correct: 1, explanation: "Bimotor: 2 motores → 1 = 100% de empuxo sobressalente com todos os motores. Quadrimotor: 4→3 = apenas 33% extra. O gradiente all-engine do bimotor é MUITO maior, cumprindo SIDs íngremes facilmente. O quadrimotor precisa de SID alternativa ou radar vectors." },
  { id: "cl9", subject: "obs", q: "Em curva com motor inoperante, qual falha causa MAIOR raio de curva?", options: ["Motor externo, curva para o lado falhado", "Depende do flap", "Motor interno, curva para o operativo", "Ambas causam o mesmo raio"], correct: 2, explanation: "Falha do motor INTERNO. Nesse caso, você vira PARA o motor operativo, que empurra a aeronave 'para fora' da curva, aumentando o raio. Falha do externo: vira para o falhado, motor operativo 'puxa para dentro', raio MENOR." },
  { id: "cl10", subject: "obs", q: "Gradiente de subida = (T−D)/W. Se T−D é negativo, o que acontece?", options: ["Sobe mais devagar", "Perde velocidade OU altitude", "Impossível, sempre positivo", "Voo nivelado"], correct: 1, explanation: "(T−D)/W negativo = arrasto > empuxo. A aeronave PERDE energia: ou desacelera mantendo altitude, ou desce mantendo velocidade, ou ambos. Situação crítica em decolagem com motor inop." },
  { id: "ic1", subject: "obs", q: "A técnica de Improved Climb consiste em:", options: ["Aumentar a acceleration altitude escolhida", "Usar mais flap na decolagem", "Aumentar V1, VR e V2 para ganhar gradiente", "Reduzir o peso de decolagem"], correct: 2, explanation: "Aumentar V1, VR e V2 para ganhar gradiente de subida. Requer mais pista (não field limited) e resulta em maior peso quando climb limited. O aumento de V2 é o que GERA o ganho — V1 e VR sobem apenas como consequência." },
  { id: "ic2", subject: "obs", q: "Improved Climb pode ser aplicado quando o voo é:", options: ["Field Limited", "Tire Speed Limited", "Brake Energy Limited", "Climb Limited"], correct: 3, explanation: "Quando é CLIMB LIMITED (segundo segmento, por exemplo). IC NÃO funciona em: Field, Tire Speed, ou Brake Energy limits. Em Obstacle Limited, depende da distância do obstáculo (distante: funciona; próximo: pode não funcionar)." },
  { id: "ic3", subject: "obs", q: "Qual velocidade 'causa' o ganho de gradiente no Improved Climb?", options: ["V2", "VR", "V1", "VREF"], correct: 0, explanation: "V2! Aumentar V2 aproxima a aeronave do 'best angle of climb speed' (arrasto mínimo), gerando mais gradiente. V1 e VR também sobem, mas apenas como consequência — não são elas que melhoram o climb." },
  { id: "ic4", subject: "obs", q: "Qual das seguintes NÃO é uma vantagem do Improved Climb?", options: ["Permite assumed temperature maior", "Reduz o Return to Land weight", "Aumenta a tail clearance (menos tail strike)", "Economiza combustível com mesmo empuxo"], correct: 1, explanation: "IC NÃO afeta o Return to Land weight. As outras 3 são vantagens reais, mais: melhor controle em windshear (mais energia). A tail clearance melhora porque pode-se usar flap menor com V2 maior." },
  { id: "ic5", subject: "obs", q: "Improved Climb em obstáculo PRÓXIMO:", options: ["Sempre beneficia a decolagem", "Não altera nada na performance", "Pode prejudicar pois decola perto do obstáculo", "Dobra o peso máximo permitido"], correct: 2, explanation: "Pode PREJUDICAR. Com V2 maior, a aeronave fica airborne mais perto do fim da pista (e mais perto do obstáculo próximo). A subida mais íngreme pode não compensar. Para obstáculos DISTANTES, IC sempre ajuda." },
  { id: "ts1", subject: "obs", q: "VTIRE é medida em relação ao:", options: ["GS, velocidade no solo", "TAS, velocidade verdadeira", "IAS, velocidade no ar", "Mach, velocidade relativa ao som"], correct: 0, explanation: "Ground Speed (solo), não IAS. Por isso aeroportos altos, quentes e com vento de cauda são críticos — aumentam a GS para a mesma IAS. Em dia frio no nível do mar com vento de proa, a GS é menor e fica mais fácil respeitar VTIRE." },
  { id: "ts2", subject: "obs", q: "O pneu pode exceder VTIRE em algum momento?", options: ["Não, é proibição absoluta de regulamento", "Por um curto período de tempo, é tolerado", "Sim, mediante autorização do controle ATC", "Sim, em qualquer condição operacional"], correct: 1, explanation: "UMA única vez, por curto período. A especificação exige que o pneu suporte ultrapassar o limite uma vez (ex: pneu de 225mph pode atingir 250mph 1x). Isso dá margem para situações excepcionais, mas não pode virar rotina." },
  { id: "ts3", subject: "obs", q: "A análise de Tire Speed usa qual cenário?", options: ["Apenas com dois motores em alta potência", "Qualquer cenário, conforme operador", "Todos os motores operando normalmente", "Apenas com motor crítico inop"], correct: 2, explanation: "ALL ENGINE! É uma exceção — quase todas outras análises usam motor inop. O pior caso para pneu é com todos os motores (máxima aceleração → VLOF atingida mais cedo e com mais energia)." },
  { id: "ts4", subject: "obs", q: "Rotação 1°/s mais lenta que o padrão pode adicionar:", options: ["Cerca de 150m extras de pista", "Não há efeito significativo", "Cerca de 50m extras de pista", "Até 400m extras com VLOF maior"], correct: 3, explanation: "Até 400m de pista adicional e aumento significativo da VLOF — risco de exceder VTIRE. A rotação esperada é 2-3°/s. Mais lenta é muito perigoso em decolagens tire-speed limited." },
  { id: "ts5", subject: "obs", q: "Solução quando limitado por Tire Speed:", options: ["Reduzir VR para Tire Speed Limited TOW", "Aumentar V2 acima do mínimo regulamentado", "Aumentar flap para reduzir distância", "Sempre alternar para pista oposta mais longa"], correct: 0, explanation: "Restringir VR (e consequentemente VLOF) → Tire Speed Limited TOW. Usar flap maior ajuda a reduzir VR, mas prejudica climb/obstacle limit, geralmente piorando o cenário. A primeira solução é preferida." },
  { id: "be1", subject: "obs", q: "O teste de certificação de VMBE é feito com freios em qual estado?", options: ["Novos (0% gastos)", "90% gastos", "50% gastos", "100% gastos"], correct: 1, explanation: "90% gastos. O resultado é extrapolado MATEMATICAMENTE para 100% de desgaste, que é o valor usado na operação. É um dos testes MAIS CAROS da certificação de uma aeronave." },
  { id: "be2", subject: "obs", q: "No teste de VMBE, quantos taxis de 3 milhas são feitos antes de acelerar para V1?", options: ["1 taxi", "2 taxis", "3 taxis", "5 taxis"], correct: 2, explanation: "3 taxis completos de 3 milhas cada. O objetivo é aquecer os freios e simular operação real antes da RTO. Depois, acelera até V1 e para SEM usar reverso — apenas freios e speedbrakes." },
  { id: "be3", subject: "obs", q: "Por que o pneu de avião é preenchido com nitrogênio?", options: ["Dura mais tempo dentro do pneu", "Nitrogênio é mais barato", "É mais leve que o ar atmosférico", "Inerte, não alimenta fogo nos freios quentes"], correct: 3, explanation: "Nitrogênio é INERTE — não é combustível nem oxidante. Se os freios superaquecerem e o plug fusível derreter, o gás escapa sem alimentar fogo. Ar normal tem 21% O₂ e poderia alimentar incêndio." },
  { id: "be4", subject: "obs", q: "Quais são os 2 tipos de plugs de segurança em um pneu de aeronave?", options: ["Um por pressão e vários fusíveis por temperatura", "Um plug único, sensível à pressão interna", "Dois plugs idênticos, sensíveis à temperatura", "Três plugs, todos sensíveis à pressão alta"], correct: 0, explanation: "1 plug de OVERINFLATION (virado para fora, estoura por pressão excessiva). Vários plugs INTERNOS fusíveis (derretem por temperatura — quando freios aquecem o gás, o plug derrete antes da pressão explodir o pneu, liberando o gás controladamente). Evita explosão catastrófica." },
  { id: "be5", subject: "obs", q: "Fatores que agravam o limite de Brake Energy (VMBE):", options: ["Dia frio com vento de proa em decolagem", "Dia quente, alta altitude, cauda, descida", "Apenas a temperatura ambiente elevada", "Excesso de pressão nos pneus radiais"], correct: 1, explanation: "Dia quente + alta altitude + vento de cauda + pista em descida. Todos aumentam a GS para mesma IAS, aumentando a energia cinética a ser dissipada. São os mesmos fatores que agravam o Tire Speed (também em GS)." },
  { id: "rtl1", subject: "obs", q: "O limite de Return to Land se aplica a quais aeronaves?", options: ["Aeronaves equipadas com fuel jettison", "Aeronaves com projeto posterior a 2006", "Aeronaves de quatro motores em rotas longas", "Toda aeronave comercial em operação"], correct: 1, explanation: "Apenas aeronaves cujo PROJETO é posterior a 2006 (FAR 25.1001). Aeronaves com projetos anteriores estão isentas, independente do ano de fabricação da unidade específica. A regra foi criada pensando em retorno por emergência médica." },
  { id: "rtl2", subject: "obs", q: "No cálculo de Return to Land, o MLW (Max Landing Weight) é limitante?", options: ["Só para aeronaves quadrimotoras", "Sim, sempre é o fator limitante", "Não, MLW não é considerado limitante aqui", "Depende do operador aéreo"], correct: 2, explanation: "NÃO — Regra 1 do FAR 25.1001. O que importa é o GRADIENTE (Landing Climb e Approach Climb), não o limite estrutural. A aeronave precisa CONSEGUIR voar em configuração de go-around, não suportar o peso no solo." },
  { id: "rtl3", subject: "obs", q: "Aeronave SEM fuel jettison: quanto combustível é considerado queimado antes do pouso?", options: ["5 minutos", "45 minutos", "30 minutos", "15 minutos"], correct: 3, explanation: "15 minutos de queima. Aeronave SEM dump = decola, sobe a 5.000ft AFE, retorna e pousa — queima 15min. Aeronave COM dump = 15min queima + 15min dump = 30min total." },
  { id: "rtl4", subject: "obs", q: "O Landing Climb exige qual gradiente mínimo e para quantos motores?", options: ["3.2% para qualquer número de motores", "Varia conforme o motor", "2.1% apenas para bimotor", "3.2% apenas para bimotor"], correct: 0, explanation: "3.2% ÚNICO para qualquer aeronave (2, 3 ou 4 motores). Isso porque o Landing Climb considera TODOS os motores operando (flap pouso, trem down, takeoff power, VREF). Não varia com número de motores." },
  { id: "rtl5", subject: "obs", q: "O Approach Climb exige qual gradiente para bi / tri / quadrimotor?", options: ["2.4% / 2.7% / 3.0%", "2.1% / 2.4% / 2.7%", "1.2% / 1.5% / 1.7%", "3.2% / 3.2% / 3.2%"], correct: 1, explanation: "2.1% / 2.4% / 2.7%. Motor CRÍTICO INOP (bi perde 50%, tri perde 33%, quad perde 25%). Flap approach, trem UP, takeoff power, VREF+5kt. Quem perde mais empuxo (bimotor), recebe gradiente menor para ser justo." },
  { id: "rtl6", subject: "obs", q: "Apesar do nome, o 'Approach Climb' se refere a qual configuração?", options: ["Circuit to land padrão", "Aproximação final normal estabilizada", "Missed approach com flap approach e trem up", "Visual approach em VFR"], correct: 2, explanation: "Missed approach (go-around): flap APPROACH (intermediário) e trem JÁ RECOLHIDO, com motor crítico inop. O nome é confuso — parece se referir à aproximação, mas é pós-arremetida. O Landing Climb sim é em config de pouso." },
  { id: "rtl7", subject: "obs", q: "Por que alguns fabricantes usam o nome 'Fuel Jettison Limited' mesmo em aeronaves SEM fuel jettison?", options: ["Erro de revisão no manual", "Para alertar o piloto visualmente", "Exigência regulatória obrigatória", "Consistência em toda a linha do fabricante"], correct: 3, explanation: "Consistência de terminologia. Alguns fabricantes preferem manter o mesmo nome em toda a linha, mesmo em aeronaves sem sistema de dump. Outros usam 'Return to Land Limited' nesses casos para ser mais claro. É o mesmo conceito com nomes diferentes." },
  { id: "en1", subject: "eng", q: "Motores turbofan modernos de aeronaves comerciais têm bypass ratio tipicamente:", options: ["Menor que 1:1", "Entre 5:1 e 12:1", "Entre 2:1 e 3:1", "Maior que 20:1"], correct: 1, explanation: "Entre 5:1 e 12:1 tipicamente. Quanto maior o bypass ratio, mais eficiente o motor. Geração anterior: ~5:1. Motores mais modernos (geared turbofans): até ~12:1. Bypass ratio = ar que passa FORA do core ÷ ar que passa DENTRO (combustão)." },
  { id: "en2", subject: "eng", q: "O que representa N1 e N2?", options: ["N1 é compressor HP, N2 é compressor LP", "N1 é combustor, N2 é turbina", "N1 é fan e LP, N2 é compressor HP", "São sinônimos do mesmo eixo"], correct: 2, explanation: "N1 = fan + compressor de BAIXA pressão (low pressure spool). N2 = compressor de ALTA pressão (high pressure spool). Eixos CONCÊNTRICOS e independentes. O N2 gira muito mais rápido que o N1 tipicamente." },
  { id: "en3", subject: "eng", q: "O que é Flat Rate Temperature (FRT)?", options: ["Temperatura mínima para partida do motor", "Temperatura ideal de combustão", "Temperatura máxima de EGT permitida", "Temperatura máxima com empuxo máximo"], correct: 3, explanation: "É a temperatura máxima (normalmente ISA+15 = 30°C ao nível do mar) em que o motor ainda produz empuxo máximo. Abaixo da FRT: empuxo constante (pressure limited). Acima da FRT: empuxo CAI (temperature limited)." },
  { id: "en4", subject: "eng", q: "Abaixo da FRT, o motor é limitado por:", options: ["Pela pressão na câmara de combustão", "Pela temperatura de saída do EGT", "Pela rotação do compressor N1", "Pelo consumo total de combustível"], correct: 0, explanation: "PRESSÃO. Ar frio/denso produz muita pressão nos compressores. Para não exceder o limite mecânico da câmara, a rotação é reduzida. O empuxo permanece CONSTANTE porque a razão de pressão (EPR) é mantida." },
  { id: "en5", subject: "eng", q: "Acima da FRT, o motor é limitado por:", options: ["Pela pressão na câmara de combustão", "Pela EGT — Exhaust Gas Temperature", "Pelo fluxo total de combustível", "Pela razão de bypass do motor"], correct: 1, explanation: "EGT. Ar quente entrando → ar quente saindo. Para não exceder o limite de EGT (que danifica turbinas), a razão de compressão é reduzida, reduzindo o empuxo. Por isso dias quentes/alta altitude = menos empuxo disponível." },
  { id: "en6", subject: "eng", q: "Apenas TOGA e MCT são valores de empuxo CERTIFICADOS. Max Climb e Max Cruise são:", options: ["Também certificados no AFM", "Obsoletos em motores modernos", "Valores do operador, não aparecem no AFM", "Usados somente em emergência"], correct: 2, explanation: "Max Climb e Max Cruise aparecem no Operations Manual mas NÃO são certificados (não estão no AFM). Apenas TOGA (5min padrão / 10min opcional) e MCT (sem limite) são certificações oficiais do motor." },
  { id: "en7", subject: "eng", q: "Conforme o motor envelhece, o que acontece com a margem de EGT?", options: ["Aumenta ao longo do tempo do motor", "Aumenta apenas após o overhaul", "Fica constante por todo ciclo de vida", "Diminui com o envelhecimento do motor"], correct: 3, explanation: "DIMINUI. Com deterioração das palhetas e outros componentes, é preciso mais calor para gerar o mesmo empuxo → EGT sobe. Quando a margem (entre EGT atual e limite de design) esgota, o motor precisa de overhaul." },
  { id: "en8", subject: "eng", q: "Qual a função do starter no motor?", options: ["Dar rotação inicial até auto-sustentação", "Manter o motor funcionando contínuo", "Controlar e monitorar a EGT", "Injetar combustível no motor"], correct: 0, explanation: "Dar rotação inicial ao N2. O motor a jato precisa de ar comprimido para a reação — sem rotação inicial, isso não acontece. O starter acelera o N2 até velocidade auto-sustentada, depois é DESACOPLADO mecanicamente." },
  { id: "rt1", subject: "eng", q: "Quais são os 2 métodos principais de Reduced Thrust?", options: ["Derated e MCT em conjunto", "MCT e Max Climb alternados", "Assumed Temperature e Derated Thrust", "ATM e TOGA máximo combinados"], correct: 2, explanation: "1) Assumed Temperature Method (ATM) — também conhecido como Flex Temp. Assume temperatura fictícia maior. 2) Derated Thrust — usa certificação diferente do motor com thrust rating menor. São abordagens distintas com implicações operacionais diferentes (especialmente em emergência)." },
  { id: "rt2", subject: "eng", q: "A diferença MAIS CRÍTICA entre ATM e Derated Thrust é:", options: ["A nomenclatura técnica usada nos manuais", "O consumo total de combustível gerado", "O custo operacional comparativo dos dois", "Em emergência ATM permite TOGA, derated não"], correct: 3, explanation: "CRÍTICA: No ATM, em emergência (windshear, obstáculo), o piloto pode avançar as manetes e obter TOGA completo — a redução é apenas 'virtual'. No Derated, o motor foi CERTIFICADO com thrust rating menor — o TOGA original NÃO está disponível. Pergunta clássica de entrevista." },
  { id: "rt3", subject: "eng", q: "O Reduced Thrust pode ser usado em pista contaminada?", options: ["Não, pista contaminada exige empuxo máximo", "Sim, se combinado com derated específico", "Sim, sem restrições para a operação normal", "Sim, em aeronaves bimotoras de fuselagem média"], correct: 0, explanation: "NÃO, regra geral. Pista contaminada (neve, gelo, slush) exige empuxo MÁXIMO por segurança. Alguns operadores permitem em pista molhada (wet) com restrições, mas contaminada é quase sempre proibido." },
  { id: "rt4", subject: "eng", q: "Qual a principal vantagem do Reduced Thrust?", options: ["Menor consumo de combustível total", "Vida do motor com menor EGT e manutenção", "Maior peso de decolagem permitido", "Decolagem mais rápida e eficiente"], correct: 1, explanation: "VIDA ÚTIL do motor. Menor empuxo → menor razão de compressão → menor EGT. Cada grau a menos prolonga a vida das turbinas. Custo de manutenção de motor é altíssimo — essa é a principal motivação econômica. Benefícios secundários: menos ruído, menos consumo momentâneo." },
  { id: "rt5", subject: "eng", q: "O Reduced Thrust pode ser usado quando a aeronave está no peso máximo?", options: ["Permitido em aeronaves bimotoras leves", "Depende da política do fabricante do motor", "Não, já se precisa do TOGA sem margem alguma", "Sim, em qualquer cenário com pista longa"], correct: 2, explanation: "NÃO. Se o peso real está NO MÁXIMO permitido para aquelas condições, a aeronave precisa do TOGA completo — não há margem para reduzir. Reduced Thrust só faz sentido quando o peso real é MENOR que o máximo." },
  { id: "rt6", subject: "eng", q: "Com Reduced Thrust, o que acontece com V1, VR e V2?", options: ["Diminuem proporcionalmente", "Apenas V2 muda ligeiramente", "Ficam idênticas ao normal", "Aumentam para compensar menor aceleração"], correct: 3, explanation: "AUMENTAM geralmente. Menor empuxo = menor aceleração. Para compensar (especialmente V1 para viabilizar parada), as velocidades sobem. Por isso o Reduced Thrust só funciona se há pista sobrando — se fosse field limited, não caberia." },
  { id: "rt7", subject: "eng", q: "Quem é responsável por definir a política de Reduced Thrust?", options: ["A companhia aérea com aprovação do regulador", "O piloto em comando decide", "A ICAO define globalmente", "O fabricante da aeronave certifica"], correct: 0, explanation: "A COMPANHIA AÉREA. Cada operador desenvolve sua política, submete ao regulador (ANAC, FAA, EASA) para aprovação, e depois fiscaliza o uso. Pilotos seguem o procedimento da empresa — não decidem sozinhos." },
  { id: "rt8", subject: "eng", q: "No Assumed Temperature Method, o piloto informa ao computador:", options: ["Informa a temperatura desejada de EGT", "Informa uma temperatura fictícia maior", "Informa a temperatura da câmara", "Informa a temperatura externa real"], correct: 1, explanation: "Uma temperatura MAIOR que a real. Ex: real 20°C, assumida 50°C. O computador calcula V-speeds e N1 para essa temperatura fictícia, que darão menor empuxo. Mas o motor continua capaz de TOGA completo se necessário — é a grande diferença para Derated." },
  { id: "rt9", subject: "eng", q: "Qual a redução MÁXIMA de empuxo permitida pelo ATM convencional?", options: ["40% do empuxo TOGA", "50% do empuxo TOGA", "25% do empuxo TOGA", "10% do empuxo TOGA"], correct: 2, explanation: "25% é o limite convencional. Algumas aeronaves específicas (B777/A330) têm certificação especial para 40%. A regra dos 25% protege a margem de segurança para emergências durante a decolagem." },
  { id: "rt10", subject: "eng", q: "ATM altera a V1(MCG)?", options: ["Não, sempre calculada no empuxo máximo", "Sim, sempre aumenta", "Sim, reduz proporcionalmente", "Apenas em pista contaminada"], correct: 0, explanation: "NÃO. V1(MCG) é sempre calculada no empuxo MÁXIMO da Rate selecionada, pois o piloto pode avançar manete e recuperar TOGA durante a decolagem. Já o Derate REDUZ V1(MCG) (novo limite físico definitivo)." },
  { id: "rt11", subject: "eng", q: "Qual a temperatura MÍNIMA que pode ser assumida no ATM?", options: ["A temperatura real do dia da operação", "O maior entre FRT e OAT mais 1°C", "OAT mais 1°C como referência simples", "A FRT da elevação atual sempre"], correct: 1, explanation: "O MAIOR entre FRT e OAT+1°C. Não pode ser menor que real (aumentaria empuxo). Não pode ser menor que FRT (não reduziria nada — empuxo é constante abaixo de FRT)." },
  { id: "rt12", subject: "eng", q: "ATM é permitido em pista CONTAMINADA?", options: ["Sim, com aprovação especial", "Sim, sem restrição", "Não, proibido por regulamento", "Apenas com Derate simultâneo"], correct: 2, explanation: "NÃO. ATM e Derate são PROIBIDOS em pista contaminada (exige empuxo máximo) ou com anti-skid INOP. Apenas em pista seca/molhada (esta com restrições do operador)." },
  { id: "rt13", subject: "eng", q: "Cada 1°C de aumento na temperatura assumida (ATM) reduz a EGT em quanto?", options: ["Cerca de 1°C, proporção direta", "Não há relação direta com EGT", "Cerca de 10°C, ganho exponencial", "Cerca de 3 a 4°C por 1°C de ATM"], correct: 3, explanation: "3 a 4°C de EGT por cada 1°C de ATM. Por isso o ATM é tão valioso para vida do motor: pequenas reduções aplicadas em todo voo geram grandes economias de manutenção." },
  { id: "rt14", subject: "eng", q: "Reduzido por ATM e Derate podem ser combinados ilimitadamente?", options: ["Não, limite combinado típico é 25%", "Limitado pelo VMCG da pista em uso", "Sim, redução total ilimitada permitida", "Permitido apenas em pista contaminada"], correct: 0, explanation: "Cada fabricante define sua regra: alguns permitem combinar ATM com Derate até 25% total; outros exigem escolher apenas um método. Em qualquer caso, a redução combinada NÃO pode exceder o limite regulamentar (geralmente 25%)." },
  { id: "v1mcg1", subject: "eng", q: "V1(MCG) Limited Takeoff Weight ocorre quando:", options: ["Quando V1 fica igual ao V2", "Quando V1 balanceada cai abaixo de V1(MCG)", "Quando V1 fica igual à VR", "Quando V1 balanceada é maior que V1(MCG)"], correct: 1, explanation: "Quando a balanced V1 calculada cai ABAIXO de V1(MCG). Como é proibido decolar com V1<V1(MCG), eleva-se V1 para V1(MCG) — isso aumenta ASD necessária, exigindo REDUZIR peso de decolagem (penalidade)." },
  { id: "v1mcg2", subject: "eng", q: "Em que situação rara o DERATE pode AUMENTAR o peso máximo de decolagem?", options: ["Em pista curta e escorregadia", "Em rotas com altitudes muito elevadas", "Em qualquer condição operacional normal", "Em aeronaves quadrimotoras de carga"], correct: 0, explanation: "Em pistas CURTAS e WET/SLIPPERY com V1(MCG) Limited TOW. Derate REDUZ V1(MCG), aliviando a penalidade. Empuxo menor = menos pista necessária para parar antes do fim. Contraintuitivo mas verdadeiro." },
  { id: "bmp1", subject: "eng", q: "O que é Takeoff Pressure Bump?", options: ["Sistema anti-stall do compressor", "Reduz empuxo em alta altitude", "Aumenta apenas a EGT máxima", "Aumenta pressão na câmara e empuxo"], correct: 3, explanation: "Permite que a pressão na câmara de combustão exceda o limite original, aumentando RPM e EMPUXO em temperaturas baixas. Resultado: mais empuxo disponível, mas FRT cai (atinge EGT limite a temperatura menor)." },
  { id: "bmp2", subject: "eng", q: "Qual a diferença entre Pressure Bump e Temperature Bump?", options: ["Pressure aumenta empuxo, Temperature mantém empuxo até T maior", "Temperature aumenta empuxo, Pressure reduz EGT", "Ambos aumentam a EGT máxima", "São termos sinônimos no manual"], correct: 0, explanation: "PRESSURE BUMP: aumenta empuxo (FRT cai). TEMPERATURE BUMP: mantém empuxo até temperatura mais alta (FRT sobe). Ambos comprometem margem do motor." },
  { id: "pl1", subject: "obs", q: "O PLTOW (Performance Limited TOW) é o menor entre quais limites?", options: ["Entre MTOW, MLW e MZFW estruturais", "Entre Climb Limit e Tire Speed Limit", "Entre Field Limit e Obstacle Limit", "Menor entre Field, Obstacle, Tire, Brake, Climb"], correct: 3, explanation: "PLTOW = menor entre Field/Obstacle/Tire/Brake (=RLTOW) e Climb e Return to Land. Os limites ESTRUTURAIS (MTOW, MLW+TripFuel, MZFW+TOFuel, PCN) são comparados DEPOIS para chegar ao Maximum Allowable TOW final." },
  { id: "pl2", subject: "obs", q: "Duas aeronaves IDÊNTICAS podem ter MTOWs diferentes?", options: ["Sim, é apenas diferença no AFM", "Apenas com motores diferentes", "Não, é impossível", "Apenas se forem fabricantes diferentes"], correct: 0, explanation: "SIM! MTOW é só certificação no AFM. Mesmo 737-800 pode ser 70.5/72.5/75/79t — escolhido pelo operador na compra. Operador paga diferença, atualiza o documento, aeronave fica igual mecanicamente." },
  { id: "pl3", subject: "obs", q: "Por que um operador escolheria certificar MTOW menor?", options: ["Para diminuir o consumo de combustível", "Por taxas operacionais menores na frota", "Para não pagar imposto sobre combustível", "Para reduzir o desempenho operacional"], correct: 1, explanation: "Custos operacionais são proporcionais ao MTOW certificado: taxas de pouso, navegação, seguro, comunicação. Para voos curtos com pouco payload, certificar MTOW menor economiza dinheiro continuamente." },
  { id: "pl4", subject: "obs", q: "O que é Fuel Tankage Limited Weight?", options: ["Peso máximo certificado com tanque vazio", "Tanque atingiu pressão máxima permitida", "Peso reduzido para tanque cheio dar autonomia", "Limite imposto pelo PCN da pista"], correct: 2, explanation: "Quando tanque cheio não oferece endurance suficiente, reduz-se peso de decolagem. Aeronave mais leve queima menos por hora → o mesmo combustível voa mais distância. Vira novo limite acima do MZFW." },
  { id: "ct1", subject: "contam", q: "Que percentual de cobertura define pista CONTAMINADA?", options: ["25%", "10%", "50%", "75%"], correct: 0, explanation: "25% ou mais da superfície coberta com contaminante. Abaixo disso, é considerada wet (água) ou seca. Espessura mínima de contaminante: 3mm (1/8in)." },
  { id: "ct2", subject: "contam", q: "Quais são contaminantes LOOSE (fluidos)?", options: ["Gelo e neve compactada em camada sólida", "Água, slush, neve e frost", "Apenas água acumulada na superfície", "Gelo de superfície formado durante a noite"], correct: 1, explanation: "LOOSE: água, slush, neve (úmida/seca) e frost. Geram resistência hidrodinâmica contra o pneu. Contaminantes SOLID (gelo, wet ice, neve compactada) permitem aceleração quase normal MAS comprometem controle e frenagem." },
  { id: "ct3", subject: "contam", q: "Hydroplaning Speed depende principalmente de:", options: ["Peso da aeronave", "Velocidade do vento", "Pressão dos pneus", "Temperatura ambiente"], correct: 2, explanation: "Hydroplaning Speed é função direta da pressão dos pneus — maior pressão eleva a velocidade na qual o pneu pode 'flutuar' sobre a água. Por isso aeronaves com pneus de alta pressão hidroplanam em velocidades mais altas (e o tipo de pneu importa para o limite)." },
  { id: "ct4", subject: "contam", q: "Em pista MOLHADA, a aceleração é igual à seca?", options: ["Reduz se houver vento de proa", "Não, é sempre reduzida pela água", "Depende da temperatura do ambiente", "Sim, aceleração depende do empuxo"], correct: 3, explanation: "SIM. Aceleração depende do EMPUXO, não do atrito do pneu. O que muda em wet é a FRENAGEM (pior). Em pista CONTAMINADA com camada de água/slush, aí sim há perda de aceleração (resistência hidrodinâmica)." },
  { id: "ct5", subject: "contam", q: "Em pista contaminada, bimotor com 1 motor inop pode ter qual aceleração?", options: ["Próxima de zero ou até negativa", "Próxima da aceleração normal seca", "Cerca de metade da aceleração normal", "Levemente reduzida, mas suficiente"], correct: 0, explanation: "Pode ir para ZERO ou NEGATIVA. Bimotor perde 50% empuxo, arrasto aumenta, e em pista com 6mm de slush a aeronave pode DESACELERAR mesmo com a remanescente em TOGA. Limites de peso são muito agressivos." },
  { id: "ct6", subject: "contam", q: "Speedbrakes/spoilers no pouso em pista escorregadia: quanto melhor?", options: ["10% mais frenagem", "92% mais frenagem", "30% mais frenagem", "60% mais frenagem"], correct: 1, explanation: "Estudo Boeing 777: +63% em pista seca, +92% em pista escorregadia. Spoilers tiram sustentação, colocando o PESO sobre as rodas → mais atrito disponível → muito mais frenagem útil." },
  { id: "ct7", subject: "contam", q: "Por que speedbrakes são tão críticos em pista escorregadia?", options: ["Aumentam o arrasto aerodinâmico no toque", "Reduzem velocidade aerodinamicamente", "Colocam peso nas rodas, mais atrito", "Travam o sistema de reversores"], correct: 2, explanation: "Spoilers TIRAM sustentação da asa, transferindo peso para as rodas. Mais peso na roda = mais atrito = mais frenagem útil. Em escorregada, atrito é o limite — peso multiplica o efeito do freio." },
  { id: "ct8", subject: "contam", q: "Quais são os níveis padronizados de braking action?", options: ["Numerado de 1 até 5 conforme atrito", "Padrão simplificado Good Medium Poor", "Padrão binário Good ou Poor apenas", "Good, GMed, Med, MPoor, Poor, Nil"], correct: 3, explanation: "Good, Good-to-Medium, Medium, Medium-to-Poor, Poor, Nil. Há ainda Dry. Nil = pouso/decolagem PROIBIDO. Usado em PIREP e ATIS." },
  { id: "ct9", subject: "contam", q: "Veer Off Risk com reverso em pista escorregadia: a solução é?", options: ["Depende da pista restante disponível", "Manter reverso até parar completamente", "Desligar reverso para evitar veer off", "Aplicar leme oposto compensando o desvio"], correct: 0, explanation: "Decisão em tempo real. Se há pista para parar sem reverso → desligar (evita veer off). Se não há → manter (overrun é pior). Sem receita única — Sophie's choice do piloto." },
  { id: "wn1", subject: "obs", q: "Qual a regra de vento para cálculo de performance?", options: ["50% headwind máx / 150% tailwind mín", "150% headwind / 50% tailwind", "100% headwind / 100% tailwind", "Vento real sempre"], correct: 0, explanation: "HEADWIND: máximo 50% creditado. TAILWIND: mínimo 150% considerado. Já incluído nas tabelas — não aplicar duas vezes. Compensa variabilidade do vento real durante decolagem." },
  { id: "wn2", subject: "obs", q: "A regra 50%/150% se aplica ao Climb Limited TOW?", options: ["Sim, o vento afeta todos os cálculos", "Não, o gradiente independe do vento", "Só vento de cauda forte é considerado", "Vento de 20kt+ sim, abaixo é descartado"], correct: 1, explanation: "NÃO. Climb Limited e Return to Land se baseiam em GRADIENTE (ângulo). Vento muda GS mas não IAS, e gradiente vem de IAS/peso/empuxo. Vento só afeta cálculos de DISTÂNCIA." },
  { id: "ai1", subject: "obs", q: "Quando é obrigatório anti-ice na decolagem?", options: ["OAT ≤ 5°C basta para a obrigatoriedade", "OAT ≤ 10°C com umidade visível", "Em chuva forte de qualquer intensidade", "Em operação noturna com visibilidade reduzida"], correct: 1, explanation: "OAT ≤ 10°C E umidade visível (precipitação, água/neve no solo, ou fog com vis ≤ 1600m). AMBAS condições devem ocorrer juntas — falta uma, não usa." },
  { id: "ai2", subject: "obs", q: "OAT 8°C, céu claro, taxiway seco: anti-ice necessário?", options: ["Sim, temperatura ≤ 10°C", "Sim, por segurança", "Não, falta umidade visível", "Apenas a wing anti-ice"], correct: 2, explanation: "NÃO. A regra é AND: temperatura ≤ 10°C SOMADO a umidade visível. Sem umidade, sem necessidade. Apenas temperatura baixa não é suficiente." },
  { id: "fl1", subject: "dist", q: "Pista FIELD LIMITED: mais flap aumenta ou diminui peso máximo?", options: ["Aumenta (VR e V2 menores)", "Diminui (mais arrasto na rotação)", "Não afeta o peso de decolagem", "Depende da temperatura de FRT"], correct: 0, explanation: "AUMENTA. Mais flap = sustentação maior em V menor = VR/V2 menores = menos pista. Em pista curta, flap MAIOR. Penaliza obstacle/climb (mais arrasto)." },
  { id: "fl2", subject: "dist", q: "Pista OBSTACLE/CLIMB LIMITED: mais flap aumenta ou diminui peso máximo?", options: ["Aumenta (mais sustentação de decolagem)", "Diminui (mais arrasto, menos gradient)", "Não afeta os limites de gradiente", "Depende do componente de vento"], correct: 1, explanation: "DIMINUI. Mais flap = mais arrasto = gradiente menor. Em decolagens limitadas por obstáculo ou subida, flap MENOR. Trade-off: pouco flap pede mais pista, muito flap pede menos gradiente." },
  { id: "fl3", subject: "dist", q: "O que é OPTIMUM FLAP?", options: ["Flap mínimo certificado pela ANAC", "Flap padrão definido pelo FCOM", "Flap que dá maior peso final", "Flap calculado a partir da VMCG"], correct: 2, explanation: "Flap que resulta no MAIOR peso de decolagem após Field/Obstacle/Climb. Cada flap dá peso máximo distinto — pega-se o menor de cada flap (limitante), depois o flap que vence entre todos." },
  { id: "cg1", subject: "obs", q: "Performance de decolagem é calculada com qual posição de CG?", options: ["CG do voo anterior salvo", "CG aft, na parte traseira do envelope", "CG neutro entre limites", "CG mais forward no envelope"], correct: 3, explanation: "CG mais FORWARD. Posição mais DESFAVORÁVEL: nariz pesado, difícil rotacionar, exige mais sustentação. Garante margem para qualquer CG real do voo." },
  { id: "cg2", subject: "obs", q: "O que é Alternate Forward CG?", options: ["Certificação que ENCOLHE o envelope na frente", "Mover o CG real para frente", "Operação com tanque traseiro vazio", "Sistema de balanceamento automático"], correct: 0, explanation: "Certificação OPCIONAL que move o LIMITE forward do envelope para TRÁS (envelope menor). Cálculo passa a usar CG menos forward → V2 menor → mais peso de decolagem permitido. Nome confunde: não move CG real." },
  { id: "st1", subject: "obs", q: "Quais 4 fatores definem o Stabilizer Trim de decolagem?", options: ["V1, VR, V2, VREF", "MTOW, MLW, MZFW, PCN", "ATOW, CG, flap, empuxo", "Vento, slope, OAT, altitude"], correct: 2, explanation: "ATOW (peso real), CG, flap e empuxo. Antigas aeronaves usam empuxo MÁXIMO da Rate (ignoram ATM). 737MAX/787/747-8 já consideram empuxo REAL após ATM." },
  { id: "cp1", subject: "speeds", q: "Qual a diferença entre Vx e Vy?", options: ["Vx para subida, Vy para descida", "São considerados sinônimos técnicos", "Vx maior taxa, Vy maior ângulo", "Vx maior ângulo, Vy maior taxa"], correct: 3, explanation: "Vx = maior ângulo (menor distância para alcançar altitude). Vy = maior taxa (menor tempo). Vx maximiza thrust excess; Vy maximiza power excess. Vy é SEMPRE maior que Vx." },
  { id: "cp2", subject: "speeds", q: "O Minimum Fuel Burn Climb Speed é o menor consumo DURANTE a subida?", options: ["Não, é o menor consumo total A→B", "Sim, é o menor consumo durante a subida", "Sim, com correção para vento calmo", "Sim, válido apenas em jatos modernos"], correct: 0, explanation: "NÃO! É menor consumo no VOO TOTAL (A→B). Subir mais rápido gasta mais por minuto na subida, mas atinge FL otimizado antes, economizando no cruzeiro. Resposta certa para a pergunta errada." },
  { id: "cp3", subject: "speeds", q: "O que é Crossover Altitude?", options: ["Altitude máxima certificada da aeronave", "Onde IAS e Mach dão mesma TAS", "Tropopausa em atmosfera padrão", "Limite imposto pelo espaço aéreo"], correct: 1, explanation: "Altitude onde IAS escolhida e Mach escolhido representam a MESMA TAS. Abaixo: IAS dá menor TAS. Acima: Mach dá menor TAS. Voa-se sempre na menor — então transição IAS→Mach acontece no crossover." },
  { id: "cr1", subject: "cruise", q: "O que é MRC (Maximum Range Cruise)?", options: ["Velocidade máxima estrutural certificada", "VMO menos 10 nós sempre", "Pico do gráfico de Fuel Mileage", "Mach 0.85 fixo para jatos"], correct: 2, explanation: "Velocidade do PICO da curva de Fuel Mileage (NM por kg). Maior distância por combustível para dado peso e altitude. Equivale a CI 0 (Cost Index zero)." },
  { id: "cr2", subject: "cruise", q: "Qual a definição de LRC (Long Range Cruise)?", options: ["Mach 0.80 em qualquer aeronave", "10% mais rápido que o MRC fixo", "Velocidade do menor consumo absoluto", "1% penalty no mileage por 3-5% velocidade"], correct: 3, explanation: "Concede 1% de penalidade no fuel mileage para ganhar 3-5% de velocidade. Sai do pico para região levemente à direita. Criado nos anos 70 com motores de alto bypass — trade-off muito favorável." },
